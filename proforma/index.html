<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Proforma Builder — XLMX</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#111;color:#fff;font-family:Inter,system-ui,sans-serif;min-height:100vh;padding:20px}
h1{font-size:1.6rem;margin-bottom:4px}p.sub{color:#999;margin-bottom:20px;font-size:.85rem}
.card{background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:.8rem;margin-bottom:4px}
input,select{width:100%;padding:10px;background:#222;border:1px solid #444;border-radius:8px;color:#fff;font-size:.95rem;margin-bottom:12px}
button{padding:12px 20px;background:#16a34a;color:#fff;border:none;border-radius:8px;font-size:.95rem;cursor:pointer;font-weight:600;margin-right:8px}
button:hover{background:#15803d}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
h3{color:#16a34a;font-size:.9rem;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #2a3a2a}
.result{display:none}
.section-title{font-size:.8rem;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;margin-top:4px}
.row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222;font-size:.85rem}
.row span:first-child{color:#aaa}.row span:last-child{color:#fff;font-weight:500}
.row.total{border-top:1px solid #16a34a;border-bottom:none;margin-top:4px;padding-top:10px}
.row.total span{color:#16a34a;font-weight:700;font-size:.95rem}
.kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.kpi-box{background:#0a2a0a;border:1px solid #16a34a33;border-radius:8px;padding:14px;text-align:center}
.kpi-box .val{font-size:1.5rem;font-weight:700;color:#16a34a}.kpi-box .lbl{font-size:.7rem;color:#aaa;margin-top:4px}
a.back{color:#16a34a;text-decoration:none;font-size:.85rem;display:inline-block;margin-bottom:16px}
@media(max-width:600px){.grid2,.grid3,.kpi{grid-template-columns:1fr}}
</style></head><body>
<a class="back" href="/">← XLMX</a>
<h1>Proforma Builder</h1>
<p class="sub">Real estate development proforma — costs, revenue, returns in one sheet</p>

<div class="card">
<h3>Project Info</h3>
<div class="grid2">
<div><label>Project Name</label><input id="name" placeholder="Project Beta Phase 1"></div>
<div><label>Asset Type</label>
<select id="type"><option>Multifamily</option><option>Mixed-Use</option><option>Office</option><option>Retail</option><option>Industrial</option><option>Hotel</option><option>For-Sale Residential</option></select></div>
<div><label>Total GBA (sqft)</label><input id="gba" type="number" value="50000" step="1000"></div>
<div><label>Net Rentable / Sellable (sqft)</label><input id="nra" type="number" value="42000" step="1000"></div>
<div><label>Number of Units</label><input id="units" type="number" value="60"></div>
<div><label>Hold Period (years)</label><input id="hold" type="number" value="5"></div>
</div>
</div>

<div class="card">
<h3>Development Costs</h3>
<div class="grid2">
<div><label>Land Cost ($)</label><input id="land" type="number" value="1500000" step="50000"></div>
<div><label>Hard Costs ($/sqft GBA)</label><input id="hard" type="number" value="180" step="5"></div>
<div><label>Soft Costs (% of Hard)</label><input id="soft" type="number" value="18" step="1"></div>
<div><label>Financing Costs (% of Total)</label><input id="fin" type="number" value="5" step="0.5"></div>
<div><label>Contingency (%)</label><input id="cont" type="number" value="8" step="1"></div>
<div><label>Developer Fee (% of Hard)</label><input id="devfee" type="number" value="5" step="1"></div>
</div>
</div>

<div class="card">
<h3>Revenue Assumptions</h3>
<div class="grid2">
<div><label>Average Rent ($/unit/mo) or Price/sqft ($)</label><input id="rev" type="number" value="1800" step="50"></div>
<div><label>Vacancy Rate (%)</label><input id="vac" type="number" value="5" step="0.5"></div>
<div><label>Operating Expenses (% of EGI)</label><input id="opex" type="number" value="35" step="1"></div>
<div><label>Exit Cap Rate (%)</label><input id="exitCap" type="number" value="5.5" step="0.25"></div>
<div><label>Annual Rent Growth (%)</label><input id="growth" type="number" value="3" step="0.5"></div>
<div><label>Target Equity ($)</label><input id="equity" type="number" value="4000000" step="100000"></div>
</div>
</div>

<button onclick="calc()">Build Proforma</button>

<div class="result" id="res">
<div class="card">
<div class="kpi" id="kpi"></div>
<h3>Development Cost Summary</h3>
<div id="costRows"></div>
<br>
<h3>Income & Returns</h3>
<div id="incomeRows"></div>
</div>
</div>

<script>
function fmt(n,d=0){return'$'+n.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d})}
function pct(n,d=1){return n.toFixed(d)+'%'}
function row(l,v,cls=''){return`<div class="row ${cls}"><span>${l}</span><span>${v}</span></div>`}

function calc(){
  const gba=+document.getElementById('gba').value, nra=+document.getElementById('nra').value;
  const units=+document.getElementById('units').value, hold=+document.getElementById('hold').value;
  const land=+document.getElementById('land').value;
  const hardPSF=+document.getElementById('hard').value;
  const softPct=+document.getElementById('soft').value/100;
  const finPct=+document.getElementById('fin').value/100;
  const contPct=+document.getElementById('cont').value/100;
  const devFeePct=+document.getElementById('devfee').value/100;
  const revUnit=+document.getElementById('rev').value;
  const vacPct=+document.getElementById('vac').value/100;
  const opexPct=+document.getElementById('opex').value/100;
  const exitCap=+document.getElementById('exitCap').value/100;
  const growthPct=+document.getElementById('growth').value/100;
  const targetEq=+document.getElementById('equity').value;

  const hardCost=gba*hardPSF;
  const softCost=hardCost*softPct;
  const devFee=hardCost*devFeePct;
  const subtotal=land+hardCost+softCost+devFee;
  const cont=subtotal*contPct;
  const preFinTotal=subtotal+cont;
  const finCost=preFinTotal*finPct;
  const totalCost=preFinTotal+finCost;
  const costPerUnit=totalCost/units;
  const costPSF=totalCost/gba;

  // Income
  const pgi=units*revUnit*12;
  const egi=pgi*(1-vacPct);
  const noi=egi*(1-opexPct);
  // Stabilized NOI at year hold with growth
  const noiAtExit=noi*Math.pow(1+growthPct,hold);
  const exitValue=noiAtExit/exitCap;
  const profit=exitValue-totalCost;
  const roi=(profit/targetEq)*100;
  // Simple IRR approx: (exitValue/totalCost)^(1/hold)-1
  const irr=(Math.pow(exitValue/totalCost,1/hold)-1)*100;
  const equityMultiple=exitValue/targetEq;
  const capRateOnCost=(noi/totalCost)*100;

  document.getElementById('kpi').innerHTML=
    `<div class="kpi-box"><div class="val">${pct(irr)}</div><div class="lbl">Levered IRR (est.)</div></div>`+
    `<div class="kpi-box"><div class="val">${equityMultiple.toFixed(2)}x</div><div class="lbl">Equity Multiple</div></div>`+
    `<div class="kpi-box"><div class="val">${pct(capRateOnCost)}</div><div class="lbl">Cap Rate on Cost</div></div>`;

  document.getElementById('costRows').innerHTML=
    row('Land',fmt(land))+row('Hard Costs',fmt(hardCost))+row('Soft Costs',fmt(softCost))+
    row('Developer Fee',fmt(devFee))+row('Contingency',fmt(cont))+row('Financing',fmt(finCost))+
    row('Total Development Cost',fmt(totalCost),'total')+
    row('Cost / Unit',fmt(costPerUnit))+row('Cost / GBA sqft',fmt(costPSF,2));

  document.getElementById('incomeRows').innerHTML=
    row('Potential Gross Income (PGI)',fmt(pgi)+'/yr')+row('Vacancy Loss',fmt(pgi*vacPct)+'/yr')+
    row('Effective Gross Income (EGI)',fmt(egi)+'/yr')+row('Operating Expenses',fmt(egi*opexPct)+'/yr')+
    row('Net Operating Income (NOI)',fmt(noi)+'/yr')+row('NOI at Exit (Yr '+hold+')',fmt(noiAtExit)+'/yr')+
    row('Exit Value',fmt(exitValue),'total')+row('Profit (Exit − Cost)',fmt(profit))+
    row('Return on Equity (vs. target equity)',pct(roi));

  document.getElementById('res').style.display='block';
}
</script></body></html>
