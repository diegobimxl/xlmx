<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Daily Report — XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:24px}.card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:20px;margin-bottom:16px}.card-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:600px){.grid2{grid-template-columns:1fr}}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}label{font-size:11px;color:#888;display:block;margin-bottom:4px}input,select,textarea{width:100%;background:#111;border:1px solid #333;color:#fff;padding:9px 12px;border-radius:6px;font-size:13px;font-family:inherit}input:focus,select:focus,textarea:focus{outline:none;border-color:#16a34a}textarea{resize:vertical}.btn{padding:9px 20px;background:#16a34a;border:none;border-radius:6px;color:#fff;font-size:13px;cursor:pointer;margin-right:8px}.btn-sec{background:#1a1a1a;border:1px solid #333}.range-row{display:flex;gap:8px;align-items:center}.range-lbl{font-size:12px;color:#aaa;white-space:nowrap;min-width:80px}input[type=range]{flex:1;accent-color:#16a34a}#output{background:#0a0a0a;border:1px solid #222;border-radius:8px;padding:20px;font-family:"Courier New",monospace;font-size:12px;color:#ccc;white-space:pre-wrap;min-height:280px;margin-top:0}</style></head><body><h1>Daily Construction Report</h1><div class="sub">Generate field reports — CA documentation</div><div class="card"><div class="card-title">Report Header</div><div class="grid3"><div><label>Project Name</label><input id="proj" value="Mixed-Use Office Tower"></div><div><label>Report #</label><input id="rnum" value="DR-001"></div><div><label>Date</label><input type="date" id="rdate"></div><div><label>Prepared By</label><input id="author" value="Diego Rodriguez, AOR"></div><div><label>Weather</label><select id="wx"><option>Clear</option><option>Partly Cloudy</option><option>Overcast</option><option>Rain</option><option>High Wind</option><option>Extreme Heat</option></select></div><div><label>Temp (°F)</label><input type="number" id="temp" value="78"></div></div></div><div class="card"><div class="card-title">Work in Progress</div><div style="display:flex;flex-direction:column;gap:10px"><div><label>Work Performed Today</label><textarea id="work" rows="4" placeholder="Poured Level 3 slab, grid lines A-E / 1-6. Structural steel erection Level 4 columns A1-C3 complete."></textarea></div><div><label>Equipment on Site</label><textarea id="equip" rows="2" placeholder="Tower crane, concrete pump truck x2, man-lift x3"></textarea></div><div><label>Subcontractors on Site (one per line)</label><textarea id="subs" rows="3" placeholder="XYZ Concrete — 12 workers&#10;ABC Steel — 8 workers&#10;MEP Sub — 4 workers"></textarea></div></div></div><div class="card"><div class="card-title">Issues and Observations</div><div style="display:flex;flex-direction:column;gap:10px"><div><label>Safety Observations</label><textarea id="safety" rows="2" placeholder="All workers with proper PPE. Fall protection in place at open deck."></textarea></div><div><label>Issues / RFIs / NCRs</label><textarea id="issues" rows="2" placeholder="RFI-012 submitted — footing depth at grid B3."></textarea></div><div><label>Visitors</label><input id="visitors" placeholder="Owner rep, structural engineer"></div><div><label>Next Day Plan</label><textarea id="next" rows="2" placeholder="Continue steel erection Level 4, begin MEP rough-in Level 2."></textarea></div></div></div><button class="btn" onclick="gen()">Generate Report</button><button class="btn btn-sec" onclick="copyOut()">Copy</button><div style="margin-top:16px" id="output">Fill in fields and click Generate Report.</div><script>document.getElementById("rdate").value=new Date().toISOString().split("T")[0];function gen(){var proj=document.getElementById("proj").value;var rn=document.getElementById("rnum").value;var rd=document.getElementById("rdate").value;var auth=document.getElementById("author").value;var wx=document.getElementById("wx").value;var temp=document.getElementById("temp").value;var work=document.getElementById("work").value;var equip=document.getElementById("equip").value;var subs=document.getElementById("subs").value;var safe=document.getElementById("safety").value;var iss=document.getElementById("issues").value;var vis=document.getElementById("visitors").value;var nxt=document.getElementById("next").value;var o="DAILY CONSTRUCTION REPORT\n"+"=".repeat(60)+"\n\n";o+="REPORT NO: "+rn+"          DATE: "+rd+"\n";o+="PROJECT:   "+proj+"\n";o+="PREPARED:  "+auth+"\n";o+="WEATHER:   "+wx+" / "+temp+"°F\n\n";o+="WORK PERFORMED\n"+"-".repeat(40)+"\n"+work+"\n\n";o+="EQUIPMENT ON SITE\n"+"-".repeat(40)+"\n"+equip+"\n\n";o+="SUBCONTRACTORS\n"+"-".repeat(40)+"\n"+subs+"\n\n";if(safe){o+="SAFETY OBSERVATIONS\n"+"-".repeat(40)+"\n"+safe+"\n\n";}if(iss){o+="ISSUES / RFIs / NCRs\n"+"-".repeat(40)+"\n"+iss+"\n\n";}if(vis){o+="VISITORS\n"+"-".repeat(40)+"\n"+vis+"\n\n";}o+="PLAN FOR NEXT DAY\n"+"-".repeat(40)+"\n"+nxt+"\n\n";o+="SIGNATURE: ________________________   DATE: __________\n";o+=auth+"\n\nEND OF REPORT";document.getElementById("output").textContent=o;}function copyOut(){navigator.clipboard.writeText(document.getElementById("output").textContent).catch(function(){});}</script></body></html>
