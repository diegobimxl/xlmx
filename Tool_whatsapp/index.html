<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WhatsApp Order System</title>
<style>
:root{--bg:#fff;--text:#111;--dim:#888;--border:#e0e0e0;--hover:#f5f5f5;--ok:#2e7d32;--warn:#b8860b;--alert:#c00;--wa:#25d366}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);max-width:960px;margin:0 auto;padding:16px}
h1{font-size:1.4em;margin-bottom:4px}.sub{color:var(--dim);font-size:.85em;margin-bottom:16px}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:8px 16px;cursor:pointer;border:none;background:none;font-size:.9em;color:var(--dim);border-bottom:2px solid transparent}
.tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:600}
.panel{display:none}.panel.active{display:block}
label{display:block;font-size:.85em;color:var(--dim);margin-bottom:4px;margin-top:10px}
input,select,textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:4px;font-size:.9em}
.row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:16px 0}
.kpi-card{padding:10px;border:1px solid var(--border);border-radius:6px;text-align:center}
.kpi-val{font-size:1.3em;font-weight:700}.kpi-label{font-size:.72em;color:var(--dim)}
table{width:100%;border-collapse:collapse;font-size:.82em;margin-top:8px}
th,td{padding:6px 8px;text-align:left;border-bottom:1px solid var(--border)}
th{font-weight:600;background:var(--hover)}
button{padding:6px 14px;border:1px solid var(--border);border-radius:4px;background:var(--text);color:var(--bg);cursor:pointer;font-size:.82em;margin-top:8px}
.btn-wa{background:var(--wa);border-color:var(--wa);color:#fff}
.btn-sm{padding:4px 8px;font-size:.75em;background:var(--bg);color:var(--text);margin:0 2px}
.item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.item-name{font-weight:600;font-size:.9em}.item-price{color:var(--dim);font-size:.85em}
.qty{display:flex;align-items:center;gap:6px}
.qty button{margin:0;padding:2px 10px;font-size:.85em;background:var(--bg);color:var(--text)}
</style>
</head>
<body>
<h1>WhatsApp Order System</h1>
<p class="sub">Catalogo de productos con generador de pedido por WhatsApp</p>

<div class="tabs">
<button class="tab active" onclick="showTab('menu')">Menu</button>
<button class="tab" onclick="showTab('cart')">Carrito (<span id="cartCount">0</span>)</button>
<button class="tab" onclick="showTab('orders')">Pedidos</button>
<button class="tab" onclick="showTab('config')">Configurar</button>
</div>

<div id="menu" class="panel active">
<input type="text" placeholder="Buscar producto..." oninput="renderMenu(this.value)" style="margin-bottom:12px">
<div id="menuList"></div>
</div>

<div id="cart" class="panel">
<div id="cartItems"></div>
<div class="kpi" id="cartKpis"></div>
<label>Nombre del Cliente</label><input id="cname" placeholder="Nombre">
<label>Telefono (con lada)</label><input id="cphone" placeholder="8441234567">
<label>Notas</label><textarea id="cnotes" style="height:50px" placeholder="Sin cebolla, extra salsa, etc."></textarea>
<button class="btn-wa" onclick="sendWhatsApp()">Enviar Pedido por WhatsApp</button>
</div>

<div id="orders" class="panel">
<table id="ordersTable"><tr><th>Fecha</th><th>Cliente</th><th>Items</th><th>Total</th></tr></table>
</div>

<div id="config" class="panel">
<label>Numero de WhatsApp del Negocio (con lada de pais)</label>
<input id="bizPhone" value="528441234567" placeholder="528441234567">
<label>Nombre del Negocio</label>
<input id="bizName" value="Mi Negocio">
<button onclick="saveConfig()">Guardar</button>
<h3 style="font-size:.95em;margin-top:16px;margin-bottom:8px">Agregar Producto</h3>
<div class="row">
<div><label>Nombre</label><input id="pname"></div>
<div><label>Precio (MXN)</label><input id="pprice" type="number"></div>
<div><label>Categoria</label><input id="pcat" placeholder="Tacos, Bebidas, etc."></div>
</div>
<button onclick="addProduct()">+ Agregar Producto</button>
</div>

<script>
const fmx=n=>'$'+n.toFixed(2);
let products=[
{name:'Tacos al Pastor (3)',price:65,cat:'Tacos'},{name:'Tacos de Bistec (3)',price:70,cat:'Tacos'},
{name:'Quesadilla',price:45,cat:'Tacos'},{name:'Burrito Especial',price:85,cat:'Burritos'},
{name:'Torta Cubana',price:75,cat:'Tortas'},{name:'Torta de Milanesa',price:65,cat:'Tortas'},
{name:'Agua Fresca 1L',price:30,cat:'Bebidas'},{name:'Coca-Cola 600ml',price:22,cat:'Bebidas'},
{name:'Cerveza',price:35,cat:'Bebidas'},{name:'Nachos Supreme',price:55,cat:'Extras'},
{name:'Guacamole',price:40,cat:'Extras'},{name:'Postre del Dia',price:35,cat:'Extras'},
];
let cart={};let orders=[];
let bizPhone='528441234567';let bizName='Mi Negocio';

function addProduct(){
products.push({name:document.getElementById('pname').value,price:+document.getElementById('pprice').value,cat:document.getElementById('pcat').value});
renderMenu('');
}
function addToCart(i){cart[i]=(cart[i]||0)+1;updateCart();}
function removeFromCart(i){if(cart[i]>1)cart[i]--;else delete cart[i];updateCart();}

function updateCart(){
const count=Object.values(cart).reduce((s,q)=>s+q,0);
document.getElementById('cartCount').textContent=count;
}

function renderMenu(q=''){
const cats=[...new Set(products.map(p=>p.cat))];
let html='';
cats.forEach(cat=>{
const filtered=products.filter(p=>p.cat===cat&&(!q||p.name.toLowerCase().includes(q.toLowerCase())));
if(!filtered.length)return;
html+=`<h3 style="font-size:.9em;margin:12px 0 6px;color:var(--dim)">${cat}</h3>`;
filtered.forEach((p,idx)=>{
const i=products.indexOf(p);const qty=cart[i]||0;
html+=`<div class="item"><div><span class="item-name">${p.name}</span><br><span class="item-price">${fmx(p.price)}</span></div><div class="qty">${qty?`<button onclick="removeFromCart(${i})">-</button><span>${qty}</span>`:''}
<button onclick="addToCart(${i})">+</button></div></div>`;
});
});
document.getElementById('menuList').innerHTML=html;
}

function renderCart(){
let html='';let total=0;
Object.entries(cart).forEach(([i,qty])=>{
const p=products[i];const sub=p.price*qty;total+=sub;
html+=`<div class="item"><div><span class="item-name">${p.name} x${qty}</span></div><div>${fmx(sub)}</div></div>`;
});
document.getElementById('cartItems').innerHTML=html||'<p style="color:var(--dim);padding:12px 0">Carrito vacio</p>';
document.getElementById('cartKpis').innerHTML=`<div class="kpi-card"><div class="kpi-val">${fmx(total)}</div><div class="kpi-label">Total del Pedido</div></div>`;
}

function sendWhatsApp(){
const name=document.getElementById('cname').value||'Cliente';
const notes=document.getElementById('cnotes').value;
let msg=`Pedido de ${bizName}\n\nCliente: ${name}\n\n`;
let total=0;
Object.entries(cart).forEach(([i,qty])=>{
const p=products[i];const sub=p.price*qty;total+=sub;
msg+=`${qty}x ${p.name} — ${fmx(sub)}\n`;
});
msg+=`\nTotal: ${fmx(total)}`;
if(notes)msg+=`\n\nNotas: ${notes}`;
const encoded=encodeURIComponent(msg);
const url=`https://wa.me/${bizPhone}?text=${encoded}`;
window.open(url,'_blank');
orders.push({date:new Date().toLocaleDateString(),client:name,items:Object.entries(cart).map(([i,q])=>`${q}x ${products[i].name}`).join(', '),total});
cart={};updateCart();renderCart();renderOrders();
}

function renderOrders(){
let h='<tr><th>Fecha</th><th>Cliente</th><th>Items</th><th>Total</th></tr>';
orders.forEach(o=>{h+=`<tr><td>${o.date}</td><td>${o.client}</td><td>${o.items}</td><td>${fmx(o.total)}</td></tr>`;});
document.getElementById('ordersTable').innerHTML=h;
}

function saveConfig(){bizPhone=document.getElementById('bizPhone').value;bizName=document.getElementById('bizName').value;}
function showTab(id){
document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.querySelector(`[onclick="showTab('${id}')"]`).classList.add('active');
if(id==='cart')renderCart();
}
renderMenu('');
</script>
<div id="pro-gate" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:9999;justify-content:center;align-items:center"><div style="background:#fff;padding:32px;border-radius:8px;max-width:420px;width:90%;text-align:center"><h2 style="font-size:1.2em;margin-bottom:8px">Te esta gustando?</h2><p style="font-size:.85em;color:#888;margin-bottom:16px">Registrate para guardar tus datos y recibir actualizaciones.</p><input id="pro-email" type="email" placeholder="tu@correo.com" style="width:100%;padding:10px;border:1px solid #e0e0e0;border-radius:4px;font-size:.9em;margin-bottom:8px"><button onclick="proUnlock()" style="width:100%;padding:10px;background:#111;color:#fff;border:none;border-radius:4px;font-size:.9em;cursor:pointer">Continuar Gratis</button><button onclick="document.getElementById('pro-gate').style.display='none';document.body.style.overflow='auto'" style="width:100%;padding:8px;background:none;border:none;color:#aaa;font-size:.8em;cursor:pointer;margin-top:4px">Ahora no</button></div></div>
<div style="position:fixed;bottom:0;left:0;width:100%;background:#111;color:#fff;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;font-size:.82em;z-index:999"><span>Version gratuita. <strong>Pro</strong>: nube, equipos, y API.</span><a href="#" onclick="document.getElementById('pro-gate').style.display='flex';document.body.style.overflow='hidden';return false" style="background:#fff;color:#111;padding:6px 16px;border-radius:4px;text-decoration:none;font-weight:600;white-space:nowrap">Upgrade to Pro</a></div>
<script>(function(){const key='app_uses_'+location.pathname;let uses=parseInt(localStorage.getItem(key)||'0');uses++;localStorage.setItem(key,uses);if(!localStorage.getItem('pro_email')&&uses>=5){document.getElementById('pro-gate').style.display='flex';document.body.style.overflow='hidden';}document.body.style.paddingBottom='50px';})();function proUnlock(){const e=document.getElementById('pro-email').value;if(e&&e.includes('@'))localStorage.setItem('pro_email',e);document.getElementById('pro-gate').style.display='none';document.body.style.overflow='auto';}</script>
</body>
</html>
