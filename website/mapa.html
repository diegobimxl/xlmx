function updateMap(){
  markers.forEach(m=>map.removeLayer(m));markers=[];
  const fp=document.getElementById('filterPerson').value;
  const fd=document.getElementById('filterDecade').value;
  let filtered=D;
  if(fp!=='all')filtered=filtered.filter(d=>d.who===fp);
  if(fd!=='all'){const[a,b]=fd.split('-').map(Number);filtered=filtered.filter(d=>d.y>=a&&d.y<=b)}
  const counts={};
  filtered.forEach(d=>{
    counts[d.who]=(counts[d.who]||0)+1;
    const m=L.circleMarker([d.lat,d.lng],{radius:6,fillColor:colors[d.who]||'#222',color:'#fff',weight:1,fillOpacity:0.8}).addTo(map);

    markers.push(m);
  });
  let s='';Object.keys(counts).forEach(k=>{s+='<span>'+names[k]+': '+counts[k]+' ciudades</span>'});
