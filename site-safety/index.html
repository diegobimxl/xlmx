<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Site Safety Checklist</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:20px}.toolbar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}.btn{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600}.btn-p{background:#16a34a;color:#fff}.btn-r{background:#dc2626;color:#fff}.btn-g{background:#1a1a1a;border:1px solid #333;color:#ccc}.section{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:16px;margin-bottom:16px}.sec-hdr{font-size:13px;font-weight:700;color:#16a34a;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}.item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #222}.item:last-child{border-bottom:none}.item-txt{font-size:13px;color:#ccc;flex:1}.toggles{display:flex;gap:4px}.tog{padding:4px 10px;border-radius:4px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:#222;color:#666}.tog.ok{background:#16a34a;color:#fff}.tog.flag{background:#dc2626;color:#fff}.tog.na{background:#555;color:#fff}.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:20px}.sum-box{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:16px;text-align:center}.sum-val{font-size:28px;font-weight:700}.sum-lbl{font-size:11px;color:#666;margin-top:4px}@media print{body{background:#fff;color:#000}.btn{display:none}.section{border:1px solid #ccc}.sec-hdr{color:#000}.item-txt{color:#000}.toggles{display:none}.item::after{content:attr(data-status);font-size:11px;color:#333}}</style></head><body><h1>Site Safety Checklist</h1><div class="sub">OSHA/Construction daily safety audit</div><div class="summary"><div class="sum-box"><div class="sum-val" id="s-ok" style="color:#16a34a">0</div><div class="sum-lbl">OK</div></div><div class="sum-box"><div class="sum-val" id="s-flag" style="color:#dc2626">0</div><div class="sum-lbl">Flagged</div></div><div class="sum-box"><div class="sum-val" id="s-na" style="color:#888">0</div><div class="sum-lbl">N/A</div></div><div class="sum-box"><div class="sum-val" id="s-open" style="color:#d97706">0</div><div class="sum-lbl">Open</div></div></div><div class="toolbar"><button class="btn btn-p" onclick="window.print()">Print / PDF</button><button class="btn btn-g" onclick="resetAll()">Reset All</button></div><div id="checklist"></div><script>var sections=[{name:"Pre-Construction",items:["Safety plan on-site and reviewed","Emergency contacts posted","First aid kit stocked","Safety officer identified","Subcontractors briefed","Permits posted and current"]},{name:"PPE",items:["Hard hats worn by all","Safety glasses in use","High-vis vests worn","Gloves appropriate to task","Steel-toed boots worn","Hearing protection available"]},{name:"Fall Protection",items:["Guardrails at all open edges","Fall arrest systems in place","Ladders secured, extend 3ft above landing","Floor openings covered and marked","Scaffolding inspected and tagged","Harnesses inspected before use"]},{name:"Electrical Safety",items:["GFCI on all temporary power","Extension cords in good condition","Electrical panels labeled and locked","No exposed wiring","Temporary lighting adequate","Lockout/tagout procedures posted"]},{name:"Fire Safety",items:["Fire extinguishers accessible and tagged","Hot work permit issued if needed","Flammable materials stored properly","No-smoking signs posted","Emergency exits clear and marked","Evacuation plan posted"]},{name:"Housekeeping",items:["Walkways clear of debris","Waste containers in place","Materials stored stably","Spills cleaned immediately","Lighting adequate throughout","Traffic controls in place"]}];var state={};function handleTog(btn){var id=btn.getAttribute("data-id");var val=btn.getAttribute("data-val");state[id]=val;var parent=btn.parentElement;parent.querySelectorAll(".tog").forEach(function(b){b.className="tog";});btn.classList.add(val);updateSummary();}function updateSummary(){var ok=0,flag=0,na=0,total=0;sections.forEach(function(s){total+=s.items.length;});Object.values(state).forEach(function(v){if(v==="ok")ok++;else if(v==="flag")flag++;else if(v==="na")na++;});document.getElementById("s-ok").textContent=ok;document.getElementById("s-flag").textContent=flag;document.getElementById("s-na").textContent=na;document.getElementById("s-open").textContent=total-ok-flag-na;}function resetAll(){state={};document.querySelectorAll(".tog").forEach(function(b){b.className="tog";});updateSummary();}function render(){var cl=document.getElementById("checklist");cl.innerHTML="";sections.forEach(function(sec,si){var d=document.createElement("div");d.className="section";var h="<div class=\"sec-hdr\">"+sec.name+"</div>";sec.items.forEach(function(item,ii){var id="i"+si+"_"+ii;h+="<div class=\"item\"><div class=\"item-txt\">"+item+"</div><div class=\"toggles\">";["ok","flag","na"].forEach(function(t){h+="<button class=\"tog\" data-id=\""+id+"\" data-val=\""+t+"\" onclick=\"handleTog(this)\">"+t.toUpperCase()+"</button>";});h+="</div></div>";});d.innerHTML=h;cl.appendChild(d);});updateSummary();}render();</script></body></html>
