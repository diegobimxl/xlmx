<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Room Data Sheets — XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:24px}.search-bar{display:flex;gap:8px;margin-bottom:16px}.search-bar input{flex:1;background:#1a1a1a;border:1px solid #222;color:#fff;padding:9px 12px;border-radius:6px;font-size:13px}.search-bar input:focus{outline:none;border-color:#16a34a}.grid-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}.room-card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:16px;cursor:pointer;transition:border-color .2s}.room-card:hover{border-color:#16a34a}.room-tag{font-size:10px;color:#16a34a;font-weight:600;margin-bottom:4px}.room-name{font-size:15px;font-weight:700;margin-bottom:4px}.room-meta{font-size:11px;color:#666}.card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:20px;margin-bottom:16px;display:none}.card.active{display:block}.card-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}@media(max-width:600px){.grid2,.grid3{grid-template-columns:1fr}}label{font-size:11px;color:#888;display:block;margin-bottom:4px}input,select{width:100%;background:#111;border:1px solid #333;color:#fff;padding:9px 12px;border-radius:6px;font-size:13px}input:focus,select:focus{outline:none;border-color:#16a34a}.btn{padding:8px 18px;background:#16a34a;border:none;border-radius:6px;color:#fff;font-size:13px;cursor:pointer;margin-right:6px}.btn-sec{background:#222;border:1px solid #333}.btn-del{background:transparent;border:none;color:#f87171;cursor:pointer;font-size:13px}.data-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #1a1a2a;font-size:12px}.data-label{color:#666}.data-val{color:#ccc}.attr-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}.attr-chip{background:#111;border:1px solid #1e1e1e;border-radius:4px;padding:5px 10px;font-size:11px;color:#888;text-align:center}.attr-chip.active{border-color:#16a34a;color:#16a34a;background:#0d2818}</style></head><body><h1>Room Data Sheets</h1><div class="sub">Room-by-room technical requirements — MEP, finishes, access</div><div style="display:flex;gap:8px;margin-bottom:16px"><input id="search" placeholder="Search rooms..." oninput="renderList()"><button class="btn" onclick="newRoom()">+ Add Room</button></div><div class="grid-list" id="room-list"></div><div class="card" id="edit-card"><div class="card-title" id="edit-title">Room Details</div><div class="grid3" style="margin-bottom:12px"><div><label>Room Number</label><input id="r-num" placeholder="101"></div><div><label>Room Name</label><input id="r-name" placeholder="Executive Conference"></div><div><label>Level</label><input id="r-lvl" placeholder="L2"></div><div><label>Area (SF)</label><input type="number" id="r-area" placeholder="480"></div><div><label>Occupancy Group</label><select id="r-occ"><option>A-3 Assembly</option><option>B Business</option><option>E Educational</option><option>I-2 Healthcare</option><option>R-2 Residential</option><option>S-1 Storage</option></select></div><div><label>Occupant Load</label><input type="number" id="r-occ-load" placeholder="20"></div></div><div class="card-title" style="margin-top:8px">Finishes</div><div class="grid3" style="margin-bottom:12px"><div><label>Floor</label><input id="r-floor" placeholder="CPT-01 — Pattern Carpet"></div><div><label>Base</label><input id="r-base" placeholder="RB-01 — 4-in Rubber"></div><div><label>Wall</label><input id="r-wall" placeholder="PT-01 — Eggshell"></div><div><label>Ceiling Type</label><select id="r-ceil"><option>ACT — Acoustic Panel 2x4</option><option>ACT — Acoustic Panel 2x2</option><option>GYP — Gypsum Board</option><option>EXP — Exposed Structure</option><option>WD — Wood Panel</option></select></div><div><label>Ceiling Height (ft)</label><input type="number" id="r-ch" step="0.25" placeholder="9.5"></div><div><label>Accent Wall</label><input id="r-accent" placeholder="None"></div></div><div class="card-title" style="margin-top:8px">MEP Requirements</div><div class="grid2" style="margin-bottom:12px"><div><label>HVAC Zone</label><input id="r-hvac" placeholder="AHU-3 / Zone B"></div><div><label>Lighting Level (fc)</label><input type="number" id="r-fc" placeholder="50"></div><div><label>Power Outlets (#)</label><input type="number" id="r-pow" placeholder="8"></div><div><label>Data Drops (#)</label><input type="number" id="r-data" placeholder="4"></div></div><button class="btn" onclick="saveRoom()">Save Room</button><button class="btn btn-sec" onclick="cancelEdit()">Cancel</button><button class="btn-del" id="del-btn" onclick="delRoom()">Delete</button></div><script>var R=JSON.parse(localStorage.getItem("room-data")||"[]");var editIdx=-1;if(!R.length){R=[{num:"101",name:"Lobby",lvl:"L1",area:1200,occ:"A-3 Assembly",occLoad:80,floor:"PT-CT — Polished Concrete",base:"RB-01 — 4-in Rubber Base",wall:"PT-01 — Eggshell White",ceil:"GYP — Gypsum Board",ch:14,accent:"FRP-01 Feature Wall — Gridline B",hvac:"AHU-1 / Main Lobby",fc:35,pow:6,data:2},{num:"201",name:"Boardroom",lvl:"L2",area:480,occ:"B Business",occLoad:20,floor:"CPT-02 — Luxury Vinyl Tile",base:"RB-01 — 4-in Rubber Base",wall:"PT-02 — Matte Charcoal",ceil:"ACT — Acoustic Panel 2x2",ch:10,accent:"WD-01 Feature Wall",hvac:"AHU-3 / Zone B",fc:50,pow:12,data:8},{num:"310",name:"Server Room",lvl:"L3",area:220,occ:"B Business",occLoad:2,floor:"PT-CC — Epoxy Sealed Concrete",base:"None",wall:"PT-01 — Eggshell White",ceil:"EXP — Exposed Structure",ch:12,accent:"None",hvac:"CRAC-1 Dedicated",fc:50,pow:24,data:12}];}function save(){localStorage.setItem("room-data",JSON.stringify(R));}function renderList(){var q=document.getElementById("search").value.toLowerCase();var list=document.getElementById("room-list");list.innerHTML="";R.filter(function(r){return !q||r.num.toLowerCase().includes(q)||r.name.toLowerCase().includes(q)||r.lvl.toLowerCase().includes(q);}).forEach(function(r,i){var card=document.createElement("div");card.className="room-card";card.innerHTML="<div class=\"room-tag\">"+r.num+" — "+r.lvl+"</div><div class=\"room-name\">"+r.name+"</div><div class=\"room-meta\">"+r.area+" SF &nbsp;|&nbsp; "+r.occ+"</div>";card.onclick=function(){openEdit(R.indexOf(r));};list.appendChild(card);});}function newRoom(){editIdx=-1;document.getElementById("edit-title").textContent="New Room";["r-num","r-name","r-lvl","r-area","r-occ-load","r-floor","r-base","r-wall","r-ch","r-accent","r-hvac","r-fc","r-pow","r-data"].forEach(function(id){document.getElementById(id).value="";});document.getElementById("del-btn").style.display="none";document.getElementById("edit-card").classList.add("active");}function openEdit(i){editIdx=i;var r=R[i];document.getElementById("edit-title").textContent="Edit Room "+r.num;document.getElementById("r-num").value=r.num;document.getElementById("r-name").value=r.name;document.getElementById("r-lvl").value=r.lvl;document.getElementById("r-area").value=r.area;document.getElementById("r-occ-load").value=r.occLoad;document.getElementById("r-floor").value=r.floor;document.getElementById("r-base").value=r.base;document.getElementById("r-wall").value=r.wall;document.getElementById("r-ch").value=r.ch;document.getElementById("r-accent").value=r.accent;document.getElementById("r-hvac").value=r.hvac;document.getElementById("r-fc").value=r.fc;document.getElementById("r-pow").value=r.pow;document.getElementById("r-data").value=r.data;document.getElementById("del-btn").style.display="inline";document.getElementById("edit-card").classList.add("active");}function v(id){return document.getElementById(id).value.trim();}function saveRoom(){var r={num:v("r-num"),name:v("r-name"),lvl:v("r-lvl"),area:parseFloat(v("r-area"))||0,occ:v("r-occ"),occLoad:parseFloat(v("r-occ-load"))||0,floor:v("r-floor"),base:v("r-base"),wall:v("r-wall"),ceil:v("r-ceil"),ch:parseFloat(v("r-ch"))||0,accent:v("r-accent"),hvac:v("r-hvac"),fc:parseFloat(v("r-fc"))||0,pow:parseFloat(v("r-pow"))||0,data:parseFloat(v("r-data"))||0};if(editIdx>=0)R[editIdx]=r;else R.push(r);save();cancelEdit();}function cancelEdit(){document.getElementById("edit-card").classList.remove("active");renderList();}function delRoom(){if(editIdx<0)return;R.splice(editIdx,1);save();cancelEdit();}renderList();</script></body></html>
