<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Punch List — XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:20px}.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:20px}.sum-box{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:14px;text-align:center}.sum-val{font-size:26px;font-weight:700}.sum-lbl{font-size:10px;color:#666;margin-top:3px}.card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:20px;margin-bottom:16px}.card-title{font-size:13px;font-weight:600;color:#ccc;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}label{font-size:11px;color:#888;display:block;margin-bottom:4px}input,select,textarea{width:100%;background:#111;border:1px solid #333;color:#fff;padding:9px 12px;border-radius:6px;font-size:13px;font-family:inherit}input:focus,select:focus,textarea:focus{outline:none;border-color:#16a34a}textarea{resize:vertical;min-height:50px}.btn{padding:9px 18px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;margin-top:12px}.btn-p{background:#16a34a;color:#fff}.btn-g{background:#222;border:1px solid #333;color:#ccc;margin-left:8px}.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}.search-bar,.flt{background:#1a1a1a;border:1px solid #333;color:#fff;padding:8px 12px;border-radius:6px;font-size:13px}.search-bar{flex:1;min-width:150px}.search-bar:focus,.flt:focus{outline:none;border-color:#16a34a}.tbl{width:100%;border-collapse:collapse}.tbl th{font-size:11px;color:#555;text-align:left;padding:8px;border-bottom:1px solid #222}.tbl td{font-size:12px;padding:8px;border-bottom:1px solid #1a1a1a;color:#ccc;vertical-align:top}.tbl tr:hover td{background:#1e1e1e}.badge{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700}.b-open{background:#d9770622;color:#d97706}.b-ip{background:#2563eb22;color:#60a5fa}.b-done{background:#16a34a22;color:#16a34a}.b-hi{background:#dc262622;color:#dc2626}.b-med{background:#d9770622;color:#d97706}.b-lo{background:#16a34a22;color:#16a34a}.del-btn{background:none;border:none;color:#666;cursor:pointer}</style></head><body><h1>Punch List Manager</h1><div class="sub">Construction closeout punch list — track, assign, and close items</div><div class="summary"><div class="sum-box"><div class="sum-val" id="s-total" style="color:#fff">0</div><div class="sum-lbl">Total</div></div><div class="sum-box"><div class="sum-val" id="s-open" style="color:#d97706">0</div><div class="sum-lbl">Open</div></div><div class="sum-box"><div class="sum-val" id="s-ip" style="color:#60a5fa">0</div><div class="sum-lbl">In Progress</div></div><div class="sum-box"><div class="sum-val" id="s-done" style="color:#16a34a">0</div><div class="sum-lbl">Closed</div></div></div><div class="card"><div class="card-title">New Item</div><div class="grid"><div><label>Location / Zone</label><input id="p-loc" placeholder="e.g. Level 2 Room 214"></div><div><label>Trade</label><select id="p-trade"><option>Architecture</option><option>Structural</option><option>Mechanical</option><option>Electrical</option><option>Plumbing</option><option>Finishes</option><option>Site Work</option><option>General</option></select></div><div><label>Priority</label><select id="p-prio"><option value="hi">High</option><option value="med" selected>Medium</option><option value="lo">Low</option></select></div><div><label>Assigned To</label><input id="p-assign" placeholder="e.g. MEP Subcontractor"></div><div><label>Due Date</label><input id="p-due" type="date"></div><div><label>Status</label><select id="p-status"><option value="open">Open</option><option value="ip">In Progress</option><option value="done">Closed</option></select></div></div><div style="margin-top:12px"><label>Description</label><textarea id="p-desc" placeholder="Describe the punch item..."></textarea></div><button class="btn btn-p" onclick="addItem()">Add Item</button><button class="btn btn-g" onclick="exportCSV()">Export CSV</button></div><div class="toolbar"><input class="search-bar" id="search" placeholder="Search..." oninput="render()"><select class="flt" id="f-status" onchange="render()"><option value="">All Status</option><option value="open">Open</option><option value="ip">In Progress</option><option value="done">Closed</option></select><select class="flt" id="f-trade" onchange="render()"><option value="">All Trades</option><option>Architecture</option><option>Structural</option><option>Mechanical</option><option>Electrical</option><option>Plumbing</option><option>Finishes</option><option>Site Work</option><option>General</option></select></div><div class="card"><table class="tbl"><thead><tr><th>#</th><th>Location</th><th>Trade</th><th>Description</th><th>Priority</th><th>Assigned</th><th>Due</th><th>Status</th><th></th></tr></thead><tbody id="tb"></tbody></table></div><script>var P=JSON.parse(localStorage.getItem("punch")||"[]");var nextId=P.length?Math.max.apply(null,P.map(function(x){return x.id;}))+1:1;function save(){localStorage.setItem("punch",JSON.stringify(P));}var stLabel={open:"Open",ip:"In Progress",done:"Closed"};var stCls={open:"b-open",ip:"b-ip",done:"b-done"};var prioCls={hi:"b-hi",med:"b-med",lo:"b-lo"};var prioLabel={hi:"HIGH",med:"MED",lo:"LOW"};function addItem(){var loc=document.getElementById("p-loc").value.trim();var trade=document.getElementById("p-trade").value;var prio=document.getElementById("p-prio").value;var assign=document.getElementById("p-assign").value.trim();var due=document.getElementById("p-due").value;var status=document.getElementById("p-status").value;var desc=document.getElementById("p-desc").value.trim();if(!desc)return;P.push({id:nextId++,loc,trade,prio,assign,due,status,desc,created:new Date().toISOString().slice(0,10)});save();render();["p-loc","p-assign","p-due","p-desc"].forEach(function(id){document.getElementById(id).value="";});}function del(i){P.splice(i,1);save();render();}function setStatus(i,val){P[i].status=val;save();render();}function render(){var q=document.getElementById("search").value.toLowerCase();var fs=document.getElementById("f-status").value;var ft=document.getElementById("f-trade").value;var rows=P.filter(function(x){var m=!q||(x.loc+x.trade+x.desc+x.assign).toLowerCase().includes(q);var sm=!fs||x.status===fs;var tm=!ft||x.trade===ft;return m&&sm&&tm;});var open=P.filter(function(x){return x.status==="open";}).length;var ip=P.filter(function(x){return x.status==="ip";}).length;var done=P.filter(function(x){return x.status==="done";}).length;document.getElementById("s-total").textContent=P.length;document.getElementById("s-open").textContent=open;document.getElementById("s-ip").textContent=ip;document.getElementById("s-done").textContent=done;var tb=document.getElementById("tb");tb.innerHTML="";rows.forEach(function(x){var idx=P.indexOf(x);var sc=stCls[x.status]||"b-open";var sl=stLabel[x.status]||x.status;var pc=prioCls[x.prio]||"b-med";var pl=prioLabel[x.prio]||"MED";tb.innerHTML+="<tr><td>"+x.id+"</td><td>"+x.loc+"</td><td>"+x.trade+"</td><td>"+x.desc+"</td><td><span class=\"badge "+pc+"\">"+pl+"</span></td><td>"+(x.assign||"-")+"</td><td>"+(x.due||"-")+"</td><td><select style=\"background:#111;border:1px solid #333;color:#fff;padding:4px;border-radius:4px;font-size:11px\" onchange=\"setStatus("+idx+",this.value)\"><option value=\"open\""+(x.status==="open"?" selected":"")+">"+"Open</option><option value=\"ip\""+(x.status==="ip"?" selected":"")+">In Progress</option><option value=\"done\""+(x.status==="done"?" selected":"")+">Closed</option></select></td><td><button class=\"del-btn\" onclick=\"del("+idx+")\">x</button></td></tr>";});}function exportCSV(){var rows=[["ID","Location","Trade","Description","Priority","Assigned","Due","Status","Created"]];P.forEach(function(x){rows.push([x.id,x.loc,x.trade,x.desc,x.prio,x.assign,x.due,x.status,x.created]);});var csv=rows.map(function(r){return r.join(",");}).join("\n");var a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="punch-list.csv";a.click();}if(P.length===0){P=[{id:1,loc:"Level 2 - Room 214",trade:"Finishes",prio:"hi",assign:"Drywall Sub",due:"2026-05-15",status:"open",desc:"Paint touch-up required on north wall — visible roller marks and uneven coverage.",created:"2026-05-01"},{id:2,loc:"Ground Floor Lobby",trade:"Electrical",prio:"med",assign:"MEP Contractor",due:"2026-05-20",status:"ip",desc:"Exit sign over main entrance not illuminated. Verify connection at J-box.",created:"2026-05-01"},{id:3,loc:"Rooftop Mechanical",trade:"Mechanical",prio:"hi",assign:"HVAC Sub",due:"2026-05-10",status:"open",desc:"RTU-3 vibration isolation pads missing. Unit not properly anchored to curb.",created:"2026-05-01"}];nextId=4;save();}render();</script></body></html>
