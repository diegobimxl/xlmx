<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Clash Detection Log — XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:24px}.card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:20px;margin-bottom:16px}.card-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}@media(max-width:640px){.grid3{grid-template-columns:1fr}}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}.result-box{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:14px;text-align:center}.result-val{font-size:22px;font-weight:700;color:#16a34a}.result-lbl{font-size:11px;color:#666;margin-top:4px}label{font-size:11px;color:#888;display:block;margin-bottom:4px}input,select,textarea{width:100%;background:#111;border:1px solid #333;color:#fff;padding:9px 12px;border-radius:6px;font-size:13px}input:focus,select:focus{outline:none;border-color:#16a34a}.btn{padding:9px 20px;background:#16a34a;border:none;border-radius:6px;color:#fff;font-size:13px;cursor:pointer;margin-right:8px}.btn-del{background:transparent;border:none;color:#555;cursor:pointer;font-size:13px;padding:4px 8px}.btn-del:hover{color:#ef4444}table{width:100%;border-collapse:collapse}th{font-size:11px;color:#555;text-align:left;padding:8px;border-bottom:1px solid #222}td{font-size:12px;padding:8px;border-bottom:1px solid #1a1a1a;color:#ccc;vertical-align:top}.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}.s-open{background:#3b1f1f;color:#f87171}.s-progress{background:#2e2510;color:#fbbf24}.s-resolved{background:#0d2818;color:#4ade80}.s-void{background:#1a1a2e;color:#818cf8}.t-hard{background:#3b1f1f;color:#f87171}.t-soft{background:#2e2510;color:#fbbf24}.t-dup{background:#1a1a2e;color:#818cf8}.fil{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}.fil select{width:auto;min-width:130px}</style></head><body><h1>Clash Detection Log</h1><div class="sub">VDC coordination — track and resolve model clashes across disciplines</div><div class="result-grid" id="summary"></div><div class="card"><div class="card-title">Add Clash</div><div class="grid3" style="margin-bottom:12px"><div><label>Clash ID</label><input id="c-id" placeholder="CLH-001"></div><div><label>Type</label><select id="c-type"><option value="hard">Hard</option><option value="soft">Soft</option><option value="dup">Duplicate</option></select></div><div><label>Status</label><select id="c-status"><option value="open">Open</option><option value="progress">In Progress</option><option value="resolved">Resolved</option><option value="void">Void</option></select></div><div><label>Discipline A</label><select id="c-d1"><option>Architecture</option><option>Structural</option><option>Mechanical</option><option>Electrical</option><option>Plumbing</option><option>Fire Protection</option><option>Civil</option></select></div><div><label>Discipline B</label><select id="c-d2"><option>Mechanical</option><option>Architecture</option><option>Structural</option><option>Electrical</option><option>Plumbing</option><option>Fire Protection</option><option>Civil</option></select></div><div><label>Grid / Level</label><input id="c-loc" placeholder="B2 / L3"></div><div><label>Description</label><input id="c-desc" placeholder="Duct conflicts with beam"></div><div><label>Assigned To</label><input id="c-assign" placeholder="Val / MEP sub"></div><div><label>Due Date</label><input type="date" id="c-due"></div></div><button class="btn" onclick="addClash()">Add Clash</button></div><div class="card"><div class="card-title">Clash Register</div><div class="fil"><select id="f-status" onchange="render()"><option value="">All Statuses</option><option value="open">Open</option><option value="progress">In Progress</option><option value="resolved">Resolved</option><option value="void">Void</option></select><select id="f-type" onchange="render()"><option value="">All Types</option><option value="hard">Hard</option><option value="soft">Soft</option><option value="dup">Duplicate</option></select></div><table><thead><tr><th>ID</th><th>Type</th><th>Status</th><th>Disciplines</th><th>Location</th><th>Description</th><th>Assigned</th><th>Due</th><th></th></tr></thead><tbody id="tbody"></tbody></table></div><script>var C=JSON.parse(localStorage.getItem("clashes")||"[]");if(!C.length){C=[{id:"CLH-001",type:"hard",status:"resolved",d1:"Structural",d2:"Mechanical",loc:"A3 / L4",desc:"W18 beam conflicts with 18-in main supply duct",assign:"Val",due:"2025-06-10"},{id:"CLH-002",type:"soft",status:"open",d1:"Architecture",d2:"Plumbing",loc:"B1 / L2",desc:"Partition wall within 2-in of sanitary riser",assign:"Team Arch",due:"2025-06-20"},{id:"CLH-003",type:"hard",status:"progress",d1:"Electrical",d2:"Mechanical",loc:"C2 / L5",desc:"Panel clearance violated by exhaust duct",assign:"MEP Sub",due:"2025-06-15"}];}function save(){localStorage.setItem("clashes",JSON.stringify(C));}function v(id){return document.getElementById(id).value.trim();}function addClash(){var c={id:v("c-id")||("CLH-"+String(C.length+1).padStart(3,"0")),type:v("c-type"),status:v("c-status"),d1:v("c-d1"),d2:v("c-d2"),loc:v("c-loc"),desc:v("c-desc"),assign:v("c-assign"),due:v("c-due")};C.push(c);save();render();["c-id","c-loc","c-desc","c-assign","c-due"].forEach(function(id){document.getElementById(id).value="";});}function del(i){C.splice(i,1);save();render();}function toggleStatus(i){var s=["open","progress","resolved","void"];var cur=C[i].status;C[i].status=s[(s.indexOf(cur)+1)%s.length];save();render();}function render(){var fs=document.getElementById("f-status").value;var ft=document.getElementById("f-type").value;var rows=C.filter(function(c){return(!fs||c.status===fs)&&(!ft||c.type===ft);});var tbody=document.getElementById("tbody");tbody.innerHTML="";rows.forEach(function(c,idx){var ri=C.indexOf(c);var over=c.due&&new Date(c.due)<new Date()&&c.status!=="resolved"&&c.status!=="void";var r=document.createElement("tr");if(over)r.style.background="#3b1f1f22";var tcls={hard:"t-hard",soft:"t-soft",dup:"t-dup"}[c.type]||"";var scls={open:"s-open",progress:"s-progress",resolved:"s-resolved",void:"s-void"}[c.status]||"";r.innerHTML="<td style=\"font-weight:600;color:#fff\">"+c.id+"</td><td><span class=\"badge "+tcls+"\">"+c.type.toUpperCase()+"</span></td><td><span class=\"badge "+scls+"\" style=\"cursor:pointer\" onclick=\"toggleStatus("+ri+")\">"+c.status.toUpperCase()+"</span></td><td style=\"color:#aaa\">"+c.d1+" / "+c.d2+"</td><td>"+c.loc+"</td><td>"+c.desc+"</td><td>"+c.assign+"</td><td style=\"color:"+(over?"#f87171":"#aaa")+"\">"+c.due+"</td><td><button class=\"btn-del\" onclick=\"del("+ri+")\">x</button></td>";tbody.appendChild(r);});var tot=C.length,open=C.filter(function(c){return c.status==="open";}).length,prog=C.filter(function(c){return c.status==="progress";}).length,res=C.filter(function(c){return c.status==="resolved";}).length;var pct=tot?Math.round(res/tot*100):0;document.getElementById("summary").innerHTML="<div class=\"result-box\"><div class=\"result-val\">"+tot+"</div><div class=\"result-lbl\">Total Clashes</div></div><div class=\"result-box\"><div class=\"result-val\" style=\"color:#f87171\">"+open+"</div><div class=\"result-lbl\">Open</div></div><div class=\"result-box\"><div class=\"result-val\" style=\"color:#fbbf24\">"+prog+"</div><div class=\"result-lbl\">In Progress</div></div><div class=\"result-box\"><div class=\"result-val\">"+res+"</div><div class=\"result-lbl\">Resolved</div></div><div class=\"result-box\"><div class=\"result-val\">"+pct+"%</div><div class=\"result-lbl\">Resolution Rate</div></div>";}render();</script></body></html>
