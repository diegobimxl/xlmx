<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Spec Section Writer — XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:24px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:640px){.grid2{grid-template-columns:1fr}}.card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:20px;margin-bottom:16px}.card-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}label{font-size:11px;color:#888;display:block;margin-bottom:4px}input,select,textarea{width:100%;background:#111;border:1px solid #333;color:#fff;padding:9px 12px;border-radius:6px;font-size:13px;font-family:inherit}input:focus,select:focus,textarea:focus{outline:none;border-color:#16a34a}textarea{resize:vertical;min-height:80px}.btn{padding:9px 20px;background:#16a34a;border:none;border-radius:6px;color:#fff;font-size:13px;cursor:pointer;margin-right:8px}.btn-sec{background:#1a1a1a;border:1px solid #333}.csi-list{display:flex;flex-direction:column;gap:4px;max-height:220px;overflow-y:auto;margin-top:8px}.csi-item{padding:8px 12px;background:#111;border:1px solid #1e1e1e;border-radius:4px;cursor:pointer;font-size:12px;color:#aaa;display:flex;justify-content:space-between}.csi-item:hover{border-color:#16a34a;color:#fff}.csi-item.selected{border-color:#16a34a;background:#0d2818;color:#fff}#output{background:#0a0a0a;border:1px solid #222;border-radius:8px;padding:20px;font-family:"Courier New",monospace;font-size:12px;color:#ccc;white-space:pre-wrap;min-height:300px;margin-top:16px}.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;background:#16a34a22;color:#16a34a;border:1px solid #16a34a44}</style></head><body><h1>Spec Section Writer</h1><div class="sub">CSI MasterFormat — generate specification section outlines</div><div class="grid2"><div><div class="card"><div class="card-title">Select Division</div><select id="div-sel" onchange="loadSecs()"><option value="">-- Division --</option><option value="01">01 — General Requirements</option><option value="02">02 — Existing Conditions</option><option value="03">03 — Concrete</option><option value="04">04 — Masonry</option><option value="05">05 — Metals</option><option value="06">06 — Wood, Plastics, Composites</option><option value="07">07 — Thermal and Moisture</option><option value="08">08 — Openings</option><option value="09">09 — Finishes</option><option value="10">10 — Specialties</option><option value="11">11 — Equipment</option><option value="12">12 — Furnishings</option><option value="22">22 — Plumbing</option><option value="23">23 — HVAC</option><option value="26">26 — Electrical</option><option value="27">27 — Communications</option><option value="28">28 — Electronic Safety</option></select><div class="csi-list" id="sec-list"></div></div></div><div><div class="card"><div class="card-title">Project Info</div><div style="display:flex;flex-direction:column;gap:10px"><div><label>Project Name</label><input id="proj-name" value="Mixed-Use Office Tower"></div><div><label>Project Number</label><input id="proj-num" value="XL-2025-001"></div><div><label>Architect of Record</label><input id="arch" value="BIM XL / Your Firm"></div><div><label>Spec Notes</label><textarea id="notes" rows="3">Coordinate with structural engineer drawings. All materials subject to Owner approval.</textarea></div></div></div><button class="btn" onclick="genSpec()">Generate Section</button><button class="btn btn-sec" onclick="copyOut()">Copy</button></div></div><div id="output">Select a CSI section and click Generate Section.</div><script>var secs={"01":[["011000","Summary of Work"],["012300","Alternates"],["013000","Administrative Requirements"],["014000","Quality Requirements"],["015000","Temporary Facilities"],["016000","Product Requirements"],["017300","Execution"],["017700","Closeout Procedures"]],"02":[["024116","Structure Demolition"],["024119","Selective Demolition"],["028200","Asbestos Remediation"]],"03":[["033000","Cast-in-Place Concrete"],["033053","Misc Cast-in-Place Concrete"],["034500","Precast Concrete"],["035300","Concrete Topping"]],"04":[["042000","Unit Masonry"],["044200","Exterior Stone Cladding"]],"05":[["051200","Structural Steel"],["053100","Steel Decking"],["054000","Cold-Formed Metal Framing"],["055000","Metal Fabrications"],["057300","Decorative Metal Railings"]],"06":[["061000","Rough Carpentry"],["062000","Finish Carpentry"],["064116","Plastic-Laminate Casework"]],"07":[["071326","Self-Adhering Sheet Waterproofing"],["072100","Thermal Insulation"],["075423","TPO Membrane Roofing"],["076200","Sheet Metal Flashing"],["079200","Joint Sealants"]],"08":[["081113","Hollow Metal Doors"],["081416","Flush Wood Doors"],["083613","Sectional Doors"],["084113","Aluminum-Framed Entrances"],["085113","Aluminum Windows"],["087100","Door Hardware"],["088000","Glazing"]],"09":[["092116","Gypsum Board Assemblies"],["093013","Ceramic Tiling"],["095113","Acoustical Panel Ceilings"],["096513","Resilient Base"],["096813","Tile Carpeting"],["099113","Exterior Painting"],["099123","Interior Painting"]],"10":[["101400","Signage"],["102800","Toilet Accessories"],["104400","Fire Protection Specialties"]],"22":[["220500","Common Work Results Plumbing"],["224000","Plumbing Fixtures"]],"23":[["230500","Common Work Results HVAC"],["233600","Air Terminal Units"],["238126","Split-System AC"]],"26":[["260500","Common Work Results Electrical"],["262726","Wiring Devices"],["265100","Interior Lighting"]],"27":[["271300","Communications Backbone"],["275000","Distributed AV"]],"28":[["281300","Access Control"],["283111","Digital Addressable Fire Alarm"]]};var sel="";function loadSecs(){var d=document.getElementById("div-sel").value;var list=document.getElementById("sec-list");list.innerHTML="";if(!d)return;var arr=secs[d]||[];arr.forEach(function(s){var el=document.createElement("div");el.className="csi-item";el.innerHTML="<span>"+s[0]+" — "+s[1]+"</span><span class=\\"tag\\">Select</span>";el.onclick=function(){document.querySelectorAll(".csi-item").forEach(function(x){x.classList.remove("selected");});el.classList.add("selected");sel=s;};list.appendChild(el);});}function genSpec(){if(!sel){document.getElementById("output").textContent="Select a section first.";return;}var proj=document.getElementById("proj-name").value||"Untitled";var num=document.getElementById("proj-num").value||"XXX-000";var arch=document.getElementById("arch").value||"";var notes=document.getElementById("notes").value||"";var d=new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});var out="SECTION "+sel[0]+" — "+sel[1].toUpperCase()+"\n";out+="=".repeat(60)+"\n\n";out+="PROJECT:  "+proj+"\n";out+="NUMBER:   "+num+"\n";out+="PREPARED: "+arch+"\n";out+="DATE:     "+d+"\n\n";out+="PART 1 — GENERAL\n"+"-".repeat(40)+"\n";out+="1.01 SUMMARY\n     A. Section includes: "+sel[1]+" work as indicated on drawings.\n     B. Related sections: Refer to Division 01 for general requirements.\n\n";out+="1.02 REFERENCES\n     A. ASTM International: applicable standards for materials specified herein.\n     B. AIA MasterSpec Section "+sel[0]+" — latest edition.\n\n";out+="1.03 SUBMITTALS\n     A. Product Data: manufacturer literature for all specified products.\n     B. Shop Drawings: as required per Drawing notes.\n     C. Samples: submit (2) samples per material, minimum 12x12 inch.\n\n";out+="1.04 QUALITY ASSURANCE\n     A. Installer qualifications: minimum 5 years experience.\n     B. Pre-installation meeting required 7 days before work begins.\n\n";out+="1.05 DELIVERY, STORAGE, HANDLING\n     A. Deliver materials in original packaging with labels intact.\n     B. Store per manufacturer recommendations; protect from moisture.\n\n";out+="PART 2 — PRODUCTS\n"+"-".repeat(40)+"\n";out+="2.01 MANUFACTURERS\n     A. Subject to compliance with requirements: provide products from\n        manufacturers listed in drawings or approved equal.\n\n";out+="2.02 MATERIALS\n     A. Refer to drawings for material schedules and specifications.\n     B. All materials shall be new, free of defects.\n\n";out+="PART 3 — EXECUTION\n"+"-".repeat(40)+"\n";out+="3.01 EXAMINATION\n     A. Verify conditions are acceptable for installation.\n     B. Do not proceed until unsatisfactory conditions are corrected.\n\n";out+="3.02 INSTALLATION\n     A. Install per manufacturer instructions and approved shop drawings.\n     B. Maintain alignment, level, and plumb.\n\n";out+="3.03 TOLERANCES\n     A. Per industry standard unless noted otherwise on drawings.\n\n";out+="3.04 CLEANING\n     A. Remove debris, leave surfaces clean upon completion.\n\n";if(notes){out+="\nNOTES:\n"+notes+"\n";}out+="\nEND OF SECTION "+sel[0];document.getElementById("output").textContent=out;}function copyOut(){var t=document.getElementById("output").textContent;navigator.clipboard.writeText(t).catch(function(){});}</script></body></html>
