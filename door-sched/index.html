<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Door Schedule — XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:24px}.card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:20px;margin-bottom:16px}.card-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}@media(max-width:640px){.grid4{grid-template-columns:1fr 1fr}}.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}.result-box{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:14px;text-align:center}.result-val{font-size:22px;font-weight:700;color:#16a34a}.result-lbl{font-size:11px;color:#666;margin-top:4px}label{font-size:11px;color:#888;display:block;margin-bottom:4px}input,select{width:100%;background:#111;border:1px solid #333;color:#fff;padding:9px 12px;border-radius:6px;font-size:13px}input:focus,select:focus{outline:none;border-color:#16a34a}.btn{padding:9px 20px;background:#16a34a;border:none;border-radius:6px;color:#fff;font-size:13px;cursor:pointer;margin-right:8px}.btn-del{background:transparent;border:none;color:#555;cursor:pointer;font-size:13px}table{width:100%;border-collapse:collapse;font-size:11px}th{color:#555;padding:6px 8px;border-bottom:1px solid #222;text-align:left;font-size:10px;text-transform:uppercase}td{padding:6px 8px;border-bottom:1px solid #1a1a1a;color:#ccc}.badge{display:inline-block;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:600}.b-yes{background:#0d2818;color:#4ade80}.b-no{background:#222;color:#666}.fil{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}.fil select{width:auto;min-width:110px}</style></head><body><h1>Door Schedule</h1><div class="sub">Door hardware schedule — type, rating, hardware sets</div><div class="result-grid" id="summary"></div><div class="card"><div class="card-title">Add Door</div><div class="grid4" style="margin-bottom:12px"><div><label>Door Mark</label><input id="d-mark" placeholder="101A"></div><div><label>Level</label><input id="d-lvl" placeholder="L1"></div><div><label>Location</label><input id="d-loc" placeholder="Main Entry Lobby"></div><div><label>Width x Height</label><input id="d-size" placeholder="3-0 x 7-0"></div><div><label>Type</label><select id="d-type"><option>HM — Hollow Metal</option><option>WD — Solid Core Wood</option><option>WD — Hollow Core</option><option>AL — Aluminum Storefront</option><option>GL — Full Lite Glass</option><option>OH — Overhead Sectional</option><option>BI — Bifold</option></select></div><div><label>Frame</label><select id="d-frame"><option>HM — Hollow Metal</option><option>AL — Aluminum</option><option>WD — Wood</option><option>DF — Drywall</option></select></div><div><label>Fire Rating</label><select id="d-fire"><option value="">None</option><option value="20 min">20 min</option><option value="45 min">45 min</option><option value="60 min">60 min (1-hr)</option><option value="90 min">90 min (1.5-hr)</option><option value="3 hr">3 hr</option></select></div><div><label>Hardware Set</label><input id="d-hw" placeholder="HW-03"></div><div><label>Closer</label><select id="d-closer"><option value="Y">Yes</option><option value="N">No</option></select></div><div><label>Panic</label><select id="d-panic"><option value="N">No</option><option value="Y">Yes</option></select></div><div><label>Access Control</label><select id="d-ac"><option value="N">No</option><option value="Y">Yes</option></select></div><div><label>Notes</label><input id="d-notes" placeholder="Coord w/ security"></div></div><button class="btn" onclick="addDoor()">Add Door</button></div><div class="card"><div class="card-title">Door Register</div><div class="fil"><select id="f-fire" onchange="render()"><option value="">All Ratings</option><option value="">Non-Rated</option><option value="20 min">20 min</option><option value="45 min">45 min</option><option value="60 min">60 min</option><option value="90 min">90 min</option></select><select id="f-ac" onchange="render()"><option value="">All</option><option value="Y">Access Ctrl</option><option value="N">No Access Ctrl</option></select></div><table><thead><tr><th>Mark</th><th>Lvl</th><th>Location</th><th>Size</th><th>Type</th><th>Frame</th><th>Rating</th><th>HW Set</th><th>Closer</th><th>Panic</th><th>AC</th><th>Notes</th><th></th></tr></thead><tbody id="tbody"></tbody></table></div><script>var D=JSON.parse(localStorage.getItem("door-sched")||"[]");if(!D.length){D=[{mark:"101A",lvl:"L1",loc:"Main Entry",size:"3-6 x 7-0",type:"AL — Aluminum Storefront",frame:"AL — Aluminum",fire:"",hw:"HW-01",closer:"Y",panic:"Y",ac:"Y",notes:"Automatic opener"},{mark:"201B",lvl:"L2",loc:"Stair 1",size:"3-0 x 7-0",type:"HM — Hollow Metal",frame:"HM — Hollow Metal",fire:"90 min",hw:"HW-02",closer:"Y",panic:"N",ac:"N",notes:"Fire-rated stair egress"},{mark:"305C",lvl:"L3",loc:"Server Room",size:"3-0 x 7-0",type:"HM — Hollow Metal",frame:"HM — Hollow Metal",fire:"",hw:"HW-04",closer:"N",panic:"N",ac:"Y",notes:"Card reader both sides"}];}function save(){localStorage.setItem("door-sched",JSON.stringify(D));}function v(id){return document.getElementById(id).value.trim();}function addDoor(){var x={mark:v("d-mark"),lvl:v("d-lvl"),loc:v("d-loc"),size:v("d-size"),type:v("d-type"),frame:v("d-frame"),fire:v("d-fire"),hw:v("d-hw"),closer:v("d-closer"),panic:v("d-panic"),ac:v("d-ac"),notes:v("d-notes")};D.push(x);save();render();["d-mark","d-lvl","d-loc","d-size","d-hw","d-notes"].forEach(function(id){document.getElementById(id).value="";});}function del(i){D.splice(i,1);save();render();}function yn(v){return "<span class=\"badge "+(v==="Y"?"b-yes":"b-no")+"\">"+(v==="Y"?"YES":"NO")+"</span>";}function render(){var fac=document.getElementById("f-ac").value;var rows=D.filter(function(x){return !fac||x.ac===fac;});var tb=document.getElementById("tbody");tb.innerHTML="";rows.forEach(function(x){var i=D.indexOf(x);tb.innerHTML+="<tr><td style=\"font-weight:600;color:#fff\">"+x.mark+"</td><td>"+x.lvl+"</td><td>"+x.loc+"</td><td>"+x.size+"</td><td>"+x.type+"</td><td>"+x.frame+"</td><td style=\"color:"+(x.fire?"#fbbf24":"#555")+"\">"+( x.fire||"—")+"</td><td style=\"color:#16a34a\">"+x.hw+"</td><td>"+yn(x.closer)+"</td><td>"+yn(x.panic)+"</td><td>"+yn(x.ac)+"</td><td>"+x.notes+"</td><td><button class=\"btn-del\" onclick=\"del("+i+")\">x</button></td></tr>";});var tot=D.length,rated=D.filter(function(x){return !!x.fire;}).length,ac=D.filter(function(x){return x.ac==="Y";}).length,panic=D.filter(function(x){return x.panic==="Y";}).length;document.getElementById("summary").innerHTML="<div class=\"result-box\"><div class=\"result-val\">"+tot+"</div><div class=\"result-lbl\">Total Doors</div></div><div class=\"result-box\"><div class=\"result-val\">"+rated+"</div><div class=\"result-lbl\">Fire Rated</div></div><div class=\"result-box\"><div class=\"result-val\">"+ac+"</div><div class=\"result-lbl\">Access Ctrl</div></div><div class=\"result-box\"><div class=\"result-val\">"+panic+"</div><div class=\"result-lbl\">Panic Device</div></div>";}render();</script></body></html>
