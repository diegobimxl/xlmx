<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Program Calculator — XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:24px}.card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:20px;margin-bottom:16px}.card-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}@media(max-width:640px){.grid3{grid-template-columns:1fr}}.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}.result-box{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:14px;text-align:center}.result-val{font-size:22px;font-weight:700;color:#16a34a}.result-lbl{font-size:11px;color:#666;margin-top:4px}label{font-size:11px;color:#888;display:block;margin-bottom:4px}input,select{width:100%;background:#111;border:1px solid #333;color:#fff;padding:9px 12px;border-radius:6px;font-size:13px}input:focus,select:focus{outline:none;border-color:#16a34a}.btn{padding:9px 20px;background:#16a34a;border:none;border-radius:6px;color:#fff;font-size:13px;cursor:pointer;margin-right:8px}.btn-del{background:transparent;border:none;color:#555;cursor:pointer;font-size:13px}table{width:100%;border-collapse:collapse}th{font-size:11px;color:#555;padding:8px;border-bottom:1px solid #222;text-align:left}td{font-size:12px;padding:8px;border-bottom:1px solid #1a1a1a;color:#ccc}tfoot td{font-weight:700;color:#fff;border-top:1px solid #333;border-bottom:none}.cat-chip{display:inline-block;padding:1px 7px;border-radius:4px;font-size:10px}.c-primary{background:#0d2818;color:#4ade80}.c-support{background:#2e2510;color:#fbbf24}.c-circ{background:#1a1a2e;color:#818cf8}.c-mech{background:#1c2e3a;color:#60a5fa}.prog-row{height:20px;display:flex;margin-top:6px;border-radius:4px;overflow:hidden}.prog-seg{height:100%;transition:width .3s}</style></head><body><h1>Space Program Calculator</h1><div class="sub">Architectural program — space requirements, areas, and efficiency</div><div class="result-grid" id="summary"></div><div class="card"><div class="card-title">Project Parameters</div><div class="grid3"><div><label>Project Name</label><input id="proj" value="Mixed-Use Office Tower"></div><div><label>Target NSF (SF)</label><input type="number" id="target" value="50000" oninput="render()"></div><div><label>Efficiency Target (%)</label><input type="number" id="eff" value="83" oninput="render()"></div></div></div><div class="card"><div class="card-title">Add Space</div><div class="grid3" style="margin-bottom:12px"><div><label>Space Name</label><input id="s-name" placeholder="Open Work Area"></div><div><label>Category</label><select id="s-cat"><option value="primary">Primary</option><option value="support">Support</option><option value="circ">Circulation</option><option value="mech">Mechanical</option></select></div><div><label>Quantity</label><input type="number" id="s-qty" value="1" min="1"></div><div><label>SF per Unit</label><input type="number" id="s-sf" placeholder="2400"></div><div><label>Headcount</label><input type="number" id="s-hc" placeholder="24"></div><div style="display:flex;align-items:flex-end"><button class="btn" onclick="addSpace()">Add</button></div></div></div><div class="card"><div class="card-title">Space Program</div><div class="prog-row" id="prog-bar" style="margin-bottom:12px"></div><table><thead><tr><th>Space</th><th>Category</th><th>Qty</th><th>SF/Unit</th><th>Total SF</th><th>% of NSF</th><th>Head</th><th>SF/Person</th><th></th></tr></thead><tbody id="tbody"></tbody><tfoot><tr><td colspan="3">TOTAL NSF</td><td></td><td id="tot-nsf">0 SF</td><td>100%</td><td id="tot-hc">0</td><td id="avg-sf">—</td><td></td></tr></tfoot></table></div><script>var S=JSON.parse(localStorage.getItem("program")||"[]");if(!S.length){S=[{name:"Executive Offices",cat:"primary",qty:6,sf:200,hc:1},{name:"Open Work Area",cat:"primary",qty:1,sf:8000,hc:80},{name:"Conference Room — Large",cat:"primary",qty:2,sf:600,hc:20},{name:"Conference Room — Small",cat:"support",qty:4,sf:200,hc:8},{name:"Break Room",cat:"support",qty:2,sf:400,hc:0},{name:"Reception / Lobby",cat:"circ",qty:1,sf:800,hc:0},{name:"Corridors",cat:"circ",qty:1,sf:3200,hc:0},{name:"Mechanical / Electrical",cat:"mech",qty:1,sf:1200,hc:0}];}function save(){localStorage.setItem("program",JSON.stringify(S));}function v(id){return document.getElementById(id).value;}function addSpace(){var x={name:v("s-name").trim(),cat:v("s-cat"),qty:parseInt(v("s-qty"))||1,sf:parseFloat(v("s-sf"))||0,hc:parseInt(v("s-hc"))||0};if(!x.name||!x.sf)return;S.push(x);save();render();["s-name","s-sf","s-hc"].forEach(function(id){document.getElementById(id).value="";});}function del(i){S.splice(i,1);save();render();}function render(){var target=parseFloat(v("target"))||0;var eff=parseFloat(v("eff"))||83;var totalNSF=S.reduce(function(sum,x){return sum+x.qty*x.sf;},0);var estGSF=totalNSF/(eff/100);var totalHC=S.reduce(function(sum,x){return sum+x.qty*x.hc;},0);var cats={primary:0,support:0,circ:0,mech:0};S.forEach(function(x){cats[x.cat]=(cats[x.cat]||0)+x.qty*x.sf;});var catCols={primary:"#16a34a",support:"#fbbf24",circ:"#818cf8",mech:"#60a5fa"};var bar=document.getElementById("prog-bar");bar.innerHTML="";["primary","support","circ","mech"].forEach(function(c){if(!cats[c]||!totalNSF)return;var pct=(cats[c]/totalNSF*100).toFixed(1);bar.innerHTML+="<div class=\"prog-seg\" title=\""+c+" "+pct+"%\" style=\"width:"+pct+"%;background:"+catCols[c]+"\"></div>";});var tb=document.getElementById("tbody");tb.innerHTML="";S.forEach(function(x,i){var tot=x.qty*x.sf;var pct=totalNSF?(tot/totalNSF*100).toFixed(1):0;var sfp=x.hc?(tot/x.qty/x.hc).toFixed(0):"—";var catCls={primary:"c-primary",support:"c-support",circ:"c-circ",mech:"c-mech"}[x.cat]||"";tb.innerHTML+="<tr><td>"+x.name+"</td><td><span class=\"cat-chip "+catCls+"\">"+x.cat+"</span></td><td>"+x.qty+"</td><td>"+x.sf.toLocaleString()+"</td><td>"+tot.toLocaleString()+"</td><td>"+pct+"%</td><td>"+( x.hc?x.qty*x.hc:"—")+"</td><td>"+sfp+"</td><td><button class=\"btn-del\" onclick=\"del("+i+")\">x</button></td></tr>";});document.getElementById("tot-nsf").textContent=totalNSF.toLocaleString()+" SF";document.getElementById("tot-hc").textContent=totalHC;document.getElementById("avg-sf").textContent=totalHC?(totalNSF/totalHC).toFixed(0)+" SF/person":"—";var over=totalNSF>target&&target>0;document.getElementById("summary").innerHTML="<div class=\"result-box\"><div class=\"result-val\">"+totalNSF.toLocaleString()+"</div><div class=\"result-lbl\">Program NSF</div></div><div class=\"result-box\"><div class=\"result-val\" style=\"color:"+(over?"#f87171":"#16a34a")+"\">"+target.toLocaleString()+"</div><div class=\"result-lbl\">Target NSF</div></div><div class=\"result-box\"><div class=\"result-val\">"+Math.round(estGSF).toLocaleString()+"</div><div class=\"result-lbl\">Est GSF @ "+eff+"%</div></div><div class=\"result-box\"><div class=\"result-val\">"+totalHC+"</div><div class=\"result-lbl\">Total Headcount</div></div>";}render();</script></body></html>
