<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Project Budget Tracker - XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:20px}label{font-size:11px;color:#888;display:block;margin-bottom:3px}input,select{background:#1a1a1a;border:1px solid #333;color:#fff;padding:7px 10px;border-radius:5px;font-size:12px}.btn{background:#16a34a;color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600}.btn-s{background:#1a1a1a;border:1px solid #333;color:#aaa;padding:7px 12px;border-radius:5px;font-size:11px;cursor:pointer}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}.stat{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:14px;text-align:center}.sv{font-size:22px;font-weight:700;color:#16a34a}.sl{font-size:10px;color:#666;margin-top:3px}.add-form{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:14px;margin-bottom:14px;display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr auto;gap:8px;align-items:flex-end}@media(max-width:700px){.add-form{grid-template-columns:1fr 1fr}}.tbl{width:100%;border-collapse:collapse}.tbl th{font-size:11px;color:#555;text-align:left;padding:8px 10px;border-bottom:1px solid #222;background:#0a0a0a}.tbl td{font-size:12px;padding:8px 10px;border-bottom:1px solid #1a1a1a;color:#ccc}.bar-wrap{background:#222;border-radius:3px;height:8px;min-width:80px}.bar-fill{height:100%;border-radius:3px}.cat-badge{font-size:10px;padding:2px 6px;border-radius:3px;background:#222;color:#aaa}.del{background:none;border:none;color:#555;cursor:pointer;font-size:15px}.filter-bar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}</style></head><body><h1>Project Budget Tracker</h1><div class="sub">Track budget vs actual by category — variance alerts and CSV export</div><div class="stats" id="stats"></div><div class="add-form"><div><label>Description</label><input id="desc" placeholder="Concrete Slab - Level 2" style="width:100%"></div><div><label>Category</label><select id="cat" style="width:100%"><option>General Conditions</option><option>Site Work</option><option>Concrete</option><option>Masonry</option><option>Steel</option><option>Finishes</option><option>MEP</option><option>Equipment</option><option>Contingency</option><option>Soft Costs</option><option>Other</option></select></div><div><label>Budgeted ($)</label><input type="number" id="bud" placeholder="0" style="width:100%"></div><div><label>Actual ($)</label><input type="number" id="act" placeholder="0" style="width:100%"></div><div><label>Status</label><select id="sta" style="width:100%"><option>In Progress</option><option>Committed</option><option>Invoiced</option><option>Paid</option><option>Pending</option></select></div><div style="display:flex;align-items:flex-end"><button class="btn" onclick="add()">+ Add</button></div></div><div class="filter-bar"><select id="fcat" onchange="render()" style="background:#1a1a1a;border:1px solid #333;color:#fff;padding:7px 10px;border-radius:5px;font-size:12px"><option value="">All Categories</option></select><button class="btn-s" onclick="exportCSV()">Export CSV</button></div><table class="tbl"><thead><tr><th>Description</th><th>Category</th><th>Budgeted</th><th>Actual</th><th>Variance</th><th>% Used</th><th>Status</th><th></th></tr></thead><tbody id="tb"></tbody></table><script>var cats=["01-General","02-Existing","03-Concrete","04-Masonry","05-Metals","06-Wood and Plastics","07-Thermal and Moisture","08-Openings","09-Finishes","10-Specialties","11-Equipment","12-Furnishings","14-Conveying","21-Fire Suppression","22-Plumbing","23-HVAC","26-Electrical","27-Communications","28-Security","31-Earthwork","32-Exterior","33-Utilities"];var B=JSON.parse(localStorage.getItem("bt")||"[]");var filt="";function save(){localStorage.setItem("bt",JSON.stringify(B));}function usd(n){return "$"+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}function stSt(p){if(p<=80)return{cls:"s-ok",txt:"On Track"};if(p<=100)return{cls:"s-warn",txt:"Near Limit"};return{cls:"s-over",txt:"Over Budget"};}function render(){var rows=B.filter(function(b){return !filt||(b.desc+b.cat).toLowerCase().includes(filt.toLowerCase());});var tb=document.getElementById("tb");tb.innerHTML="";var tBud=0,tAct=0;rows.forEach(function(b){var idx=B.indexOf(b);var bud=parseFloat(b.bud)||0,act=parseFloat(b.act)||0;var vari=bud-act,pct=bud?((act/bud)*100):0;var st=stSt(pct);tBud+=bud;tAct+=act;var bar=Math.min(pct,120);var bc=pct<=80?"#16a34a":pct<=100?"#d97706":"#dc2626";var row="<tr><td>"+b.desc+"</td><td>"+b.cat+"</td><td>"+usd(bud)+"</td><td>"+usd(act)+"</td>";row+="<td>"+(vari>=0?"+":"")+usd(vari)+"</td>";row+="<td><div style=\"background:#222;height:10px;border-radius:4px\"><div style=\"background:"+bc+";height:10px;width:"+bar+"%\"></div></div>";row+="<div style=\"font-size:10px;color:#666\">"+pct.toFixed(1)+"%</div></td>";row+="<td><span class=\"badge "+st.cls+"\">"+st.txt+"</span></td>";row+="<td><button onclick=\"del("+idx+")\">x</button></td></tr>";tb.innerHTML+=row;});var tv=tBud-tAct;var ts=document.getElementById("totals");ts.innerHTML="<tr><td><b>TOTAL</b></td><td></td><td><b>"+usd(tBud)+"</b></td><td><b>"+usd(tAct)+"</b></td><td>"+(tv>=0?"+":"")+usd(tv)+"</td><td></td><td></td><td></td></tr>";var sm=document.getElementById("summary");sm.innerHTML="<div class=\"result-box\"><div class=\"result-val\">"+usd(tBud)+"</div><div class=\"result-lbl\">Budget</div></div>";sm.innerHTML+="<div class=\"result-box\"><div class=\"result-val\">"+usd(tAct)+"</div><div class=\"result-lbl\">Actual</div></div>";sm.innerHTML+="<div class=\"result-box\"><div class=\"result-val\" style=\"color:"+(tv>=0?"#16a34a":"#dc2626")+"\">"+(tv>=0?"+":"")+usd(tv)+"</div><div class=\"result-lbl\">Variance</div></div>";sm.innerHTML+="<div class=\"result-box\"><div class=\"result-val\">"+(tBud?((tAct/tBud)*100).toFixed(1)+"%":"0%")+"</div><div class=\"result-lbl\">% Spent</div></div>";}function addEntry(){var desc=document.getElementById("i-desc").value.trim();var cat=document.getElementById("i-cat").value;var bud=document.getElementById("i-bud").value;var act=document.getElementById("i-act").value;if(!desc||!bud)return;B.push({desc:desc,cat:cat,bud:bud,act:act||0});save();render();document.getElementById("i-desc").value="";document.getElementById("i-bud").value="";document.getElementById("i-act").value="";}function del(i){B.splice(i,1);save();render();}function exportCSV(){var rows=[["Description","Category","Budgeted","Actual","Variance","Pct","Status"]];B.forEach(function(b){var bud=parseFloat(b.bud)||0,act=parseFloat(b.act)||0,vari=bud-act,pct=bud?((act/bud)*100):0;rows.push([b.desc,b.cat,bud,act,vari.toFixed(2),pct.toFixed(1)+"%",stSt(pct).txt]);});var csv=rows.map(function(r){return r.join(",");}).join("\n");var a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="budget.csv";a.click();}var catSel=document.getElementById("i-cat");cats.forEach(function(c){var o=document.createElement("option");o.value=c;o.textContent=c;catSel.appendChild(o);});document.getElementById("search").oninput=function(){filt=this.value;render();};if(B.length===0){B=[{desc:"General Conditions",cat:"01-General",bud:"50000",act:"42000"},{desc:"Concrete Work",cat:"03-Concrete",bud:"120000",act:"118500"},{desc:"Framing",cat:"06-Wood and Plastics",bud:"85000",act:"91200"},{desc:"Roofing",cat:"07-Thermal and Moisture",bud:"40000",act:"38000"},{desc:"Electrical",cat:"26-Electrical",bud:"95000",act:"76000"},{desc:"Plumbing",cat:"22-Plumbing",bud:"60000",act:"62400"},{desc:"HVAC",cat:"23-HVAC",bud:"75000",act:"58000"}];save();}render();</script></body></html>
