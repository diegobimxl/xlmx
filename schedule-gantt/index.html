<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gantt Schedule Builder — XLMX</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}
h1{font-size:20px;font-weight:700;margin-bottom:4px}
.sub{font-size:12px;color:#888;margin-bottom:24px}
.top{display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
input,select{background:#1a1a1a;border:1px solid #333;color:#fff;padding:8px 12px;border-radius:6px;font-size:13px}
input[type=date]{color-scheme:dark}
btn,.btn{background:#16a34a;color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600}
.btn-sec{background:#1a1a1a;border:1px solid #333;color:#aaa;padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer}
.btn-sec:hover{border-color:#16a34a;color:#fff}
.row-form{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 80px auto;gap:8px;margin-bottom:8px;align-items:center}
.row-form input,.row-form select{width:100%}
label{font-size:11px;color:#888;display:block;margin-bottom:4px}
.gantt-wrap{overflow-x:auto;margin-top:24px}
.gantt{min-width:900px}
.gantt-header{display:flex;margin-bottom:4px}
.gantt-label{width:240px;flex-shrink:0;font-size:11px;color:#888;padding:0 8px}
.gantt-timeline{flex:1;display:flex;font-size:10px;color:#666}
.gantt-day{flex:1;text-align:center;border-left:1px solid #222}
.gantt-row{display:flex;align-items:center;margin-bottom:4px;min-height:32px}
.gantt-name{width:240px;flex-shrink:0;font-size:12px;padding:0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-bar-area{flex:1;position:relative;height:24px;background:#1a1a1a;border-radius:4px;overflow:hidden}
.gantt-bar{position:absolute;height:100%;border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:10px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden}
.cat-design{background:#1d4ed8}
.cat-structure{background:#7c3aed}
.cat-mep{background:#0891b2}
.cat-construction{background:#b45309}
.cat-closeout{background:#15803d}
.cat-permitting{background:#b91c1c}
.cat-other{background:#374151}
.task-list{margin-top:16px}
.task-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 80px 32px;gap:8px;align-items:center;background:#1a1a1a;border:1px solid #222;border-radius:6px;padding:10px 12px;margin-bottom:6px}
.task-name{font-size:13px;font-weight:600}
.task-detail{font-size:11px;color:#888}
.del-btn{background:#2a1a1a;border:1px solid #3a1a1a;color:#f87171;border-radius:4px;cursor:pointer;width:28px;height:28px;font-size:14px;display:flex;align-items:center;justify-content:center}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#aaa}
.leg-dot{width:10px;height:10px;border-radius:2px}
.stat-bar{display:flex;gap:16px;background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:16px;margin-bottom:20px;flex-wrap:wrap}
.stat{text-align:center}
.stat-val{font-size:20px;font-weight:700;color:#16a34a}
.stat-lbl{font-size:10px;color:#888;margin-top:2px}
.section-title{font-size:13px;font-weight:600;color:#888;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.empty{color:#444;font-size:13px;text-align:center;padding:40px}
</style>
</head>
<body>
<h1>Gantt Schedule Builder</h1>
<div class="sub">Project timeline — add tasks, set dates, visualize the schedule</div>

<div class="stat-bar" id="stats">
<div class="stat"><div class="stat-val" id="s-tasks">0</div><div class="stat-lbl">Tasks</div></div>
<div class="stat"><div class="stat-val" id="s-duration">0d</div><div class="stat-lbl">Duration</div></div>
<div class="stat"><div class="stat-val" id="s-start">—</div><div class="stat-lbl">Start</div></div>
<div class="stat"><div class="stat-val" id="s-end">—</div><div class="stat-lbl">End</div></div>
<div style="margin-left:auto;display:flex;align-items:center;gap:8px">
<button class="btn-sec" onclick="exportCSV()">Export CSV</button>
<button class="btn-sec" onclick="clearAll()">Clear</button>
</div>
</div>

<div class="section-title">Add Task</div>
<div class="row-form">
<div><label>Task Name</label><input type="text" id="in-name" placeholder="e.g. Schematic Design"></div>
<div><label>Category</label>
<select id="in-cat">
<option value="design">Design</option>
<option value="structure">Structure</option>
<option value="mep">MEP</option>
<option value="construction">Construction</option>
<option value="closeout">Closeout</option>
<option value="permitting">Permitting</option>
<option value="other">Other</option>
</select></div>
<div><label>Start Date</label><input type="date" id="in-start"></div>
<div><label>End Date</label><input type="date" id="in-end"></div>
<div><label>% Done</label><input type="number" id="in-pct" min="0" max="100" value="0" placeholder="0"></div>
<div style="display:flex;align-items:flex-end"><button class="btn" onclick="addTask()">+ Add</button></div>
</div>

<div class="legend">
<div class="leg-item"><div class="leg-dot" style="background:#1d4ed8"></div>Design</div>
<div class="leg-item"><div class="leg-dot" style="background:#7c3aed"></div>Structure</div>
<div class="leg-item"><div class="leg-dot" style="background:#0891b2"></div>MEP</div>
<div class="leg-item"><div class="leg-dot" style="background:#b45309"></div>Construction</div>
<div class="leg-item"><div class="leg-dot" style="background:#15803d"></div>Closeout</div>
<div class="leg-item"><div class="leg-dot" style="background:#b91c1c"></div>Permitting</div>
<div class="leg-item"><div class="leg-dot" style="background:#374151"></div>Other</div>
</div>

<div class="section-title">Schedule</div>
<div class="gantt-wrap" id="gantt-wrap">
<div class="empty" id="empty-msg">No tasks yet. Add your first task above.</div>
</div>

<div class="section-title" style="margin-top:24px">Task List</div>
<div class="task-list" id="task-list"></div>

<script>
var tasks = JSON.parse(localStorage.getItem('gantt-tasks') || '[]');

var today = new Date();
document.getElementById('in-start').value = today.toISOString().slice(0,10);
var def_end = new Date(today); def_end.setDate(def_end.getDate()+14);
document.getElementById('in-end').value = def_end.toISOString().slice(0,10);

function save(){ localStorage.setItem('gantt-tasks', JSON.stringify(tasks)); }

function addTask(){
  var name = document.getElementById('in-name').value.trim();
  var cat = document.getElementById('in-cat').value;
  var start = document.getElementById('in-start').value;
  var end = document.getElementById('in-end').value;
  var pct = parseInt(document.getElementById('in-pct').value)||0;
  if(!name||!start||!end){alert('Name, start, and end required.');return;}
  if(start>end){alert('Start must be before end.');return;}
  tasks.push({id:Date.now(),name:name,cat:cat,start:start,end:end,pct:Math.min(100,Math.max(0,pct))});
  save(); render();
  document.getElementById('in-name').value='';
  document.getElementById('in-pct').value=0;
}

function deleteTask(id){
  tasks = tasks.filter(function(t){return t.id!==id;});
  save(); render();
}

function daysBetween(a,b){
  return Math.round((new Date(b)-new Date(a))/(1000*60*60*24));
}

function fmtDate(d){
  var p = d.split('-');
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[parseInt(p[1])-1]+' '+parseInt(p[2]);
}

function render(){
  if(tasks.length===0){
    document.getElementById('gantt-wrap').innerHTML='<div class="empty" id="empty-msg">No tasks yet. Add your first task above.</div>';
    document.getElementById('task-list').innerHTML='';
    document.getElementById('s-tasks').textContent='0';
    document.getElementById('s-duration').textContent='0d';
    document.getElementById('s-start').textContent='—';
    document.getElementById('s-end').textContent='—';
    return;
  }

  var sorted = tasks.slice().sort(function(a,b){return a.start.localeCompare(b.start);});
  var minDate = sorted[0].start;
  var maxDate = sorted.reduce(function(m,t){return t.end>m?t.end:m;},sorted[0].end);
  var totalDays = daysBetween(minDate,maxDate)+1;

  document.getElementById('s-tasks').textContent=tasks.length;
  document.getElementById('s-duration').textContent=totalDays+'d';
  document.getElementById('s-start').textContent=fmtDate(minDate);
  document.getElementById('s-end').textContent=fmtDate(maxDate);

  // Build week labels
  var weekLabels = [];
  var cur = new Date(minDate);
  var end = new Date(maxDate);
  while(cur<=end){
    weekLabels.push({label: fmtDate(cur.toISOString().slice(0,10)), offset: daysBetween(minDate,cur.toISOString().slice(0,10))});
    cur.setDate(cur.getDate()+7);
  }

  var gantt = '<div class="gantt"><div class="gantt-header"><div class="gantt-label">Task</div><div class="gantt-timeline">';
  weekLabels.forEach(function(w){
    var pct = (w.offset/totalDays)*100;
    gantt+='<div style="position:absolute;left:'+pct+'%;font-size:10px;color:#555;white-space:nowrap">'+w.label+'</div>';
  });
  gantt+='</div></div>';

  gantt+='<div style="position:relative;margin-left:240px;height:16px;margin-bottom:4px">';
  weekLabels.forEach(function(w){
    var pct = (w.offset/totalDays)*100;
    gantt+='<div style="position:absolute;left:'+pct+'%;font-size:10px;color:#555;white-space:nowrap">'+w.label+'</div>';
  });
  gantt+='</div>';

  sorted.forEach(function(t){
    var left = (daysBetween(minDate,t.start)/totalDays)*100;
    var width = ((daysBetween(t.start,t.end)+1)/totalDays)*100;
    var catClass = 'cat-'+t.cat;
    gantt+='<div class="gantt-row">';
    gantt+='<div class="gantt-name" title="'+t.name+'">'+t.name+'</div>';
    gantt+='<div class="gantt-bar-area">';
    gantt+='<div class="gantt-bar '+catClass+'" style="left:'+left+'%;width:'+width+'%">';
    if(t.pct>0){gantt+='<div style="position:absolute;left:0;top:0;height:100%;width:'+t.pct+'%;background:rgba(255,255,255,0.25);border-radius:4px"></div>';}
    gantt+=t.pct+'%';
    gantt+='</div></div></div>';
  });
  gantt+='</div>';

  document.getElementById('gantt-wrap').innerHTML=gantt;

  var listHtml='';
  sorted.forEach(function(t){
    var dur=daysBetween(t.start,t.end)+1;
    listHtml+='<div class="task-row">';
    listHtml+='<div><div class="task-name">'+t.name+'</div><div class="task-detail">'+fmtDate(t.start)+' — '+fmtDate(t.end)+'</div></div>';
    listHtml+='<div class="task-detail" style="text-transform:capitalize">'+t.cat+'</div>';
    listHtml+='<div class="task-detail">'+dur+' days</div>';
    listHtml+='<div class="task-detail">'+t.pct+'% done</div>';
    listHtml+='<div></div>';
    listHtml+='<button class="del-btn" onclick="deleteTask('+t.id+')">×</button>';
    listHtml+='</div>';
  });
  document.getElementById('task-list').innerHTML=listHtml;
}

function clearAll(){ if(confirm('Clear all tasks?')){tasks=[];save();render();} }

function exportCSV(){
  var csv='Task,Category,Start,End,Duration (days),% Done\n';
  tasks.forEach(function(t){
    csv+='"'+t.name+'",'+t.cat+','+t.start+','+t.end+','+(daysBetween(t.start,t.end)+1)+','+t.pct+'\n';
  });
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='schedule.csv'; a.click();
}

render();

// Load sample on first visit
if(tasks.length===0){
  var s=new Date(); s.setDate(s.getDate()-5);
  var fmt=function(d){return d.toISOString().slice(0,10);};
  var dates=[
    [fmt(s), addDays(s,10)],
    [addDays(s,3), addDays(s,18)],
    [addDays(s,12), addDays(s,30)],
    [addDays(s,8), addDays(s,22)]
  ];
  function addDays(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return fmt(x);}
  tasks=[
    {id:1,name:'Schematic Design',cat:'design',start:dates[0][0],end:dates[0][1],pct:80},
    {id:2,name:'Structural Engineering',cat:'structure',start:dates[1][0],end:dates[1][1],pct:40},
    {id:3,name:'Construction Documents',cat:'design',start:dates[2][0],end:dates[2][1],pct:10},
    {id:4,name:'MEP Coordination',cat:'mep',start:dates[3][0],end:dates[3][1],pct:25}
  ];
  save(); render();
}
</script>
</body>
</html>
