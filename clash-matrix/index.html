<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Clash Matrix - BIM XL</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d0d0d;color:#e8e8e8;min-height:100vh}
header{background:#111;border-bottom:1px solid #222;padding:14px 24px;display:flex;align-items:center;gap:14px}
header a{color:#555;text-decoration:none;font-size:13px}
header a:hover{color:#e8e8e8}
h1{font-size:19px;font-weight:600;color:#fff}
.sub{font-size:12px;color:#555;margin-left:auto}
.toolbar{display:flex;gap:10px;padding:16px 24px;background:#111;border-bottom:1px solid #222;flex-wrap:wrap;align-items:center}
.btn{padding:7px 14px;font-size:12px;font-weight:500;border:1px solid #333;border-radius:4px;cursor:pointer;background:#1a1a1a;color:#ccc;transition:all .15s}
.btn:hover{background:#252525;color:#fff;border-color:#444}
.btn.primary{background:#c8a96e;border-color:#c8a96e;color:#000}
.btn.primary:hover{background:#d4b87a}
.btn.danger{border-color:#444;color:#f87171}
.btn.danger:hover{background:#2a1a1a;border-color:#f87171}
.pname-input{background:#1a1a1a;border:1px solid #2e2e2e;color:#e8e8e8;padding:6px 10px;font-size:13px;border-radius:4px;width:220px}
.pname-input:focus{outline:none;border-color:#c8a96e}
.main{padding:24px}
.section-label{font-size:11px;color:#555;letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px}
/* Matrix */
.matrix-wrap{overflow-x:auto;margin-bottom:28px}
table.clash{border-collapse:collapse;white-space:nowrap}
table.clash th{font-size:11px;font-weight:600;color:#888;padding:6px 4px;text-align:center;min-width:80px}
table.clash th.row-lbl{text-align:right;padding-right:10px;min-width:120px;color:#aaa;font-size:12px}
table.clash td.row-lbl{text-align:right;padding-right:10px;font-size:12px;color:#aaa;min-width:120px}
table.clash td.cell{width:80px;height:60px;border:1px solid #1e1e1e;cursor:pointer;position:relative;text-align:center;vertical-align:middle;transition:background .12s}
table.clash td.cell:hover{background:#1e1e1e!important}
table.clash td.cell.self{background:#111;cursor:default}
table.clash td.cell.mirror{background:#0f0f0f;cursor:default;opacity:.4}
.cell-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;height:100%;padding:4px}
.cell-count{font-size:18px;font-weight:700;line-height:1}
.cell-status{font-size:9px;font-weight:600;letter-spacing:.04em;padding:1px 5px;border-radius:2px}
.s-pending{background:#2a2a2a;color:#666}
.s-testing{background:#1e2a3a;color:#60a5fa}
.s-pass{background:#14291e;color:#4ade80}
.s-fail{background:#2a1414;color:#f87171}
.s-na{background:#111;color:#444}
/* Log */
.log-wrap{background:#111;border:1px solid #1e1e1e;border-radius:6px;overflow:hidden}
.log-header{display:grid;grid-template-columns:120px 120px 80px 80px 1fr 100px;gap:0;background:#161616;border-bottom:1px solid #222}
.log-header span{font-size:11px;color:#555;padding:8px 12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.log-row{display:grid;grid-template-columns:120px 120px 80px 80px 1fr 100px;gap:0;border-bottom:1px solid #1a1a1a;transition:background .1s}
.log-row:hover{background:#141414}
.log-row span{font-size:12px;padding:10px 12px;color:#ccc;display:flex;align-items:center}
.log-row span.note{color:#888;font-style:italic}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;letter-spacing:.03em}
.log-edit{background:none;border:1px solid #333;color:#888;font-size:11px;padding:3px 8px;border-radius:3px;cursor:pointer}
.log-edit:hover{border-color:#c8a96e;color:#c8a96e}
.empty-log{padding:32px;text-align:center;color:#444;font-size:13px}
/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#161616;border:1px solid #2e2e2e;border-radius:8px;width:420px;max-width:90vw;padding:24px}
.modal h2{font-size:15px;font-weight:600;color:#fff;margin-bottom:16px}
.modal-pair{font-size:13px;color:#c8a96e;margin-bottom:16px;font-weight:500}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:#666;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{width:100%;background:#1a1a1a;border:1px solid #2e2e2e;color:#e8e8e8;padding:8px 10px;font-size:13px;border-radius:4px;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#c8a96e}
.field textarea{resize:vertical;min-height:70px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
/* Print */
@media print{
  .toolbar,.overlay{display:none!important}
  body{background:#fff;color:#000}
  header{background:#fff;border-bottom:1px solid #ccc}
  h1{color:#000}.sub{color:#666}
  table.clash th,table.clash td.row-lbl{color:#333}
  table.clash td.cell{border-color:#ccc}
}
</style>
</head>
<body>
<header>
  <a href="/">← Dashboard</a>
  <h1>Clash Matrix</h1>
  <span class="sub">BIM XL — VDC Coordination</span>
</header>
<div class="toolbar">
  <input class="pname-input" id="projName" placeholder="Project name..." oninput="saveState()">
  <button class="btn primary" onclick="exportCSV()">Export CSV</button>
  <button class="btn" onclick="exportJSON()">Export JSON</button>
  <button class="btn" onclick="window.print()">Print</button>
  <button class="btn danger" onclick="resetAll()">Reset</button>
</div>
<div class="main">
  <p class="section-label">Discipline Clash Matrix — click any cell to log results</p>
  <div class="matrix-wrap" id="matrixWrap"></div>
  <p class="section-label" style="margin-top:8px">Clash Log</p>
  <div class="log-wrap">
    <div class="log-header">
      <span>Discipline A</span><span>Discipline B</span><span>Count</span><span>Status</span><span>Notes</span><span>Actions</span>
    </div>
    <div id="logBody"></div>
  </div>
</div>
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Edit Clash Entry</h2>
    <div class="modal-pair" id="modalPair"></div>
    <div class="field"><label>Clash Count</label><input type="number" id="mCount" min="0" value="0"></div>
    <div class="field">
      <label>Status</label>
      <select id="mStatus">
        <option value="pending">Pending</option>
        <option value="testing">Testing / In Progress</option>
        <option value="pass">Pass — Resolved</option>
        <option value="fail">Fail — Active Clash</option>
        <option value="na">N/A</option>
      </select>
    </div>
    <div class="field"><label>Notes</label><textarea id="mNotes" placeholder="Coordination notes, responsible party, issue #..."></textarea></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveEntry()">Save</button>
    </div>
  </div>
</div>
<script>
var DISCS=[
  {id:'arch',label:'Architecture'},
  {id:'str',label:'Structure'},
  {id:'hvac',label:'HVAC'},
  {id:'plumb',label:'Plumbing'},
  {id:'elec',label:'Electrical'},
  {id:'fp',label:'Fire Protection'},
  {id:'site',label:'Civil / Site'},
  {id:'int',label:'Interiors'}
];
var data={};
var editKey=null;

function key(a,b){
  var ai=DISCS.findIndex(function(d){return d.id===a});
  var bi=DISCS.findIndex(function(d){return d.id===b});
  return ai<bi?a+'|'+b:b+'|'+a;
}
function getEntry(a,b){
  var k=key(a,b);
  if(!data[k])data[k]={count:0,status:'pending',notes:''};
  return data[k];
}
function buildMatrix(){
  var html='<table class="clash"><thead><tr><th class="row-lbl"></th>';
  DISCS.forEach(function(d){html+='<th>'+d.label+'</th>';});
  html+='</tr></thead><tbody>';
  DISCS.forEach(function(da,ai){
    html+='<tr><td class="row-lbl">'+da.label+'</td>';
    DISCS.forEach(function(db,bi){
      if(ai===bi){html+='<td class="cell self"><div class="cell-inner"><span style="color:#333;font-size:11px">—</span></div></td>';return;}
      if(ai>bi){html+='<td class="cell mirror"></td>';return;}
      var e=getEntry(da.id,db.id);
      var sc='s-'+e.status;
      var sl={pending:'PENDING',testing:'TESTING',pass:'PASS',fail:'FAIL',na:'N/A'}[e.status];
      html+='<td class="cell" onclick="openModal(\''+da.id+'\',\''+db.id+'\')"><div class="cell-inner"><span class="cell-count" style="color:'+(e.count>0&&e.status==='fail'?'#f87171':e.count>0&&e.status==='pass'?'#4ade80':'#aaa')+'">'+e.count+'</span><span class="cell-status '+sc+'">'+sl+'</span></div></td>';
    });
    html+='</tr>';
  });
  html+='</tbody></table>';
  document.getElementById('matrixWrap').innerHTML=html;
}
function buildLog(){
  var rows=[];
  Object.keys(data).forEach(function(k){
    var e=data[k];
    if(e.count>0||e.status!=='pending'||e.notes){
      var parts=k.split('|');
      var la=DISCS.find(function(d){return d.id===parts[0]});
      var lb=DISCS.find(function(d){return d.id===parts[1]});
      rows.push({k:k,a:la?la.label:parts[0],b:lb?lb.label:parts[1],e:e});
    }
  });
  if(!rows.length){
    document.getElementById('logBody').innerHTML='<div class="empty-log">No entries yet — click a cell to log clash data.</div>';
    return;
  }
  var sc={pending:'s-pending',testing:'s-testing',pass:'s-pass',fail:'s-fail',na:'s-na'};
  var sl={pending:'PENDING',testing:'TESTING',pass:'PASS',fail:'FAIL',na:'N/A'};
  var html='';
  rows.sort(function(a,b){return (b.e.count||0)-(a.e.count||0);});
  rows.forEach(function(r){
    var parts=r.k.split('|');
    html+='<div class="log-row">'
      +'<span>'+r.a+'</span>'
      +'<span>'+r.b+'</span>'
      +'<span style="font-weight:700;color:'+(r.e.count>0?'#e8e8e8':'#555')+'">'+r.e.count+'</span>'
      +'<span><span class="badge '+sc[r.e.status]+'">'+sl[r.e.status]+'</span></span>'
      +'<span class="note">'+(r.e.notes||'—')+'</span>'
      +'<span><button class="log-edit" onclick="openModal(\''+parts[0]+'\',\''+parts[1]+'\')">Edit</button></span>'
      +'</div>';
  });
  document.getElementById('logBody').innerHTML=html;
}
function openModal(a,b){
  editKey=key(a,b);
  var e=getEntry(a,b);
  var la=DISCS.find(function(d){return d.id===a}).label;
  var lb=DISCS.find(function(d){return d.id===b}).label;
  document.getElementById('modalPair').textContent=la+' ↔ '+lb;
  document.getElementById('mCount').value=e.count;
  document.getElementById('mStatus').value=e.status;
  document.getElementById('mNotes').value=e.notes;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('mCount').focus();
}
function closeModal(){document.getElementById('overlay').classList.remove('open');editKey=null;}
function saveEntry(){
  if(!editKey)return;
  data[editKey]={
    count:parseInt(document.getElementById('mCount').value)||0,
    status:document.getElementById('mStatus').value,
    notes:document.getElementById('mNotes').value.trim()
  };
  saveState();buildMatrix();buildLog();closeModal();
}
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
function saveState(){
  try{localStorage.setItem('clashData',JSON.stringify(data));
  var pn=document.getElementById('projName').value;
  localStorage.setItem('clashProj',pn);}catch(ex){}
}
function loadState(){
  try{
    var d=localStorage.getItem('clashData');if(d)data=JSON.parse(d);
    var p=localStorage.getItem('clashProj');if(p)document.getElementById('projName').value=p;
  }catch(ex){}
}
function resetAll(){
  if(!confirm('Reset all clash data? This cannot be undone.'))return;
  data={};saveState();buildMatrix();buildLog();
}
function exportCSV(){
  var rows=[['Discipline A','Discipline B','Clash Count','Status','Notes']];
  DISCS.forEach(function(da,ai){
    DISCS.forEach(function(db,bi){
      if(bi<=ai)return;
      var e=getEntry(da.id,db.id);
      rows.push([da.label,db.label,e.count,e.status,'"'+(e.notes||'').replace(/"/g,'""')+'"']);
    });
  });
  var csv=rows.map(function(r){return r.join(',');}).join('\n');
  var pn=document.getElementById('projName').value||'project';
  download(pn+'_clash_matrix.csv',csv,'text/csv');
}
function exportJSON(){
  var out={project:document.getElementById('projName').value,exported:new Date().toISOString(),disciplines:DISCS,clashes:{}};
  Object.keys(data).forEach(function(k){out.clashes[k]=data[k];});
  var pn=document.getElementById('projName').value||'project';
  download(pn+'_clash_matrix.json',JSON.stringify(out,null,2),'application/json');
}
function download(name,content,type){
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type:type}));a.download=name;a.click();
}
loadState();buildMatrix();buildLog();
</script>
</body>
</html>
