<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BIM Clash Matrix — XLMX</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#111;color:#fff;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:20px}
h1{font-size:1.5rem;margin-bottom:4px}
.sub{font-size:.75rem;color:#888;margin-bottom:20px}
label{display:block;font-size:.75rem;color:#aaa;margin:8px 0 3px}
input,select,textarea{width:100%;padding:8px 10px;background:#1a1a1a;border:1px solid #333;color:#fff;border-radius:4px;font-size:.85rem;font-family:inherit}
textarea{min-height:80px;resize:vertical}
select{appearance:auto}
button{padding:8px 16px;background:#16a34a;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:.8rem;font-weight:600;font-family:inherit}
button:hover{background:#15803d}
button.sec{background:#333}
button.sec:hover{background:#444}
.card{background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:16px;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
table{width:100%;border-collapse:collapse;font-size:.78rem}
th{background:#222;padding:8px;text-align:left;font-weight:600;color:#aaa;border-bottom:1px solid #333}
td{padding:6px 8px;border-bottom:1px solid #222}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.65rem;font-weight:700}
.bg{background:#16a34a22;color:#16a34a}.br{background:#dc262622;color:#dc2626}.by{background:#eab30822;color:#eab308}.bo{background:#f9731622;color:#f97316}.bb{background:#3b82f622;color:#3b82f6}
.stat{text-align:center;padding:12px}.stat .n{font-size:1.8rem;font-weight:800}.stat .l{font-size:.65rem;color:#888}
.flex{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.tag{font-size:.65rem;padding:3px 8px;border-radius:3px;background:#222;color:#aaa}
@media(max-width:600px){.grid2,.grid3{grid-template-columns:1fr}}
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
.mx{display:grid;gap:1px;background:#333;border-radius:6px;overflow:hidden}
.mx div{padding:8px 4px;text-align:center;font-size:.65rem;font-weight:600;cursor:pointer;user-select:none;transition:background .15s}
.mx .hdr{background:#222;color:#aaa;cursor:default;font-size:.6rem}
.mx .crit{background:#dc262640;color:#dc2626}.mx .major{background:#f9731640;color:#f97316}.mx .minor{background:#eab30830;color:#eab308}.mx .ignore{background:#1a1a1a;color:#555}.mx .na{background:#111;color:#333;cursor:default}
</style></head><body>
<div class="container">
<h1>BIM Clash Matrix</h1>
<p class="sub">Define clash detection priorities between disciplines. Click cells to cycle priority.</p>
<div class="card" id="matrix"></div>
<div class="card" id="summary"></div>
<div style="margin-top:10px"><button onclick="copyText()">Copy as Text</button> <button class="sec" onclick="resetDefaults()">Reset Defaults</button></div>
</div>
<script>
const DISC=['Architecture','Structure','MEP-Mech','MEP-Elec','MEP-Plumb','Fire Prot','Civil'];
const LEVELS=['crit','major','minor','ignore'];
const LABELS={crit:'Critical',major:'Major',minor:'Minor',ignore:'Ignore'};
const DEFAULTS={
'0-1':'crit','0-2':'major','0-3':'minor','0-4':'minor','0-5':'major','0-6':'minor',
'1-2':'crit','1-3':'crit','1-4':'crit','1-5':'crit','1-6':'major',
'2-3':'major','2-4':'crit','2-5':'crit','2-6':'minor',
'3-4':'major','3-5':'major','3-6':'minor',
'4-5':'crit','4-6':'minor','5-6':'minor'
};
let state={};
function init(){state={...DEFAULTS};render();}
function toggle(i,j){if(i>=j)return;const k=i+'-'+j;const cur=state[k]||'ignore';const ni=LEVELS[(LEVELS.indexOf(cur)+1)%LEVELS.length];state[k]=ni;render();}
function render(){
const n=DISC.length;
let cols=n+1;
let h=`<div class="mx" style="grid-template-columns:80px repeat(${n},1fr);">`;
h+=`<div class="hdr"></div>`;
DISC.forEach(d=>h+=`<div class="hdr">${d}</div>`);
for(let i=0;i<n;i++){
h+=`<div class="hdr">${DISC[i]}</div>`;
for(let j=0;j<n;j++){
if(i===j){h+=`<div class="na">—</div>`;}
else{
const k=Math.min(i,j)+'-'+Math.max(i,j);
const lv=state[k]||'ignore';
h+=`<div class="${lv}" onclick="toggle(${Math.min(i,j)},${Math.max(i,j)})">${LABELS[lv]}</div>`;
}
}
}
h+=`</div>`;
document.getElementById('matrix').innerHTML=h;
let counts={crit:0,major:0,minor:0,ignore:0};
Object.values(state).forEach(v=>counts[v]++);
document.getElementById('summary').innerHTML=`<div class="grid3" style="grid-template-columns:repeat(4,1fr)">
<div class="stat"><div class="n" style="color:#dc2626">${counts.crit}</div><div class="l">Critical</div></div>
<div class="stat"><div class="n" style="color:#f97316">${counts.major}</div><div class="l">Major</div></div>
<div class="stat"><div class="n" style="color:#eab308">${counts.minor}</div><div class="l">Minor</div></div>
<div class="stat"><div class="n" style="color:#555">${counts.ignore}</div><div class="l">Ignore</div></div>
</div>`;
}
function copyText(){
let t='CLASH MATRIX\n';
DISC.forEach((d,i)=>{
DISC.forEach((d2,j)=>{
if(i<j){const k=i+'-'+j;t+=`${d} vs ${d2}: ${LABELS[state[k]||'ignore']}\n`;}});
});
navigator.clipboard.writeText(t).then(()=>alert('Copied!'));
}
function resetDefaults(){init();}
init();
</script></body></html>
