<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Risk Register — XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:24px}.card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:20px;margin-bottom:16px}.card-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}@media(max-width:640px){.grid3{grid-template-columns:1fr}}.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}.result-box{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:14px;text-align:center}.result-val{font-size:22px;font-weight:700;color:#16a34a}.result-lbl{font-size:11px;color:#666;margin-top:4px}label{font-size:11px;color:#888;display:block;margin-bottom:4px}input,select,textarea{width:100%;background:#111;border:1px solid #333;color:#fff;padding:9px 12px;border-radius:6px;font-size:13px;font-family:inherit}input:focus,select:focus{outline:none;border-color:#16a34a}.btn{padding:9px 20px;background:#16a34a;border:none;border-radius:6px;color:#fff;font-size:13px;cursor:pointer;margin-right:8px}.btn-del{background:transparent;border:none;color:#555;cursor:pointer;font-size:13px}.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}.r-low{background:#0d2818;color:#4ade80}.r-med{background:#2e2510;color:#fbbf24}.r-high{background:#3b1f1f;color:#f87171}.r-crit{background:#7f1d1d;color:#fca5a5}table{width:100%;border-collapse:collapse}th{font-size:11px;color:#555;padding:8px;border-bottom:1px solid #222;text-align:left}td{font-size:12px;padding:8px;border-bottom:1px solid #1a1a1a;color:#ccc;vertical-align:top}.matrix{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-top:8px;font-size:10px}.mx-cell{padding:8px 4px;text-align:center;border-radius:3px;color:#fff;font-weight:600}.mx-label{display:flex;align-items:center;justify-content:center;color:#555;font-size:10px}</style></head><body><h1>Risk Register</h1><div class="sub">Project risk identification, scoring, and mitigation tracking</div><div class="result-grid" id="summary"></div><div class="card"><div class="card-title">Add Risk</div><div class="grid3" style="margin-bottom:12px"><div><label>Risk ID</label><input id="r-id" placeholder="RSK-001"></div><div><label>Category</label><select id="r-cat"><option>Schedule</option><option>Cost</option><option>Scope</option><option>Technical</option><option>Regulatory</option><option>Subcontractor</option><option>Site Conditions</option><option>Force Majeure</option></select></div><div><label>Status</label><select id="r-stat"><option value="open">Open</option><option value="mitigated">Mitigated</option><option value="closed">Closed</option><option value="realized">Realized</option></select></div><div style="grid-column:1/-1"><label>Risk Description</label><input id="r-desc" placeholder="Ground conditions may require additional piling beyond current budget"></div><div><label>Probability (1-5)</label><select id="r-prob"><option value="1">1 — Rare</option><option value="2">2 — Unlikely</option><option value="3" selected>3 — Possible</option><option value="4">4 — Likely</option><option value="5">5 — Almost Certain</option></select></div><div><label>Impact (1-5)</label><select id="r-imp"><option value="1">1 — Negligible</option><option value="2">2 — Minor</option><option value="3" selected>3 — Moderate</option><option value="4">4 — Major</option><option value="5">5 — Catastrophic</option></select></div><div><label>Owner</label><input id="r-own" placeholder="Diego / Val"></div><div style="grid-column:1/-1"><label>Mitigation Plan</label><input id="r-mit" placeholder="Conduct geotechnical investigation prior to final foundation design"></div></div><button class="btn" onclick="addRisk()">Add Risk</button></div><div class="card"><div class="card-title">Risk Register</div><table><thead><tr><th>ID</th><th>Category</th><th>Description</th><th>P</th><th>I</th><th>Score</th><th>Level</th><th>Status</th><th>Owner</th><th>Mitigation</th><th></th></tr></thead><tbody id="tbody"></tbody></table></div><script>var R=JSON.parse(localStorage.getItem("risk-reg")||"[]");if(!R.length){R=[{id:"RSK-001",cat:"Site Conditions",desc:"Undocumented underground utilities may conflict with foundation excavation",prob:3,imp:4,stat:"open",own:"Diego",mit:"Request as-built survey from municipality before excavation"},{id:"RSK-002",cat:"Cost",desc:"Steel price escalation exceeding current GMP allowance",prob:4,imp:3,stat:"mitigated",own:"Val",mit:"Lock steel pricing with fabricator via early procurement"},{id:"RSK-003",cat:"Schedule",desc:"Permit review cycle extends beyond 60 days causing mobilization delay",prob:3,imp:3,stat:"open",own:"Diego",mit:"Pre-application meeting with building official; expedited review requested"}];}function save(){localStorage.setItem("risk-reg",JSON.stringify(R));}function v(id){return document.getElementById(id).value.trim();}function scoreClass(s){if(s>=16)return"r-crit";if(s>=9)return"r-high";if(s>=4)return"r-med";return"r-low";}function scoreLabel(s){if(s>=16)return"CRITICAL";if(s>=9)return"HIGH";if(s>=4)return"MEDIUM";return"LOW";}function addRisk(){var x={id:v("r-id")||"RSK-"+String(R.length+1).padStart(3,"0"),cat:v("r-cat"),desc:v("r-desc"),prob:parseInt(document.getElementById("r-prob").value),imp:parseInt(document.getElementById("r-imp").value),stat:v("r-stat"),own:v("r-own"),mit:v("r-mit")};R.push(x);save();render();["r-id","r-desc","r-own","r-mit"].forEach(function(id){document.getElementById(id).value="";});}function del(i){R.splice(i,1);save();render();}function render(){var tb=document.getElementById("tbody");tb.innerHTML="";R.forEach(function(x,i){var sc=x.prob*x.imp;var scls=scoreClass(sc);var statCol={open:"#f87171",mitigated:"#fbbf24",closed:"#4ade80",realized:"#f87171"}[x.stat]||"#aaa";tb.innerHTML+="<tr><td style=\"font-weight:600;color:#fff\">"+x.id+"</td><td>"+x.cat+"</td><td>"+x.desc+"</td><td style=\"text-align:center\">"+x.prob+"</td><td style=\"text-align:center\">"+x.imp+"</td><td style=\"text-align:center;font-weight:700;color:#fff\">"+sc+"</td><td><span class=\"badge "+scls+"\">"+scoreLabel(sc)+"</span></td><td style=\"color:"+statCol+"\">"+x.stat.toUpperCase()+"</td><td>"+x.own+"</td><td style=\"color:#888\">"+x.mit+"</td><td><button class=\"btn-del\" onclick=\"del("+i+")\">x</button></td></tr>";});var tot=R.length,high=R.filter(function(x){return x.prob*x.imp>=9;}).length,crit=R.filter(function(x){return x.prob*x.imp>=16;}).length,open=R.filter(function(x){return x.stat==="open";}).length;document.getElementById("summary").innerHTML="<div class=\"result-box\"><div class=\"result-val\">"+tot+"</div><div class=\"result-lbl\">Total Risks</div></div><div class=\"result-box\"><div class=\"result-val\" style=\"color:#fbbf24\">"+high+"</div><div class=\"result-lbl\">High / Critical</div></div><div class=\"result-box\"><div class=\"result-val\" style=\"color:#f87171\">"+crit+"</div><div class=\"result-lbl\">Critical (16+)</div></div><div class=\"result-box\"><div class=\"result-val\">"+open+"</div><div class=\"result-lbl\">Open</div></div>";}render();</script></body></html>
