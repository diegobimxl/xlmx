<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>IFC Reference — XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:20px}.search-bar{width:100%;background:#1a1a1a;border:1px solid #333;color:#fff;padding:10px 14px;border-radius:8px;font-size:14px;margin-bottom:16px}.search-bar:focus{outline:none;border-color:#16a34a}.tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}.tab{padding:7px 14px;background:#1a1a1a;border:1px solid #333;border-radius:6px;cursor:pointer;font-size:12px;color:#888}.tab.active{background:#16a34a;border-color:#16a34a;color:#fff}.panel{display:none}.panel.active{display:block}.tbl{width:100%;border-collapse:collapse}.tbl th{font-size:11px;color:#555;text-align:left;padding:8px;border-bottom:1px solid #222;background:#111;position:sticky;top:0}.tbl td{font-size:12px;padding:8px;border-bottom:1px solid #1a1a1a;color:#ccc}.tbl tr:hover td{background:#1e1e1e}.code{font-family:monospace;color:#16a34a;font-size:12px}.tag{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600;margin-right:2px}.t-arch{background:#1e3a5f;color:#60a5fa}.t-str{background:#3b1f1f;color:#f87171}.t-mep{background:#1a3a1a;color:#4ade80}.t-ge{background:#3b2e00;color:#fbbf24}.no-results{color:#555;font-size:13px;padding:20px;text-align:center}</style></head><body><h1>IFC Reference</h1><div class="sub">ISO 16739 — IFC4 / IFC2x3 entity quick reference for BIM/VDC teams</div><input class="search-bar" id="search" placeholder="Search entity, description, or tag..." oninput="filterAll()"><div class="tabs" id="tabs"></div><div id="panels"></div><script>var data={"Spatial":[["IfcProject","Root project object, holds all model data","ge"],["IfcSite","Represents the building site with geolocation","ge"],["IfcBuilding","The building object within a site","ge"],["IfcBuildingStorey","A floor level or storey within a building","ge"],["IfcSpace","A bounded 3D space (room, area, zone)","ge"],["IfcZone","Group of spaces with shared function","ge"],["IfcExternalSpatialElement","Space outside the building envelope","ge"]],"Arch":[["IfcWall","Generic wall element","arch"],["IfcWallStandardCase","Parametric wall with material layers","arch"],["IfcSlab","Horizontal structural plate — floor, roof, landing","arch"],["IfcRoof","Roof element or assembly","arch"],["IfcColumn","Vertical structural member","arch"],["IfcBeam","Horizontal or inclined structural member","arch"],["IfcWindow","Window opening with frame and glazing","arch"],["IfcDoor","Door with frame and leaf","arch"],["IfcCurtainWall","Non-structural facade system","arch"],["IfcRailing","Protective railing or handrail","arch"],["IfcStair","Stair flight and landing assembly","arch"],["IfcRamp","Sloped floor or ramp element","arch"],["IfcCovering","Ceiling, floor finish, or cladding","arch"],["IfcPlate","Thin planar element, cladding panel","arch"]],"Structural":[["IfcFooting","Foundation element","str"],["IfcPile","Deep foundation pile element","str"],["IfcMember","Generic structural member","str"],["IfcTendon","Pre-stress tendon in concrete","str"],["IfcReinforcingBar","Rebar element in concrete","str"],["IfcReinforcingMesh","Mesh reinforcement in slab","str"]],"MEP":[["IfcPipeSegment","Straight pipe section","mep"],["IfcPipeFitting","Pipe elbow, tee, reducer","mep"],["IfcValve","Flow control valve","mep"],["IfcDuctSegment","Straight duct section","mep"],["IfcDuctFitting","Duct transition, elbow, tee","mep"],["IfcFlowTerminal","End device: diffuser, outlet, fixture","mep"],["IfcAirTerminal","Supply/return air terminal","mep"],["IfcPump","Pumping equipment","mep"],["IfcFan","Mechanical fan","mep"],["IfcBoiler","Heating boiler","mep"],["IfcChiller","Chiller unit","mep"],["IfcCableCarrierSegment","Conduit or cable tray","mep"],["IfcCableSegment","Electrical cable run","mep"],["IfcLightFixture","Luminaire fixture","mep"],["IfcOutlet","Electrical outlet or socket","mep"],["IfcSensor","Building automation sensor","mep"]],"PropSets":[["Pset_WallCommon","Fire rating, acoustic rating, load bearing","arch"],["Pset_SlabCommon","Load bearing, fire rating, pitch angle","arch"],["Pset_ColumnCommon","Load bearing, fire rating","arch"],["Pset_WindowCommon","Fire rating, glazing, thermal transmittance","arch"],["Pset_DoorCommon","Fire rating, acoustic, hardware type","arch"],["Pset_SpaceCommon","Occupancy, reference, net floor area","ge"],["Pset_BuildingCommon","Year of construction, number of storeys","ge"],["Pset_PipeSegmentTypeCommon","Fluid velocity, nominal diameter","mep"],["Pset_DuctSegmentTypeCommon","Air velocity, nominal width, height","mep"],["Pset_ElectricMotorTypeCommon","Nominal power, efficiency class","mep"]]};var catNames=Object.keys(data);var tagCls={arch:"t-arch",str:"t-str",mep:"t-mep",ge:"t-ge"};var tagLabel={arch:"ARCH",str:"STRUCT",mep:"MEP",ge:"GENERAL"};function filterAll(){var q=document.getElementById("search").value.toLowerCase();catNames.forEach(function(cat){var tbody=document.getElementById("tb-"+cat);if(!tbody)return;var rows=tbody.querySelectorAll("tr");var any=false;rows.forEach(function(tr){var txt=tr.textContent.toLowerCase();var show=!q||txt.includes(q);tr.style.display=show?"":"none";if(show)any=true;});var noRes=document.getElementById("no-"+cat);if(noRes)noRes.style.display=any?"none":"block";});}function render(){var tabsEl=document.getElementById("tabs");var panelsEl=document.getElementById("panels");catNames.forEach(function(cat,i){var tb=document.createElement("div");tb.className="tab"+(i===0?" active":"");tb.textContent=cat;tb.onclick=function(){document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active");});document.querySelectorAll(".panel").forEach(function(p){p.classList.remove("active");});tb.classList.add("active");document.getElementById("p-"+cat).classList.add("active");};tabsEl.appendChild(tb);var panel=document.createElement("div");panel.className="panel"+(i===0?" active":"");panel.id="p-"+cat;var rows="";data[cat].forEach(function(r){var tc=tagCls[r[2]]||"";var tl=tagLabel[r[2]]||r[2].toUpperCase();rows+="<tr><td class=\"code\">"+r[0]+"</td><td>"+r[1]+"</td><td><span class=\"tag "+tc+"\">"+tl+"</span></td></tr>";});panel.innerHTML="<table class=\"tbl\"><thead><tr><th>Entity</th><th>Description</th><th>Domain</th></tr></thead><tbody id=\"tb-"+cat+"\">"+rows+"</tbody></table><div id=\"no-"+cat+"\" class=\"no-results\" style=\"display:none\">No results found.</div>";panelsEl.appendChild(panel);});}render();</script></body></html>
