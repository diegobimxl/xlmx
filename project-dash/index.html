<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Project Dashboard — XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:24px}.tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}.tab{padding:7px 16px;background:#1a1a1a;border:1px solid #333;border-radius:6px;cursor:pointer;font-size:12px;color:#888}.tab.active{background:#16a34a;border-color:#16a34a;color:#fff}.panel{display:none}.panel.active{display:block}.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}.kpi{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:16px}.kpi-val{font-size:28px;font-weight:700;color:#16a34a}.kpi-lbl{font-size:11px;color:#666;margin-top:4px}.kpi-sub{font-size:11px;margin-top:6px}.card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:20px;margin-bottom:14px}.card-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:640px){.grid2{grid-template-columns:1fr}}label{font-size:11px;color:#888;display:block;margin-bottom:4px}input,select{width:100%;background:#111;border:1px solid #333;color:#fff;padding:9px 12px;border-radius:6px;font-size:13px}input:focus,select:focus{outline:none;border-color:#16a34a}.btn{padding:9px 20px;background:#16a34a;border:none;border-radius:6px;color:#fff;font-size:13px;cursor:pointer}.metric-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #111}.m-label{font-size:12px;color:#aaa}.m-val{font-size:13px;font-weight:600}.prog-bar{height:8px;background:#222;border-radius:4px;overflow:hidden;margin-top:6px}.prog-fill{height:100%;border-radius:4px;transition:width .4s}.status-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}.status-card{background:#111;border:1px solid #1e1e1e;border-radius:6px;padding:12px}.sc-title{font-size:11px;color:#888;margin-bottom:6px}.sc-val{font-size:18px;font-weight:700}.sc-prog{margin-top:6px}.rag{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:6px}.rag-g{background:#16a34a}.rag-a{background:#f59e0b}.rag-r{background:#ef4444}.milestone-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #111}.ms-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}.ms-name{flex:1;font-size:13px;color:#ccc}.ms-date{font-size:11px;color:#888}.ms-status{font-size:11px;font-weight:600}</style></head><body><h1>Project Dashboard</h1><div class="sub">Master project overview — schedule, cost, BIM, and team status</div><div class="tabs"><div class="tab active" onclick="setTab(0)">Overview</div><div class="tab" onclick="setTab(1)">Schedule</div><div class="tab" onclick="setTab(2)">Cost</div><div class="tab" onclick="setTab(3)">BIM Status</div><div class="tab" onclick="setTab(4)">Settings</div></div><div class="panel active" id="p0"><div class="kpi-grid" id="kpis"></div><div class="grid2"><div><div class="card"><div class="card-title">Phase Status — RAG</div><div id="rag-list"></div></div></div><div><div class="card"><div class="card-title">Key Milestones</div><div id="milestones"></div></div></div></div></div><div class="panel" id="p1"><div class="card"><div class="card-title">Schedule Summary</div><div id="sched-detail"></div></div></div><div class="panel" id="p2"><div class="card"><div class="card-title">Cost Summary</div><div id="cost-detail"></div></div></div><div class="panel" id="p3"><div class="card"><div class="card-title">BIM Discipline Status</div><div id="bim-detail"></div></div></div><div class="panel" id="p4"><div class="card"><div class="card-title">Project Settings</div><div class="grid2" style="gap:12px"><div><label>Project Name</label><input id="cfg-name" oninput="saveCfg()"></div><div><label>Project Number</label><input id="cfg-num" oninput="saveCfg()"></div><div><label>Client</label><input id="cfg-client" oninput="saveCfg()"></div><div><label>PM</label><input id="cfg-pm" oninput="saveCfg()"></div><div><label>Contract Value ($)</label><input type="number" id="cfg-contract" oninput="saveCfg()"></div><div><label>Current Invoiced ($)</label><input type="number" id="cfg-inv" oninput="saveCfg()"></div><div><label>Schedule % Complete</label><input type="number" id="cfg-sched" min="0" max="100" oninput="saveCfg()"></div><div><label>Budget % Spent</label><input type="number" id="cfg-budg" min="0" max="100" oninput="saveCfg()"></div></div></div></div><script>var defaults={name:"Mixed-Use Office Tower",num:"XL-2025-001",client:"Client Co. / Your Firm",pm:"Diego Rodriguez",contract:2400000,inv:960000,sched:40,budg:38};var cfg=JSON.parse(localStorage.getItem("dash-cfg")||JSON.stringify(defaults));var phases=[{name:"Pre-Design",rag:"g",pct:100},{name:"Schematic Design (SD)",rag:"g",pct:100},{name:"Design Development (DD)",rag:"a",pct:85},{name:"Construction Documents (CD)",rag:"a",pct:40},{name:"Bidding / Procurement",rag:"r",pct:0},{name:"Construction Administration",rag:"r",pct:0}];var milestones=[{name:"SD Submittal",date:"2025-02-14",done:true},{name:"DD Submittal",date:"2025-04-28",done:true},{name:"Permit Submittal",date:"2025-05-30",done:false},{name:"100% CD",date:"2025-07-15",done:false},{name:"GC Bid Award",date:"2025-08-20",done:false},{name:"Construction Start",date:"2025-09-01",done:false},{name:"Substantial Completion",date:"2026-08-01",done:false}];var bimDiscs=[{name:"Architecture",lod:300,target:350,pct:88},{name:"Structural",lod:300,target:350,pct:92},{name:"Mechanical",lod:200,target:300,pct:65},{name:"Electrical",lod:200,target:300,pct:60},{name:"Plumbing",lod:200,target:300,pct:58},{name:"Fire Protection",lod:100,target:200,pct:30}];function saveCfg(){cfg.name=document.getElementById("cfg-name").value;cfg.num=document.getElementById("cfg-num").value;cfg.client=document.getElementById("cfg-client").value;cfg.pm=document.getElementById("cfg-pm").value;cfg.contract=parseFloat(document.getElementById("cfg-contract").value)||0;cfg.inv=parseFloat(document.getElementById("cfg-inv").value)||0;cfg.sched=parseFloat(document.getElementById("cfg-sched").value)||0;cfg.budg=parseFloat(document.getElementById("cfg-budg").value)||0;localStorage.setItem("dash-cfg",JSON.stringify(cfg));renderAll();}function loadCfg(){document.getElementById("cfg-name").value=cfg.name;document.getElementById("cfg-num").value=cfg.num;document.getElementById("cfg-client").value=cfg.client;document.getElementById("cfg-pm").value=cfg.pm;document.getElementById("cfg-contract").value=cfg.contract;document.getElementById("cfg-inv").value=cfg.inv;document.getElementById("cfg-sched").value=cfg.sched;document.getElementById("cfg-budg").value=cfg.budg;}function usd(n){return "$"+Math.round(n).toLocaleString();}function renderAll(){var spi=cfg.budg?(cfg.sched/cfg.budg).toFixed(2):"—";var remaining=cfg.contract-cfg.inv;document.getElementById("kpis").innerHTML="<div class=\"kpi\"><div class=\"kpi-val\">"+cfg.sched+"%</div><div class=\"kpi-lbl\">Schedule Complete</div><div class=\"prog-bar\"><div class=\"prog-fill\" style=\"width:"+cfg.sched+"%;background:#16a34a\"></div></div></div><div class=\"kpi\"><div class=\"kpi-val\">"+cfg.budg+"%</div><div class=\"kpi-lbl\">Budget Spent</div><div class=\"prog-bar\"><div class=\"prog-fill\" style=\"width:"+cfg.budg+"%;background:"+(cfg.budg>cfg.sched+5?"#ef4444":"#16a34a")+"\"></div></div></div><div class=\"kpi\"><div class=\"kpi-val\">"+usd(cfg.inv)+"</div><div class=\"kpi-lbl\">Invoiced</div><div class=\"kpi-sub\" style=\"color:#888\">of "+usd(cfg.contract)+"</div></div><div class=\"kpi\"><div class=\"kpi-val\">"+usd(remaining)+"</div><div class=\"kpi-lbl\">Remaining Fee</div></div><div class=\"kpi\"><div class=\"kpi-val\">"+spi+"</div><div class=\"kpi-lbl\">SPI (Sched/Cost)</div><div class=\"kpi-sub\" style=\"color:"+(parseFloat(spi)>=1?"#16a34a":"#f87171")+"\">"+( parseFloat(spi)>=1?"On Track":"Behind Schedule")+"</div></div>";var ragList=document.getElementById("rag-list");ragList.innerHTML="";phases.forEach(function(ph){ragList.innerHTML+="<div class=\"milestone-row\"><span class=\"rag rag-"+(ph.pct===100?"g":ph.pct>0?"a":"r")+"\"></span><div class=\"ms-name\">"+ph.name+"</div><div style=\"font-size:12px;font-weight:600;color:#fff\">"+ph.pct+"%</div></div>";});var ms=document.getElementById("milestones");ms.innerHTML="";milestones.forEach(function(m){var past=new Date(m.date)<new Date();var col=m.done?"#16a34a":past?"#ef4444":"#888";ms.innerHTML+="<div class=\"milestone-row\"><div class=\"ms-dot\" style=\"background:"+col+"\"></div><div class=\"ms-name\">"+m.name+"</div><div class=\"ms-date\">"+m.date+"</div><div class=\"ms-status\" style=\"color:"+col+"\">"+(m.done?"DONE":past?"OVERDUE":"UPCOMING")+"</div></div>";});document.getElementById("sched-detail").innerHTML=phases.map(function(ph){return "<div class=\"metric-row\"><div class=\"m-label\">"+ph.name+"</div><div class=\"m-val\">"+ph.pct+"%</div></div><div class=\"prog-bar\" style=\"margin-bottom:8px\"><div class=\"prog-fill\" style=\"width:"+ph.pct+"%;background:#16a34a\"></div></div>";}).join("");document.getElementById("cost-detail").innerHTML="<div class=\"metric-row\"><div class=\"m-label\">Contract Value</div><div class=\"m-val\">"+usd(cfg.contract)+"</div></div><div class=\"metric-row\"><div class=\"m-label\">Total Invoiced</div><div class=\"m-val\" style=\"color:#16a34a\">"+usd(cfg.inv)+"</div></div><div class=\"metric-row\"><div class=\"m-label\">Remaining</div><div class=\"m-val\">"+usd(cfg.contract-cfg.inv)+"</div></div><div class=\"metric-row\" style=\"border:none\"><div class=\"m-label\">Invoice Rate</div><div class=\"m-val\">"+( cfg.contract?Math.round(cfg.inv/cfg.contract*100):0)+"%</div></div><div class=\"prog-bar\" style=\"margin-top:8px\"><div class=\"prog-fill\" style=\"width:"+( cfg.contract?Math.round(cfg.inv/cfg.contract*100):0)+"%;background:#16a34a\"></div></div>";document.getElementById("bim-detail").innerHTML=bimDiscs.map(function(d){var col=d.pct>=80?"#16a34a":d.pct>=50?"#fbbf24":"#f87171";return "<div class=\"metric-row\"><div class=\"m-label\">"+d.name+"</div><div style=\"display:flex;gap:8px;align-items:center\"><span style=\"font-size:11px;color:#888\">LOD "+d.lod+"</span><div class=\"m-val\" style=\"color:"+col+"\">"+d.pct+"%</div></div></div><div class=\"prog-bar\" style=\"margin-bottom:8px\"><div class=\"prog-fill\" style=\"width:"+d.pct+"%;background:"+col+"\"></div></div>";}).join("");}function setTab(i){document.querySelectorAll(".tab").forEach(function(t,idx){t.classList.toggle("active",idx===i)});document.querySelectorAll(".panel").forEach(function(p,idx){p.classList.toggle("active",idx===i)});}loadCfg();renderAll();</script></body></html>
