<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Project Dashboard - BIM XL</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d0d0d;color:#e8e8e8;min-height:100vh}
header{background:#111;border-bottom:1px solid #222;padding:14px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
header a{color:#555;text-decoration:none;font-size:13px}
header a:hover{color:#e8e8e8}
h1{font-size:19px;font-weight:600;color:#fff}
.proj-title{font-size:14px;color:#c8a96e;font-weight:500}
.hdr-meta{font-size:11px;color:#555;margin-left:auto}
.toolbar{display:flex;gap:10px;padding:12px 24px;background:#111;border-bottom:1px solid #1e1e1e;flex-wrap:wrap;align-items:center}
.btn{padding:6px 13px;font-size:12px;font-weight:500;border:1px solid #333;border-radius:4px;cursor:pointer;background:#1a1a1a;color:#ccc;transition:all .15s}
.btn:hover{background:#252525;color:#fff;border-color:#444}
.btn.primary{background:#c8a96e;border-color:#c8a96e;color:#000}
.btn.primary:hover{background:#d4b87a}
input.txt,select.sel,textarea.ta{background:#1a1a1a;border:1px solid #2e2e2e;color:#e8e8e8;padding:6px 10px;font-size:13px;border-radius:4px;font-family:inherit}
input.txt:focus,select.sel:focus,textarea.ta:focus{outline:none;border-color:#c8a96e}
input.txt[data-w="lg"]{width:260px}
input.txt[data-w="md"]{width:160px}
.main{padding:20px 24px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:900px){.main{grid-template-columns:1fr}}
/* KPI strip */
.kpi-strip{grid-column:1/-1;display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.kpi{background:#111;border:1px solid #1e1e1e;border-radius:6px;padding:14px 16px;display:flex;flex-direction:column;gap:4px}
.kpi-val{font-size:28px;font-weight:700;line-height:1}
.kpi-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.05em}
.kpi-sub{font-size:11px;color:#666}
/* Sections */
.section{background:#111;border:1px solid #1e1e1e;border-radius:6px;overflow:hidden}
.section.full{grid-column:1/-1}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #1e1e1e;background:#141414}
.sec-head h2{font-size:13px;font-weight:600;color:#ddd;letter-spacing:.02em}
.sec-add{background:none;border:1px solid #2e2e2e;color:#666;font-size:11px;padding:3px 10px;border-radius:3px;cursor:pointer}
.sec-add:hover{border-color:#c8a96e;color:#c8a96e}
/* Milestone */
.ms-row{display:grid;grid-template-columns:1fr 110px 90px 28px;gap:8px;padding:9px 14px;border-bottom:1px solid #161616;align-items:center}
.ms-row:last-child{border-bottom:none}
.ms-name{font-size:13px;color:#ccc}
.ms-date{font-size:12px;color:#777}
.ms-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;text-align:center}
.st-done{background:#14291e;color:#4ade80}
.st-on{background:#1e2a3a;color:#60a5fa}
.st-risk{background:#2a2114;color:#fbbf24}
.st-late{background:#2a1414;color:#f87171}
.st-pending{background:#1e1e1e;color:#666}
.del-btn{background:none;border:none;color:#444;font-size:14px;cursor:pointer;padding:0 2px}
.del-btn:hover{color:#f87171}
/* Risk */
.risk-row{display:grid;grid-template-columns:1fr 70px 70px 28px;gap:8px;padding:9px 14px;border-bottom:1px solid #161616;align-items:start}
.risk-row:last-child{border-bottom:none}
.risk-desc{font-size:12px;color:#ccc;line-height:1.4}
.risk-owner{font-size:11px;color:#888;margin-top:2px}
.prob-badge,.impact-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;text-align:center}
.p-high{background:#2a1414;color:#f87171}
.p-med{background:#2a2114;color:#fbbf24}
.p-low{background:#14291e;color:#4ade80}
/* Actions */
.act-row{display:grid;grid-template-columns:1fr 100px 28px;gap:8px;padding:9px 14px;border-bottom:1px solid #161616;align-items:center}
.act-row:last-child{border-bottom:none}
.act-text{font-size:12px;color:#ccc}
.act-owner{font-size:11px;color:#888}
.act-due{font-size:11px;color:#666}
/* Notes */
#notesArea{width:100%;background:#111;border:none;color:#bbb;font-size:13px;padding:14px;resize:vertical;min-height:100px;font-family:inherit;line-height:1.6}
#notesArea:focus{outline:none}
/* Status dot */
.sdot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
.sdot.green{background:#4ade80}
.sdot.yellow{background:#fbbf24}
.sdot.red{background:#f87171}
.sdot.blue{background:#60a5fa}
.sdot.grey{background:#555}
/* Empty */
.empty{padding:20px;text-align:center;color:#444;font-size:12px}
/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#161616;border:1px solid #2e2e2e;border-radius:8px;width:400px;max-width:92vw;padding:22px}
.modal h2{font-size:14px;font-weight:600;color:#fff;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;color:#555;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{width:100%}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
/* Print */
@media print{
  @page{size:landscape;margin:12mm}
  .toolbar,.sec-add,.del-btn,.overlay{display:none!important}
  body{background:#fff;color:#000}
  header,header a,h1,.proj-title,.hdr-meta{color:#000!important;background:#fff!important;border-color:#ccc!important}
  .kpi,.section{border-color:#ccc!important;background:#fff!important}
  .sec-head{background:#f5f5f5!important}
  .main{gap:14px}
}
</style>
</head>
<body>
<header>
  <a href="/">← Home</a>
  <h1>Project Dashboard</h1>
  <span class="proj-title" id="hdrTitle">New Project</span>
  <span class="hdr-meta" id="hdrMeta"></span>
</header>
<div class="toolbar">
  <input class="txt" data-w="lg" id="projName" placeholder="Project name..." oninput="updateHeader();save()">
  <select class="sel" id="projPhase" onchange="updateHeader();save()">
    <option value="SD">Schematic Design</option>
    <option value="DD">Design Development</option>
    <option value="CD">Construction Documents</option>
    <option value="CA">Construction Admin</option>
    <option value="BID">Bidding</option>
    <option value="CLOSE">Closeout</option>
  </select>
  <select class="sel" id="projHealth" onchange="updateHeader();save()">
    <option value="green">Health: On Track</option>
    <option value="yellow">Health: At Risk</option>
    <option value="red">Health: Off Track</option>
    <option value="blue">Health: On Hold</option>
  </select>
  <button class="btn primary" onclick="window.print()">Print / PDF</button>
  <button class="btn" onclick="resetAll()">Reset</button>
</div>
<div class="main" id="main">
  <!-- KPI strip -->
  <div class="kpi-strip">
    <div class="kpi">
      <span class="kpi-val" id="kpiMs">0</span>
      <span class="kpi-label">Milestones</span>
      <span class="kpi-sub" id="kpiMsSub">— done</span>
    </div>
    <div class="kpi">
      <span class="kpi-val" id="kpiRisk">0</span>
      <span class="kpi-label">Open Risks</span>
      <span class="kpi-sub" id="kpiRiskSub">— high</span>
    </div>
    <div class="kpi">
      <span class="kpi-val" id="kpiAct">0</span>
      <span class="kpi-label">Actions</span>
      <span class="kpi-sub" id="kpiActSub">open items</span>
    </div>
    <div class="kpi">
      <span class="kpi-val" id="kpiLod">—</span>
      <span class="kpi-label">LOD Target</span>
      <span class="kpi-sub" id="kpiLodSub">current phase</span>
    </div>
  </div>
  <!-- Milestones -->
  <div class="section">
    <div class="sec-head">
      <h2>Milestones</h2>
      <button class="sec-add" onclick="openModal('ms')">+ Add</button>
    </div>
    <div id="msList"></div>
  </div>
  <!-- Risks -->
  <div class="section">
    <div class="sec-head">
      <h2>Risks</h2>
      <button class="sec-add" onclick="openModal('risk')">+ Add</button>
    </div>
    <div id="riskList"></div>
  </div>
  <!-- Actions -->
  <div class="section">
    <div class="sec-head">
      <h2>Action Items</h2>
      <button class="sec-add" onclick="openModal('act')">+ Add</button>
    </div>
    <div id="actList"></div>
  </div>
  <!-- Notes -->
  <div class="section">
    <div class="sec-head"><h2>Notes / Context</h2></div>
    <textarea id="notesArea" placeholder="Project notes, decisions, context..." oninput="save()"></textarea>
  </div>
</div>
<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modalBox">
    <h2 id="modalTitle">Add Item</h2>
    <div id="modalFields"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>
<script>
var state={milestones:[],risks:[],actions:[]};
var modalType=null;
var LOD_BY_PHASE={SD:'LOD 100',DD:'LOD 200',CD:'LOD 300',CA:'LOD 350/400',BID:'LOD 300',CLOSE:'LOD 400'};
var MS_STATUS=['pending','on-track','at-risk','late','done'];
var MS_LABEL={pending:'Pending','on-track':'On Track','at-risk':'At Risk',late:'Late',done:'Done'};
var MS_CLS={pending:'st-pending','on-track':'st-on','at-risk':'st-risk',late:'st-late',done:'st-done'};
var PROB=['high','med','low'];

function updateHeader(){
  var n=document.getElementById('projName').value||'New Project';
  var ph=document.getElementById('projPhase').value;
  var h=document.getElementById('projHealth').value;
  document.getElementById('hdrTitle').textContent=n;
  document.getElementById('hdrMeta').textContent=ph+' | '+new Date().toLocaleDateString();
  document.getElementById('kpiLod').textContent=LOD_BY_PHASE[ph]||'—';
  document.getElementById('kpiLodSub').textContent=ph+' phase';
  var dot='<span class="sdot '+h+'"></span>';
  document.getElementById('hdrTitle').innerHTML=dot+n;
}
function renderMs(){
  var ms=state.milestones;
  document.getElementById('kpiMs').textContent=ms.length;
  var done=ms.filter(function(m){return m.status==='done';}).length;
  document.getElementById('kpiMsSub').textContent=done+' of '+ms.length+' done';
  if(!ms.length){document.getElementById('msList').innerHTML='<div class="empty">No milestones — add one.</div>';return;}
  var html='';
  ms.forEach(function(m,i){
    html+='<div class="ms-row">'
      +'<span class="ms-name">'+esc(m.name)+'</span>'
      +'<span class="ms-date">'+esc(m.date||'—')+'</span>'
      +'<span class="ms-badge '+MS_CLS[m.status]+'">'+MS_LABEL[m.status]+'</span>'
      +'<button class="del-btn" onclick="del(\'ms\','+i+')">×</button>'
      +'</div>';
  });
  document.getElementById('msList').innerHTML=html;
}
function renderRisks(){
  var rs=state.risks;
  document.getElementById('kpiRisk').textContent=rs.length;
  var hi=rs.filter(function(r){return r.prob==='high';}).length;
  document.getElementById('kpiRiskSub').textContent=hi+' high probability';
  if(!rs.length){document.getElementById('riskList').innerHTML='<div class="empty">No risks logged.</div>';return;}
  var html='';
  rs.forEach(function(r,i){
    html+='<div class="risk-row">'
      +'<div><div class="risk-desc">'+esc(r.desc)+'</div><div class="risk-owner">'+esc(r.owner||'Unassigned')+'</div></div>'
      +'<span class="prob-badge p-'+r.prob+'">'+r.prob.toUpperCase()+'</span>'
      +'<span class="impact-badge p-'+r.impact+'">'+r.impact.toUpperCase()+'</span>'
      +'<button class="del-btn" onclick="del(\'risk\','+i+')">×</button>'
      +'</div>';
  });
  document.getElementById('riskList').innerHTML=html;
}
function renderActions(){
  var ac=state.actions;
  document.getElementById('kpiAct').textContent=ac.length;
  document.getElementById('kpiActSub').textContent='open items';
  if(!ac.length){document.getElementById('actList').innerHTML='<div class="empty">No action items.</div>';return;}
  var html='';
  ac.forEach(function(a,i){
    html+='<div class="act-row">'
      +'<div><div class="act-text">'+esc(a.text)+'</div><div class="act-owner">'+esc(a.owner||'—')+' &nbsp;·&nbsp; <span class="act-due">Due: '+esc(a.due||'TBD')+'</span></div></div>'
      +'<span class="ms-badge '+MS_CLS[a.status||'pending']+'">'+MS_LABEL[a.status||'pending']+'</span>'
      +'<button class="del-btn" onclick="del(\'act\','+i+')">×</button>'
      +'</div>';
  });
  document.getElementById('actList').innerHTML=html;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function del(type,i){
  if(type==='ms')state.milestones.splice(i,1);
  else if(type==='risk')state.risks.splice(i,1);
  else state.actions.splice(i,1);
  render();save();
}
function render(){renderMs();renderRisks();renderActions();}
function openModal(type){
  modalType=type;
  var fields='';
  if(type==='ms'){
    document.getElementById('modalTitle').textContent='Add Milestone';
    fields='<div class="field"><label>Milestone Name</label><input class="txt" id="f1" placeholder="DD Submission" style="width:100%"></div>'
      +'<div class="field"><label>Target Date</label><input class="txt" type="date" id="f2" style="width:100%"></div>'
      +'<div class="field"><label>Status</label><select class="sel" id="f3" style="width:100%">'
      +MS_STATUS.map(function(s){return '<option value="'+s+'">'+MS_LABEL[s]+'</option>';}).join('')
      +'</select></div>';
  } else if(type==='risk'){
    document.getElementById('modalTitle').textContent='Add Risk';
    fields='<div class="field"><label>Risk Description</label><textarea class="ta" id="f1" rows="3" style="width:100%"></textarea></div>'
      +'<div class="field"><label>Owner</label><input class="txt" id="f2" placeholder="Responsible party" style="width:100%"></div>'
      +'<div class="field"><label>Probability</label><select class="sel" id="f3" style="width:100%"><option value="high">High</option><option value="med">Med</option><option value="low">Low</option></select></div>'
      +'<div class="field"><label>Impact</label><select class="sel" id="f4" style="width:100%"><option value="high">High</option><option value="med">Med</option><option value="low">Low</option></select></div>';
  } else {
    document.getElementById('modalTitle').textContent='Add Action Item';
    fields='<div class="field"><label>Action</label><input class="txt" id="f1" placeholder="What needs to happen" style="width:100%"></div>'
      +'<div class="field"><label>Owner</label><input class="txt" id="f2" placeholder="Person responsible" style="width:100%"></div>'
      +'<div class="field"><label>Due Date</label><input class="txt" type="date" id="f3" style="width:100%"></div>'
      +'<div class="field"><label>Status</label><select class="sel" id="f4" style="width:100%">'
      +MS_STATUS.map(function(s){return '<option value="'+s+'">'+MS_LABEL[s]+'</option>';}).join('')
      +'</select></div>';
  }
  document.getElementById('modalFields').innerHTML=fields;
  document.getElementById('overlay').classList.add('open');
  var f=document.getElementById('f1');if(f)f.focus();
}
function closeModal(){document.getElementById('overlay').classList.remove('open');modalType=null;}
function saveModal(){
  var f1=document.getElementById('f1'),f2=document.getElementById('f2'),f3=document.getElementById('f3'),f4=document.getElementById('f4');
  if(modalType==='ms'){
    if(!f1.value.trim()){f1.focus();return;}
    state.milestones.push({name:f1.value.trim(),date:f2?f2.value:'',status:f3?f3.value:'pending'});
  } else if(modalType==='risk'){
    if(!f1.value.trim()){f1.focus();return;}
    state.risks.push({desc:f1.value.trim(),owner:f2?f2.value:'',prob:f3?f3.value:'med',impact:f4?f4.value:'med'});
  } else {
    if(!f1.value.trim()){f1.focus();return;}
    state.actions.push({text:f1.value.trim(),owner:f2?f2.value:'',due:f3?f3.value:'',status:f4?f4.value:'pending'});
  }
  render();save();closeModal();
}
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
function save(){
  try{
    localStorage.setItem('dashState',JSON.stringify(state));
    localStorage.setItem('dashProj',document.getElementById('projName').value);
    localStorage.setItem('dashPhase',document.getElementById('projPhase').value);
    localStorage.setItem('dashHealth',document.getElementById('projHealth').value);
    localStorage.setItem('dashNotes',document.getElementById('notesArea').value);
  }catch(ex){}
}
function load(){
  try{
    var s=localStorage.getItem('dashState');if(s)state=JSON.parse(s);
    var p=localStorage.getItem('dashProj');if(p)document.getElementById('projName').value=p;
    var ph=localStorage.getItem('dashPhase');if(ph)document.getElementById('projPhase').value=ph;
    var h=localStorage.getItem('dashHealth');if(h)document.getElementById('projHealth').value=h;
    var n=localStorage.getItem('dashNotes');if(n)document.getElementById('notesArea').value=n;
  }catch(ex){}
}
function resetAll(){
  if(!confirm('Reset all dashboard data?'))return;
  state={milestones:[],risks:[],actions:[]};
  document.getElementById('projName').value='';
  document.getElementById('notesArea').value='';
  save();updateHeader();render();
}
load();updateHeader();render();
</script>
</body>
</html>
