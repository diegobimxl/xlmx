<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Project Directory — XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:20px}.card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:20px;margin-bottom:16px}.card-title{font-size:13px;font-weight:600;color:#ccc;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}label{font-size:11px;color:#888;display:block;margin-bottom:4px}input,select{width:100%;background:#111;border:1px solid #333;color:#fff;padding:9px 12px;border-radius:6px;font-size:13px}input:focus,select:focus{outline:none;border-color:#16a34a}.btn{padding:9px 18px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;margin-top:12px}.btn-p{background:#16a34a;color:#fff}.btn-g{background:#222;border:1px solid #333;color:#ccc;margin-left:8px}.search-bar{width:100%;background:#1a1a1a;border:1px solid #333;color:#fff;padding:9px 12px;border-radius:6px;font-size:13px;margin-bottom:12px}.search-bar:focus{outline:none;border-color:#16a34a}.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}.contact-card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:16px;position:relative}.cc-name{font-size:15px;font-weight:700;margin-bottom:2px}.cc-role{font-size:12px;color:#16a34a;margin-bottom:8px}.cc-company{font-size:12px;color:#888;margin-bottom:8px}.cc-line{font-size:12px;color:#ccc;margin-bottom:4px}.cc-line a{color:#60a5fa;text-decoration:none}.cc-del{position:absolute;top:10px;right:10px;background:none;border:none;color:#444;cursor:pointer;font-size:14px}.discipline-tag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;margin-bottom:8px}.d-arch{background:#1e3a5f22;color:#60a5fa;border:1px solid #1e3a5f}.d-str{background:#3b1f1f22;color:#f87171;border:1px solid #3b1f1f}.d-mep{background:#1a3a1a22;color:#4ade80;border:1px solid #1a3a1a}.d-cm{background:#3b2e0022;color:#fbbf24;border:1px solid #3b2e00}.d-own{background:#2e1a3b22;color:#c084fc;border:1px solid #2e1a3b}.d-other{background:#1a1a1a;color:#888;border:1px solid #333}</style></head><body><h1>Project Contact Directory</h1><div class="sub">Centralized contact list for all project stakeholders</div><div class="card"><div class="card-title">Add Contact</div><div class="grid"><div><label>Full Name</label><input id="c-name" placeholder="e.g. Carlos Mendez"></div><div><label>Company / Firm</label><input id="c-company" placeholder="e.g. Your Firm"></div><div><label>Role / Title</label><input id="c-role" placeholder="e.g. Project Manager"></div><div><label>Discipline</label><select id="c-disc"><option value="arch">Architecture</option><option value="str">Structural</option><option value="mep">MEP</option><option value="cm">Construction Mgmt</option><option value="own">Owner / Client</option><option value="other">Other</option></select></div><div><label>Phone</label><input id="c-phone" placeholder="+1 555 000 0000"></div><div><label>Email</label><input id="c-email" placeholder="name@firm.com"></div><div><label>Project</label><input id="c-proj" placeholder="e.g. Project Alpha, HW, All"></div></div><button class="btn btn-p" onclick="addContact()">Add Contact</button><button class="btn btn-g" onclick="exportCSV()">Export CSV</button></div><input class="search-bar" id="search" placeholder="Search by name, company, role, or project..." oninput="render()"><div id="contact-grid" class="cards-grid"></div><script>var C=JSON.parse(localStorage.getItem("cd")||"[]");function save(){localStorage.setItem("cd",JSON.stringify(C));}var discLabel={arch:"Architecture",str:"Structural",mep:"MEP",cm:"Construction Mgmt",own:"Owner/Client",other:"Other"};var discCls={arch:"d-arch",str:"d-str",mep:"d-mep",cm:"d-cm",own:"d-own",other:"d-other"};function addContact(){var name=document.getElementById("c-name").value.trim();var company=document.getElementById("c-company").value.trim();var role=document.getElementById("c-role").value.trim();var disc=document.getElementById("c-disc").value;var phone=document.getElementById("c-phone").value.trim();var email=document.getElementById("c-email").value.trim();var proj=document.getElementById("c-proj").value.trim();if(!name)return;C.push({name,company,role,disc,phone,email,proj});save();render();["c-name","c-company","c-role","c-phone","c-email","c-proj"].forEach(function(id){document.getElementById(id).value="";});}function del(i){C.splice(i,1);save();render();}function render(){var q=document.getElementById("search").value.toLowerCase();var grid=document.getElementById("contact-grid");grid.innerHTML="";var rows=C.filter(function(c){return !q||(c.name+c.company+c.role+c.proj).toLowerCase().includes(q);});if(rows.length===0){grid.innerHTML="<div style=\"color:#555;font-size:13px;padding:20px\">No contacts yet. Add one above.</div>";return;}rows.forEach(function(c){var idx=C.indexOf(c);var dc=discCls[c.disc]||"d-other";var dl=discLabel[c.disc]||c.disc;var card="<div class=\"contact-card\">";card+="<button class=\"cc-del\" onclick=\"del("+idx+")\">x</button>";card+="<div class=\"cc-name\">"+c.name+"</div>";card+="<div class=\"cc-role\">"+c.role+"</div>";card+="<span class=\"discipline-tag "+dc+"\">"+dl+"</span>";if(c.company)card+="<div class=\"cc-company\">"+c.company+"</div>";if(c.phone)card+="<div class=\"cc-line\">"+c.phone+"</div>";if(c.email)card+="<div class=\"cc-line\"><a href=\"mailto:"+c.email+"\">"+c.email+"</a></div>";if(c.proj)card+="<div class=\"cc-line\" style=\"color:#888\">Project: "+c.proj+"</div>";card+="</div>";grid.innerHTML+=card;});}function exportCSV(){var rows=[["Name","Company","Role","Discipline","Phone","Email","Project"]];C.forEach(function(c){rows.push([c.name,c.company,c.role,discLabel[c.disc],c.phone,c.email,c.proj]);});var csv=rows.map(function(r){return r.join(",");}).join("\n");var a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="contacts.csv";a.click();}if(C.length===0){C=[{name:"Diego Rodriguez",company:"Your Firm",role:"Principal Architect",disc:"arch",phone:"+52 844 000 0000",email:"diego@bimxl.com",proj:"All"},{name:"Valeria Solares",company:"BIMXL",role:"Director Technology and Ops",disc:"arch",phone:"",email:"team@yourfirm.com",proj:"All"},{name:"Client Contact A",company:"Client Co.",role:"Client Contact",disc:"own",phone:"",email:"",proj:"Project Alpha, Project Beta, Project Gamma"}];save();}render();</script></body></html>
