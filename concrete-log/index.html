<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Concrete Pour Log — XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:24px}.card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:20px;margin-bottom:16px}.card-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}@media(max-width:640px){.grid4{grid-template-columns:1fr 1fr}}.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}.result-box{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:14px;text-align:center}.result-val{font-size:22px;font-weight:700;color:#16a34a}.result-lbl{font-size:11px;color:#666;margin-top:4px}label{font-size:11px;color:#888;display:block;margin-bottom:4px}input,select{width:100%;background:#111;border:1px solid #333;color:#fff;padding:9px 12px;border-radius:6px;font-size:13px}input:focus,select:focus{outline:none;border-color:#16a34a}.btn{padding:9px 20px;background:#16a34a;border:none;border-radius:6px;color:#fff;font-size:13px;cursor:pointer;margin-right:8px}.btn-del{background:transparent;border:none;color:#555;cursor:pointer;font-size:13px}.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}.ps{background:#0d2818;color:#4ade80}.pf{background:#3b1f1f;color:#f87171}.pp{background:#2e2510;color:#fbbf24}table{width:100%;border-collapse:collapse}th{font-size:11px;color:#555;padding:7px 8px;border-bottom:1px solid #222;text-align:left}td{font-size:12px;padding:7px 8px;border-bottom:1px solid #1a1a1a;color:#ccc}</style></head><body><h1>Concrete Pour Log</h1><div class="sub">Field pour records — mix design, slump, cylinders, and test results</div><div class="result-grid" id="summary"></div><div class="card"><div class="card-title">Add Pour Record</div><div class="grid4" style="margin-bottom:12px"><div><label>Pour ID</label><input id="c-id" placeholder="PR-001"></div><div><label>Date</label><input type="date" id="c-date"></div><div><label>Element</label><input id="c-elem" placeholder="L3 Slab — A/1 to E/6"></div><div><label>Mix Design</label><input id="c-mix" placeholder="5000 psi / w/c 0.40"></div><div><label>Volume (CY)</label><input type="number" id="c-vol" placeholder="85"></div><div><label>Slump (in)</label><input type="number" id="c-slump" step="0.25" placeholder="4.5"></div><div><label>Air Content (%)</label><input type="number" id="c-air" step="0.1" placeholder="5.5"></div><div><label>Temp (°F)</label><input type="number" id="c-temp" placeholder="72"></div><div><label>Cylinders Cast</label><input type="number" id="c-cyl" placeholder="4"></div><div><label>7-Day Break (psi)</label><input type="number" id="c-7d" placeholder="3200"></div><div><label>28-Day Break (psi)</label><input type="number" id="c-28d" placeholder="5100"></div><div><label>Result</label><select id="c-res"><option value="pp">Pending</option><option value="ps">Pass</option><option value="pf">Fail</option></select></div></div><button class="btn" onclick="addPour()">Add Pour</button></div><div class="card"><div class="card-title">Pour Register</div><table><thead><tr><th>ID</th><th>Date</th><th>Element</th><th>Mix</th><th>CY</th><th>Slump</th><th>Air%</th><th>Temp</th><th>Cyls</th><th>7d psi</th><th>28d psi</th><th>Result</th><th></th></tr></thead><tbody id="tbody"></tbody></table></div><script>var C=JSON.parse(localStorage.getItem("conc-log")||"[]");if(!C.length){C=[{id:"PR-001",date:"2025-05-10",elem:"L3 Slab A/1-E/6",mix:"5000 psi w/c 0.40",vol:85,slump:4.5,air:5.5,temp:74,cyl:4,d7:3150,d28:5200,res:"ps"},{id:"PR-002",date:"2025-05-14",elem:"Col Grid B3-D5 L4",mix:"6000 psi w/c 0.38",vol:22,slump:5.0,air:5.0,temp:78,cyl:4,d7:3800,d28:0,res:"pp"},{id:"PR-003",date:"2025-04-28",elem:"Grade Beam East",mix:"4000 psi",vol:38,slump:4.0,air:6.0,temp:68,cyl:4,d7:2400,d28:3800,res:"pf"}];}function save(){localStorage.setItem("conc-log",JSON.stringify(C));}function v(id){return document.getElementById(id).value;}function addPour(){var x={id:v("c-id")||"PR-"+String(C.length+1).padStart(3,"0"),date:v("c-date"),elem:v("c-elem"),mix:v("c-mix"),vol:parseFloat(v("c-vol"))||0,slump:parseFloat(v("c-slump"))||0,air:parseFloat(v("c-air"))||0,temp:parseFloat(v("c-temp"))||0,cyl:parseFloat(v("c-cyl"))||0,d7:parseFloat(v("c-7d"))||0,d28:parseFloat(v("c-28d"))||0,res:v("c-res")};C.push(x);save();render();["c-id","c-date","c-elem","c-mix","c-vol","c-slump","c-air","c-temp","c-cyl","c-7d","c-28d"].forEach(function(id){document.getElementById(id).value="";});}function del(i){C.splice(i,1);save();render();}function render(){var tb=document.getElementById("tbody");tb.innerHTML="";C.forEach(function(x,i){var rcls={ps:"ps",pf:"pf",pp:"pp"}[x.res]||"pp";tb.innerHTML+="<tr><td>"+x.id+"</td><td>"+x.date+"</td><td>"+x.elem+"</td><td>"+x.mix+"</td><td>"+x.vol+"</td><td>"+x.slump+"</td><td>"+x.air+"</td><td>"+x.temp+"</td><td>"+x.cyl+"</td><td>"+(x.d7||"—")+"</td><td>"+(x.d28||"—")+"</td><td><span class=\"badge "+rcls+"\">"+(x.res==="ps"?"PASS":x.res==="pf"?"FAIL":"PENDING")+"</span></td><td><button class=\"btn-del\" onclick=\"del("+i+")\">x</button></td></tr>";});var tot=C.length,pass=C.filter(function(x){return x.res==="ps";}).length,fail=C.filter(function(x){return x.res==="pf";}).length,vol=C.reduce(function(s,x){return s+x.vol;},0);document.getElementById("summary").innerHTML="<div class=\"result-box\"><div class=\"result-val\">"+tot+"</div><div class=\"result-lbl\">Total Pours</div></div><div class=\"result-box\"><div class=\"result-val\">"+vol.toFixed(0)+" CY</div><div class=\"result-lbl\">Total Volume</div></div><div class=\"result-box\"><div class=\"result-val\">"+pass+"</div><div class=\"result-lbl\">Pass</div></div><div class=\"result-box\"><div class=\"result-val\" style=\"color:"+(fail?"#f87171":"#16a34a")+"\">"+fail+"</div><div class=\"result-lbl\">Fail</div></div>";}render();document.getElementById("c-date").value=new Date().toISOString().split("T")[0];</script></body></html>
