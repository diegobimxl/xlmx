<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Material Takeoff — XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:24px}.card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:20px;margin-bottom:16px}.card-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}@media(max-width:640px){.grid3{grid-template-columns:1fr 1fr}}.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}.result-box{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:14px;text-align:center}.result-val{font-size:22px;font-weight:700;color:#16a34a}.result-lbl{font-size:11px;color:#666;margin-top:4px}label{font-size:11px;color:#888;display:block;margin-bottom:4px}input,select{width:100%;background:#111;border:1px solid #333;color:#fff;padding:9px 12px;border-radius:6px;font-size:13px}input:focus,select:focus{outline:none;border-color:#16a34a}.btn{padding:9px 20px;background:#16a34a;border:none;border-radius:6px;color:#fff;font-size:13px;cursor:pointer;margin-right:8px}.btn-del{background:transparent;border:none;color:#555;cursor:pointer;font-size:13px}table{width:100%;border-collapse:collapse}th{font-size:11px;color:#555;padding:8px;border-bottom:1px solid #222;text-align:left}td{font-size:12px;padding:8px;border-bottom:1px solid #1a1a1a;color:#ccc}tfoot td{font-weight:700;color:#fff;border-top:1px solid #333;border-bottom:none}.div-head{font-size:11px;font-weight:600;color:#16a34a;padding:10px 8px 4px;background:#0d2818;border-radius:4px;margin-top:4px}</style></head><body><h1>Material Takeoff Calculator</h1><div class="sub">Quantity takeoff with waste factor and unit cost</div><div class="result-grid" id="summary"></div><div class="card"><div class="card-title">Add Line Item</div><div class="grid3" style="margin-bottom:12px"><div><label>Description</label><input id="t-desc" placeholder="3-5/8 Metal Stud 25ga"></div><div><label>CSI Division</label><select id="t-div"><option value="03">03 — Concrete</option><option value="04">04 — Masonry</option><option value="05">05 — Metals</option><option value="06" selected>06 — Wood / Composites</option><option value="07">07 — Thermal and Moisture</option><option value="08">08 — Openings</option><option value="09">09 — Finishes</option><option value="22">22 — Plumbing</option><option value="23">23 — HVAC</option><option value="26">26 — Electrical</option></select></div><div><label>Unit</label><select id="t-unit"><option>LF</option><option>SF</option><option>SY</option><option>CF</option><option>CY</option><option>EA</option><option>TON</option><option>GAL</option></select></div><div><label>Quantity</label><input type="number" id="t-qty" placeholder="1200"></div><div><label>Waste Factor (%)</label><input type="number" id="t-waste" value="10" placeholder="10"></div><div><label>Unit Cost ($)</label><input type="number" id="t-cost" step="0.01" placeholder="1.85"></div></div><button class="btn" onclick="addItem()">Add Item</button><button class="btn" style="background:#222;border:1px solid #333" onclick="exportCSV()">Export CSV</button></div><div class="card"><div class="card-title">Takeoff Sheet</div><table><thead><tr><th>Description</th><th>Div</th><th>Unit</th><th>Net Qty</th><th>Waste%</th><th>Total Qty</th><th>Unit Cost</th><th>Extended</th><th></th></tr></thead><tbody id="tbody"></tbody><tfoot><tr><td colspan="7">TOTAL</td><td id="total-cost">$0</td><td></td></tr></tfoot></table></div><script>var T=JSON.parse(localStorage.getItem("takeoff")||"[]");if(!T.length){T=[{desc:"Cast-in-Place Concrete — Slab on Grade",div:"03",unit:"CY",qty:120,waste:5,cost:185},{desc:"3-5/8 Metal Stud 25ga at 16\" OC",div:"09",unit:"LF",qty:3200,waste:12,cost:1.85},{desc:"5/8 Type X Gypsum Board",div:"09",unit:"SF",qty:8400,waste:10,cost:0.62},{desc:"TPO Roofing Membrane 60-mil",div:"07",unit:"SF",qty:14500,waste:8,cost:4.20},{desc:"Aluminum Storefront System",div:"08",unit:"SF",qty:2200,waste:3,cost:85}];}function save(){localStorage.setItem("takeoff",JSON.stringify(T));}function v(id){return document.getElementById(id).value;}function addItem(){var x={desc:v("t-desc"),div:v("t-div"),unit:v("t-unit"),qty:parseFloat(v("t-qty"))||0,waste:parseFloat(v("t-waste"))||0,cost:parseFloat(v("t-cost"))||0};if(!x.desc||!x.qty)return;T.push(x);save();render();["t-desc","t-qty","t-cost"].forEach(function(id){document.getElementById(id).value="";});}function del(i){T.splice(i,1);save();render();}function render(){var tb=document.getElementById("tbody");tb.innerHTML="";var total=0;T.forEach(function(x,i){var totalQty=x.qty*(1+x.waste/100);var ext=totalQty*x.cost;total+=ext;tb.innerHTML+="<tr><td>"+x.desc+"</td><td>"+x.div+"</td><td>"+x.unit+"</td><td>"+x.qty.toLocaleString()+"</td><td>"+x.waste+"%</td><td style=\"color:#fbbf24\">"+totalQty.toFixed(1)+"</td><td>$"+x.cost.toFixed(2)+"</td><td style=\"color:#16a34a\">$"+Math.round(ext).toLocaleString()+"</td><td><button class=\"btn-del\" onclick=\"del("+i+")\">x</button></td></tr>";});document.getElementById("total-cost").textContent="$"+Math.round(total).toLocaleString();var items=T.length,totalNet=T.reduce(function(s,x){return s+x.qty;},0);document.getElementById("summary").innerHTML="<div class=\"result-box\"><div class=\"result-val\">"+items+"</div><div class=\"result-lbl\">Line Items</div></div><div class=\"result-box\"><div class=\"result-val\">$"+Math.round(total).toLocaleString()+"</div><div class=\"result-lbl\">Total Material Cost</div></div>";}function exportCSV(){var rows=["Description,Division,Unit,Net Qty,Waste %,Total Qty,Unit Cost,Extended"];T.forEach(function(x){var tq=(x.qty*(1+x.waste/100)).toFixed(1);var ext=Math.round(tq*x.cost);rows.push([x.desc,x.div,x.unit,x.qty,x.waste,tq,"$"+x.cost,"$"+ext].join(","));});var a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(rows.join("\n"));a.download="takeoff.csv";a.click();}render();</script></body></html>
