<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Invoice Builder - XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:24px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:600px){.grid2{grid-template-columns:1fr}}.card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:18px;margin-bottom:14px}.ct{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}label{font-size:11px;color:#777;display:block;margin-bottom:3px}input,select,textarea{width:100%;background:#111;border:1px solid #333;color:#fff;padding:8px 11px;border-radius:5px;font-size:12px;font-family:inherit}input[type=date]{color-scheme:dark}textarea{resize:vertical;min-height:60px}.btn{background:#16a34a;color:#fff;border:none;padding:9px 20px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;margin-right:8px}.btn-s{background:#1a1a1a;border:1px solid #333;color:#aaa;padding:9px 16px;border-radius:6px;font-size:12px;cursor:pointer;margin-right:6px}.btn-sm{background:#1a1a1a;border:1px solid #333;color:#aaa;padding:5px 10px;border-radius:4px;font-size:11px;cursor:pointer}.inv-preview{background:#fff;color:#111;border-radius:8px;padding:32px;margin-top:16px;font-family:-apple-system,sans-serif;max-width:700px}.inv-header{display:flex;justify-content:space-between;margin-bottom:24px}.inv-title{font-size:28px;font-weight:800;letter-spacing:2px;color:#111}.inv-num{font-size:13px;color:#666;text-align:right}.inv-parties{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;font-size:12px;color:#444;line-height:1.6}.inv-tbl{width:100%;border-collapse:collapse;margin-bottom:16px}.inv-tbl th{background:#f5f5f5;padding:8px 10px;text-align:left;font-size:11px;color:#666;border-bottom:2px solid #e0e0e0}.inv-tbl td{padding:8px 10px;font-size:12px;border-bottom:1px solid #f0f0f0;color:#333}.inv-tbl td:last-child,.inv-tbl th:last-child{text-align:right}.inv-totals{text-align:right;margin-bottom:20px;font-size:13px;line-height:2}.inv-total-final{font-size:18px;font-weight:700;color:#111}.inv-notes{font-size:11px;color:#666;line-height:1.6;border-top:1px solid #e0e0e0;padding-top:14px}.tabs{display:flex;gap:4px;margin-bottom:20px}.tab{padding:7px 18px;background:#1a1a1a;border:1px solid #333;border-radius:6px;cursor:pointer;font-size:12px;color:#888}.tab.active{background:#16a34a;border-color:#16a34a;color:#fff}.panel{display:none}.panel.active{display:block}.line-row{display:grid;grid-template-columns:3fr 1fr 1fr 1fr 30px;gap:8px;margin-bottom:8px;align-items:center}</style></head><body>
<h1>Invoice Builder</h1><div class="sub">Professional invoice generator — fill, preview, print or copy</div><div class="tabs"><div class="tab active" onclick="sw(0)">Form</div><div class="tab" onclick="sw(1)">Preview</div></div><div class="panel active" id="pf"><div class="card"><div class="ct">Invoice Details</div><div class="grid2"><div><label>Invoice #</label><input id="inum" placeholder="INV-2025-001"></div><div><label>Invoice Date</label><input type="date" id="idate"></div><div><label>Due Date</label><input type="date" id="ddate"></div><div><label>Currency</label><select id="cur"><option value="USD">USD ($)</option><option value="MXN">MXN ($)</option><option value="EUR">EUR (€)</option></select></div></div></div><div class="card"><div class="ct">From (Your Company)</div><div class="grid2"><div><label>Company Name</label><input id="fn" placeholder="BIMXL LLC"></div><div><label>Email</label><input id="fe" placeholder="info@bimxl.com"></div><div><label>Address</label><input id="fa" placeholder="Saltillo, Coahuila"></div><div><label>Tax ID / RFC</label><input id="ft" placeholder="BIMX123456ABC"></div></div></div><div class="card"><div class="ct">To (Client)</div><div class="grid2"><div><label>Client Name</label><input id="cn" placeholder="Apex Architects"></div><div><label>Contact</label><input id="cc" placeholder="Project Manager"></div><div><label>Address</label><input id="ca" placeholder="Oklahoma City, OK"></div><div><label>Project</label><input id="cp" placeholder="Medical Office Building"></div></div></div><div class="card"><div class="ct">Line Items <button class="btn-sm" onclick="addLine()">+ Add Line</button></div><div style="display:grid;grid-template-columns:3fr 1fr 1fr 1fr 30px;gap:8px;margin-bottom:6px"><span style="font-size:10px;color:#555">Description</span><span style="font-size:10px;color:#555">Qty</span><span style="font-size:10px;color:#555">Unit Price</span><span style="font-size:10px;color:#555">Amount</span><span></span></div><div id="lines"></div></div><div class="card"><div class="ct">Totals & Notes</div><div class="grid2"><div><label>Tax / IVA %</label><input type="number" id="tax" value="0" oninput="calcTot()"></div><div><label>Discount %</label><input type="number" id="disc" value="0" oninput="calcTot()"></div><div><label>Notes / Payment Terms</label><textarea id="notes" placeholder="Payment due within 30 days. Wire transfer to..."></textarea></div></div></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn" onclick="preview()">Preview Invoice</button><button class="btn-s" onclick="window.print()">Print / PDF</button></div></div><div class="panel" id="pp"><button class="btn-s" onclick="sw(0)">Back to Form</button><button class="btn-s" onclick="window.print()" style="margin-left:8px">Print / PDF</button><div class="inv-preview" id="inv"></div></div>
<script>var today=new Date().toISOString().slice(0,10);document.getElementById("idate").value=today;var d30=new Date();d30.setDate(d30.getDate()+30);document.getElementById("ddate").value=d30.toISOString().slice(0,10);var lc=0;function addLine(desc,qty,price){lc++;var id=lc;var row=document.createElement("div");row.className="line-row";row.id="lr"+id;row.innerHTML="<input placeholder=\"Description\" value=\""+(desc||"")+"\"><input type=number placeholder=1 value=\""+(qty||1)+"\" oninput=\"calcTot()\"><input type=number placeholder=\"0.00\" value=\""+(price||"")+"\"><input type=number id=\"amt"+id+"\" readonly style=\"color:#16a34a\"><button onclick=\"document.getElementById("+("lr"+id).replace("lr","lr")+id+")\".remove();calcTot()\" style=\"background:none;border:none;color:#666;cursor:pointer;font-size:16px\">x</button>";document.getElementById("lines").appendChild(row);calcTot();}function calcTot(){var lines=document.querySelectorAll("#lines .line-row");var sub=0;lines.forEach(function(r){var ins=r.querySelectorAll("input");var q=parseFloat(ins[1].value)||0,p=parseFloat(ins[2].value)||0,a=q*p;sub+=a;if(ins[3])ins[3].value=a.toFixed(2);});var tax=parseFloat(document.getElementById("tax").value)||0;var disc=parseFloat(document.getElementById("disc").value)||0;var after=sub*(1-disc/100);var total=after*(1+tax/100);return{sub:sub,after:after,tax:tax,disc:disc,total:total};}function v(id){return document.getElementById(id).value.trim();}function sym(){var c=v("cur");return c=="EUR"?"EUR ":c=="MXN"?"MX$":"$";}function preview(){var t=calcTot();var cur=sym();var lines=document.querySelectorAll("#lines .line-row");var rows="";lines.forEach(function(r){var ins=r.querySelectorAll("input");var desc=ins[0].value||"-",q=ins[1].value||1,p=ins[2].value||0,a=ins[3].value||0;rows+="<tr><td>"+desc+"</td><td>"+q+"</td><td>"+cur+parseFloat(p).toFixed(2)+"</td><td>"+cur+parseFloat(a).toFixed(2)+"</td></tr>";});var tots="";if(t.disc>0)tots+="<div>Subtotal: "+cur+t.sub.toFixed(2)+"</div><div>Discount ("+t.disc+"%): -"+cur+(t.sub-t.after).toFixed(2)+"</div>";if(t.tax>0)tots+="<div>Tax/IVA ("+t.tax+"%): "+cur+(t.total-t.after).toFixed(2)+"</div>";tots+="<div class=inv-total-final>TOTAL: "+cur+t.total.toFixed(2)+" "+v("cur")+"</div>";document.getElementById("inv").innerHTML="<div class=inv-header><div class=inv-title>INVOICE</div><div class=inv-num><b>"+v("inum")+"</b><br>Date: "+v("idate")+"<br>Due: "+v("ddate")+"</div></div><div class=inv-parties><div><b>FROM</b><br>"+v("fn")+"<br>"+v("fa")+"<br>"+v("fe")+"<br>"+v("ft")+"</div><div><b>TO</b><br>"+v("cn")+"<br>"+v("cc")+"<br>"+v("ca")+"<br>Project: "+v("cp")+"</div></div><table class=inv-tbl><thead><tr><th>Description</th><th>Qty</th><th>Unit Price</th><th>Amount</th></tr></thead><tbody>"+rows+"</tbody></table><div class=inv-totals>"+tots+"</div><div class=inv-notes>"+v("notes")+"</div>";sw(1);}function sw(i){document.querySelectorAll(".tab").forEach(function(e,j){e.classList.toggle("active",i==j);});document.querySelectorAll(".panel").forEach(function(e,j){e.classList.toggle("active",i==j);});}addLine("BIM Modeling Services — Schematic Design Phase",1,8500);addLine("VDC Coordination & Clash Detection",1,3200);addLine("Project Management & Communication",8,120);</script></body></html>
