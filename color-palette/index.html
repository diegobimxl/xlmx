<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Architecture Color Palette — XLMX</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#111;color:#fff;font-family:Inter,system-ui,sans-serif;min-height:100vh;padding:20px}
h1{font-size:1.6rem;margin-bottom:4px}p.sub{color:#999;margin-bottom:20px;font-size:.85rem}
.card{background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:.8rem;margin-bottom:4px}
select,input{width:100%;padding:10px;background:#222;border:1px solid #444;border-radius:8px;color:#fff;font-size:.95rem;margin-bottom:12px}
button{padding:10px 18px;background:#16a34a;color:#fff;border:none;border-radius:8px;font-size:.9rem;cursor:pointer;font-weight:600;margin-right:8px}
button:hover{background:#15803d}button.sec{background:#333}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.palette{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
.swatch{border-radius:8px;aspect-ratio:1;cursor:pointer;position:relative;transition:transform .15s}
.swatch:hover{transform:scale(1.05)}
.swatch-info{margin-top:6px;font-size:.7rem;text-align:center;color:#aaa}
.swatch-name{font-weight:600;color:#fff;font-size:.72rem;text-align:center}
.copy-tip{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#000a;color:#fff;padding:3px 7px;border-radius:4px;font-size:.65rem;opacity:0;transition:opacity .2s;white-space:nowrap}
.swatch:hover .copy-tip{opacity:1}
.scheme-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 16px;background:#222;border:1px solid #333;border-radius:6px;cursor:pointer;font-size:.82rem}
.tab.active{border-color:#16a34a;color:#16a34a;background:#0a1a0a}
.saved{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-bottom:12px}
.saved-swatch{height:32px;border-radius:4px;cursor:pointer}
a.back{color:#16a34a;text-decoration:none;font-size:.85rem;display:inline-block;margin-bottom:16px}
@media(max-width:600px){.palette{grid-template-columns:repeat(3,1fr)}.saved{grid-template-columns:repeat(5,1fr)}}
</style></head><body>
<a class="back" href="/">← XLMX</a>
<h1>Architecture Color Palette</h1>
<p class="sub">Curated palettes for AEC projects — HEX, RAL approximate, and material inspiration</p>
<div class="card">
<div class="grid2">
<div><label>Palette Style</label>
<select id="style" onchange="loadPalette()">
<option value="concrete">Brutalist Concrete</option>
<option value="nordic">Nordic Minimalism</option>
<option value="mediterranean">Mediterranean Warm</option>
<option value="industrial">Industrial Steel</option>
<option value="biophilic">Biophilic Greens</option>
<option value="desert">Desert / Adobe</option>
<option value="nighttime">Night Architecture</option>
<option value="scandinavian">Scandinavian Pastels</option>
<option value="mexico">Mexico Vernacular</option>
<option value="tech">High-Tech Facade</option>
</select></div>
<div><label>Base Color (override)</label>
<input id="baseColor" type="color" value="#c5c0b8" style="height:46px;padding:4px;cursor:pointer">
</div>
</div>
<div style="display:flex;gap:8px;flex-wrap:wrap">
<button onclick="loadPalette()">Generate Palette</button>
<button class="sec" onclick="generateFromBase()">Generate from Base Color</button>
<button class="sec" onclick="exportPalette()">Export HEX List</button>
</div>
</div>
<div class="scheme-tabs" id="tabs">
<div class="tab active" onclick="setScheme('main',this)">Main Palette</div>
<div class="tab" onclick="setScheme('accent',this)">Accents</div>
<div class="tab" onclick="setScheme('neutral',this)">Neutrals</div>
<div class="tab" onclick="setScheme('material',this)">Material Refs</div>
</div>
<div class="palette" id="palette"></div>
<div class="card">
<p style="color:#aaa;font-size:.8rem;margin-bottom:8px">Saved swatches (click palette to add)</p>
<div class="saved" id="saved"></div>
<button class="sec" onclick="document.getElementById('saved').innerHTML=''">Clear</button>
</div>
<script>
const PALETTES={
  concrete:{main:['#c5c0b8','#9e9a94','#726e68','#4a4745','#1e1c1a'],accent:['#d4a853','#8b4513','#2d5a6b','#8fa89a','#b8cdd4'],neutral:['#f2f0ee','#e0ddd9','#c5c0b8','#9e9a94','#1e1c1a'],material:['#c5c0b8','#a8a09a','#878380','#d4c9bb','#6b5e50']},
  nordic:{main:['#e8e4dc','#c9c3b8','#a09890','#6d6560','#2c2724'],accent:['#4a7fa5','#8db5c8','#b5c9d4','#d4c5b0','#7a6e65'],neutral:['#f5f3f0','#e8e4dc','#c9c3b8','#a09890','#2c2724'],material:['#f0ece4','#d4cdc4','#b8b0a8','#8c8480','#584e46']},
  mediterranean:{main:['#e8d5b0','#c4a882','#a07850','#8c5a2a','#5a3015'],accent:['#4a8fa0','#2d6b8a','#c85a2a','#e8834a','#a8c8b4'],neutral:['#f5efe0','#e8d5b0','#c8b89a','#a09080','#5a4a35'],material:['#e0d0b0','#c8b890','#b0a070','#988858','#806840']},
  industrial:{main:['#4a4e54','#6e7278','#8f9299','#b4b8bc','#d8dadc'],accent:['#e87d2a','#c8601a','#3a6e8c','#5c8fa8','#a84820'],neutral:['#1a1c1e','#2a2c30','#3a3c40','#4a4e54','#6e7278'],material:['#8a8c90','#6e7074','#54565a','#9ca0a4','#c4c8cc']},
  biophilic:{main:['#4a7a5a','#6a9a70','#8aba88','#a8d0a0','#c8e8c0'],accent:['#8b6914','#c4a040','#2a5a40','#a8c870','#5a3a20'],neutral:['#f0f4ec','#d8e4d0','#b8ccb0','#98b490','#4a7a5a'],material:['#5a8a4a','#7aa060','#90b878','#a8d090','#c0e0a8']},
  desert:{main:['#d4a870','#b88a54','#9a6e3a','#7a5224','#5a3a18'],accent:['#c84a18','#e87040','#4a6a50','#6a8a60','#3a5040'],neutral:['#f0e4d0','#e0d0b8','#c8b89a','#a89078','#785840'],material:['#e0c8a0','#c8b080','#b09860','#987844','#7a5830']},
  nighttime:{main:['#0a0e1a','#141824','#1e2430','#2a3040','#3a4254'],accent:['#4a7fa8','#6094bc','#80b0d0','#c8a840','#e0c050'],neutral:['#0a0e1a','#1a1e2a','#2a2e3a','#3a3e4e','#4a4e60'],material:['#141824','#1e2a3a','#28344a','#323e58','#3c4866']},
  scandinavian:{main:['#e8e4f0','#c8c0d8','#a8a0c0','#8880a8','#686090'],accent:['#c8d8e0','#b0c8d4','#f0d8b8','#e0c8a0','#a8c8b0'],neutral:['#f8f6fc','#ece8f4','#d8d4e8','#c4c0d8','#a8a0c0'],material:['#e0dce8','#ccc8d8','#b8b4cc','#a4a0bc','#9090ac']},
  mexico:{main:['#d42020','#e85a10','#f0a820','#2a8050','#1a4a90'],accent:['#f8d840','#60b8d8','#c03828','#3a7038','#e87028'],neutral:['#f8f0e0','#e8dcc8','#c8b898','#a89068','#785040'],material:['#e0b860','#c8a040','#b08820','#987008','#805800']},
  tech:{main:['#0a1a2a','#0e2a3e','#123452','#183e60','#1e4870'],accent:['#00a8e8','#00c8f8','#40d8ff','#0080c0','#c8e8f8'],neutral:['#0a0e14','#10161e','#161e28','#1e2830','#28323e'],material:['#b0c8d8','#90aec0','#7094a8','#507a90','#306078']}
};
let currentScheme='main';let currentPalette=[];let saved=[];
function setScheme(s,el){currentScheme=s;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderPalette()}
function loadPalette(){
  const style=document.getElementById('style').value;
  currentPalette=PALETTES[style]||PALETTES.concrete;renderPalette();
}
function renderPalette(){
  const colors=currentPalette[currentScheme]||currentPalette.main;
  const RALMAP={concrete:'RAL 7030',nordic:'RAL 9001',mediterranean:'RAL 1001',industrial:'RAL 7015',biophilic:'RAL 6021',desert:'RAL 1014',nighttime:'RAL 5026',scandinavian:'RAL 4009',mexico:'RAL 3000',tech:'RAL 5011'};
  const style=document.getElementById('style').value;
  const el=document.getElementById('palette');el.innerHTML='';
  colors.forEach(hex=>{
    el.innerHTML+=`<div>
    <div class="swatch" style="background:${hex}" onclick="saveSwatch('${hex}')">
    <div class="copy-tip">Click to save</div></div>
    <div class="swatch-name">${hex.toUpperCase()}</div>
    <div class="swatch-info">${hexToRgb(hex)}</div></div>`;
  });
}
function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${r},${g},${b})`}
function saveSwatch(hex){saved.push(hex);const el=document.getElementById('saved');el.innerHTML='';saved.slice(-16).forEach(h=>{el.innerHTML+=`<div class="saved-swatch" style="background:${h}" title="${h}" onclick="navigator.clipboard.writeText('${h}')"></div>`})}
function generateFromBase(){
  const base=document.getElementById('baseColor').value;
  const [r,g,b]=[parseInt(base.slice(1,3),16),parseInt(base.slice(3,5),16),parseInt(base.slice(5,7),16)];
  const toHex=(rv,gv,bv)=>'#'+[rv,gv,bv].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('');
  currentPalette={main:[base,toHex(r-20,g-20,b-20),toHex(r-40,g-40,b-40),toHex(r+20,g+20,b+20),toHex(r+40,g+40,b+40)],
    accent:[toHex(r,g,b-60),toHex(r+60,g,b),toHex(r,g+60,b),toHex(r-30,g+30,b-30),toHex(255-r,255-g,255-b)],
    neutral:[toHex(240,238,235),toHex(220,216,210),toHex(r,g,b),toHex(100,96,92),toHex(30,28,26)],
    material:[base,toHex(r+10,g+8,b+5),toHex(r-15,g-15,b-18),toHex(r+25,g+22,b+18),toHex(r-30,g-28,b-25)]};
  renderPalette();
}
function exportPalette(){
  const all=[...currentPalette.main,...currentPalette.accent,...currentPalette.neutral];
  const txt=all.map((h,i)=>`Color ${i+1}: ${h.toUpperCase()} | ${hexToRgb(h)}`).join('\n');
  navigator.clipboard.writeText(txt);alert('Palette copied to clipboard!');
}
loadPalette();
</script></body></html>
