<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Submittal Log — XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:20px}.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:20px}.sum-box{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:14px;text-align:center}.sum-val{font-size:26px;font-weight:700}.sum-lbl{font-size:10px;color:#666;margin-top:3px}.card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:20px;margin-bottom:16px}.card-title{font-size:13px;font-weight:600;color:#ccc;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}label{font-size:11px;color:#888;display:block;margin-bottom:4px}input,select{width:100%;background:#111;border:1px solid #333;color:#fff;padding:9px 12px;border-radius:6px;font-size:13px}input:focus,select:focus{outline:none;border-color:#16a34a}.btn{padding:9px 18px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;margin-top:12px}.btn-p{background:#16a34a;color:#fff}.btn-g{background:#222;border:1px solid #333;color:#ccc;margin-left:8px}.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}.search-bar,.flt{background:#1a1a1a;border:1px solid #333;color:#fff;padding:8px 12px;border-radius:6px;font-size:13px}.search-bar{flex:1;min-width:150px}.search-bar:focus,.flt:focus{outline:none;border-color:#16a34a}.tbl-wrap{overflow-x:auto}.tbl{width:100%;border-collapse:collapse;min-width:900px}.tbl th{font-size:11px;color:#555;text-align:left;padding:8px;border-bottom:1px solid #222;white-space:nowrap}.tbl td{font-size:12px;padding:8px;border-bottom:1px solid #1a1a1a;color:#ccc}.tbl tr:hover td{background:#1e1e1e}.badge{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700}.b-pending{background:#d9770622;color:#d97706}.b-review{background:#2563eb22;color:#60a5fa}.b-approved{background:#16a34a22;color:#16a34a}.b-rejected{background:#dc262622;color:#dc2626}.b-revise{background:#7c3aed22;color:#c084fc}.del-btn{background:none;border:none;color:#666;cursor:pointer}</style></head><body><h1>Submittal Log</h1><div class="sub">Track shop drawings, product data, and samples through the review cycle</div><div class="summary"><div class="sum-box"><div class="sum-val" id="s-total">0</div><div class="sum-lbl">Total</div></div><div class="sum-box"><div class="sum-val" id="s-pending" style="color:#d97706">0</div><div class="sum-lbl">Pending</div></div><div class="sum-box"><div class="sum-val" id="s-review" style="color:#60a5fa">0</div><div class="sum-lbl">In Review</div></div><div class="sum-box"><div class="sum-val" id="s-approved" style="color:#16a34a">0</div><div class="sum-lbl">Approved</div></div><div class="sum-box"><div class="sum-val" id="s-rejected" style="color:#dc2626">0</div><div class="sum-lbl">Rejected</div></div></div><div class="card"><div class="card-title">New Submittal</div><div class="grid"><div><label>Spec Section</label><input id="s-spec" placeholder="e.g. 07 5000"></div><div><label>Description</label><input id="s-desc" placeholder="e.g. Roofing Membrane Shop Drawing"></div><div><label>Type</label><select id="s-type"><option>Shop Drawing</option><option>Product Data</option><option>Sample</option><option>Mock-up</option><option>Test Report</option><option>Certificate</option><option>O+M Manual</option></select></div><div><label>Submitted By</label><input id="s-by" placeholder="e.g. Roofing Sub"></div><div><label>Date Submitted</label><input id="s-date" type="date"></div><div><label>Required By</label><input id="s-req" type="date"></div><div><label>Reviewer</label><input id="s-rev" placeholder="e.g. A/E of Record"></div><div><label>Status</label><select id="s-status"><option value="pending">Pending Submission</option><option value="review">In Review</option><option value="approved">Approved</option><option value="revise">Revise and Resubmit</option><option value="rejected">Rejected</option></select></div></div><button class="btn btn-p" onclick="addSub()">Add Submittal</button><button class="btn btn-g" onclick="exportCSV()">Export CSV</button></div><div class="toolbar"><input class="search-bar" id="search" placeholder="Search..." oninput="render()"><select class="flt" id="f-status" onchange="render()"><option value="">All Status</option><option value="pending">Pending</option><option value="review">In Review</option><option value="approved">Approved</option><option value="revise">Revise</option><option value="rejected">Rejected</option></select></div><div class="card"><div class="tbl-wrap"><table class="tbl"><thead><tr><th>#</th><th>Spec</th><th>Description</th><th>Type</th><th>Submitted By</th><th>Date Submitted</th><th>Required By</th><th>Reviewer</th><th>Status</th><th></th></tr></thead><tbody id="tb"></tbody></table></div></div><script>var S=JSON.parse(localStorage.getItem("sublog")||"[]");var nextId=S.length?Math.max.apply(null,S.map(function(x){return x.id;}))+1:1;function save(){localStorage.setItem("sublog",JSON.stringify(S));}var stLabel={pending:"Pending",review:"In Review",approved:"Approved",revise:"Revise",rejected:"Rejected"};var stCls={pending:"b-pending",review:"b-review",approved:"b-approved",revise:"b-revise",rejected:"b-rejected"};function addSub(){var spec=document.getElementById("s-spec").value.trim();var desc=document.getElementById("s-desc").value.trim();var type=document.getElementById("s-type").value;var by=document.getElementById("s-by").value.trim();var date=document.getElementById("s-date").value;var req=document.getElementById("s-req").value;var rev=document.getElementById("s-rev").value.trim();var status=document.getElementById("s-status").value;if(!desc)return;S.push({id:nextId++,spec,desc,type,by,date,req,rev,status});save();render();["s-spec","s-desc","s-by","s-date","s-req","s-rev"].forEach(function(id){document.getElementById(id).value="";});}function del(i){S.splice(i,1);save();render();}function setStatus(i,val){S[i].status=val;save();render();}function render(){var q=document.getElementById("search").value.toLowerCase();var fs=document.getElementById("f-status").value;var rows=S.filter(function(x){var m=!q||(x.spec+x.desc+x.type+x.by+x.rev).toLowerCase().includes(q);var sm=!fs||x.status===fs;return m&&sm;});document.getElementById("s-total").textContent=S.length;["pending","review","approved","rejected"].forEach(function(st){document.getElementById("s-"+st).textContent=S.filter(function(x){return x.status===st;}).length;});var tb=document.getElementById("tb");tb.innerHTML="";rows.forEach(function(x){var idx=S.indexOf(x);var sc=stCls[x.status]||"b-pending";var sl=stLabel[x.status]||x.status;var overdue=x.req&&new Date(x.req)<new Date()&&x.status!=="approved";tb.innerHTML+="<tr"+(overdue?" style=\"background:#3b1f1f22\"":"")+">";tb.innerHTML+="<td>"+x.id+"</td><td>"+( x.spec||"-")+"</td><td>"+x.desc+"</td><td>"+x.type+"</td><td>"+(x.by||"-")+"</td><td>"+(x.date||"-")+"</td>";tb.innerHTML+="<td style=\"color:"+(overdue?"#dc2626":"#ccc")+"\">"+(x.req||"-")+"</td><td>"+(x.rev||"-")+"</td>";tb.innerHTML+="<td><select style=\"background:#111;border:1px solid #333;color:#fff;padding:4px;border-radius:4px;font-size:11px\" onchange=\"setStatus("+idx+",this.value)\">";["pending","review","approved","revise","rejected"].forEach(function(opt){tb.innerHTML+="<option value=\""+opt+"\""+(x.status===opt?" selected":"")+">"+stLabel[opt]+"</option>";});tb.innerHTML+="</select></td><td><button class=\"del-btn\" onclick=\"del("+idx+")\">x</button></td></tr>";});}function exportCSV(){var rows=[["ID","Spec","Description","Type","Submitted By","Date","Required By","Reviewer","Status"]];S.forEach(function(x){rows.push([x.id,x.spec,x.desc,x.type,x.by,x.date,x.req,x.rev,stLabel[x.status]]);});var csv=rows.map(function(r){return r.join(",");}).join("\n");var a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="submittal-log.csv";a.click();}if(S.length===0){S=[{id:1,spec:"07 5400",desc:"TPO Roofing Membrane - Shop Drawing",type:"Shop Drawing",by:"Roofing Sub",date:"2026-04-10",req:"2026-04-24",rev:"A/E of Record",status:"approved"},{id:2,spec:"23 3100",desc:"Supply Air Ductwork - Product Data",type:"Product Data",by:"HVAC Sub",date:"2026-04-18",req:"2026-05-02",rev:"MEP Engineer",status:"review"},{id:3,spec:"08 4100",desc:"Aluminum Storefront System - Shop Drawing",type:"Shop Drawing",by:"Glazing Sub",date:"2026-04-25",req:"2026-05-09",rev:"A/E of Record",status:"revise"}];nextId=4;save();}render();</script></body></html>
