<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LEED Points Calculator — XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:20px}.cert-bar{background:#1a1a1a;border:1px solid #222;border-radius:12px;padding:20px;margin-bottom:20px;text-align:center}.cert-label{font-size:28px;font-weight:700;margin-bottom:4px}.cert-sub{font-size:13px;color:#888;margin-bottom:16px}.progress-wrap{background:#222;border-radius:8px;height:20px;overflow:hidden;margin-bottom:8px}.progress-fill{height:20px;border-radius:8px;transition:width .4s}.cert-tiers{display:flex;justify-content:space-between;font-size:10px;color:#666;margin-top:4px}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px}.cat-card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:16px}.cat-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.cat-name{font-size:13px;font-weight:700;color:#ccc}.cat-pts{font-size:13px;font-weight:700;color:#16a34a}.credit{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #1e1e1e}.credit:last-child{border-bottom:none}.credit-name{font-size:12px;color:#aaa;flex:1;margin-right:8px}.credit-ctrl{display:flex;align-items:center;gap:6px}.pts-disp{font-size:12px;color:#16a34a;min-width:40px;text-align:right}.max-pts{font-size:10px;color:#555}.range-input{-webkit-appearance:none;width:80px;height:4px;border-radius:2px;background:#333;outline:none}.range-input::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#16a34a;cursor:pointer}@media(max-width:600px){.cards{grid-template-columns:1fr}}</style></head><body><h1>LEED v4 Points Calculator</h1><div class="sub">BD+C — New Construction certification tracker</div><div class="cert-bar"><div class="cert-label" id="cert-level">Calculating...</div><div class="cert-sub" id="cert-pts">0 / 110 points</div><div class="progress-wrap"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div><div class="cert-tiers"><span>0</span><span>Certified 40</span><span>Silver 50</span><span>Gold 60</span><span>Platinum 80+</span></div></div><div class="cards" id="cards"></div><script>var categories=[{name:"Integrative Process",color:"#16a34a",credits:[{name:"Integrative Process",max:1}]},{name:"Location and Transportation",color:"#2563eb",credits:[{name:"LEED for Neighborhood Dev.",max:16},{name:"Sensitive Land Protection",max:1},{name:"High Priority Site",max:2},{name:"Surrounding Density and Diverse Uses",max:5},{name:"Access to Quality Transit",max:5},{name:"Bicycle Facilities",max:1},{name:"Reduced Parking Footprint",max:1},{name:"Green Vehicles",max:1}]},{name:"Sustainable Sites",color:"#065f46",credits:[{name:"Construction Activity Pollution Prevention",max:1},{name:"Site Assessment",max:1},{name:"Site Development - Protect/Restore Habitat",max:2},{name:"Open Space",max:1},{name:"Rainwater Management",max:3},{name:"Heat Island Reduction",max:2},{name:"Light Pollution Reduction",max:1}]},{name:"Water Efficiency",color:"#0284c7",credits:[{name:"Outdoor Water Use Reduction",max:2},{name:"Indoor Water Use Reduction",max:6},{name:"Building-Level Water Metering",max:1},{name:"Cooling Tower Water Use",max:2},{name:"Water Metering",max:1}]},{name:"Energy and Atmosphere",color:"#d97706",credits:[{name:"Enhanced Commissioning",max:6},{name:"Optimize Energy Performance",max:18},{name:"Advanced Energy Metering",max:1},{name:"Demand Response",max:2},{name:"Renewable Energy",max:3},{name:"Enhanced Refrigerant Mgmt",max:1},{name:"Green Power and Carbon Offsets",max:2}]},{name:"Materials and Resources",color:"#7c3aed",credits:[{name:"Construction Waste Management",max:2},{name:"Building Product Disclosure - EPD",max:2},{name:"Building Product Disclosure - Sourcing",max:2},{name:"Building Product Disclosure - Ingredients",max:2},{name:"Construction and Demolition Waste",max:2}]},{name:"Indoor Environmental Quality",color:"#be185d",credits:[{name:"Enhanced Indoor Air Quality",max:2},{name:"Low-Emitting Materials",max:3},{name:"Construction IAQ Management Plan",max:1},{name:"Indoor Air Quality Assessment",max:2},{name:"Thermal Comfort",max:1},{name:"Interior Lighting",max:2},{name:"Daylight",max:3},{name:"Quality Views",max:1},{name:"Acoustic Performance",max:1}]},{name:"Innovation",color:"#0891b2",credits:[{name:"Innovation",max:5},{name:"LEED Accredited Professional",max:1}]},{name:"Regional Priority",color:"#9a3412",credits:[{name:"Regional Priority Credits (up to 4)",max:4}]}];var pts={};function update(){var total=0;Object.values(pts).forEach(function(v){total+=v;});var pct=Math.round((total/110)*100);document.getElementById("cert-pts").textContent=total+" / 110 points";document.getElementById("progress-fill").style.width=pct+"%";var level,color;if(total>=80){level="Platinum";color="#60a5fa";}else if(total>=60){level="Gold";color="#fbbf24";}else if(total>=50){level="Silver";color="#94a3b8";}else if(total>=40){level="Certified";color="#16a34a";}else{level="Not Certified";color="#666";}document.getElementById("cert-level").textContent=level+" — "+total+" pts";document.getElementById("cert-level").style.color=color;document.getElementById("progress-fill").style.background=color;}function render(){var el=document.getElementById("cards");el.innerHTML="";categories.forEach(function(cat){var catPts=cat.credits.reduce(function(s,c){return s+(pts[cat.name+c.name]||0);},0);var catMax=cat.credits.reduce(function(s,c){return s+c.max;},0);var card="<div class=\"cat-card\">";card+="<div class=\"cat-hdr\"><span class=\"cat-name\" style=\"color:"+cat.color+"\">"+cat.name+"</span><span class=\"cat-pts\">"+catPts+" / "+catMax+"</span></div>";cat.credits.forEach(function(cr){var key=cat.name+cr.name;var cur=pts[key]||0;card+="<div class=\"credit\"><span class=\"credit-name\">"+cr.name+"</span>";card+="<div class=\"credit-ctrl\"><input type=\"range\" class=\"range-input\" min=\"0\" max=\""+cr.max+"\" value=\""+cur+"\" data-key=\""+key+"\" oninput=\"setVal(this)\"><span class=\"pts-disp\" id=\"disp-"+key.replace(/ /g,\"_\")+"\">"+cur+"</span><span class=\"max-pts\">/"+cr.max+"</span></div></div>";});card+="</div>";el.innerHTML+=card;});update();}function setVal(el){var key=el.getAttribute("data-key");var val=parseInt(el.value);pts[key]=val;var dispId="disp-"+key.replace(/ /g,"_");document.getElementById(dispId).textContent=val;update();}render();</script></body></html>
