<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Bid Analysis Comparator - XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:24px}label{font-size:11px;color:#888;display:block;margin-bottom:3px}input,select,textarea{background:#1a1a1a;border:1px solid #333;color:#fff;padding:8px 11px;border-radius:5px;font-size:12px;font-family:inherit}input{width:100%}.btn{background:#16a34a;color:#fff;border:none;padding:8px 18px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;margin-right:8px}.btn-s{background:#1a1a1a;border:1px solid #333;color:#aaa;padding:8px 14px;border-radius:6px;font-size:12px;cursor:pointer}.header-row{display:flex;gap:10px;align-items:flex-end;margin-bottom:16px;flex-wrap:wrap}.card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:18px;margin-bottom:14px}.ct{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}.tbl{width:100%;border-collapse:collapse}.tbl th{font-size:11px;color:#555;text-align:left;padding:8px 10px;border-bottom:1px solid #222;background:#111}.tbl td{font-size:12px;padding:8px 10px;border-bottom:1px solid #1e1e1e;color:#ccc;vertical-align:middle}.tbl input{background:#111;border:1px solid #2a2a2a;color:#fff;padding:5px 8px;border-radius:4px;font-size:12px;width:100%}.low{color:#16a34a;font-weight:700}.high{color:#f87171}.mid{color:#facc15}.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}.stat{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:14px;text-align:center}.sv{font-size:20px;font-weight:700;color:#16a34a}.sl{font-size:10px;color:#666;margin-top:3px}.score-bar{height:6px;border-radius:3px;background:#222;margin-top:4px}.score-fill{height:100%;border-radius:3px;background:#16a34a}</style></head><body><h1>Bid Analysis Comparator</h1><div class="sub">Compare up to 5 contractor bids — line-item breakdown with low/mid/high flagging</div>
<div class="header-row"><div style="flex:2"><label>Project Name</label><input id="proj" placeholder="Medical Office Building"></div><div><label>Number of Bidders</label><select id="nb" onchange="buildTable()"><option value=2>2</option><option value=3 selected>3</option><option value=4>4</option><option value=5>5</option></select></div><div><button class="btn" onclick="analyze()">Analyze</button><button class="btn-s" onclick="exportCSV()">Export CSV</button></div></div><div class="card"><div class="ct">Bidder Names</div><div id="bidder-names" style="display:flex;gap:10px;flex-wrap:wrap"></div></div><div class="stat-grid" id="stats"></div><div class="card"><div class="ct">Line Items</div><table class="tbl"><thead><tr id="thead"><th>CSI Division / Item</th></tr></thead><tbody id="tbody"></tbody><tfoot><tr id="tfoot"><td style="font-weight:700;font-size:13px">TOTAL BASE BID</td></tr></tfoot></table></div><div style="margin-top:8px"><button class="btn-s" onclick="addRow()">+ Add Line Item</button></div><div class="card" id="notes-card" style="margin-top:14px"><div class="ct">Analysis Notes</div><div id="analysis-out" style="font-size:12px;color:#ccc;line-height:1.8"></div></div>
<script>var defaultItems=["01 - General Conditions","02 - Site Work / Demolition","03 - Concrete","04 - Masonry","05 - Steel / Metals","06 - Wood & Plastics","07 - Thermal & Moisture","08 - Doors & Windows","09 - Finishes","10 - Specialties","11 - Equipment","14 - Conveying Systems","21-22 - Fire / Plumbing","23 - HVAC","26 - Electrical","31-32 - Earthwork / Paving","General Contractor OH & Profit"];var nb=3;function buildTable(){nb=parseInt(document.getElementById("nb").value);var nh=document.getElementById("thead");var nf=document.getElementById("tfoot");var bnames=document.getElementById("bidder-names");var thHtml="<th>CSI Division / Item</th>";var tfHtml="<td style=font-weight:700;font-size:13px>TOTAL BASE BID</td>";bnames.innerHTML="";for(var i=0;i<nb;i++){var bc="B"+(i+1);thHtml+="<th>Bidder "+(i+1)+"</th>";tfHtml+="<td id=tot"+i+" style=font-weight:700;color:#16a34a></td>";var inp=document.createElement("input");inp.placeholder="Contractor "+(i+1);inp.id="bn"+i;inp.style.cssText="width:140px;background:#111;border:1px solid #333;color:#fff;padding:7px 10px;border-radius:5px;font-size:12px;";bnames.appendChild(inp);}nh.innerHTML=thHtml;nf.innerHTML=tfHtml;var tb=document.getElementById("tbody");tb.innerHTML="";defaultItems.forEach(function(item){addRow(item);});}function addRow(label){var nb2=nb||3;var tr=document.createElement("tr");var html="<td><input value=\""+(label||"")+"\" style=\"background:#111;border:1px solid #2a2a2a;color:#fff;padding:5px 8px;border-radius:4px;font-size:12px;width:100%\"></td>";for(var i=0;i<nb2;i++)html+="<td><input type=number placeholder=0 oninput=analyze() style=\"background:#111;border:1px solid #2a2a2a;color:#fff;padding:5px 8px;border-radius:4px;font-size:12px;width:100%\"></td>";tr.innerHTML=html;document.getElementById("tbody").appendChild(tr);}function analyze(){var rows=document.querySelectorAll("#tbody tr");var totals=new Array(nb).fill(0);rows.forEach(function(r){var cells=r.querySelectorAll("td");var vals=[];for(var i=1;i<=nb;i++){var v=parseFloat(cells[i]?cells[i].querySelector("input").value:0)||0;vals.push(v);totals[i-1]+=v;}var mn=Math.min.apply(null,vals.filter(function(v){return v>0;}));var mx=Math.max.apply(null,vals);for(var i=1;i<=nb;i++){var td=cells[i];if(!td)continue;td.className=vals[i-1]==mn&&mn>0?"low":vals[i-1]==mx&&mx>mn?"high":"mid";}});var u=function(n){return"$"+Math.round(n).toLocaleString();};for(var i=0;i<nb;i++){var el=document.getElementById("tot"+i);if(el)el.textContent=u(totals[i]);}var valid=totals.filter(function(v){return v>0;});if(!valid.length)return;var mn=Math.min.apply(null,valid),mx=Math.max.apply(null,valid),avg=valid.reduce(function(a,b){return a+b;})/valid.length;var names=[];for(var i=0;i<nb;i++)names.push(document.getElementById("bn"+i)?document.getElementById("bn"+i).value||("Bidder "+(i+1)):"Bidder "+(i+1));var lowIdx=totals.indexOf(mn),highIdx=totals.indexOf(mx);document.getElementById("stats").innerHTML="<div class=stat><div class=sv>"+u(mn)+"</div><div class=sl>Lowest Bid ("+names[lowIdx]+")</div></div><div class=stat><div class=sv>"+u(mx)+"</div><div class=sl>Highest Bid</div></div><div class=stat><div class=sv>"+u(avg)+"</div><div class=sl>Average</div></div><div class=stat><div class=sv>"+u(mx-mn)+"</div><div class=sl>Spread (H-L)</div></div><div class=stat><div class=sv>"+Math.round((mx-mn)/mn*100)+"%</div><div class=sl>Spread %</div></div>";var notes="Lowest bid: "+names[lowIdx]+" at "+u(mn)+"\n";notes+="Highest bid: "+names[highIdx]+" at "+u(mx)+"\n";notes+="Average: "+u(avg)+"\n";if((mx-mn)/mn>0.2)notes+="WARNING: Spread >20% — review scope inclusions carefully.\n";notes+="Recommendation: Verify lowest bidder scope includes all spec sections.";document.getElementById("analysis-out").textContent=notes;}function exportCSV(){var rows=document.querySelectorAll("#tbody tr");var names=[];for(var i=0;i<nb;i++)names.push(document.getElementById("bn"+i)?document.getElementById("bn"+i).value||("Bidder "+(i+1)):"Bidder "+(i+1));var csv="Item,"+names.join(",")+"\n";rows.forEach(function(r){var cells=r.querySelectorAll("td input");var line=cells[0].value;for(var i=1;i<=nb;i++)line+=","+((cells[i]?cells[i].value:"")||"0");csv+=line+"\n";});var a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="bid-analysis.csv";a.click();}buildTable();analyze();</script></body></html>
