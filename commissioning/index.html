<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Commissioning Log — XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:24px}.card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:20px;margin-bottom:16px}.card-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}.result-box{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:14px;text-align:center}.result-val{font-size:22px;font-weight:700;color:#16a34a}.result-lbl{font-size:11px;color:#666;margin-top:4px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}@media(max-width:640px){.grid3{grid-template-columns:1fr}}label{font-size:11px;color:#888;display:block;margin-bottom:4px}input,select{width:100%;background:#111;border:1px solid #333;color:#fff;padding:9px 12px;border-radius:6px;font-size:13px}input:focus,select:focus{outline:none;border-color:#16a34a}.btn{padding:9px 20px;background:#16a34a;border:none;border-radius:6px;color:#fff;font-size:13px;cursor:pointer;margin-right:8px}.btn-del{background:transparent;border:none;color:#555;cursor:pointer;font-size:13px}.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}.s-pending{background:#1a1a2e;color:#818cf8}.s-testing{background:#2e2510;color:#fbbf24}.s-pass{background:#0d2818;color:#4ade80}.s-fail{background:#3b1f1f;color:#f87171}.s-na{background:#222;color:#555}table{width:100%;border-collapse:collapse}th{font-size:11px;color:#555;padding:8px;border-bottom:1px solid #222;text-align:left}td{font-size:12px;padding:8px;border-bottom:1px solid #1a1a1a;color:#ccc;vertical-align:top}.prog-bar{height:6px;background:#222;border-radius:3px;overflow:hidden;margin-top:6px}.prog-fill{height:100%;border-radius:3px}</style></head><body><h1>Commissioning Log</h1><div class="sub">Building systems commissioning — testing, verification, and deficiency tracking</div><div class="result-grid" id="summary"></div><div class="card"><div class="card-title">Add Commissioning Item</div><div class="grid3" style="margin-bottom:12px"><div><label>System</label><input id="c-sys" placeholder="AHU-1 — Main Air Handling Unit"></div><div><label>Category</label><select id="c-cat"><option>Mechanical / HVAC</option><option>Electrical / Lighting</option><option>Plumbing</option><option>Fire Alarm</option><option>Access Control</option><option>Building Automation</option><option>Elevators</option><option>Envelope</option></select></div><div><label>Status</label><select id="c-stat"><option value="pending">Pending</option><option value="testing">Testing</option><option value="pass">Pass</option><option value="fail">Fail</option><option value="na">N/A</option></select></div><div><label>Test Date</label><input type="date" id="c-date"></div><div><label>Technician</label><input id="c-tech" placeholder="Val / Cx Agent"></div><div><label>Design Value</label><input id="c-design" placeholder="12,500 CFM"></div><div><label>Measured Value</label><input id="c-meas" placeholder="12,250 CFM"></div><div><label>Deficiency</label><input id="c-defic" placeholder="Drive VFD freq to +3Hz"></div><div><label>Resolution</label><input id="c-fix" placeholder="Adjusted — retest passed"></div></div><button class="btn" onclick="addItem()">Add Item</button></div><div class="card"><div class="card-title">Commissioning Register</div><table><thead><tr><th>System</th><th>Category</th><th>Status</th><th>Date</th><th>Technician</th><th>Design</th><th>Measured</th><th>Deficiency</th><th>Resolution</th><th></th></tr></thead><tbody id="tbody"></tbody></table></div><script>var C=JSON.parse(localStorage.getItem("cx-log")||"[]");if(!C.length){C=[{sys:"AHU-1 Supply Fan",cat:"Mechanical / HVAC",stat:"pass",date:"2025-06-10",tech:"Val",design:"12,500 CFM",meas:"12,350 CFM",defic:"",fix:""},{sys:"Chiller Plant Sequence",cat:"Building Automation",stat:"testing",date:"2025-06-12",tech:"BAS Sub",design:"Auto stage on load",meas:"Manual override only",defic:"Sequencing logic not loaded",fix:"Awaiting BAS programmer"},{sys:"Fire Alarm — L2 Devices",cat:"Fire Alarm",stat:"pass",date:"2025-06-08",tech:"Fire Tech Inc",design:"All devices per drawings",meas:"48/48 devices functional",defic:"",fix:""}];}function save(){localStorage.setItem("cx-log",JSON.stringify(C));}function v(id){return document.getElementById(id).value.trim();}function addItem(){var x={sys:v("c-sys"),cat:v("c-cat"),stat:v("c-stat"),date:v("c-date"),tech:v("c-tech"),design:v("c-design"),meas:v("c-meas"),defic:v("c-defic"),fix:v("c-fix")};if(!x.sys)return;C.push(x);save();render();["c-sys","c-date","c-tech","c-design","c-meas","c-defic","c-fix"].forEach(function(id){document.getElementById(id).value="";});}function del(i){C.splice(i,1);save();render();}function render(){var tb=document.getElementById("tbody");tb.innerHTML="";C.forEach(function(x,i){var scls={pending:"s-pending",testing:"s-testing",pass:"s-pass",fail:"s-fail",na:"s-na"}[x.stat]||"s-pending";tb.innerHTML+="<tr><td>"+x.sys+"</td><td>"+x.cat+"</td><td><span class=\"badge "+scls+"\">"+x.stat.toUpperCase()+"</span></td><td>"+x.date+"</td><td>"+x.tech+"</td><td style=\"color:#aaa\">"+x.design+"</td><td style=\"color:#fff\">"+x.meas+"</td><td style=\"color:"+(x.defic?"#f87171":"#555")+"\">"+( x.defic||"—")+"</td><td style=\"color:#16a34a;font-size:11px\">"+x.fix+"</td><td><button class=\"btn-del\" onclick=\"del("+i+")\">x</button></td></tr>";});var tot=C.length,pass=C.filter(function(x){return x.stat==="pass";}).length,fail=C.filter(function(x){return x.stat==="fail";}).length,pend=C.filter(function(x){return x.stat==="pending"||x.stat==="testing";}).length;var pct=Math.round(pass/(tot||1)*100);document.getElementById("summary").innerHTML="<div class=\"result-box\"><div class=\"result-val\">"+tot+"</div><div class=\"result-lbl\">Total Systems</div></div><div class=\"result-box\"><div class=\"result-val\">"+pass+"</div><div class=\"result-lbl\">Passed</div></div><div class=\"result-box\"><div class=\"result-val\" style=\"color:#f87171\">"+fail+"</div><div class=\"result-lbl\">Failed</div></div><div class=\"result-box\"><div class=\"result-val\" style=\"color:#fbbf24\">"+pend+"</div><div class=\"result-lbl\">Pending</div></div><div class=\"result-box\"><div class=\"result-val\">"+pct+"%</div><div class=\"result-lbl\">Pass Rate</div></div>";}render();</script></body></html>
