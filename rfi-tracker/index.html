<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RFI Tracker — XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:20px}.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:20px}.sum-box{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:14px;text-align:center}.sum-val{font-size:26px;font-weight:700}.sum-lbl{font-size:10px;color:#666;margin-top:3px}.card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:20px;margin-bottom:16px}.card-title{font-size:13px;font-weight:600;color:#ccc;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}label{font-size:11px;color:#888;display:block;margin-bottom:4px}input,select,textarea{width:100%;background:#111;border:1px solid #333;color:#fff;padding:9px 12px;border-radius:6px;font-size:13px;font-family:inherit}input:focus,select:focus,textarea:focus{outline:none;border-color:#16a34a}textarea{resize:vertical;min-height:50px}.btn{padding:9px 18px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;margin-top:12px}.btn-p{background:#16a34a;color:#fff}.btn-g{background:#222;border:1px solid #333;color:#ccc;margin-left:8px}.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}.search-bar,.flt{background:#1a1a1a;border:1px solid #333;color:#fff;padding:8px 12px;border-radius:6px;font-size:13px}.search-bar{flex:1;min-width:150px}.search-bar:focus,.flt:focus{outline:none;border-color:#16a34a}.tbl-wrap{overflow-x:auto}.tbl{width:100%;border-collapse:collapse;min-width:900px}.tbl th{font-size:11px;color:#555;text-align:left;padding:8px;border-bottom:1px solid #222;white-space:nowrap}.tbl td{font-size:12px;padding:8px;border-bottom:1px solid #1a1a1a;color:#ccc;vertical-align:top;max-width:250px}.tbl tr:hover td{background:#1e1e1e}.badge{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700}.b-open{background:#d9770622;color:#d97706}.b-answered{background:#16a34a22;color:#16a34a}.b-pending{background:#2563eb22;color:#60a5fa}.b-void{background:#33333366;color:#888}.del-btn{background:none;border:none;color:#666;cursor:pointer}</style></head><body><h1>RFI Tracker</h1><div class="sub">Request for Information log — track questions, responses, and schedule impact</div><div class="summary"><div class="sum-box"><div class="sum-val" id="s-total">0</div><div class="sum-lbl">Total</div></div><div class="sum-box"><div class="sum-val" id="s-open" style="color:#d97706">0</div><div class="sum-lbl">Open</div></div><div class="sum-box"><div class="sum-val" id="s-pending" style="color:#60a5fa">0</div><div class="sum-lbl">Pending</div></div><div class="sum-box"><div class="sum-val" id="s-answered" style="color:#16a34a">0</div><div class="sum-lbl">Answered</div></div><div class="sum-box"><div class="sum-val" id="s-overdue" style="color:#dc2626">0</div><div class="sum-lbl">Overdue</div></div></div><div class="card"><div class="card-title">New RFI</div><div class="grid"><div><label>Subject</label><input id="r-subj" placeholder="e.g. Column footing depth at grid B3"></div><div><label>Spec / Drawing Ref</label><input id="r-ref" placeholder="e.g. S-102, Grid B3"></div><div><label>Submitted By</label><input id="r-by" placeholder="e.g. GC / Sub"></div><div><label>Directed To</label><input id="r-to" placeholder="e.g. Structural Engineer"></div><div><label>Date Submitted</label><input id="r-date" type="date"></div><div><label>Required Response By</label><input id="r-req" type="date"></div><div><label>Priority</label><select id="r-prio"><option value="hi">High — Schedule Impact</option><option value="med" selected>Medium</option><option value="lo">Low</option></select></div><div><label>Status</label><select id="r-status"><option value="open">Open</option><option value="pending">Pending Response</option><option value="answered">Answered</option><option value="void">Void</option></select></div></div><div style="margin-top:12px"><label>Question</label><textarea id="r-q" placeholder="Describe the request for information..."></textarea></div><div style="margin-top:8px"><label>Response / Answer</label><textarea id="r-a" placeholder="Leave blank until answered..."></textarea></div><button class="btn btn-p" onclick="addRFI()">Add RFI</button><button class="btn btn-g" onclick="exportCSV()">Export CSV</button></div><div class="toolbar"><input class="search-bar" id="search" placeholder="Search RFIs..." oninput="render()"><select class="flt" id="f-status" onchange="render()"><option value="">All Status</option><option value="open">Open</option><option value="pending">Pending</option><option value="answered">Answered</option><option value="void">Void</option></select></div><div class="card"><div class="tbl-wrap"><table class="tbl"><thead><tr><th>RFI #</th><th>Subject</th><th>Ref</th><th>From</th><th>To</th><th>Date</th><th>Req By</th><th>Question</th><th>Response</th><th>Status</th><th></th></tr></thead><tbody id="tb"></tbody></table></div></div><script>var R=JSON.parse(localStorage.getItem("rfi")||"[]");var nextId=R.length?Math.max.apply(null,R.map(function(x){return x.id;}))+1:1;function save(){localStorage.setItem("rfi",JSON.stringify(R));}var stLabel={open:"Open",pending:"Pending",answered:"Answered",void:"Void"};var stCls={open:"b-open",pending:"b-pending",answered:"b-answered",void:"b-void"};function addRFI(){var subj=document.getElementById("r-subj").value.trim();var ref=document.getElementById("r-ref").value.trim();var by=document.getElementById("r-by").value.trim();var to=document.getElementById("r-to").value.trim();var date=document.getElementById("r-date").value||new Date().toISOString().slice(0,10);var req=document.getElementById("r-req").value;var prio=document.getElementById("r-prio").value;var status=document.getElementById("r-status").value;var q=document.getElementById("r-q").value.trim();var a=document.getElementById("r-a").value.trim();if(!subj||!q)return;R.push({id:nextId++,subj,ref,by,to,date,req,prio,status,q,a});save();render();["r-subj","r-ref","r-by","r-to","r-date","r-req","r-q","r-a"].forEach(function(id){document.getElementById(id).value="";});}function del(i){R.splice(i,1);save();render();}function setStatus(i,val){R[i].status=val;save();render();}function render(){var q=document.getElementById("search").value.toLowerCase();var fs=document.getElementById("f-status").value;var rows=R.filter(function(x){var m=!q||(x.subj+x.ref+x.by+x.to+x.q).toLowerCase().includes(q);var sm=!fs||x.status===fs;return m&&sm;});var now=new Date();var overdue=R.filter(function(x){return x.req&&new Date(x.req)<now&&x.status!=="answered"&&x.status!=="void";}).length;document.getElementById("s-total").textContent=R.length;document.getElementById("s-open").textContent=R.filter(function(x){return x.status==="open";}).length;document.getElementById("s-pending").textContent=R.filter(function(x){return x.status==="pending";}).length;document.getElementById("s-answered").textContent=R.filter(function(x){return x.status==="answered";}).length;document.getElementById("s-overdue").textContent=overdue;var tb=document.getElementById("tb");tb.innerHTML="";rows.forEach(function(x){var idx=R.indexOf(x);var sc=stCls[x.status]||"b-open";var od=x.req&&new Date(x.req)<now&&x.status!=="answered"&&x.status!=="void";tb.innerHTML+="<tr"+(od?" style=\"background:#3b1f1f22\"":"")+">";tb.innerHTML+="<td>RFI-"+String(x.id).padStart(3,"0")+"</td><td>"+x.subj+"</td><td>"+(x.ref||"-")+"</td><td>"+(x.by||"-")+"</td><td>"+(x.to||"-")+"</td><td>"+x.date+"</td>";tb.innerHTML+="<td style=\"color:"+(od?"#dc2626":"#ccc")+"\">"+(x.req||"-")+"</td>";tb.innerHTML+="<td style=\"max-width:200px\">"+x.q+"</td><td style=\"max-width:200px;color:"+(x.a?"#16a34a":"#555")+"\">"+(x.a||"Awaiting response")+"</td>";tb.innerHTML+="<td><select style=\"background:#111;border:1px solid #333;color:#fff;padding:4px;border-radius:4px;font-size:11px\" onchange=\"setStatus("+idx+",this.value)\">";["open","pending","answered","void"].forEach(function(opt){tb.innerHTML+="<option value=\""+opt+"\""+(x.status===opt?" selected":"")+">"+stLabel[opt]+"</option>";});tb.innerHTML+="</select></td><td><button class=\"del-btn\" onclick=\"del("+idx+")\">x</button></td></tr>";});}function exportCSV(){var rows=[["RFI#","Subject","Ref","From","To","Date","Req By","Question","Response","Status"]];R.forEach(function(x){rows.push(["RFI-"+String(x.id).padStart(3,"0"),x.subj,x.ref,x.by,x.to,x.date,x.req,x.q,x.a,stLabel[x.status]]);});var csv=rows.map(function(r){return r.map(function(c){return "\""+String(c||"").replace(/"/g,"\"\"")+"\"";}).join(",");}).join("\n");var a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="rfi-log.csv";a.click();}if(R.length===0){R=[{id:1,subj:"Column footing depth at Grid B3 conflicts with MEP trench",ref:"S-102, M-201",by:"General Contractor",to:"Structural Engineer",date:"2026-04-15",req:"2026-04-22",prio:"hi",status:"answered",q:"Structural drawings show footing at -1.5m but MEP shows drain trench at -1.2m at same location. Confirm resolution.",a:"Footing to be deepened to -1.8m. Issue revised drawing S-102 Rev.2. No schedule impact."},{id:2,subj:"Exterior cladding color at north elevation — spec vs rendering conflict",ref:"A-301, Spec 09 7600",by:"Cladding Sub",to:"Architect",date:"2026-04-28",req:"2026-05-05",prio:"med",status:"open",q:"Spec section 09 7600 calls for RAL 9006 White Aluminum but elevation rendering shows darker tone. Please confirm correct color.",a:""},{id:3,subj:"Fire damper required at ductwork penetration Grid D7",ref:"M-301, FA-101",by:"HVAC Sub",to:"MEP Engineer",date:"2026-05-01",req:"2026-05-08",prio:"hi",status:"pending",q:"No fire damper shown on mechanical drawings at 2-hour rated wall penetration at Grid D7. Building code requires FD. Confirm requirement and spec.",a:""}];nextId=4;save();}render();</script></body></html>
