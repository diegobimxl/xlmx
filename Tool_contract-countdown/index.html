<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contract Countdown — XLMX</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fff;color:#111;line-height:1.6}
a{color:#111;text-decoration:none}
header{display:flex;align-items:center;justify-content:space-between;padding:20px 32px;border-bottom:1px solid #e5e5e5}
.logo{font-size:28px;font-weight:800;letter-spacing:2px}
.logo span{font-weight:300;font-size:14px;margin-left:8px;color:#666}
.back{font-size:13px;color:#666}.back:hover{color:#111}
.hero{max-width:720px;margin:60px auto 40px;padding:0 32px;text-align:center}
.hero h1{font-size:32px;font-weight:800;letter-spacing:1px;margin-bottom:12px}
.hero p{font-size:15px;color:#444;max-width:560px;margin:0 auto}
.badge{display:inline-block;font-size:10px;font-weight:600;background:#f5f5f5;color:#555;padding:3px 10px;border-radius:3px;margin-top:12px;letter-spacing:0.5px}
.app{max-width:720px;margin:0 auto;padding:0 32px 80px}
.add-form{border:1px solid #e5e5e5;border-radius:8px;overflow:hidden;margin-bottom:24px}
.form-header{background:#f5f5f5;padding:10px 16px;font-size:13px;font-weight:600;border-bottom:1px solid #e5e5e5}
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;padding:16px}
@media(max-width:550px){.form-grid{grid-template-columns:1fr 1fr}}
.form-field label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px}
.form-field input,.form-field select{width:100%;padding:7px 10px;border:1px solid #e5e5e5;border-radius:4px;font-size:13px;font-family:inherit}
.form-actions{padding:0 16px 16px;display:flex;gap:10px}
.btn{padding:9px 20px;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.btn-primary{background:#111;color:#fff}.btn-primary:hover{background:#333}
.btn-secondary{background:#f5f5f5;color:#111;border:1px solid #e5e5e5}
.contract-list{display:flex;flex-direction:column;gap:12px}
.contract-card{border:1px solid #e5e5e5;border-radius:8px;overflow:hidden}
.contract-card.urgent{border-left:4px solid #c62828}
.contract-card.warning{border-left:4px solid #e65100}
.contract-card.ok{border-left:4px solid #2e7d32}
.contract-card.expired{border-left:4px solid #bbb;opacity:.7}
.cc-top{padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.cc-name{font-size:15px;font-weight:700}
.cc-client{font-size:12px;color:#888;margin-top:2px}
.cc-right{text-align:right;flex-shrink:0}
.cc-days{font-size:28px;font-weight:800;line-height:1}
.cc-days.red{color:#c62828}
.cc-days.orange{color:#e65100}
.cc-days.green{color:#2e7d32}
.cc-days-label{font-size:11px;color:#888}
.cc-bar{height:6px;background:#f0f0f0}
.cc-progress{height:100%;background:#111;transition:width .3s}
.cc-progress.red{background:#c62828}
.cc-progress.orange{background:#e65100}
.cc-progress.green{background:#2e7d32}
.cc-footer{padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #f0f0f0;gap:10px;flex-wrap:wrap}
.cc-dates{font-size:11px;color:#888}
.cc-actions{display:flex;gap:8px}
.action-btn{font-size:11px;background:none;border:1px solid #e5e5e5;padding:4px 10px;border-radius:3px;cursor:pointer;color:#555}
.action-btn:hover{background:#f5f5f5}
.action-btn.del:hover{background:#ffebee;color:#c62828;border-color:#ffcdd2}
.renewal-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:3px}
.rt-open{background:#fff3e0;color:#e65100}
.rt-auto{background:#ffebee;color:#c62828}
.rt-manual{background:#e8f5e9;color:#1b5e20}
.empty-state{text-align:center;padding:40px;color:#888;font-size:14px;border:1px dashed #e5e5e5;border-radius:8px}
.footer-bar{position:fixed;bottom:0;left:0;right:0;background:#111;color:#fff;display:flex;justify-content:space-between;align-items:center;padding:10px 32px;font-size:13px}
.footer-bar a{color:#111;background:#fff;padding:6px 16px;border-radius:4px;font-size:12px;font-weight:600}
</style>
</head>
<body>
<header>
<div class="logo">XLMX<span>Data Systems</span></div>
<a href="../" class="back">← All Tools</a>
</header>
<div class="hero">
<h1>Contract Countdown</h1>
<p>Track contract end dates, renewal windows, and auto-renewal traps. Get a copy-paste email when it's time to act.</p>
<div class="badge">FREE TOOL</div>
</div>
<div class="app">
<div class="add-form">
<div class="form-header">Add Contract</div>
<div class="form-grid">
<div class="form-field"><label>Contract / Project</label><input type="text" id="cName" placeholder="e.g. Adobe CC Subscription"></div>
<div class="form-field"><label>Client / Vendor</label><input type="text" id="cClient" placeholder="e.g. Adobe Inc."></div>
<div class="form-field"><label>Renewal type</label>
<select id="cRenewal"><option value="auto">Auto-renews</option><option value="manual">Manual renewal</option><option value="open">Open-ended</option></select>
</div>
<div class="form-field"><label>Start date</label><input type="date" id="cStart"></div>
<div class="form-field"><label>End / Renewal date</label><input type="date" id="cEnd"></div>
<div class="form-field"><label>Notice required (days)</label><input type="number" id="cNotice" value="30"></div>
</div>
<div class="form-actions">
<button class="btn btn-primary" onclick="addContract()">Add Contract</button>
<button class="btn btn-secondary" onclick="loadSamples()">Load Examples</button>
</div>
</div>
<div class="contract-list" id="contractList">
<div class="empty-state">No contracts yet. Add one above or load examples.</div>
</div>
</div>
<div class="footer-bar"><span>XLMX — Data Systems</span><a href="mailto:info@bimxl.com">Contact</a></div>
<script>
let contracts=[];
const today=new Date();today.setHours(0,0,0,0);
function daysUntil(dateStr){const d=new Date(dateStr);d.setHours(0,0,0,0);return Math.round((d-today)/(1000*60*60*24));}
function fmt(dateStr){return new Date(dateStr).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function addContract(){
  const name=document.getElementById('cName').value.trim();
  const client=document.getElementById('cClient').value.trim();
  const renewal=document.getElementById('cRenewal').value;
  const start=document.getElementById('cStart').value;
  const end=document.getElementById('cEnd').value;
  const notice=parseInt(document.getElementById('cNotice').value)||30;
  if(!name||!end){alert('Contract name and end date required.');return;}
  contracts.push({id:Date.now(),name,client,renewal,start,end,notice});
  document.getElementById('cName').value='';
  document.getElementById('cClient').value='';
  renderContracts();
}
function loadSamples(){
  const d=(n)=>{const x=new Date();x.setDate(x.getDate()+n);return x.toISOString().split('T')[0];};
  contracts=[
    {id:1,name:'Adobe Creative Cloud',client:'Adobe Inc.',renewal:'auto',start:d(-180),end:d(15),notice:30},
    {id:2,name:'Office 365 Business',client:'Microsoft',renewal:'auto',start:d(-350),end:d(45),notice:60},
    {id:3,name:'HW BIM Services Agreement',client:'Hoefer Welker',renewal:'manual',start:d(-60),end:d(120),notice:45},
    {id:4,name:'Airtable Pro',client:'Airtable',renewal:'auto',start:d(-200),end:d(-10),notice:30},
    {id:5,name:'ACC Enterprise License',client:'Autodesk',renewal:'manual',start:d(-90),end:d(220),notice:90},
  ];
  renderContracts();
}
function removeContract(id){contracts=contracts.filter(c=>c.id!==id);renderContracts();}
function copyReminder(id){
  const c=contracts.find(x=>x.id===id);
  if(!c)return;
  const days=daysUntil(c.end);
  const txt=`Subject: ${c.name} — Renewal Notice\n\nHi,\n\nThis is a reminder that the ${c.name} agreement with ${c.client||'[party]'} ${days>0?'expires in '+days+' days on '+fmt(c.end):'expired on '+fmt(c.end)}.\n\nRenewal type: ${c.renewal}. Required notice: ${c.notice} days.\n\nPlease confirm next steps.\n\nBest regards`;
  navigator.clipboard.writeText(txt).then(()=>alert('Reminder email copied to clipboard.')).catch(()=>alert(txt));
}
function renderContracts(){
  const el=document.getElementById('contractList');
  if(!contracts.length){el.innerHTML='<div class="empty-state">No contracts yet. Add one above or load examples.</div>';return;}
  const sorted=[...contracts].sort((a,b)=>daysUntil(a.end)-daysUntil(b.end));
  el.innerHTML='';
  sorted.forEach(c=>{
    const days=daysUntil(c.end);
    const noticeAlert=days<=c.notice;
    const statusClass=days<0?'expired':days<=c.notice?'urgent':days<=c.notice*2?'warning':'ok';
    const daysClass=days<0?'red':days<=c.notice?'red':days<=c.notice*2?'orange':'green';
    const totalDays=c.start?Math.max(1,Math.round((new Date(c.end)-new Date(c.start))/(1000*60*60*24))):365;
    const elapsed=Math.max(0,totalDays-Math.max(0,days));
    const pct=Math.min(100,Math.round(elapsed/totalDays*100));
    const rtCls=c.renewal==='auto'?'rt-auto':c.renewal==='manual'?'rt-manual':'rt-open';
    const rtLabel=c.renewal==='auto'?'Auto-renews':c.renewal==='manual'?'Manual renewal':'Open-ended';
    const daysLabel=days<0?'days expired':days===0?'expires today':'days left';
    const daysVal=days<0?Math.abs(days):days;
    const div=document.createElement('div');
    div.className='contract-card '+statusClass;
    div.innerHTML=`<div class="cc-top">
      <div><div class="cc-name">${c.name}</div><div class="cc-client">${c.client||'—'}</div>
      ${noticeAlert&&days>0?'<div style="font-size:11px;color:#c62828;margin-top:4px;font-weight:600">Notice window is open — act now</div>':''}</div>
      <div class="cc-right"><div class="cc-days ${daysClass}">${daysVal}</div><div class="cc-days-label">${daysLabel}</div></div>
    </div>
    <div class="cc-bar"><div class="cc-progress ${daysClass}" style="width:${pct}%"></div></div>
    <div class="cc-footer">
      <div>
        <span class="renewal-tag ${rtCls}">${rtLabel}</span>
        <span class="cc-dates" style="margin-left:8px">${c.start?fmt(c.start)+' → ':''} ${fmt(c.end)} · ${c.notice}d notice</span>
      </div>
      <div class="cc-actions">
        <button class="action-btn" onclick="copyReminder(${c.id})">Copy reminder</button>
        <button class="action-btn del" onclick="removeContract(${c.id})">Remove</button>
      </div>
    </div>`;
    el.appendChild(div);
  });
}
const defaultEnd=new Date();defaultEnd.setMonth(defaultEnd.getMonth()+3);
document.getElementById('cEnd').value=defaultEnd.toISOString().split('T')[0];
document.getElementById('cStart').value=new Date().toISOString().split('T')[0];
renderContracts();
</script>
</body>
</html>
