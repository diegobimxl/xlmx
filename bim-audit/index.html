<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BIM Model Audit — XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:24px}.card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:20px;margin-bottom:16px}.card-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}.result-box{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:14px;text-align:center}.result-val{font-size:22px;font-weight:700;color:#16a34a}.result-lbl{font-size:11px;color:#666;margin-top:4px}.prog-bar{height:8px;background:#222;border-radius:4px;overflow:hidden;margin-top:8px}.prog-fill{height:100%;border-radius:4px;transition:width .4s}.section-head{font-size:13px;font-weight:600;color:#fff;margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid #222;display:flex;justify-content:space-between;align-items:center}.s-count{font-size:11px;color:#888;font-weight:400}.check-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #111}.chk{width:18px;height:18px;border-radius:4px;border:1px solid #333;background:#111;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px}.chk.done{background:#16a34a;border-color:#16a34a}.chk.fail{background:#7f1d1d;border-color:#ef4444}.item-col{flex:1}.item-text{font-size:13px;color:#bbb}.item-text.done{color:#555;text-decoration:line-through}.item-note{font-size:11px;color:#555;margin-top:2px}.item-sev{font-size:10px;padding:1px 6px;border-radius:4px;display:inline-block;margin-top:3px}.sev-c{background:#3b1f1f;color:#f87171}.sev-m{background:#2e2510;color:#fbbf24}.sev-l{background:#1a1a2e;color:#818cf8}.btn-group{display:flex;gap:4px;margin-left:auto;flex-shrink:0}.sg-btn{font-size:10px;background:transparent;border:1px solid #333;border-radius:4px;padding:2px 6px;cursor:pointer;color:#555}.sg-btn.pass{border-color:#16a34a;color:#16a34a}.sg-btn.fail{border-color:#ef4444;color:#ef4444}</style></head><body><h1>BIM Model Audit</h1><div class="sub">ISO 19650 compliance and model quality checklist — pre-coordination and milestone QC</div><div class="result-grid" id="summary"></div><div id="checklist"></div><script>var sections=[{title:"File Naming and CDE",sev:"c",items:[{t:"Files named per BIM Execution Plan (BEP) naming convention",n:"ISO 19650-2 Annex A",sev:"c"},{t:"Model files uploaded to correct ACC / CDE folder",n:"",sev:"c"},{t:"Revision codes and suitability codes applied correctly",n:"S2 shared, S3 published",sev:"c"},{t:"Superseded files archived — not deleted",n:"",sev:"m"}]},{title:"Model Origin and Coordinates",sev:"c",items:[{t:"Shared coordinates linked across all disciplines",n:"Survey Point and Project Base Point aligned",sev:"c"},{t:"Model origin at (0,0,0) or agreed project origin",n:"",sev:"c"},{t:"North orientation matches site drawings",n:"",sev:"m"},{t:"Units set correctly (Imperial or SI per BEP)",n:"",sev:"c"}]},{title:"Element Worksets and Categories",sev:"m",items:[{t:"All elements assigned to correct Revit worksets",n:"No elements on default worksets",sev:"m"},{t:"Linked models on dedicated link worksets",n:"",sev:"m"},{t:"No elements on shared levels or grids workset",n:"",sev:"l"},{t:"Rooms and spaces placed and bounded correctly",n:"",sev:"m"}]},{title:"LOD Compliance",sev:"m",items:[{t:"LOD matches project phase per BEP milestone",n:"LOD 350 required at CD",sev:"c"},{t:"Generic families replaced with project-specific families",n:"",sev:"m"},{t:"Manufacturer families reviewed — no excessive geometry",n:"Avoid high-poly families in coordination model",sev:"l"},{t:"All elements have required shared parameters populated",n:"Type Mark, OmniClass, UniFormat",sev:"m"}]},{title:"Clash and Coordination",sev:"c",items:[{t:"Model exported and clash-tested in Navisworks or ACC",n:"",sev:"c"},{t:"All Hard clashes resolved or documented with disposition",n:"",sev:"c"},{t:"Clash report delivered to project team",n:"",sev:"m"},{t:"MEP clearance zones modeled (pipe insulation, duct flanges)",n:"",sev:"m"}]},{title:"Sheets and Views",sev:"l",items:[{t:"All sheets have correct sheet number, title, and date",n:"",sev:"m"},{t:"Views are on correct sheets — no duplicate views",n:"",sev:"l"},{t:"Revision history up to date on title block",n:"",sev:"m"},{t:"Schedules match model data — no manually edited cells",n:"",sev:"m"}]}];var state=JSON.parse(localStorage.getItem("bim-audit")||"{}");function save(){localStorage.setItem("bim-audit",JSON.stringify(state));}function toggle(key,val){state[key]=state[key]===val?"":val;save();render();}function render(){var tot=0,pass=0,fail=0;sections.forEach(function(s){s.items.forEach(function(it){tot++;var k=s.title+it.t;if(state[k]==="pass")pass++;if(state[k]==="fail")fail++;});});var pct=Math.round((pass+fail)/tot*100);document.getElementById("summary").innerHTML="<div class=\"result-box\"><div class=\"result-val\">"+tot+"</div><div class=\"result-lbl\">Total Checks</div></div><div class=\"result-box\"><div class=\"result-val\">"+pass+"</div><div class=\"result-lbl\">Pass</div></div><div class=\"result-box\"><div class=\"result-val\" style=\"color:#f87171\">"+fail+"</div><div class=\"result-lbl\">Fail</div></div><div class=\"result-box\"><div class=\"result-val\">"+pct+"%</div><div class=\"result-lbl\">Reviewed</div></div><div class=\"result-box\"><div class=\"result-val\">"+Math.round(pass/(pass+fail||1)*100)+"%</div><div class=\"result-lbl\">Pass Rate</div></div>";var cl=document.getElementById("checklist");cl.innerHTML="";sections.forEach(function(s){var sPass=s.items.filter(function(it){return state[s.title+it.t]==="pass";}).length;var sFail=s.items.filter(function(it){return state[s.title+it.t]==="fail";}).length;var sh=document.createElement("div");sh.className="section-head";sh.innerHTML=s.title+"<span class=\"s-count\">"+sPass+" pass / "+sFail+" fail</span>";cl.appendChild(sh);var card=document.createElement("div");card.className="card";s.items.forEach(function(it){var k=s.title+it.t;var isPass=state[k]==="pass";var isFail=state[k]==="fail";var sevCls={c:"sev-c",m:"sev-m",l:"sev-l"}[it.sev]||"";var sevLbl={c:"Critical",m:"Major",l:"Minor"}[it.sev]||"";var row=document.createElement("div");row.className="check-item";var chkEl=document.createElement("div");chkEl.className="chk"+(isPass?" done":isFail?" fail":"");chkEl.innerHTML=isPass?"<svg width=10 height=8 viewBox=\"0 0 10 8\"><path d=\"M1 4l3 3 5-6\" stroke=\"#fff\" stroke-width=\"1.5\" fill=\"none\"/></svg>":isFail?"<svg width=10 height=10 viewBox=\"0 0 10 10\"><path d=\"M2 2l6 6M8 2l-6 6\" stroke=\"#fff\" stroke-width=\"1.5\" fill=\"none\"/></svg>":"";var itemCol=document.createElement("div");itemCol.className="item-col";var txt=document.createElement("div");txt.className="item-text"+(isPass?" done":"");txt.textContent=it.t;if(it.n){var note=document.createElement("div");note.className="item-note";note.textContent=it.n;itemCol.appendChild(txt);itemCol.appendChild(note);}else{itemCol.appendChild(txt);}var sTag=document.createElement("span");sTag.className="item-sev "+sevCls;sTag.textContent=sevLbl;itemCol.appendChild(sTag);var btns=document.createElement("div");btns.className="btn-group";var pb=document.createElement("button");pb.className="sg-btn"+(isPass?" pass":"");pb.textContent="Pass";pb.onclick=function(){toggle(k,"pass");};var fb=document.createElement("button");fb.className="sg-btn"+(isFail?" fail":"");fb.textContent="Fail";fb.onclick=function(){toggle(k,"fail");};btns.appendChild(pb);btns.appendChild(fb);row.appendChild(chkEl);row.appendChild(itemCol);row.appendChild(btns);card.appendChild(row);});cl.appendChild(card);});}render();</script></body></html>
