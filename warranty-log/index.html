<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Warranty Log — XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:20px}.card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:20px;margin-bottom:16px}.card-title{font-size:13px;font-weight:600;color:#ccc;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}label{font-size:11px;color:#888;display:block;margin-bottom:4px}input,select{width:100%;background:#111;border:1px solid #333;color:#fff;padding:9px 12px;border-radius:6px;font-size:13px}input:focus,select:focus{outline:none;border-color:#16a34a}.btn{padding:9px 18px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;margin-top:12px}.btn-p{background:#16a34a;color:#fff}.btn-g{background:#222;border:1px solid #333;color:#ccc;margin-left:8px}.tbl{width:100%;border-collapse:collapse;margin-top:12px}.tbl th{font-size:11px;color:#555;text-align:left;padding:8px;border-bottom:1px solid #222}.tbl td{font-size:12px;padding:8px;border-bottom:1px solid #1a1a1a;color:#ccc}.tbl tr:hover td{background:#1e1e1e}.badge{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700}.b-act{background:#16a34a22;color:#16a34a}.b-exp{background:#dc262622;color:#dc2626}.b-near{background:#d9770622;color:#d97706}.del-btn{background:none;border:none;color:#666;cursor:pointer;font-size:13px}.search-bar{width:100%;background:#1a1a1a;border:1px solid #333;color:#fff;padding:9px 12px;border-radius:6px;font-size:13px;margin-bottom:12px}.search-bar:focus{outline:none;border-color:#16a34a}</style></head><body><h1>Warranty Log</h1><div class="sub">Track warranties, vendors, and expiry dates by project</div><div class="card"><div class="card-title">Add Warranty</div><div class="grid"><div><label>Item / System</label><input id="w-item" placeholder="e.g. Roofing Membrane"></div><div><label>Vendor / Manufacturer</label><input id="w-vendor" placeholder="e.g. Carlisle SynTec"></div><div><label>Project</label><input id="w-proj" placeholder="e.g. Project Alpha Ph.2"></div><div><label>Start Date</label><input id="w-start" type="date"></div><div><label>End Date</label><input id="w-end" type="date"></div><div><label>Warranty Type</label><select id="w-type"><option>Full System</option><option>Labor</option><option>Materials</option><option>Equipment</option><option>Performance</option></select></div><div><label>Contact</label><input id="w-contact" placeholder="e.g. John Doe 555-1234"></div><div><label>Notes</label><input id="w-notes" placeholder="Optional notes"></div></div><button class="btn btn-p" onclick="addW()">Add Warranty</button><button class="btn btn-g" onclick="exportCSV()">Export CSV</button></div><input class="search-bar" id="search" placeholder="Search warranties..." oninput="render()"><div class="card"><div class="card-title">Warranty Register</div><table class="tbl"><thead><tr><th>Item</th><th>Vendor</th><th>Project</th><th>Type</th><th>Start</th><th>End</th><th>Days Left</th><th>Status</th><th>Contact</th><th></th></tr></thead><tbody id="tb"></tbody></table></div><script>var W=JSON.parse(localStorage.getItem("wl")||"[]");function save(){localStorage.setItem("wl",JSON.stringify(W));}function daysLeft(end){var e=new Date(end),now=new Date();now.setHours(0,0,0,0);return Math.round((e-now)/86400000);}function status(d){if(d<0)return{cls:"b-exp",txt:"EXPIRED"};if(d<=90)return{cls:"b-near",txt:"EXPIRING"};return{cls:"b-act",txt:"ACTIVE"};}function addW(){var item=document.getElementById("w-item").value.trim();var vendor=document.getElementById("w-vendor").value.trim();var proj=document.getElementById("w-proj").value.trim();var start=document.getElementById("w-start").value;var end=document.getElementById("w-end").value;var type=document.getElementById("w-type").value;var contact=document.getElementById("w-contact").value.trim();var notes=document.getElementById("w-notes").value.trim();if(!item||!end)return;W.push({item,vendor,proj,start,end,type,contact,notes});save();render();["w-item","w-vendor","w-proj","w-start","w-end","w-contact","w-notes"].forEach(function(id){document.getElementById(id).value="";});}function del(i){W.splice(i,1);save();render();}function render(){var q=document.getElementById("search").value.toLowerCase();var tb=document.getElementById("tb");tb.innerHTML="";var rows=W.filter(function(w){return !q||(w.item+w.vendor+w.proj+w.type).toLowerCase().includes(q);});rows.sort(function(a,b){return new Date(a.end)-new Date(b.end);});rows.forEach(function(w){var idx=W.indexOf(w);var dl=daysLeft(w.end);var st=status(dl);var dlTxt=dl<0?""+Math.abs(dl)+" ago":dl+" days";tb.innerHTML+="<tr><td>"+w.item+"</td><td>"+w.vendor+"</td><td>"+w.proj+"</td><td>"+w.type+"</td><td>"+(w.start||"-")+"</td><td>"+w.end+"</td><td>"+dlTxt+"</td><td><span class=\"badge "+st.cls+"\">"+st.txt+"</span></td><td>"+( w.contact||"-")+"</td><td><button class=\"del-btn\" onclick=\"del("+idx+")\">x</button></td></tr>";});}function exportCSV(){var rows=[["Item","Vendor","Project","Type","Start","End","Days Left","Status","Contact","Notes"]];W.forEach(function(w){var dl=daysLeft(w.end);rows.push([w.item,w.vendor,w.proj,w.type,w.start,w.end,dl,status(dl).txt,w.contact,w.notes]);});var csv=rows.map(function(r){return r.join(",");}).join("\n");var a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="warranty-log.csv";a.click();}if(W.length===0){var today=new Date();var y=today.getFullYear();W=[{item:"Roofing Membrane",vendor:"Carlisle SynTec",proj:"Project Alpha",start:y+"-01-15",end:(y+2)+"-01-15",type:"Full System",contact:"800-233-0551",notes:"20-year NDL"},{item:"HVAC Units",vendor:"Carrier Corp",proj:"Project Alpha",start:y+"-03-01",end:(y+1)+"-03-01",type:"Equipment",contact:"John Doe 555-2100",notes:"Includes parts and labor"},{item:"Glazing System",vendor:"Kawneer",proj:"Project Beta",start:y+"-06-01",end:(y+10)+"-06-01",type:"Performance",contact:"techsupport@kawneer.com",notes:"Condensation warranty"}];save();}render();</script></body></html>
