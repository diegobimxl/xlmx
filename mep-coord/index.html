<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MEP Coordination Log — XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:24px}.card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:20px;margin-bottom:16px}.card-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}@media(max-width:640px){.grid3{grid-template-columns:1fr}}.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}.result-box{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:14px;text-align:center}.result-val{font-size:22px;font-weight:700;color:#16a34a}.result-lbl{font-size:11px;color:#666;margin-top:4px}label{font-size:11px;color:#888;display:block;margin-bottom:4px}input,select{width:100%;background:#111;border:1px solid #333;color:#fff;padding:9px 12px;border-radius:6px;font-size:13px}input:focus,select:focus{outline:none;border-color:#16a34a}.btn{padding:9px 20px;background:#16a34a;border:none;border-radius:6px;color:#fff;font-size:13px;cursor:pointer;margin-right:8px}.btn-del{background:transparent;border:none;color:#555;cursor:pointer;font-size:13px}.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}.s-open{background:#3b1f1f;color:#f87171}.s-prog{background:#2e2510;color:#fbbf24}.s-res{background:#0d2818;color:#4ade80}.s-hold{background:#1a1a2e;color:#818cf8}.disc-m{background:#1c3a2e;color:#34d399}.disc-e{background:#1c2e3a;color:#60a5fa}.disc-p{background:#2e1a3a;color:#c084fc}.disc-fp{background:#3a1f1a;color:#fb923c}.disc-a{background:#222;color:#999}table{width:100%;border-collapse:collapse}th{font-size:11px;color:#555;padding:8px;border-bottom:1px solid #222;text-align:left}td{font-size:12px;padding:8px;border-bottom:1px solid #1a1a1a;color:#ccc;vertical-align:top}.fil{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}.fil select{width:auto;min-width:120px}</style></head><body><h1>MEP Coordination Log</h1><div class="sub">Multi-discipline coordination issues — track resolution across trades</div><div class="result-grid" id="summary"></div><div class="card"><div class="card-title">Add Coordination Issue</div><div class="grid3" style="margin-bottom:12px"><div><label>Issue ID</label><input id="i-id" placeholder="MEP-001"></div><div><label>Discipline</label><select id="i-disc"><option value="mech">Mechanical</option><option value="elec">Electrical</option><option value="plumb">Plumbing</option><option value="fp">Fire Protection</option><option value="arch">Architecture</option></select></div><div><label>Status</label><select id="i-stat"><option value="open">Open</option><option value="prog">In Progress</option><option value="res">Resolved</option><option value="hold">On Hold</option></select></div><div><label>Grid / Level</label><input id="i-loc" placeholder="D4 / L5 — Corridor"></div><div><label>Assigned To</label><input id="i-assign" placeholder="Val / MEP sub"></div><div><label>Due</label><input type="date" id="i-due"></div><div style="grid-column:1/-1"><label>Issue Description</label><input id="i-desc" placeholder="18-in main supply duct conflicts with W18x55 at grid D4 / L5"></div><div style="grid-column:1/-1"><label>Resolution</label><input id="i-res" placeholder="Reroute duct above beam — coordinate with structural for web opening"></div></div><button class="btn" onclick="addIssue()">Add Issue</button></div><div class="card"><div class="card-title">Coordination Issues</div><div class="fil"><select id="f-disc" onchange="render()"><option value="">All Disciplines</option><option value="mech">Mechanical</option><option value="elec">Electrical</option><option value="plumb">Plumbing</option><option value="fp">Fire Protection</option><option value="arch">Architecture</option></select><select id="f-stat" onchange="render()"><option value="">All Statuses</option><option value="open">Open</option><option value="prog">In Progress</option><option value="res">Resolved</option><option value="hold">On Hold</option></select></div><table><thead><tr><th>ID</th><th>Disc</th><th>Description</th><th>Location</th><th>Status</th><th>Assigned</th><th>Due</th><th>Resolution</th><th></th></tr></thead><tbody id="tbody"></tbody></table></div><script>var I=JSON.parse(localStorage.getItem("mep-coord")||"[]");if(!I.length){I=[{id:"MEP-001",disc:"mech",stat:"res",loc:"A3 / L4",assign:"Val",due:"2025-05-10",desc:"18-in supply duct conflicts with W18 beam at corridor",res:"Web opening approved by SE — duct passes through beam"},{id:"MEP-002",disc:"plumb",stat:"open",loc:"B1 / L2",assign:"MEP Sub",due:"2025-06-01",desc:"4-in sanitary waste conflicts with shear wall footing",res:""},{id:"MEP-003",disc:"elec",stat:"prog",loc:"C2 / L5",assign:"Team Arch",due:"2025-05-25",desc:"400A panel location violates 36-in working clearance per NEC 110.26",res:"Panel relocated 2 ft west — coord structural wall opening"}];}function save(){localStorage.setItem("mep-coord",JSON.stringify(I));}function v(id){return document.getElementById(id).value.trim();}function addIssue(){var x={id:v("i-id")||"MEP-"+String(I.length+1).padStart(3,"0"),disc:v("i-disc"),stat:v("i-stat"),loc:v("i-loc"),assign:v("i-assign"),due:v("i-due"),desc:v("i-desc"),res:v("i-res")};I.push(x);save();render();["i-id","i-loc","i-assign","i-due","i-desc","i-res"].forEach(function(id){document.getElementById(id).value="";});}function del(idx){I.splice(idx,1);save();render();}function discBadge(d){var m={mech:"disc-m",elec:"disc-e",plumb:"disc-p",fp:"disc-fp",arch:"disc-a"};var lbl={mech:"MECH",elec:"ELEC",plumb:"PLUMB",fp:"FP",arch:"ARCH"};return "<span class=\"badge "+(m[d]||"disc-a")+"\">"+(lbl[d]||d.toUpperCase())+"</span>";}function statBadge(s){var m={open:"s-open",prog:"s-prog",res:"s-res",hold:"s-hold"};return "<span class=\"badge "+(m[s]||"s-open")+"\">"+s.toUpperCase()+"</span>";}function render(){var fd=document.getElementById("f-disc").value;var fs=document.getElementById("f-stat").value;var rows=I.filter(function(x){return(!fd||x.disc===fd)&&(!fs||x.stat===fs);});var tb=document.getElementById("tbody");tb.innerHTML="";rows.forEach(function(x){var i=I.indexOf(x);var over=x.due&&new Date(x.due)<new Date()&&x.stat!=="res";tb.innerHTML+="<tr"+(over?" style=\"background:#3b1f1f22\"":"")+"><td style=\"font-weight:600;color:#fff\">"+x.id+"</td><td>"+discBadge(x.disc)+"</td><td>"+x.desc+"</td><td>"+x.loc+"</td><td>"+statBadge(x.stat)+"</td><td>"+x.assign+"</td><td style=\"color:"+(over?"#f87171":"#aaa")+"\">"+x.due+"</td><td style=\"color:#16a34a;font-size:11px\">"+x.res+"</td><td><button class=\"btn-del\" onclick=\"del("+i+")\">x</button></td></tr>";});var tot=I.length,open=I.filter(function(x){return x.stat==="open";}).length,res=I.filter(function(x){return x.stat==="res";}).length,prog=I.filter(function(x){return x.stat==="prog";}).length;document.getElementById("summary").innerHTML="<div class=\"result-box\"><div class=\"result-val\">"+tot+"</div><div class=\"result-lbl\">Total Issues</div></div><div class=\"result-box\"><div class=\"result-val\" style=\"color:#f87171\">"+open+"</div><div class=\"result-lbl\">Open</div></div><div class=\"result-box\"><div class=\"result-val\" style=\"color:#fbbf24\">"+prog+"</div><div class=\"result-lbl\">In Progress</div></div><div class=\"result-box\"><div class=\"result-val\">"+res+"</div><div class=\"result-lbl\">Resolved</div></div>";}render();</script></body></html>
