<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Subcontractor Evaluation — XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:24px}.card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:20px;margin-bottom:16px}.card-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:600px){.grid2{grid-template-columns:1fr}}label{font-size:11px;color:#888;display:block;margin-bottom:4px}input,select,textarea{width:100%;background:#111;border:1px solid #333;color:#fff;padding:9px 12px;border-radius:6px;font-size:13px;font-family:inherit}input:focus,select:focus{outline:none;border-color:#16a34a}.btn{padding:9px 20px;background:#16a34a;border:none;border-radius:6px;color:#fff;font-size:13px;cursor:pointer;margin-right:8px}.btn-del{background:transparent;border:none;color:#555;cursor:pointer}.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}.gr-a{background:#0d2818;color:#4ade80}.gr-b{background:#1c3a2a;color:#86efac}.gr-c{background:#2e2510;color:#fbbf24}.gr-d{background:#3b1f1f;color:#f87171}.gr-f{background:#7f1d1d;color:#fca5a5}.score-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}.score-label{font-size:12px;color:#aaa;flex:1}.score-val{font-size:13px;font-weight:700;color:#fff;min-width:28px;text-align:right}.score-bar{flex:2;height:6px;background:#222;border-radius:3px;overflow:hidden}.score-fill{height:100%;border-radius:3px}.sub-card{background:#111;border:1px solid #1e1e1e;border-radius:8px;padding:16px;margin-bottom:10px}.sub-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}.sub-name{font-size:14px;font-weight:700}.sub-trade{font-size:11px;color:#888;margin-top:2px}input[type=range]{accent-color:#16a34a;padding:0}</style></head><body><h1>Subcontractor Evaluation</h1><div class="sub">Performance scoring — quality, schedule, safety, and communication</div><div class="card"><div class="card-title">New Evaluation</div><div class="grid2" style="margin-bottom:12px"><div><label>Subcontractor Name</label><input id="s-name" placeholder="ABC Mechanical LLC"></div><div><label>Trade / Scope</label><input id="s-trade" placeholder="HVAC / Sheet Metal"></div><div><label>Project</label><input id="s-proj" placeholder="Mixed-Use Office Tower"></div><div><label>Evaluator</label><input id="s-eval" value="Diego Rodriguez"></div></div><div class="card-title">Scoring (1 = Poor, 5 = Excellent)</div><div id="criteria"></div><div style="margin-top:12px"><label>Comments</label><textarea id="s-notes" rows="2" placeholder="Overall good performance, minor schedule delays in weeks 3-4."></textarea></div><div style="margin-top:12px"><button class="btn" onclick="addEval()">Save Evaluation</button></div></div><div id="eval-list"></div><script>var criteria=["Quality of Work","Schedule Adherence","Safety Performance","Communication","Submittals / RFI Response","Site Cleanliness","Crew Competency","Change Order Management"];function buildCriteria(){var div=document.getElementById("criteria");div.innerHTML="";criteria.forEach(function(c,i){div.innerHTML+="<div class=\"score-row\"><div class=\"score-label\">"+c+"</div><input type=\"range\" id=\"cr-"+i+"\" min=\"1\" max=\"5\" value=\"3\" oninput=\"updateScore("+i+")\"><div class=\"score-val\" id=\"sv-"+i+"\">3</div></div>";});}function updateScore(i){document.getElementById("sv-"+i).textContent=document.getElementById("cr-"+i).value;}var E=JSON.parse(localStorage.getItem("subcon-evals")||"[]");if(!E.length){E=[{name:"XYZ Concrete",trade:"Concrete / Formwork",proj:"Project Alpha Tower",eval:"Diego Rodriguez",scores:[5,4,5,4,3,4,5,4],notes:"Excellent work on L3 slab. Minor rework on column caps.",date:"2025-04-20"},{name:"MEP Solutions",trade:"Mechanical / Plumbing",proj:"Project Alpha Tower",eval:"Val",scores:[3,2,4,3,2,3,3,2],notes:"Repeated submittal delays and change order disputes.",date:"2025-05-01"}];}function save(){localStorage.setItem("subcon-evals",JSON.stringify(E));}function grade(avg){if(avg>=4.5)return{cls:"gr-a",lbl:"A"};if(avg>=3.5)return{cls:"gr-b",lbl:"B"};if(avg>=2.5)return{cls:"gr-c",lbl:"C"};if(avg>=1.5)return{cls:"gr-d",lbl:"D"};return{cls:"gr-f",lbl:"F"};}function addEval(){var name=document.getElementById("s-name").value.trim();if(!name)return;var scores=criteria.map(function(_,i){return parseInt(document.getElementById("cr-"+i).value);});var x={name:name,trade:document.getElementById("s-trade").value,proj:document.getElementById("s-proj").value,eval:document.getElementById("s-eval").value,scores:scores,notes:document.getElementById("s-notes").value,date:new Date().toISOString().split("T")[0]};E.push(x);save();renderList();["s-name","s-trade","s-proj","s-notes"].forEach(function(id){document.getElementById(id).value="";});criteria.forEach(function(_,i){document.getElementById("cr-"+i).value=3;document.getElementById("sv-"+i).textContent="3";});}function renderList(){var div=document.getElementById("eval-list");div.innerHTML="";E.forEach(function(x,i){var avg=x.scores.reduce(function(a,b){return a+b;},0)/x.scores.length;var g=grade(avg);var bars=criteria.map(function(c,ci){var pct=(x.scores[ci]/5)*100;var col=x.scores[ci]>=4?"#16a34a":x.scores[ci]>=3?"#fbbf24":"#f87171";return "<div class=\"score-row\"><div class=\"score-label\">"+c+"</div><div class=\"score-bar\"><div class=\"score-fill\" style=\"width:"+pct+"%;background:"+col+"\"></div></div><div class=\"score-val\">"+x.scores[ci]+"</div></div>";}).join("");div.innerHTML+="<div class=\"sub-card\"><div class=\"sub-head\"><div><div class=\"sub-name\">"+x.name+"</div><div class=\"sub-trade\">"+x.trade+" — "+x.proj+"</div></div><div style=\"display:flex;gap:8px;align-items:center\"><span class=\"badge "+g.cls+"\">"+g.lbl+" ("+avg.toFixed(1)+")</span><span style=\"font-size:11px;color:#555\">"+x.date+"</span><button class=\"btn-del\" onclick=\"E.splice("+i+",1);save();renderList()\">x</button></div></div>"+bars+(x.notes?"<div style=\"font-size:11px;color:#888;margin-top:8px;padding-top:8px;border-top:1px solid #222\">"+x.notes+"</div>":"")+"</div>";});}buildCriteria();renderList();</script></body></html>
