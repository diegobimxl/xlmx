<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fire Egress Calculator — XLMX</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#111;color:#fff;font-family:Inter,system-ui,sans-serif;min-height:100vh;padding:20px}
h1{font-size:1.6rem;margin-bottom:4px}p.sub{color:#999;margin-bottom:20px;font-size:.85rem}
.card{background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:.8rem;margin-bottom:4px}
input,select{width:100%;padding:10px;background:#222;border:1px solid #444;border-radius:8px;color:#fff;font-size:.95rem;margin-bottom:12px}
button{width:100%;padding:12px;background:#16a34a;color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:600}
button:hover{background:#15803d}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.kpi{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
.kbox{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:14px;text-align:center}
.kbox .v{font-size:1.4rem;font-weight:700;color:#16a34a}.kbox .l{color:#aaa;font-size:.7rem;margin-top:4px}
.row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #222;font-size:.85rem}
.row span:first-child{color:#aaa}
.pass{color:#16a34a}.fail{color:#ef4444}
.badge{padding:2px 8px;border-radius:4px;font-size:.75rem;font-weight:600}
.badge.pass{background:#0a2a0a;color:#16a34a}.badge.fail{background:#2a0a0a;color:#ef4444}
.warn-box{background:#1a1000;border:1px solid #f59e0b33;border-radius:8px;padding:14px;margin-top:12px;font-size:.85rem;color:#f59e0b}
a.back{color:#16a34a;text-decoration:none;font-size:.85rem;display:inline-block;margin-bottom:16px}
@media(max-width:600px){.grid2,.kpi{grid-template-columns:1fr}}
</style></head><body>
<a class="back" href="/">← XLMX</a>
<h1>Fire Egress Calculator</h1>
<p class="sub">IBC occupant load, required exits, egress width, and travel distance — per IBC 2021</p>
<div class="card">
<div class="grid2">
<div><label>Occupancy Type</label>
<select id="occ">
<option value="A-1">A-1 Assembly — Fixed seating (theater)</option>
<option value="A-2">A-2 Assembly — Restaurant/Bar</option>
<option value="A-3">A-3 Assembly — Gym/worship/art gallery</option>
<option value="B">B Business — Office</option>
<option value="E">E Educational — Classroom</option>
<option value="F">F Factory</option>
<option value="H">H High Hazard</option>
<option value="I-1">I-1 Institutional — Assisted living</option>
<option value="M">M Mercantile — Retail</option>
<option value="R-1">R-1 Residential — Hotel</option>
<option value="R-2">R-2 Residential — Apartment</option>
<option value="S-1">S-1 Storage — Moderate hazard</option>
</select></div>
<div><label>Floor Area (m²)</label><input id="area" type="number" value="500" step="10"></div>
<div><label>Number of Stories</label><input id="stories" type="number" value="3" step="1"></div>
<div><label>Sprinklered?</label>
<select id="sprink"><option value="yes">Yes — NFPA 13</option><option value="no">No</option></select></div>
<div><label>Number of Exits Provided</label><input id="exits" type="number" value="2" step="1"></div>
<div><label>Exit Door Width (mm each)</label><input id="dw" type="number" value="900" step="50"></div>
</div>
<button onclick="calc()">Calculate Egress</button>
</div>
<div id="res" style="display:none">
<div class="kpi" id="kpi"></div>
<div class="card" id="details"></div>
</div>
<script>
// IBC occupant load factors (m² per person)
const OLF={'A-1':0.65,'A-2':1.4,'A-3':1.4,'B':9.3,'E':1.9,'F':9.3,'H':9.3,'I-1':11.1,'M':2.8,'R-1':18.6,'R-2':18.6,'S-1':46.5};
// Max travel distance (m) — sprinklered / non-sprinklered
const TRAVEL={'A-1':[61,46],'A-2':[61,46],'A-3':[61,46],'B':[61,46],'E':[61,46],'F':[76,46],'H':[30,23],'I-1':[61,46],'M':[61,46],'R-1':[61,46],'R-2':[61,46],'S-1':[76,46]};
const MIN_EXITS={'A-1':2,'A-2':2,'A-3':2,'B':2,'E':2,'F':2,'H':2,'I-1':2,'M':2,'R-1':2,'R-2':2,'S-1':2};
function calc(){
  const occ=document.getElementById('occ').value;
  const area=+document.getElementById('area').value;
  const stories=+document.getElementById('stories').value;
  const sprink=document.getElementById('sprink').value==='yes';
  const exits=+document.getElementById('exits').value;
  const dw=+document.getElementById('dw').value;
  const olf=OLF[occ]||9.3;
  const occupants=Math.ceil(area/olf);
  // Required exits
  let reqExits=2;if(occupants>500)reqExits=3;if(occupants>1000)reqExits=4;
  // Egress width: 7.6mm per occupant for doors
  const reqWidth=Math.ceil(occupants*7.6);
  const provWidth=exits*dw;
  const passWidth=provWidth>=reqWidth;
  const passExits=exits>=reqExits;
  const [tSpr,tNon]=TRAVEL[occ]||[61,46];
  const maxTravel=sprink?tSpr:tNon;
  document.getElementById('res').style.display='block';
  document.getElementById('kpi').innerHTML=
    `<div class="kbox"><div class="v">${occupants}</div><div class="l">Occupant Load (IBC)</div></div>`+
    `<div class="kbox"><div class="v">${reqExits}</div><div class="l">Exits Required</div></div>`;
  const det=document.getElementById('details');
  det.innerHTML=`<p style="color:#16a34a;font-weight:600;margin-bottom:12px">Egress Analysis — IBC 2021</p>`+
    `<div class="row"><span>Occupancy</span><span>${occ}</span></div>`+
    `<div class="row"><span>Floor area</span><span>${area} m²</span></div>`+
    `<div class="row"><span>Load factor</span><span>1 person / ${olf} m²</span></div>`+
    `<div class="row"><span>Occupant load</span><span>${occupants} persons</span></div>`+
    `<div class="row"><span>Exits required</span><span>${reqExits}</span></div>`+
    `<div class="row"><span>Exits provided</span><span class="${passExits?'pass':'fail'}">${exits} — ${passExits?'✓ OK':'✗ Insufficient'}</span></div>`+
    `<div class="row"><span>Min egress width required</span><span>${reqWidth} mm</span></div>`+
    `<div class="row"><span>Total egress width provided</span><span class="${passWidth?'pass':'fail'}">${provWidth} mm — ${passWidth?'✓ OK':'✗ Insufficient'}</span></div>`+
    `<div class="row"><span>Max travel distance (${sprink?'sprinklered':'non-sprinklered'})</span><span>${maxTravel} m</span></div>`+
    `<div class="row"><span>System</span><span>${sprink?'NFPA 13 Sprinklered':'Non-Sprinklered'}</span></div>`;
  if(!passExits||!passWidth){
    det.innerHTML+=`<div class="warn-box">⚠ Non-compliant: ${!passExits?`Add ${reqExits-exits} more exit(s). `:''}${!passWidth?`Increase total egress width by ${reqWidth-provWidth} mm.`:''}</div>`;
  }
}
calc();
</script></body></html>
