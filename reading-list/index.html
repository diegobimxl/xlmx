<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEC Reading List - XLMX</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#fff;font-family:'Inter',system-ui,sans-serif;min-height:100vh;padding:2rem}
.back{display:inline-block;color:#16a34a;text-decoration:none;font-size:.85rem;margin-bottom:2rem}
.back:hover{text-decoration:underline}
h1{font-size:1.8rem;font-weight:600;margin-bottom:.5rem}
.sub{color:#888;margin-bottom:2rem;font-size:.95rem}
.add-form{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:1.25rem;margin-bottom:1.5rem}
.add-form h2{font-size:.85rem;font-weight:600;color:#16a34a;margin-bottom:.75rem}
.form-row{display:flex;gap:.75rem;flex-wrap:wrap}
.form-row .f{flex:1;min-width:130px}
label{display:block;font-size:.73rem;color:#888;margin-bottom:.25rem}
input,select,textarea{width:100%;background:#111;border:1px solid #333;color:#fff;padding:.45rem .7rem;border-radius:5px;font-size:.82rem;font-family:inherit}
textarea{resize:vertical;min-height:55px}
input:focus,select:focus,textarea:focus{outline:none;border-color:#16a34a}
.btn{background:#16a34a;color:#fff;border:none;padding:.5rem 1.1rem;border-radius:6px;font-size:.82rem;cursor:pointer;font-family:inherit;font-weight:500;margin-top:.5rem}
.btn:hover{background:#15803d}
.filter-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.ftab{background:#1a1a1a;border:1px solid #333;color:#888;padding:.28rem .7rem;border-radius:5px;font-size:.75rem;cursor:pointer}
.ftab.active{background:#16a34a;border-color:#16a34a;color:#fff}
.book-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem}
.book{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:1.1rem;position:relative}
.book:hover{border-color:#444}
.book-title{font-size:.92rem;font-weight:600;margin-bottom:.2rem}
.book-author{font-size:.75rem;color:#16a34a;margin-bottom:.4rem}
.book-cat{font-size:.68rem;background:#16a34a22;color:#16a34a;padding:.1rem .4rem;border-radius:3px;display:inline-block;margin-bottom:.4rem}
.book-note{font-size:.78rem;color:#aaa;line-height:1.5;margin-bottom:.6rem}
.book-status{display:flex;gap:.35rem;align-items:center}
.status-dot{width:8px;height:8px;border-radius:50%}
.dot-read{background:#16a34a}
.dot-reading{background:#f59e0b}
.dot-want{background:#555}
.status-text{font-size:.72rem;color:#888}
.book-actions{margin-top:.6rem;display:flex;gap:.35rem}
.act{background:#222;border:1px solid #222;color:#666;padding:.2rem .55rem;border-radius:4px;font-size:.68rem;cursor:pointer}
.act:hover{color:#fff}
.act.del:hover{color:#ef4444}
.stars{color:#f59e0b;font-size:.82rem;margin-left:auto}
.stats{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.stat{background:#1a1a1a;border:1px solid #333;border-radius:7px;padding:.7rem 1rem;flex:1;min-width:90px;text-align:center}
.sv{font-size:1.3rem;font-weight:600;color:#16a34a}
.sl{font-size:.7rem;color:#888;margin-top:.15rem}
.empty{text-align:center;color:#555;padding:2.5rem;font-size:.88rem}
.search-input{flex:1;min-width:180px;background:#1a1a1a;border:1px solid #333;color:#fff;padding:.4rem .8rem;border-radius:5px;font-size:.82rem;font-family:inherit}
.search-input:focus{outline:none;border-color:#16a34a}
</style>
</head>
<body>
<a class="back" href="/">back XLMX</a>
<h1>AEC Reading List</h1>
<p class="sub">Track architecture, BIM, real estate, and design books and resources with notes and ratings.</p>

<div class="stats" id="statsRow"></div>

<div class="add-form">
  <h2>Add Book / Resource</h2>
  <div class="form-row">
    <div class="f"><label>Title</label><input type="text" id="bTitle" placeholder="e.g. Complexity and Contradiction in Architecture"></div>
    <div class="f"><label>Author</label><input type="text" id="bAuthor" placeholder="e.g. Robert Venturi"></div>
    <div class="f" style="max-width:140px"><label>Year</label><input type="number" id="bYear" value="2024"></div>
  </div>
  <div class="form-row" style="margin-top:.6rem">
    <div class="f">
      <label>Category</label>
      <select id="bCat"><option>Architecture Theory</option><option>BIM / Technology</option><option>Real Estate</option><option>Urban Design</option><option>Construction</option><option>Business</option><option>Design Process</option><option>History</option><option>Sustainability</option><option>Other</option></select>
    </div>
    <div class="f">
      <label>Status</label>
      <select id="bStatus"><option value="want">Want to Read</option><option value="reading">Currently Reading</option><option value="read">Read</option></select>
    </div>
    <div class="f" style="max-width:120px">
      <label>Rating (1-5)</label>
      <select id="bRating"><option value="0">—</option><option value="1">1 star</option><option value="2">2 stars</option><option value="3">3 stars</option><option value="4">4 stars</option><option value="5">5 stars</option></select>
    </div>
  </div>
  <div style="margin-top:.6rem"><label>Notes / Key Takeaway</label><textarea id="bNote" placeholder="Key concepts, why it matters, memorable quotes..."></textarea></div>
  <button class="btn" onclick="addBook()">Add to List</button>
</div>

<div class="filter-row">
  <input class="search-input" type="text" id="search" placeholder="Search..." oninput="render()">
  <div class="ftab active" onclick="setFilter('all',this)">All</div>
  <div class="ftab" onclick="setFilter('want',this)">Want to Read</div>
  <div class="ftab" onclick="setFilter('reading',this)">Reading</div>
  <div class="ftab" onclick="setFilter('read',this)">Read</div>
</div>

<div class="book-list" id="bookList"></div>

<script>
var books = [
  {id:1,title:'Complexity and Contradiction in Architecture',author:'Robert Venturi',year:1966,cat:'Architecture Theory',status:'read',rating:5,note:'The manifesto against pure modernism. Both/and vs either/or. Essential reading.'},
  {id:2,title:'Towards a New Architecture',author:'Le Corbusier',year:1923,cat:'Architecture Theory',status:'read',rating:5,note:'Machines for living. The 5 points. Purist polemic that shaped the 20th century.'},
  {id:3,title:'A Pattern Language',author:'Christopher Alexander',year:1977,cat:'Urban Design',status:'read',rating:5,note:'253 patterns for building at every scale. Still the most human book in the canon.'},
  {id:4,title:'The BIM Manager Handbook',author:'Dominik Holzer',year:2016,cat:'BIM / Technology',status:'read',rating:4,note:'Practical. Covers ISO 19650, EIR, BEP structure. Keep on desk.'},
  {id:5,title:'Real Estate Development - Principles and Process',author:'Miles / Berens / Weiss',year:2007,cat:'Real Estate',status:'want',rating:0,note:'Standard academic reference for development economics and process.'},
  {id:6,title:'How Buildings Learn',author:'Stewart Brand',year:1994,cat:'Architecture Theory',status:'read',rating:5,note:'Six layers of change. Shearing layers theory. Aging as design parameter.'},
  {id:7,title:'The Death and Life of Great American Cities',author:'Jane Jacobs',year:1961,cat:'Urban Design',status:'read',rating:5,note:'Mixed use, eyes on the street, short blocks. Urban planning common sense.'},
  {id:8,title:'Thinking Fast and Slow',author:'Daniel Kahneman',year:2011,cat:'Business',status:'read',rating:4,note:'System 1 vs System 2 thinking. Invaluable for client presentations and negotiations.'}
];
var nextId = 9;
var currentFilter = 'all';

function addBook(){
  var b={
    id:nextId++,
    title:document.getElementById('bTitle').value.trim()||'Untitled',
    author:document.getElementById('bAuthor').value.trim()||'',
    year:parseInt(document.getElementById('bYear').value)||0,
    cat:document.getElementById('bCat').value,
    status:document.getElementById('bStatus').value,
    rating:parseInt(document.getElementById('bRating').value)||0,
    note:document.getElementById('bNote').value.trim()
  };
  books.unshift(b); save(); render();
  document.getElementById('bTitle').value='';
  document.getElementById('bAuthor').value='';
  document.getElementById('bNote').value='';
}

function removeBook(id){books=books.filter(function(b){return b.id!==id;});save();render();}
function cycleStatus(id){
  var b=books.find(function(x){return x.id===id;});
  if(!b)return;
  var seq=['want','reading','read'];
  b.status=seq[(seq.indexOf(b.status)+1)%seq.length];
  save();render();
}

function setFilter(f,el){currentFilter=f;document.querySelectorAll('.ftab').forEach(function(t){t.classList.remove('active');});el.classList.add('active');render();}

function render(){
  var q=document.getElementById('search').value.toLowerCase();
  var filtered=books.filter(function(b){
    var st=currentFilter==='all'||b.status===currentFilter;
    var sq=!q||b.title.toLowerCase().includes(q)||b.author.toLowerCase().includes(q)||b.cat.toLowerCase().includes(q)||(b.note||'').toLowerCase().includes(q);
    return st&&sq;
  });

  var total=books.length,read=books.filter(function(b){return b.status==='read';}).length,reading=books.filter(function(b){return b.status==='reading';}).length;
  document.getElementById('statsRow').innerHTML=[['Total',total],['Read',read],['Reading',reading],['Want',total-read-reading]].map(function(s){return '<div class="stat"><div class="sv">'+s[1]+'</div><div class="sl">'+s[0]+'</div></div>';}).join('');

  if(!filtered.length){document.getElementById('bookList').innerHTML='<div class="empty">No books match.</div>';return;}
  document.getElementById('bookList').innerHTML=filtered.map(function(b){
    var dotClass=b.status==='read'?'dot-read':b.status==='reading'?'dot-reading':'dot-want';
    var statusLabel=b.status==='read'?'Read':b.status==='reading'?'Reading':'Want to Read';
    var stars=b.rating?Array(b.rating+1).join('&#9733;')+'<span style="color:#333">'+Array(6-b.rating).join('&#9733;')+'</span>':'';
    return '<div class="book">'
      +'<div class="book-title">'+esc(b.title)+'</div>'
      +'<div class="book-author">'+esc(b.author)+(b.year?' &mdash; '+b.year:'')+'</div>'
      +'<div class="book-cat">'+b.cat+'</div>'
      +(b.note?'<div class="book-note">'+esc(b.note)+'</div>':'')
      +'<div class="book-status"><span class="status-dot '+dotClass+'"></span><span class="status-text">'+statusLabel+'</span>'+(stars?'<span class="stars">'+stars+'</span>':'')+'</div>'
      +'<div class="book-actions"><button class="act" onclick="cycleStatus('+b.id+')">Change Status</button><button class="act del" onclick="removeBook('+b.id+')">Remove</button></div>'
      +'</div>';
  }).join('');
}

function esc(s){return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function save(){try{localStorage.setItem('xlmx_books',JSON.stringify(books));}catch(e){}}
function load(){try{var d=localStorage.getItem('xlmx_books');if(d){books=JSON.parse(d);nextId=Math.max.apply(null,books.map(function(b){return b.id;}))+1;}}catch(e){}}

load(); render();
</script>
</body>
</html>
