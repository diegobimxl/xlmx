<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Change Order Tracker — XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:20px}.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}.sum-box{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:14px;text-align:center}.sum-val{font-size:22px;font-weight:700}.sum-lbl{font-size:10px;color:#666;margin-top:3px}.card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:20px;margin-bottom:16px}.card-title{font-size:13px;font-weight:600;color:#ccc;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}label{font-size:11px;color:#888;display:block;margin-bottom:4px}input,select,textarea{width:100%;background:#111;border:1px solid #333;color:#fff;padding:9px 12px;border-radius:6px;font-size:13px;font-family:inherit}input:focus,select:focus,textarea:focus{outline:none;border-color:#16a34a}textarea{resize:vertical;min-height:50px}.btn{padding:9px 18px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;margin-top:12px}.btn-p{background:#16a34a;color:#fff}.btn-g{background:#222;border:1px solid #333;color:#ccc;margin-left:8px}.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}.search-bar,.flt{background:#1a1a1a;border:1px solid #333;color:#fff;padding:8px 12px;border-radius:6px;font-size:13px}.search-bar{flex:1;min-width:150px}.search-bar:focus,.flt:focus{outline:none;border-color:#16a34a}.tbl-wrap{overflow-x:auto}.tbl{width:100%;border-collapse:collapse;min-width:900px}.tbl th{font-size:11px;color:#555;text-align:left;padding:8px;border-bottom:1px solid #222;white-space:nowrap}.tbl td{font-size:12px;padding:8px;border-bottom:1px solid #1a1a1a;color:#ccc}.tbl tr:hover td{background:#1e1e1e}.badge{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700}.b-draft{background:#33333366;color:#888}.b-pending{background:#d9770622;color:#d97706}.b-approved{background:#16a34a22;color:#16a34a}.b-rejected{background:#dc262622;color:#dc2626}.del-btn{background:none;border:none;color:#666;cursor:pointer}.add-cost{color:#16a34a}.sub-cost{color:#dc2626}</style></head><body><h1>Change Order Tracker</h1><div class="sub">Track PCOs, COs, and contract value adjustments through approval</div><div class="summary"><div class="sum-box"><div class="sum-val" id="s-total">0</div><div class="sum-lbl">Total COs</div></div><div class="sum-box"><div class="sum-val" id="s-pending" style="color:#d97706">0</div><div class="sum-lbl">Pending</div></div><div class="sum-box"><div class="sum-val" id="s-approved" style="color:#16a34a">0</div><div class="sum-lbl">Approved</div></div><div class="sum-box"><div class="sum-val" id="s-contract" style="color:#60a5fa">$0</div><div class="sum-lbl">Original Contract</div></div><div class="sum-box"><div class="sum-val" id="s-approved-amt" style="color:#16a34a">$0</div><div class="sum-lbl">Approved Changes</div></div><div class="sum-box"><div class="sum-val" id="s-revised" style="color:#fff">$0</div><div class="sum-lbl">Revised Contract</div></div></div><div class="card"><div class="card-title">Contract Value</div><div class="grid"><div><label>Original Contract Value (USD)</label><input id="orig-val" type="number" placeholder="e.g. 2500000" oninput="updateSummary()"></div><div><label>Project Name</label><input id="proj-name" placeholder="e.g. Project Alpha Ph.2"></div></div></div><div class="card"><div class="card-title">New Change Order / PCO</div><div class="grid"><div><label>CO Number</label><input id="c-num" placeholder="e.g. PCO-001"></div><div><label>Description</label><input id="c-desc" placeholder="e.g. Additional waterproofing at basement"></div><div><label>Submitted By</label><input id="c-by" placeholder="e.g. General Contractor"></div><div><label>Date</label><input id="c-date" type="date"></div><div><label>Amount (USD)</label><input id="c-amt" type="number" placeholder="e.g. 45000 or -5000"></div><div><label>Days Impact</label><input id="c-days" type="number" placeholder="0 = no impact"></div><div><label>Type</label><select id="c-type"><option>Owner Directed</option><option>Design Change</option><option>Unforeseen Conditions</option><option>Scope Reduction</option><option>Value Engineering</option><option>Code Compliance</option><option>Other</option></select></div><div><label>Status</label><select id="c-status"><option value="draft">Draft</option><option value="pending">Pending Approval</option><option value="approved">Approved</option><option value="rejected">Rejected</option></select></div></div><div style="margin-top:12px"><label>Justification / Notes</label><textarea id="c-notes" placeholder="Describe reason, reference RFI or drawing..."></textarea></div><button class="btn btn-p" onclick="addCO()">Add Change Order</button><button class="btn btn-g" onclick="exportCSV()">Export CSV</button></div><div class="toolbar"><input class="search-bar" id="search" placeholder="Search change orders..." oninput="render()"><select class="flt" id="f-status" onchange="render()"><option value="">All Status</option><option value="draft">Draft</option><option value="pending">Pending</option><option value="approved">Approved</option><option value="rejected">Rejected</option></select></div><div class="card"><div class="tbl-wrap"><table class="tbl"><thead><tr><th>CO #</th><th>Description</th><th>Type</th><th>From</th><th>Date</th><th>Amount</th><th>Days</th><th>Notes</th><th>Status</th><th></th></tr></thead><tbody id="tb"></tbody></table></div></div><script>var CO=JSON.parse(localStorage.getItem("cotrack")||"[]");function save(){localStorage.setItem("cotrack",JSON.stringify(CO));}function usd(n){return "$"+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0});}var stLabel={draft:"Draft",pending:"Pending",approved:"Approved",rejected:"Rejected"};var stCls={draft:"b-draft",pending:"b-pending",approved:"b-approved",rejected:"b-rejected"};function addCO(){var num=document.getElementById("c-num").value.trim();var desc=document.getElementById("c-desc").value.trim();var by=document.getElementById("c-by").value.trim();var date=document.getElementById("c-date").value||new Date().toISOString().slice(0,10);var amt=parseFloat(document.getElementById("c-amt").value)||0;var days=parseInt(document.getElementById("c-days").value)||0;var type=document.getElementById("c-type").value;var status=document.getElementById("c-status").value;var notes=document.getElementById("c-notes").value.trim();if(!desc)return;CO.push({num,desc,by,date,amt,days,type,status,notes});save();render();["c-num","c-desc","c-by","c-date","c-amt","c-days","c-notes"].forEach(function(id){document.getElementById(id).value="";});}function del(i){CO.splice(i,1);save();render();}function setStatus(i,val){CO[i].status=val;save();render();}function updateSummary(){var orig=parseFloat(document.getElementById("orig-val").value)||0;var approved=CO.filter(function(x){return x.status==="approved";});var approvedAmt=approved.reduce(function(s,x){return s+x.amt;},0);var revised=orig+approvedAmt;document.getElementById("s-contract").textContent=usd(orig);document.getElementById("s-approved-amt").textContent=(approvedAmt>=0?"+":"")+usd(approvedAmt);document.getElementById("s-revised").textContent=usd(revised);document.getElementById("s-total").textContent=CO.length;document.getElementById("s-pending").textContent=CO.filter(function(x){return x.status==="pending";}).length;document.getElementById("s-approved").textContent=approved.length;}function render(){var q=document.getElementById("search").value.toLowerCase();var fs=document.getElementById("f-status").value;var rows=CO.filter(function(x){var m=!q||(x.num+x.desc+x.by+x.type+x.notes).toLowerCase().includes(q);var sm=!fs||x.status===fs;return m&&sm;});var tb=document.getElementById("tb");tb.innerHTML="";rows.forEach(function(x){var idx=CO.indexOf(x);var sc=stCls[x.status]||"b-draft";var ac=x.amt>=0?"add-cost":"sub-cost";tb.innerHTML+="<tr><td>"+(x.num||"-")+"</td><td>"+x.desc+"</td><td>"+x.type+"</td><td>"+(x.by||"-")+"</td><td>"+x.date+"</td>";tb.innerHTML+="<td class=\""+ac+"\">"+(x.amt>=0?"+":"")+usd(x.amt)+"</td>";tb.innerHTML+="<td>"+(x.days?x.days+" days":"0")+"</td>";tb.innerHTML+="<td style=\"max-width:200px;color:#888\">"+(x.notes||"-")+"</td>";tb.innerHTML+="<td><select style=\"background:#111;border:1px solid #333;color:#fff;padding:4px;border-radius:4px;font-size:11px\" onchange=\"setStatus("+idx+",this.value)\">";["draft","pending","approved","rejected"].forEach(function(opt){tb.innerHTML+="<option value=\""+opt+"\""+(x.status===opt?" selected":"")+">"+stLabel[opt]+"</option>";});tb.innerHTML+="</select></td><td><button class=\"del-btn\" onclick=\"del("+idx+")\">x</button></td></tr>";});updateSummary();}function exportCSV(){var rows=[["CO#","Description","Type","From","Date","Amount","Days Impact","Status","Notes"]];CO.forEach(function(x){rows.push([x.num,x.desc,x.type,x.by,x.date,x.amt,x.days,stLabel[x.status],x.notes]);});var csv=rows.map(function(r){return r.map(function(c){return "\""+String(c||"").replace(/"/g,"\"\"")+"\"";}).join(",");}).join("\n");var a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="change-orders.csv";a.click();}if(CO.length===0){document.getElementById("orig-val").value="2500000";document.getElementById("proj-name").value="Project Alpha Ph.2";CO=[{num:"PCO-001",desc:"Unforeseen rock excavation at basement footings",by:"General Contractor",date:"2026-03-10",amt:85000,days:7,type:"Unforeseen Conditions",status:"approved",notes:"Rock encountered at -2.1m. Additional blasting and removal required. Ref. geotech report addendum."},{num:"PCO-002",desc:"Add card access at 4 additional doors per Owner request",by:"General Contractor",date:"2026-04-01",amt:22500,days:0,type:"Owner Directed",status:"pending",notes:"Owner requested expansion of access control scope. Ref. email from Client Contact A 2026-03-28."},{num:"VE-001",desc:"Substitute specified cladding panel for value-engineered equivalent",by:"Owner / VE",date:"2026-04-15",amt:-35000,days:-3,type:"Value Engineering",status:"approved",notes:"Approved alternate meets spec performance requirements. Net savings to Owner."}];save();}render();</script></body></html>
