<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Permit Tracker — XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:24px}.card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:20px;margin-bottom:16px}.card-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}@media(max-width:640px){.grid3{grid-template-columns:1fr}}.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}.result-box{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:14px;text-align:center}.result-val{font-size:22px;font-weight:700;color:#16a34a}.result-lbl{font-size:11px;color:#666;margin-top:4px}label{font-size:11px;color:#888;display:block;margin-bottom:4px}input,select{width:100%;background:#111;border:1px solid #333;color:#fff;padding:9px 12px;border-radius:6px;font-size:13px}input:focus,select:focus{outline:none;border-color:#16a34a}.btn{padding:9px 20px;background:#16a34a;border:none;border-radius:6px;color:#fff;font-size:13px;cursor:pointer;margin-right:8px}.btn-del{background:transparent;border:none;color:#555;cursor:pointer;font-size:13px}.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}.p-prep{background:#1a1a2e;color:#818cf8}.p-sub{background:#2e2510;color:#fbbf24}.p-review{background:#1c2e3a;color:#60a5fa}.p-approved{background:#0d2818;color:#4ade80}.p-issued{background:#16a34a44;color:#16a34a}.p-expired{background:#3b1f1f;color:#f87171}table{width:100%;border-collapse:collapse}th{font-size:11px;color:#555;padding:8px;border-bottom:1px solid #222;text-align:left}td{font-size:12px;padding:8px;border-bottom:1px solid #1a1a1a;color:#ccc;vertical-align:top}.fil{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}.fil select{width:auto;min-width:130px}</style></head><body><h1>Permit Tracker</h1><div class="sub">Building permit applications — submission, review, and issuance log</div><div class="result-grid" id="summary"></div><div class="card"><div class="card-title">Add Permit</div><div class="grid3" style="margin-bottom:12px"><div><label>Permit Type</label><select id="p-type"><option>Building Permit</option><option>MEP Permit</option><option>Demolition Permit</option><option>Grading Permit</option><option>Fire Permit</option><option>Plumbing Permit</option><option>Electrical Permit</option><option>Sign Permit</option><option>Occupancy Permit</option></select></div><div><label>Jurisdiction</label><input id="p-jur" placeholder="City of Dallas"></div><div><label>Status</label><select id="p-stat"><option value="prep">Preparation</option><option value="sub">Submitted</option><option value="review">Under Review</option><option value="approved">Approved</option><option value="issued">Issued</option><option value="expired">Expired</option></select></div><div><label>Submitted Date</label><input type="date" id="p-sub"></div><div><label>Expected Issue</label><input type="date" id="p-exp"></div><div><label>Issued Date</label><input type="date" id="p-iss"></div><div><label>Permit Number</label><input id="p-num" placeholder="BP-2025-4421"></div><div><label>Fee ($)</label><input type="number" id="p-fee" placeholder="4500"></div><div><label>Notes</label><input id="p-notes" placeholder="2nd review cycle"></div></div><button class="btn" onclick="addPermit()">Add Permit</button></div><div class="card"><div class="card-title">Permit Log</div><div class="fil"><select id="f-stat" onchange="render()"><option value="">All Statuses</option><option value="prep">Preparation</option><option value="sub">Submitted</option><option value="review">Under Review</option><option value="approved">Approved</option><option value="issued">Issued</option><option value="expired">Expired</option></select></div><table><thead><tr><th>Type</th><th>Jurisdiction</th><th>Status</th><th>Submitted</th><th>Expected</th><th>Issued</th><th>Number</th><th>Fee</th><th>Notes</th><th></th></tr></thead><tbody id="tbody"></tbody></table></div><script>var P=JSON.parse(localStorage.getItem("permits")||"[]");if(!P.length){P=[{type:"Building Permit",jur:"City of Monterrey",stat:"issued",sub:"2025-03-10",exp:"2025-05-01",iss:"2025-05-03",num:"BP-2025-1182",fee:12500,notes:"Full set approved"},{type:"MEP Permit",jur:"City of Monterrey",stat:"review",sub:"2025-04-15",exp:"2025-06-01",iss:"",num:"",fee:3200,notes:"2nd review cycle pending"},{type:"Demolition Permit",jur:"City of Saltillo",stat:"approved",sub:"2025-02-20",exp:"2025-04-01",iss:"",num:"DM-2025-441",fee:800,notes:"Asbestos survey attached"}];}function save(){localStorage.setItem("permits",JSON.stringify(P));}function v(id){return document.getElementById(id).value.trim();}function addPermit(){var x={type:v("p-type"),jur:v("p-jur"),stat:v("p-stat"),sub:v("p-sub"),exp:v("p-exp"),iss:v("p-iss"),num:v("p-num"),fee:parseFloat(document.getElementById("p-fee").value)||0,notes:v("p-notes")};P.push(x);save();render();["p-jur","p-sub","p-exp","p-iss","p-num","p-fee","p-notes"].forEach(function(id){document.getElementById(id).value="";});}function del(i){P.splice(i,1);save();render();}function badge(s){var m={prep:"p-prep",sub:"p-sub2",review:"p-review",approved:"p-approved",issued:"p-issued",expired:"p-expired"};return "<span class=\"badge "+(m[s]||"")+"\">"+s.toUpperCase()+"</span>";}function render(){var fs=document.getElementById("f-stat").value;var rows=P.filter(function(x){return !fs||x.stat===fs;});var tb=document.getElementById("tbody");tb.innerHTML="";rows.forEach(function(x,ri){var i=P.indexOf(x);var over=x.exp&&!x.iss&&new Date(x.exp)<new Date()&&x.stat!=="expired"&&x.stat!=="issued";tb.innerHTML+="<tr"+(over?" style=\"background:#3b1f1f22\"":"")+"><td>"+x.type+"</td><td>"+x.jur+"</td><td>"+badge(x.stat)+"</td><td>"+x.sub+"</td><td style=\"color:"+(over?"#f87171":"#ccc")+"\">"+x.exp+"</td><td style=\"color:#16a34a\">"+x.iss+"</td><td style=\"color:#aaa\">"+x.num+"</td><td>"+( x.fee?"$"+x.fee.toLocaleString():"—")+"</td><td>"+x.notes+"</td><td><button class=\"btn-del\" onclick=\"del("+i+")\">x</button></td></tr>";});var tot=P.length,iss=P.filter(function(x){return x.stat==="issued";}).length,rev=P.filter(function(x){return x.stat==="review";}).length,fees=P.reduce(function(s,x){return s+x.fee;},0);document.getElementById("summary").innerHTML="<div class=\"result-box\"><div class=\"result-val\">"+tot+"</div><div class=\"result-lbl\">Total Permits</div></div><div class=\"result-box\"><div class=\"result-val\">"+iss+"</div><div class=\"result-lbl\">Issued</div></div><div class=\"result-box\"><div class=\"result-val\" style=\"color:#fbbf24\">"+rev+"</div><div class=\"result-lbl\">Under Review</div></div><div class=\"result-box\"><div class=\"result-val\">$"+fees.toLocaleString()+"</div><div class=\"result-lbl\">Total Fees</div></div>";}render();</script></body></html>
