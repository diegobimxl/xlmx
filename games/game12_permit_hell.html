<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Permit Hell</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #1a0a2e; color: #fff; min-height: 100vh; }
.header { background: #2a0a4e; border-bottom: 2px solid #9b5de5; padding: 12px 24px; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 22px; font-weight: 900; }
.badge { background: #9b5de5; color: #fff; font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 600; }
.hud { display: flex; gap: 20px; margin-left: auto; align-items: center; }
.hud-val { font-size: 22px; font-weight: 700; color: #f72585; }
.hud-lbl { font-size: 10px; color: #aaa; text-transform: uppercase; }
.container { max-width: 900px; margin: 0 auto; padding: 16px; }
.queue-label { font-size: 12px; font-weight: 600; color: #aaa; text-transform: uppercase; margin-bottom: 8px; }
.queue-bar-wrap { background: #2a0a4e; border-radius: 8px; height: 12px; margin-bottom: 16px; overflow: hidden; }
.queue-bar { height: 100%; background: linear-gradient(90deg, #f72585, #b5179e); border-radius: 8px; transition: width .3s; }
.permits-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 16px; }
.permit-card { background: #2a1a4e; border: 2px solid #3a2a6e; border-radius: 12px; padding: 14px; cursor: pointer; transition: all .15s; position: relative; overflow: hidden; }
.permit-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(155,93,229,.4); }
.permit-card.urgent { border-color: #f72585; animation: urgentPulse 1s infinite; }
@keyframes urgentPulse { 0%,100%{box-shadow:0 0 0 0 rgba(247,37,133,.4)} 50%{box-shadow:0 0 0 8px rgba(247,37,133,0)} }
.permit-type { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
.permit-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.permit-detail { font-size: 11px; color: #aaa; line-height: 1.4; }
.permit-timer { position: absolute; top: 8px; right: 10px; font-size: 18px; font-weight: 900; }
.action-row { display: flex; gap: 8px; margin-top: 10px; }
.abtn { flex: 1; padding: 8px; border-radius: 6px; font-family: 'Inter',sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; border: none; transition: all .15s; }
.abtn-approve { background: #4fffb0; color: #0f0f23; }
.abtn-approve:hover { background: #2ecc71; }
.abtn-deny { background: #f72585; color: #fff; }
.abtn-deny:hover { background: #c1121f; }
.abtn-hold { background: #fbbf24; color: #0f0f23; }
.abtn-hold:hover { background: #d97706; }
.lb-wrap { background: #2a1a4e; border-radius: 10px; padding: 14px; }
.lb-wrap h3 { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; margin-bottom: 10px; }
.lb-row { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; border-bottom: 1px solid #3a2a6e; color: #ccc; }
.lb-row:last-child { border-bottom: none; }
.toast { position: fixed; top: 70px; right: 16px; background: #2a1a4e; border: 1px solid #9b5de5; border-radius: 8px; padding: 10px 16px; font-size: 13px; font-weight: 600; z-index: 200; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.85); display: flex; align-items: center; justify-content: center; z-index: 100; }
.overlay.hidden { display: none; }
.modal { background: #2a0a4e; border: 2px solid #9b5de5; border-radius: 16px; padding: 32px; max-width: 440px; width: 90%; text-align: center; }
.modal h2 { font-size: 28px; font-weight: 900; color: #f72585; margin-bottom: 12px; }
.modal p { font-size: 14px; color: #ccc; line-height: 1.6; margin-bottom: 16px; }
.btn-primary { background: #9b5de5; color: #fff; width: 100%; padding: 12px; border-radius: 8px; font-family: 'Inter',sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; border: none; }
</style>
</head>
<body>
<div class="header">
  <h1>PERMIT HELL</h1><span class="badge">XLMX ARCADE</span>
  <div class="hud">
    <div><div class="hud-val" id="score">0</div><div class="hud-lbl">Score</div></div>
    <div><div class="hud-val" id="approved" style="color:#4fffb0">0</div><div class="hud-lbl">Approved</div></div>
    <div><div class="hud-val" id="denied" style="color:#f72585">0</div><div class="hud-lbl">Denied</div></div>
    <div><div class="hud-val" id="level">1</div><div class="hud-lbl">Level</div></div>
  </div>
</div>
<div class="container">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
    <span class="queue-label">⚠️ QUEUE PRESSURE</span>
    <span style="font-size:12px;color:#f72585;" id="queue-pct">0%</span>
  </div>
  <div class="queue-bar-wrap"><div class="queue-bar" id="queue-bar" style="width:0%"></div></div>
  <div class="permits-grid" id="permits-grid"></div>
  <div class="lb-wrap"><h3>Leaderboard</h3><div id="lb"></div></div>
</div>
<div class="toast" id="toast"></div>

<div class="overlay hidden" id="end-overlay">
  <div class="modal">
    <div id="end-icon" style="font-size:48px;margin-bottom:8px;">📋</div>
    <h2 id="end-title">QUEUE OVERFLOW</h2>
    <p id="end-desc"></p>
    <div id="end-lb" style="text-align:left;margin:16px 0;"></div>
    <button class="btn-primary" onclick="startGame()">Back to the Desk</button>
  </div>
</div>

<script>
const PERMIT_TYPES = [
  { type:'RESIDENTIAL', color:'#4fffb0', items:['Single-Family Home','Duplex Addition','Garage Conversion','ADU — Backyard','Pool Enclosure','Fence over 6ft'], approve:true, pts:10 },
  { type:'COMMERCIAL', color:'#fbbf24', items:['Food Truck Spot','Pop-Up Retail','Office Fit-Out','Drive-Thru Addition','ATM Kiosk','Outdoor Seating'], approve:true, pts:15 },
  { type:'STRUCTURAL', color:'#f97316', items:['Column Removal','Retaining Wall','Shear Wall Mod','Load Path Change','Beam Splice','Foundation Repair'], approve:true, pts:25 },
  { type:'ILLEGAL ⚠️', color:'#f72585', items:['Build in Setback','Exceed FAR','No Fire Egress','Skip Soil Report','Block Fire Lane','Unapproved Demo'], approve:false, pts:30 },
  { type:'ENVIRONMENTAL', color:'#60a5fa', items:['Tree Removal','Wetland Proximity','Storm Runoff Change','Solar on Historic Bldg','Creek Encroachment'], approve:Math.random()>0.5, pts:20 },
];

let permits = [], score = 0, approved = 0, denied = 0, queuePressure = 0, running = false, spawnTimer, pressureTimer, level = 1, gameCount = 0, leaderboard = [];
let konamiSeq = '', speedMultiplier = 1;

// Easter egg: type "STAMP" for bonus points
document.addEventListener('keydown', e => {
  konamiSeq += e.key.toUpperCase();
  konamiSeq = konamiSeq.slice(-5);
  if (konamiSeq === 'STAMP') { score += 100; document.getElementById('score').textContent = score; showToast('🔏 RUBBER STAMP BONUS +100 pts'); konamiSeq = ''; }
});

function rand(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

function spawnPermit() {
  if (permits.length >= 6) { queuePressure = Math.min(100, queuePressure + 15); updateQueueBar(); return; }
  const ptype = rand(PERMIT_TYPES);
  const permit = {
    id: Date.now() + Math.random(),
    type: ptype.type, color: ptype.color,
    title: rand(ptype.items),
    shouldApprove: ptype.approve,
    pts: ptype.pts,
    ttl: Math.max(4, 10 - level),
    urgent: Math.random() < 0.25,
  };
  permits.push(permit);
  queuePressure = Math.min(100, queuePressure + 5);
  renderPermits();
  updateQueueBar();
}

function tick() {
  permits.forEach(p => { p.ttl -= speedMultiplier; });
  permits = permits.filter(p => {
    if (p.ttl <= 0) { queuePressure = Math.min(100, queuePressure + 20); return false; }
    return true;
  });
  updateQueueBar();
  renderPermits();
  if (queuePressure >= 100) endGame();
}

function decide(id, action) {
  const p = permits.find(x => x.id === id);
  if (!p) return;
  permits = permits.filter(x => x.id !== id);
  let pts = 0;
  if (action === 'approve' && p.shouldApprove) { pts = p.pts; approved++; showToast(`✅ APPROVED: ${p.title} +${pts}pts`); }
  else if (action === 'deny' && !p.shouldApprove) { pts = p.pts; denied++; showToast(`🚫 CORRECT DENIAL: ${p.title} +${pts}pts`); }
  else if (action === 'hold') { pts = 5; showToast(`⏸️ ON HOLD: ${p.title} +5pts`); }
  else if (action === 'approve' && !p.shouldApprove) { pts = -p.pts * 2; showToast(`❌ BAD APPROVAL: ${p.title} ${pts}pts — that was illegal!`); }
  else if (action === 'deny' && p.shouldApprove) { pts = -10; showToast(`❌ WRONGFUL DENIAL: ${p.title} −10pts`); }
  score = Math.max(0, score + pts);
  queuePressure = Math.max(0, queuePressure - 8);
  document.getElementById('score').textContent = score;
  document.getElementById('approved').textContent = approved;
  document.getElementById('denied').textContent = denied;
  updateQueueBar();
  renderPermits();
  // Level up every 10 decisions
  const total = approved + denied;
  level = Math.min(10, Math.floor(total/10)+1);
  document.getElementById('level').textContent = level;
  speedMultiplier = 1 + (level-1)*0.15;
}

function updateQueueBar() {
  document.getElementById('queue-bar').style.width = queuePressure + '%';
  document.getElementById('queue-pct').textContent = Math.round(queuePressure) + '%';
  document.getElementById('queue-bar').style.background = queuePressure > 70 ? '#f72585' : queuePressure > 40 ? '#fbbf24' : 'linear-gradient(90deg,#f72585,#b5179e)';
}

function renderPermits() {
  const grid = document.getElementById('permits-grid');
  grid.innerHTML = '';
  permits.slice(0,6).forEach(p => {
    const card = document.createElement('div');
    card.className = 'permit-card' + (p.urgent?' urgent':'');
    const ttlColor = p.ttl < 3 ? '#f72585' : p.ttl < 5 ? '#fbbf24' : '#fff';
    card.innerHTML = `
      <div class="permit-type" style="color:${p.color}">${p.type}</div>
      <div class="permit-title">${p.title}</div>
      <div class="permit-detail">${p.shouldApprove?'Appears compliant':'Has issues — review carefully'}</div>
      <div class="permit-timer" style="color:${ttlColor}">${Math.ceil(p.ttl)}s</div>
      <div class="action-row">
        <button class="abtn abtn-approve" onclick="decide(${p.id},'approve')">✓ APPROVE</button>
        <button class="abtn abtn-deny" onclick="decide(${p.id},'deny')">✗ DENY</button>
        <button class="abtn abtn-hold" onclick="decide(${p.id},'hold')">⏸</button>
      </div>`;
    grid.appendChild(card);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function renderLB(container='lb') {
  const el = document.getElementById(container);
  if (!leaderboard.length) { el.innerHTML='<div style="font-size:12px;color:#555;">No scores yet.</div>'; return; }
  el.innerHTML = '';
  leaderboard.slice(0,5).forEach((e,i) => {
    const row = document.createElement('div');
    row.className = 'lb-row';
    row.innerHTML = `<span>#${i+1}</span><span>${e.score}pts</span>`;
    el.appendChild(row);
  });
}

function startGame() {
  clearInterval(spawnTimer); clearInterval(pressureTimer);
  permits=[]; score=0; approved=0; denied=0; queuePressure=0; level=1; speedMultiplier=1; running=true;
  ['score','approved','denied'].forEach(id => document.getElementById(id).textContent = 0);
  document.getElementById('level').textContent = 1;
  document.getElementById('end-overlay').classList.add('hidden');
  renderPermits(); updateQueueBar(); renderLB();
  spawnTimer = setInterval(spawnPermit, 2500);
  pressureTimer = setInterval(tick, 1000);
}

function endGame() {
  clearInterval(spawnTimer); clearInterval(pressureTimer); running=false;
  gameCount++;
  leaderboard.push({ run:gameCount, score });
  leaderboard.sort((a,b)=>b.score-a.score);
  document.getElementById('end-icon').textContent = score>500?'🏆':score>200?'📋':'😵';
  document.getElementById('end-title').textContent = score>500?'CHIEF PERMIT OFFICER':'QUEUE OVERFLOW';
  document.getElementById('end-desc').textContent = `Score: ${score} | Approved: ${approved} | Denied: ${denied} | Run #${gameCount}. ${score>500?'You are the bureaucratic god we needed.':approved+denied<10?'You barely touched the queue. The city burned.':'The queue crushed you. It always does.'}`;
  renderLB('end-lb');
  document.getElementById('end-overlay').classList.remove('hidden');
}

startGame();
</script>
</body>
</html>
