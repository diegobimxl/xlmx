var _cat='all';
var _q='';

function doFilter(){_q=document.getElementById('searchBox').value.toLowerCase();render();}
function setcat(c){_cat=c;document.querySelectorAll('.cat-btn').forEach(function(b){b.classList.toggle('active',b.dataset.cat===c);});render();}

function render(){
  var f=TOOLS.filter(function(t){
    return (_cat==='all'||t.c===_cat)&&(!_q||t.n.toLowerCase().includes(_q)||t.d.toLowerCase().includes(_q)||t.c.toLowerCase().includes(_q));
  });
  document.getElementById('info').textContent=f.length+' of '+TOOLS.length+' tools';
  if(!f.length){document.getElementById('toolGrid').innerHTML='<div class="empty">No tools match your search.</div>';return;}
  var h='';
  f.forEach(function(t){
    var col=CC[t.c]||'#444';
    var badge=t.s==='live'?'<span class="badge b-live">Live</span>':t.s==='new'?'<span class="badge b-new">New</span>':'<span class="badge b-soon">Soon</span>';
    var foot=t.u?'<span class="card-open">Open â†’</span>':'<span></span>';
    var card='<div class="tool-card '+t.s+'"'+(t.u?' onclick="location.href=\''+t.u+'\'"':'')+' style="--cc:'+col+'">'
      +'<div class="card-top"><span class="card-name">'+t.n+'</span>'+badge+'</div>'
      +'<div class="card-desc">'+t.d+'</div>'
      +'<div class="card-foot"><span class="card-cat">'+t.c+'</span>'+foot+'</div>'
      +'</div>';
    h+=card;
  });
  document.getElementById('toolGrid').innerHTML=h;
}

function init(){
  var cats=['all'].concat(Object.keys(CC));
  var row=document.getElementById('catRow');
  cats.forEach(function(c){
    var b=document.createElement('button');
    b.className='cat-btn'+(c==='all'?' active':'');
    b.dataset.cat=c;
    b.textContent=c==='all'?'All':c;
    b.onclick=function(){setcat(c);};
    row.appendChild(b);
  });
  var live=TOOLS.filter(function(t){return t.s==='live'||t.s==='new';}).length;
  document.getElementById('liveCount').textContent=live;
  document.getElementById('totalCount').textContent=TOOLS.length;
  render();
}
init();
