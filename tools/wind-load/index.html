<!DOCTYPE html><html lang=en><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Wind Load | XLMX</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0d0d0d;color:#e8e8e8;font-family:system-ui,sans-serif}
.tb{background:#1a1a1a;border-bottom:1px solid #2a2a2a;padding:12px 24px;display:flex;align-items:center;gap:16px}
.tb a{color:#c8a96e;text-decoration:none;font-size:13px}.tb h1{font-size:16px;font-weight:600}
.wrap{max-width:700px;margin:0 auto;padding:32px 24px}
label{display:block;font-size:13px;color:#aaa;margin-bottom:4px;margin-top:16px}
input,select{width:100%;background:#1a1a1a;border:1px solid #333;color:#e8e8e8;padding:8px 12px;border-radius:6px;font-size:14px}
input:focus,select:focus{outline:none;border-color:#c8a96e}
.btn{margin-top:24px;background:#c8a96e;color:#0d0d0d;border:none;padding:10px 28px;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;width:100%}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:24px}
.kpi{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:16px;text-align:center}
.kpi .val{font-size:24px;font-weight:700;color:#c8a96e}.kpi .lbl{font-size:12px;color:#888;margin-top:4px}
.tbl{width:100%;border-collapse:collapse;margin-top:24px;font-size:13px}
.tbl th{background:#1a1a1a;color:#c8a96e;padding:8px 12px;text-align:left;border:1px solid #2a2a2a}
.tbl td{padding:8px 12px;border:1px solid #222}.tbl tr:hover td{background:#1a1a1a}
.note{color:#666;font-size:12px;margin-top:16px;line-height:1.6}
</style></head><body>
<div class=tb><a href="/tools/">&larr; Tools</a><h1>Wind Load Calculator (ASCE 7-22)</h1></div>
<div class=wrap>
<label>Basic Wind Speed V (mph) — ASCE 7 Fig. 26.5-1</label>
<input type=number id=V value=115 min=85 max=200>
<label>Exposure Category</label>
<select id=exp><option value=B>B — Suburban/woodland</option><option value=C selected>C — Open terrain</option><option value=D>D — Open water/flat coastline</option></select>
<label>Building Height h (ft)</label>
<input type=number id=h value=40 min=10 max=500>
<label>Enclosure Classification</label>
<select id=enc><option value=enclosed selected>Enclosed</option><option value=partial>Partially Enclosed</option><option value=open>Open</option></select>
<label>Internal Pressure Coefficient GCpi</label>
<select id=gcpi><option value=0.18 selected>+0.18 Enclosed</option><option value=-0.18>-0.18 Enclosed</option><option value=0.55>+0.55 Partially Enclosed</option><option value=-0.55>-0.55 Partially Enclosed</option><option value=0>0.00 Open</option></select>
<button class=btn onclick=calc()>Calculate Wind Pressures</button>
<div id=out></div>
<p class=note>Reference: ASCE 7-22 Chapter 27 (MWFRS Envelope Procedure). Kz per Table 26.10-1. Kd=0.85 for buildings. Kzt=1.0 (flat terrain). Results are design wind pressures for MWFRS — use component and cladding tables for C&C design.</p>
</div>
<script>
function kz(h,exp){
  const t={B:{zg:1200,alpha:7},C:{zg:900,alpha:9.5},D:{zg:700,alpha:11.5}};
  const p=t[exp];
  if(h<=15)return exp==='B'?0.57:exp==='C'?0.85:1.03;
  return 2.01*Math.pow(Math.min(h,p.zg)/p.zg,2/p.alpha);
}
function calc(){
  const V=+document.getElementById('V').value;
  const exp=document.getElementById('exp').value;
  const h=+document.getElementById('h').value;
  const GCpi=+document.getElementById('gcpi').value;
  const Kz=kz(h,exp);
  const Kzt=1.0,Kd=0.85,Ke=1.0;
  const qz=0.00256*Kz*Kzt*Kd*Ke*V*V;
  const qh=qz;
  // External Cp values for windward/leeward walls
  const CpW=0.8, CpL=-0.5, CpRoof=-0.7;
  const pW=qh*(CpW-GCpi);
  const pL=qh*(CpL-GCpi);
  const pR=qh*(CpRoof-GCpi);
  const pNet=pW-pL;
  document.getElementById('out').innerHTML=`
  <div class=cards>
    <div class=kpi><div class=val>${Kz.toFixed(3)}</div><div class=lbl>Kz</div></div>
    <div class=kpi><div class=val>${qz.toFixed(2)}</div><div class=lbl>qz (psf)</div></div>
    <div class=kpi><div class=val>${pW.toFixed(1)}</div><div class=lbl>Windward (psf)</div></div>
    <div class=kpi><div class=val>${pL.toFixed(1)}</div><div class=lbl>Leeward (psf)</div></div>
    <div class=kpi><div class=val>${pNet.toFixed(1)}</div><div class=lbl>Net Horiz (psf)</div></div>
    <div class=kpi><div class=val>${pR.toFixed(1)}</div><div class=lbl>Roof (psf)</div></div>
  </div>
  <table class=tbl><thead><tr><th>Surface</th><th>Cp</th><th>Pressure (psf)</th><th>Note</th></tr></thead>
  <tbody>
  <tr><td>Windward Wall</td><td>+0.80</td><td>${pW.toFixed(2)}</td><td>+ = inward</td></tr>
  <tr><td>Leeward Wall</td><td>-0.50</td><td>${pL.toFixed(2)}</td><td>- = outward</td></tr>
  <tr><td>Roof (flat/low pitch)</td><td>-0.70</td><td>${pR.toFixed(2)}</td><td>uplift</td></tr>
  <tr><td>Net Horizontal (MWFRS)</td><td>W-L</td><td><b>${pNet.toFixed(2)}</b></td><td>for lateral system</td></tr>
  </tbody></table>`;
}
calc();
</script></body></html>
