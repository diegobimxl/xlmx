<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#e8e8e8;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
.topbar{background:#1a1a1a;border-bottom:1px solid #2a2a2a;padding:12px 24px;display:flex;align-items:center;gap:16px}
.topbar a{color:#c8a96e;text-decoration:none;font-size:13px}
.topbar h1{font-size:16px;font-weight:600;color:#fff}
.container{max-width:1100px;margin:0 auto;padding:32px 24px}
.subtitle{color:#888;font-size:14px;margin-bottom:24px}
.controls{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;align-items:center}
.controls input{background:#1a1a1a;border:1px solid #333;color:#e8e8e8;padding:8px 14px;border-radius:6px;font-size:14px;width:280px}
.controls input:focus{outline:none;border-color:#c8a96e}
.controls select{background:#1a1a1a;border:1px solid #333;color:#e8e8e8;padding:8px 14px;border-radius:6px;font-size:14px;cursor:pointer}
.count{color:#888;font-size:13px;margin-left:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:16px;transition:border-color .2s}
.card:hover{border-color:#c8a96e}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.div-num{background:#c8a96e;color:#0d0d0d;font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;white-space:nowrap}
.div-name{font-size:14px;font-weight:600;color:#fff}
.sections{margin-top:8px;display:flex;flex-direction:column;gap:4px}
.sec{display:flex;gap:8px;align-items:baseline}
.sec-num{color:#c8a96e;font-size:12px;font-weight:600;min-width:80px;font-family:monospace}
.sec-name{color:#ccc;font-size:13px}
.sec-note{color:#666;font-size:11px;margin-top:2px;margin-left:88px}
.no-results{text-align:center;color:#555;padding:60px 0;font-size:15px}
</style>
</head>

function render(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const f=document.getElementById('filter').value;
  let src=DIVS;
  if(f)src=DIVS.filter(d=>d.g===f);
  if(q){src=src.map(d=>{
    if(d.t.toLowerCase().includes(q)||d.n.includes(q))return d;
    const ms=d.s.filter(s=>s.c.toLowerCase().includes(q)||s.n.toLowerCase().includes(q)||(s.note&&s.note.toLowerCase().includes(q)));
    if(ms.length)return Object.assign({},d,{s:ms});
    return null;
  }).filter(Boolean);}
  document.getElementById('count').textContent=src.length+' division'+(src.length!==1?'s':'')+' shown';
  const g=document.getElementById('grid');
  if(!src.length){g.innerHTML='<p class=no-results>No sections match.</p>';return;}
  g.innerHTML=src.map(d=>'<div class=card><div class=card-header><span class=div-num>DIV '+d.n+'</span><span class=div-name>'+d.t+'</span></div><div class=sections>'+d.s.map(s=>'<div><div class=sec><span class=sec-num>'+s.c+'</span><span class=sec-name>'+s.n+'</span></div>'+(s.note?'<div class=sec-note>'+s.note+'</div>':'')+'</div>').join('')+'</div></div>').join('');
}
render();
