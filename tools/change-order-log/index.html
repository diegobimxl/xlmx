<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Change Order Log | XLMX</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#0d0d0d;color:#e8e8e8;font-family:system-ui,sans-serif;min-height:100vh}
.topbar{background:#111;border-bottom:1px solid #222;padding:12px 20px;display:flex;align-items:center;gap:16px}
.back{color:#c8a96e;text-decoration:none;font-size:13px}.topbar h1{font-size:15px;font-weight:600;color:#fff}
.container{max-width:1000px;margin:0 auto;padding:24px 20px}.desc{color:#888;font-size:13px;margin-bottom:24px}
.section{background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:20px;margin-bottom:16px}
.section h2{font-size:12px;font-weight:600;color:#c8a96e;margin-bottom:14px;text-transform:uppercase}
label{font-size:11px;color:#888;display:block;margin-bottom:4px}
input,select{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;color:#e8e8e8;font-size:13px;padding:7px 10px;width:100%}
input:focus,select:focus{outline:none;border-color:#c8a96e}
.btn{background:#c8a96e;color:#000;border:none;border-radius:6px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer}
.btn-ghost{background:transparent;border:1px solid #333;color:#888;border-radius:6px;padding:7px 14px;font-size:12px;cursor:pointer}
.btn-ghost:hover{border-color:#c8a96e;color:#c8a96e}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.card{background:#111;border:1px solid #1e1e1e;border-radius:8px;padding:12px}
.card-label{font-size:10px;color:#888;margin-bottom:4px;text-transform:uppercase}.card-val{font-size:17px;font-weight:700;color:#c8a96e}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 8px;font-size:10px;color:#888;border-bottom:1px solid #222;text-transform:uppercase;font-weight:500}
td{padding:7px 8px;border-bottom:1px solid #141414}
.del-btn{background:transparent;border:none;color:#555;cursor:pointer;font-size:13px;padding:2px 6px}
.del-btn:hover{color:#e05252}
.gold{color:#c8a96e}.green{color:#52c87a}.red{color:#e05252}.orange{color:#e09d52}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600}
.b-app{background:#1a3a2a;color:#52c87a}.b-pend{background:#3a3a1a;color:#c8a96e}.b-rej{background:#3a1a1a;color:#e05252}.b-void{background:#1e1e1e;color:#666}
.form-grid{display:grid;grid-template-columns:60px 2fr 80px 1fr 100px 100px auto;gap:8px;align-items:end;margin-bottom:10px}
.num{text-align:right}
</style></head>
<body>
<div class="topbar"><a href="/tools/" class="back">&#8592; Tools</a><h1>Change Order Log</h1></div>
<div class="container">
<p class="desc">Track all change orders with status, cost impact, schedule impact, and running contract total.</p>
<div class="summary-grid">
<div class="card"><div class="card-label">Original Contract</div><div class="card-val" id="s-orig">$0</div></div>
<div class="card"><div class="card-label">Approved COs</div><div class="card-val green" id="s-app">$0</div></div>
<div class="card"><div class="card-label">Pending COs</div><div class="card-val orange" id="s-pend">$0</div></div>
<div class="card"><div class="card-label">Revised Contract</div><div class="card-val gold" id="s-rev">$0</div></div>
</div>
<div class="section">
<h2>Contract Value</h2>
<div style="display:flex;gap:12px;align-items:flex-end;margin-bottom:4px">
<div style="flex:1"><label>Original Contract Amount ($)</label><input type="number" id="orig" placeholder="1000000" oninput="render()"></div>
</div>
</div>
<div class="section">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
<span style="font-size:13px;font-weight:600">Change Orders</span>
<button class="btn-ghost" onclick="addRow()">+ Add CO</button>
</div>
<div id="farea"></div>
<table>
<thead><tr><th>CO#</th><th>Description</th><th>Date</th><th class="num">Amount ($)</th><th>Days</th><th>Status</th><th></th></tr></thead>
<tbody id="tbody"><tr><td colspan="7" style="text-align:center;color:#555;padding:16px">No change orders. Click + Add CO.</td></tr></tbody>
<tfoot id="tfoot"></tfoot>
</table>
</div>
</div>
<script>
var items=[],ctr=0;
function fm(n){return(n<0?"-$":"$")+Math.abs(Math.round(n)).toLocaleString("en-US")}
function addRow(){
ctr++;var id=ctr;
var d=document.createElement("div");d.className="form-grid";d.id="fr"+id;
d.innerHTML='<div><label>CO#</label><input type="text" id="fn'+id+'" placeholder="001"></div>'
+'<div><label>Description</label><input type="text" id="fd'+id+'" placeholder="PCO description"></div>'
+'<div><label>Date</label><input type="date" id="fdt'+id+'"></div>'
+'<div><label>Amount ($)</label><input type="number" id="fa'+id+'" placeholder="0"></div>'
+'<div><label>Days +/-</label><input type="number" id="fdy'+id+'" placeholder="0"></div>'
+'<div><label>Status</label><select id="fs'+id+'"><option value="pend">Pending</option><option value="app">Approved</option><option value="rej">Rejected</option><option value="void">Void</option></select></div>'
+'<div style="display:flex;align-items:flex-end"><button class="btn" onclick="saveRow('+id+')">Add</button></div>';
document.getElementById("farea").appendChild(d);
}
function saveRow(id){
var n=document.getElementById("fn"+id).value.trim()||ctr;
var desc=document.getElementById("fd"+id).value.trim()||"No description";
var dt=document.getElementById("fdt"+id).value||"";
var amt=parseFloat(document.getElementById("fa"+id).value)||0;
var days=parseInt(document.getElementById("fdy"+id).value)||0;
var status=document.getElementById("fs"+id).value;
items.push({id:id,n:n,desc:desc,dt:dt,amt:amt,days:days,status:status});
document.getElementById("fr"+id).remove();render();
}
function delItem(id){items=items.filter(function(i){return i.id!==id});render()}
function render(){
var orig=parseFloat(document.getElementById("orig").value)||0;
var tb=document.getElementById("tbody");
if(!items.length){tb.innerHTML='<tr><td colspan="7" style="text-align:center;color:#555;padding:16px">No change orders.</td></tr>';
document.getElementById("s-orig").textContent=fm(orig);document.getElementById("s-app").textContent="$0";
document.getElementById("s-pend").textContent="$0";document.getElementById("s-rev").textContent=fm(orig);
document.getElementById("tfoot").innerHTML="";return;}
var totApp=0,totPend=0,totDays=0;
var badges={app:'b-app',pend:'b-pend',rej:'b-rej',void:'b-void'};
var labels={app:'Approved',pend:'Pending',rej:'Rejected',void:'Void'};
tb.innerHTML=items.map(function(item){
if(item.status==="app"){totApp+=item.amt;totDays+=item.days;}
else if(item.status==="pend")totPend+=item.amt;
var amtClass=item.amt>0?"green":(item.amt<0?"red":"");
return'<tr><td style="color:#888">'+item.n+'</td><td>'+item.desc+'</td><td style="color:#888">'+item.dt+'</td>'
+'<td class="num '+(item.status==="rej"||item.status==="void"?"":""+amtClass)+'">'+fm(item.amt)+'</td>'
+'<td style="text-align:center;color:#888">'+(item.days>0?"+":"")+item.days+'d</td>'
+'<td><span class="badge '+badges[item.status]+'">'+labels[item.status]+'</span></td>'
+'<td><button class="del-btn" onclick="delItem('+item.id+')">X</button></td></tr>';
}).join("");
var rev=orig+totApp;
document.getElementById("tfoot").innerHTML='<tr style="border-top:2px solid #333"><td></td><td style="font-weight:600">TOTAL APPROVED</td><td></td>'
+'<td class="num gold" style="font-weight:600">'+fm(totApp)+'</td>'
+'<td style="text-align:center;font-weight:600;color:#888">'+totDays+'d</td><td></td><td></td></tr>';
document.getElementById("s-orig").textContent=fm(orig);
document.getElementById("s-app").textContent=fm(totApp);
document.getElementById("s-pend").textContent=fm(totPend);
document.getElementById("s-rev").textContent=fm(rev);
}
document.getElementById("orig").addEventListener("input",render);
</script></body></html>
