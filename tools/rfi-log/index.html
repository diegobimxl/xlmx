<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RFI Log | BIM XL Tools</title>
<style>*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#e0e0e0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
.topbar{background:#111;border-bottom:1px solid #2a2a2a;padding:12px 24px;display:flex;align-items:center;gap:16px}
.topbar a{color:#c8a96e;text-decoration:none;font-size:13px;opacity:.7}.topbar a:hover{opacity:1}
.topbar-title{color:#e0e0e0;font-size:15px;font-weight:600}
.container{max-width:860px;margin:0 auto;padding:40px 24px}
h1{font-size:24px;font-weight:700;color:#fff;margin-bottom:8px}
.subtitle{color:#888;font-size:14px;margin-bottom:32px}
.card{background:#141414;border:1px solid #2a2a2a;border-radius:8px;padding:24px;margin-bottom:20px}
.card h2{font-size:14px;font-weight:600;color:#c8a96e;text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px}
label{display:block;font-size:13px;color:#aaa;margin-bottom:4px}
input,select{width:100%;background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:8px 12px;color:#e0e0e0;font-size:14px;margin-bottom:12px}
input:focus,select:focus{outline:none;border-color:#c8a96e}
.btn{background:#c8a96e;color:#0d0d0d;border:none;border-radius:6px;padding:10px 20px;font-weight:700;font-size:14px;cursor:pointer;margin-top:4px}
.btn:hover{background:#d4b87e}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-danger{background:#444;color:#e0e0e0}
.btn-danger:hover{background:#555}
.result{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:16px;margin-top:16px}
.result-value{font-size:20px;font-weight:700;color:#c8a96e}
.result-label{font-size:12px;color:#888;margin-bottom:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#1a1a1a;color:#c8a96e;text-align:left;padding:8px 10px;font-size:12px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #2a2a2a}
td{padding:8px 10px;border-bottom:1px solid #1e1e1e;vertical-align:top}
tr:hover td{background:#161616}
td input,td select{margin-bottom:0;padding:4px 8px;font-size:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.b-open{background:#1a3a1a;color:#4ade80}
.b-closed{background:#3a1a1a;color:#f87171}
.b-draft{background:#2a2a1a;color:#fbbf24}
.b-issued{background:#1a2a3a;color:#60a5fa}
.tbl-wrap{overflow-x:auto}
.row-actions{display:flex;gap:6px}
.empty{color:#555;font-size:13px;padding:20px 0;text-align:center}
@media(max-width:600px){.grid2,.grid3{grid-template-columns:1fr}}</style>
</head>
<body>
<div class="topbar"><a href="/tools/">← Tools</a><span class="topbar-title">RFI Log</span></div>
<div class="container">
<h1>RFI Log</h1>
<p class="subtitle">Track Requests for Information with issue dates, response deadlines, and status.</p>
<div class="card">
<h2>New RFI</h2>
<div class="grid2">
  <div><label>RFI No.</label><input id="rNum" placeholder="RFI-001"></div>
  <div><label>Subject</label><input id="rSubj" placeholder="Beam pocket dimension clarification"></div>
  <div><label>From</label><input id="rFrom" placeholder="Contractor / BIM Team"></div>
  <div><label>To</label><input id="rTo" placeholder="Architect / Engineer"></div>
  <div><label>Date Issued</label><input id="rIssued" type="date"></div>
  <div><label>Date Required</label><input id="rRequired" type="date"></div>
</div>
<label>Question / Description</label>
<input id="rDesc" placeholder="Brief description of the RFI question">
<button class="btn" onclick="addRFI()">Add RFI</button>
</div>
<div class="card">
<h2>RFI Log <span id="rfiCount" style="color:#888;font-weight:400;font-size:12px"></span></h2>
<div class="tbl-wrap">
<table><thead><tr><th>No.</th><th>Subject</th><th>From → To</th><th>Issued</th><th>Required</th><th>Status</th><th></th></tr></thead>
<tbody id="rfiBody"><tr><td colspan="7" class="empty">No RFIs logged yet.</td></tr></tbody>
</table>
</div>
</div>
<script>
var rfis=[];
function addRFI(){
  var num=document.getElementById('rNum').value.trim();
  var subj=document.getElementById('rSubj').value.trim();
  if(!num||!subj){alert('RFI number and subject required.');return;}
  rfis.push({num:num,subj:subj,from:document.getElementById('rFrom').value,to:document.getElementById('rTo').value,issued:document.getElementById('rIssued').value,required:document.getElementById('rRequired').value,desc:document.getElementById('rDesc').value,stat:'open'});
  renderRFI();
  ['rNum','rSubj','rFrom','rTo','rIssued','rRequired','rDesc'].forEach(function(id){document.getElementById(id).value='';});
}
function toggleStat(i){rfis[i].stat=rfis[i].stat==='open'?'closed':'open';renderRFI();}
function removeRFI(i){rfis.splice(i,1);renderRFI();}
function renderRFI(){
  var b=document.getElementById('rfiBody');
  var open=rfis.filter(function(r){return r.stat==='open';}).length;
  document.getElementById('rfiCount').textContent='('+rfis.length+' total, '+open+' open)';
  if(!rfis.length){b.innerHTML='<tr><td colspan="7" class="empty">No RFIs logged yet.</td></tr>';return;}
  b.innerHTML=rfis.map(function(r,i){
    var sc=r.stat==='open'?'b-open':'b-closed';
    return '<tr><td>'+r.num+'</td><td title="'+r.desc+'">'+r.subj+'</td><td>'+r.from+' → '+r.to+'</td><td>'+(r.issued||'—')+'</td><td>'+(r.required||'—')+'</td><td><span class="badge '+sc+'" style="cursor:pointer" onclick="toggleStat('+i+')">'+r.stat.charAt(0).toUpperCase()+r.stat.slice(1)+'</span></td><td><button class="btn btn-danger btn-sm" onclick="removeRFI('+i+')">✕</button></td></tr>';
  }).join('');
}
</script>
</div>
</body>
</html>
