<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ROI Calculator | XLMX</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#0d0d0d;color:#e8e8e8;font-family:system-ui,sans-serif;min-height:100vh}
.topbar{background:#111;border-bottom:1px solid #222;padding:12px 20px;display:flex;align-items:center;gap:16px}
.back{color:#c8a96e;text-decoration:none;font-size:13px}.topbar h1{font-size:15px;font-weight:600;color:#fff}
.container{max-width:700px;margin:0 auto;padding:24px 20px}.desc{color:#888;font-size:13px;margin-bottom:24px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.section{background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:20px;margin-bottom:16px}
.section h2{font-size:12px;font-weight:600;color:#c8a96e;margin-bottom:14px;text-transform:uppercase}
.field{margin-bottom:12px}label{font-size:11px;color:#888;display:block;margin-bottom:4px}
input{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;color:#e8e8e8;font-size:13px;padding:8px 10px;width:100%}
input:focus{outline:none;border-color:#c8a96e}
.btn{background:#c8a96e;color:#000;border:none;border-radius:6px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;width:100%}
.result-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #1e1e1e;font-size:13px}
.result-row:last-child{border-bottom:none}.result-label{color:#888}.result-val{font-weight:600}
.big{font-size:44px;font-weight:700;text-align:center;padding:12px 0}
.big-lbl{font-size:11px;color:#888;text-align:center}
.gold{color:#c8a96e}.green{color:#52c87a}.red{color:#e05252}
</style></head>
<body>
<div class="topbar"><a href="/tools/" class="back">&#8592; Tools</a><h1>ROI Calculator</h1></div>
<div class="container">
<p class="desc">Calculate return on investment. Supports total ROI, annualized ROI, CAGR, and equity multiple.</p>
<div class="grid">
<div>
<div class="section">
<h2>Inputs</h2>
<div class="field"><label>Initial Investment ($)</label><input type="number" id="inv" placeholder="100000" min="0"></div>
<div class="field"><label>Final Value / Net Proceeds ($)</label><input type="number" id="fin" placeholder="130000" min="0"></div>
<div class="field"><label>Net Cash Flows During Hold ($)</label><input type="number" id="cf" placeholder="0"></div>
<div class="field"><label>Holding Period (years)</label><input type="number" id="yrs" placeholder="3" min="0" step="0.5"></div>
<button class="btn" onclick="calc()">Calculate</button>
</div>
</div>
<div>
<div class="section">
<div class="big-lbl">Total ROI</div>
<div class="big gold" id="roi-hero">&#8212;</div>
<div class="result-row"><span class="result-label">Total Gain / Loss</span><span class="result-val" id="r-gain">&#8212;</span></div>
<div class="result-row"><span class="result-label">Total Return (incl. cash flows)</span><span class="result-val" id="r-total">&#8212;</span></div>
<div class="result-row"><span class="result-label">Annualized ROI</span><span class="result-val" id="r-ann">&#8212;</span></div>
<div class="result-row"><span class="result-label">CAGR</span><span class="result-val" id="r-cagr">&#8212;</span></div>
<div class="result-row"><span class="result-label">Equity Multiple (MOIC)</span><span class="result-val" id="r-em">&#8212;</span></div>
<div class="result-row"><span class="result-label">Assessment</span><span class="result-val" id="r-interp">&#8212;</span></div>
</div>
</div>
</div>
</div>
<script>
function fmt(n){return"$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}
function fp(n){return n.toFixed(2)+"%"}
function calc(){
var inv=parseFloat(document.getElementById("inv").value)||0;
var fin=parseFloat(document.getElementById("fin").value)||0;
var cf=parseFloat(document.getElementById("cf").value)||0;
var yrs=parseFloat(document.getElementById("yrs").value)||0;
if(!inv){alert("Enter initial investment.");return;}
var gain=fin-inv,totalRet=gain+cf,roi=totalRet/inv*100;
var annRoi=yrs>0?roi/yrs:roi;
var cagr=yrs>0?(Math.pow(fin/inv,1/yrs)-1)*100:null;
var em=(fin+cf)/inv;
var c=roi>0?"green":roi<0?"red":"gold";
document.getElementById("roi-hero").textContent=fp(roi);
document.getElementById("roi-hero").className="big "+c;
document.getElementById("r-gain").textContent=fmt(gain);
document.getElementById("r-gain").className="result-val "+(gain>=0?"green":"red");
document.getElementById("r-total").textContent=fmt(totalRet);
document.getElementById("r-ann").textContent=fp(annRoi);
document.getElementById("r-cagr").textContent=cagr!==null?fp(cagr):"N/A";
document.getElementById("r-em").textContent=em.toFixed(2)+"x";
var interp=roi>=20?"Strong":(roi>=10?"Decent":(roi>=0?"Marginal":"Loss"));
document.getElementById("r-interp").textContent=interp;
document.getElementById("r-interp").className="result-val "+(roi>=10?"green":(roi>=0?"gold":"red"));
}
</script></body></html>
