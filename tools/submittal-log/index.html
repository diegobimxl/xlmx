<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Submittal Log | BIM XL Tools</title>
<style>*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#e0e0e0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
.topbar{background:#111;border-bottom:1px solid #2a2a2a;padding:12px 24px;display:flex;align-items:center;gap:16px}
.topbar a{color:#c8a96e;text-decoration:none;font-size:13px;opacity:.7}.topbar a:hover{opacity:1}
.topbar-title{color:#e0e0e0;font-size:15px;font-weight:600}
.container{max-width:860px;margin:0 auto;padding:40px 24px}
h1{font-size:24px;font-weight:700;color:#fff;margin-bottom:8px}
.subtitle{color:#888;font-size:14px;margin-bottom:32px}
.card{background:#141414;border:1px solid #2a2a2a;border-radius:8px;padding:24px;margin-bottom:20px}
.card h2{font-size:14px;font-weight:600;color:#c8a96e;text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px}
label{display:block;font-size:13px;color:#aaa;margin-bottom:4px}
input,select{width:100%;background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:8px 12px;color:#e0e0e0;font-size:14px;margin-bottom:12px}
input:focus,select:focus{outline:none;border-color:#c8a96e}
.btn{background:#c8a96e;color:#0d0d0d;border:none;border-radius:6px;padding:10px 20px;font-weight:700;font-size:14px;cursor:pointer;margin-top:4px}
.btn:hover{background:#d4b87e}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-danger{background:#444;color:#e0e0e0}
.btn-danger:hover{background:#555}
.result{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:16px;margin-top:16px}
.result-value{font-size:20px;font-weight:700;color:#c8a96e}
.result-label{font-size:12px;color:#888;margin-bottom:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#1a1a1a;color:#c8a96e;text-align:left;padding:8px 10px;font-size:12px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #2a2a2a}
td{padding:8px 10px;border-bottom:1px solid #1e1e1e;vertical-align:top}
tr:hover td{background:#161616}
td input,td select{margin-bottom:0;padding:4px 8px;font-size:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.b-open{background:#1a3a1a;color:#4ade80}
.b-closed{background:#3a1a1a;color:#f87171}
.b-draft{background:#2a2a1a;color:#fbbf24}
.b-issued{background:#1a2a3a;color:#60a5fa}
.tbl-wrap{overflow-x:auto}
.row-actions{display:flex;gap:6px}
.empty{color:#555;font-size:13px;padding:20px 0;text-align:center}
@media(max-width:600px){.grid2,.grid3{grid-template-columns:1fr}}</style>
</head>
<body>
<div class="topbar"><a href="/tools/">← Tools</a><span class="topbar-title">Submittal Log</span></div>
<div class="container">
<h1>Submittal Log</h1>
<p class="subtitle">Track submittals from initial submission through approval with spec section and remarks.</p>
<div class="card">
<h2>New Submittal</h2>
<div class="grid2">
  <div><label>Submittal No.</label><input id="subNum" placeholder="SUB-001"></div>
  <div><label>Description</label><input id="subDesc" placeholder="Structural Steel Shop Drawings"></div>
  <div><label>Spec Section</label><input id="subSpec" placeholder="05 12 00"></div>
  <div><label>Contractor / Submitter</label><input id="subFrom" placeholder="General Contractor"></div>
  <div><label>Date Submitted</label><input id="subDate" type="date"></div>
  <div><label>Date Required</label><input id="subReq" type="date"></div>
</div>
<label>Remarks</label><input id="subRem" placeholder="Optional remarks">
<button class="btn" onclick="addSub()">Add Submittal</button>
</div>
<div class="card">
<h2>Submittal Log <span id="subCount" style="color:#888;font-weight:400;font-size:12px"></span></h2>
<div class="tbl-wrap">
<table><thead><tr><th>No.</th><th>Description</th><th>Spec</th><th>Submitted</th><th>Required</th><th>Status</th><th></th></tr></thead>
<tbody id="subBody"><tr><td colspan="7" class="empty">No submittals logged yet.</td></tr></tbody>
</table>
</div>
</div>
<script>
var subs=[];
var stats=['pending','under_review','approved','approved_as_noted','revise_resubmit','rejected'];
var statLabels={'pending':'Pending','under_review':'Under Review','approved':'Approved','approved_as_noted':'Approved as Noted','revise_resubmit':'Revise & Resubmit','rejected':'Rejected'};
var statColors={'pending':'b-draft','under_review':'b-issued','approved':'b-open','approved_as_noted':'b-open','revise_resubmit':'b-draft','rejected':'b-closed'};
function addSub(){
  var num=document.getElementById('subNum').value.trim();
  var desc=document.getElementById('subDesc').value.trim();
  if(!num||!desc){alert('Number and description required.');return;}
  subs.push({num:num,desc:desc,spec:document.getElementById('subSpec').value,from:document.getElementById('subFrom').value,date:document.getElementById('subDate').value,req:document.getElementById('subReq').value,rem:document.getElementById('subRem').value,stat:'pending'});
  renderSub();
  ['subNum','subDesc','subSpec','subFrom','subDate','subReq','subRem'].forEach(function(id){document.getElementById(id).value='';});
}
function cycleStat(i){var idx=stats.indexOf(subs[i].stat);subs[i].stat=stats[(idx+1)%stats.length];renderSub();}
function removeSub(i){subs.splice(i,1);renderSub();}
function renderSub(){
  var b=document.getElementById('subBody');
  var pend=subs.filter(function(s){return s.stat==='pending'||s.stat==='under_review';}).length;
  document.getElementById('subCount').textContent='('+subs.length+' total, '+pend+' pending)';
  if(!subs.length){b.innerHTML='<tr><td colspan="7" class="empty">No submittals logged yet.</td></tr>';return;}
  b.innerHTML=subs.map(function(s,i){
    return '<tr><td>'+s.num+'</td><td title="'+s.rem+'">'+s.desc+'</td><td>'+s.spec+'</td><td>'+(s.date||'—')+'</td><td>'+(s.req||'—')+'</td><td><span class="badge '+statColors[s.stat]+'" style="cursor:pointer;white-space:nowrap" onclick="cycleStat('+i+')" title="Click to advance status">'+statLabels[s.stat]+'</span></td><td><button class="btn btn-danger btn-sm" onclick="removeSub('+i+')">✕</button></td></tr>';
  }).join('');
}
</script>
</div>
</body>
</html>
