<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Punch List | XLMX</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#0d0d0d;color:#e8e8e8;font-family:system-ui,sans-serif;min-height:100vh}
.topbar{background:#111;border-bottom:1px solid #222;padding:12px 20px;display:flex;align-items:center;gap:16px}
.back{color:#c8a96e;text-decoration:none;font-size:13px}.topbar h1{font-size:15px;font-weight:600;color:#fff}
.container{max-width:900px;margin:0 auto;padding:24px 20px}.desc{color:#888;font-size:13px;margin-bottom:24px}
.section{background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:20px;margin-bottom:16px}
.section h2{font-size:12px;font-weight:600;color:#c8a96e;margin-bottom:14px;text-transform:uppercase}
label{font-size:11px;color:#888;display:block;margin-bottom:4px}
input,select{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;color:#e8e8e8;font-size:13px;padding:7px 10px;width:100%}
input:focus,select:focus{outline:none;border-color:#c8a96e}
.btn{background:#c8a96e;color:#000;border:none;border-radius:6px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer}
.btn-ghost{background:transparent;border:1px solid #333;color:#888;border-radius:6px;padding:7px 14px;font-size:12px;cursor:pointer}
.btn-ghost:hover{border-color:#c8a96e;color:#c8a96e}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.card{background:#111;border:1px solid #1e1e1e;border-radius:8px;padding:12px}
.card-label{font-size:10px;color:#888;margin-bottom:4px;text-transform:uppercase}.card-val{font-size:22px;font-weight:700;color:#c8a96e}
.pbar{background:#1a1a1a;border-radius:4px;height:6px;margin-top:6px}.pfill{background:#c8a96e;border-radius:4px;height:6px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 8px;font-size:10px;color:#888;border-bottom:1px solid #222;text-transform:uppercase;font-weight:500}
td{padding:7px 8px;border-bottom:1px solid #141414}tr:hover td{background:#151515}
.del-btn{background:transparent;border:none;color:#555;cursor:pointer;font-size:13px;padding:2px 6px}
.del-btn:hover{color:#e05252}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer}
.b-open{background:#3a1a1a;color:#e05252}.b-ip{background:#3a3010;color:#c8a96e}.b-done{background:#1a3a2a;color:#52c87a}
.form-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:8px;align-items:end;margin-bottom:10px}
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{padding:5px 12px;border-radius:5px;font-size:11px;cursor:pointer;border:1px solid #2a2a2a;background:#111;color:#888}
.filter-btn.active{background:#c8a96e;color:#000;border-color:#c8a96e;font-weight:600}
</style></head>
<body>
<div class="topbar"><a href="/tools/" class="back">&#8592; Tools</a><h1>Punch List</h1></div>
<div class="container">
<p class="desc">Track construction deficiencies and closeout items. Filter by status, trade, or location.</p>
<div class="summary-grid">
<div class="card"><div class="card-label">Total Items</div><div class="card-val" id="s-total">0</div></div>
<div class="card"><div class="card-label">Open</div><div class="card-val red" id="s-open">0</div></div>
<div class="card"><div class="card-label">In Progress</div><div class="card-val gold" id="s-ip">0</div></div>
<div class="card"><div class="card-label">Complete</div><div class="card-val green" id="s-done">0</div><div class="pbar"><div class="pfill" id="s-pbar" style="width:0%"></div></div></div>
</div>
<div class="section">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
<span style="font-size:13px;font-weight:600">Items</span>
<button class="btn-ghost" onclick="addRow()">+ Add Item</button>
</div>
<div id="farea"></div>
<div class="filter-bar">
<span style="font-size:11px;color:#888;line-height:24px">Filter:</span>
<button class="filter-btn active" onclick="setFilter('all',this)">All</button>
<button class="filter-btn" onclick="setFilter('open',this)">Open</button>
<button class="filter-btn" onclick="setFilter('ip',this)">In Progress</button>
<button class="filter-btn" onclick="setFilter('done',this)">Complete</button>
</div>
<table>
<thead><tr><th>#</th><th>Description</th><th>Location</th><th>Trade</th><th>Assigned To</th><th>Due</th><th>Status</th><th></th></tr></thead>
<tbody id="tbody"><tr><td colspan="8" style="text-align:center;color:#555;padding:16px">No items. Click + Add Item.</td></tr></tbody>
</table>
</div>
</div>
<script>
var items=[],ctr=0,filter="all";
var red="red";var gold="gold";var green="green";
function addRow(){
ctr++;var id=ctr;
var d=document.createElement("div");d.className="form-grid";d.id="fr"+id;
d.innerHTML='<div><label>Description</label><input type="text" id="fd'+id+'" placeholder="e.g. Paint touch-up Room 201"></div>'
+'<div><label>Location</label><input type="text" id="fl'+id+'" placeholder="Level 2"></div>'
+'<div><label>Trade</label><input type="text" id="ft'+id+'" placeholder="Painter"></div>'
+'<div><label>Assigned To</label><input type="text" id="fa'+id+'" placeholder="Contractor"></div>'
+'<div style="display:flex;align-items:flex-end"><button class="btn" onclick="saveRow('+id+')">Add</button></div>';
document.getElementById("farea").appendChild(d);
}
function saveRow(id){
var desc=document.getElementById("fd"+id).value.trim()||"Item";
var loc=document.getElementById("fl"+id).value.trim()||"";
var trade=document.getElementById("ft"+id).value.trim()||"";
var assign=document.getElementById("fa"+id).value.trim()||"";
items.push({id:id,n:ctr,desc:desc,loc:loc,trade:trade,assign:assign,status:"open",due:""});
document.getElementById("fr"+id).remove();render();
}
function delItem(id){items=items.filter(function(i){return i.id!==id});render()}
function cycleStatus(id){
var item=items.find(function(i){return i.id===id});
if(!item)return;
var order=["open","ip","done"];
var idx=order.indexOf(item.status);
item.status=order[(idx+1)%3];render();
}
function setFilter(f,el){filter=f;document.querySelectorAll(".filter-btn").forEach(function(b){b.classList.remove("active")});el.classList.add("active");render()}
var labels={open:"Open",ip:"In Progress",done:"Complete"};
var badges={open:"b-open",ip:"b-ip",done:"b-done"};
function render(){
var tot=items.length,nOpen=0,nIp=0,nDone=0;
items.forEach(function(i){if(i.status==="open")nOpen++;else if(i.status==="ip")nIp++;else nDone++;});
document.getElementById("s-total").textContent=tot;
document.getElementById("s-open").textContent=nOpen;
document.getElementById("s-ip").textContent=nIp;
document.getElementById("s-done").textContent=nDone;
document.getElementById("s-pbar").style.width=(tot>0?Math.round(nDone/tot*100):0)+"%";
var vis=filter==="all"?items:items.filter(function(i){return i.status===filter});
var tb=document.getElementById("tbody");
if(!vis.length){tb.innerHTML='<tr><td colspan="8" style="text-align:center;color:#555;padding:16px">No items match filter.</td></tr>';return;}
tb.innerHTML=vis.map(function(item){
return'<tr><td style="color:#555">'+item.n+'</td><td>'+item.desc+'</td><td style="color:#888">'+item.loc+'</td><td style="color:#888">'+item.trade+'</td><td style="color:#888">'+item.assign+'</td><td style="color:#888">'+item.due+'</td>'
+'<td><span class="badge '+badges[item.status]+'" onclick="cycleStatus('+item.id+')" title="Click to cycle status">'+labels[item.status]+'</span></td>'
+'<td><button class="del-btn" onclick="delItem('+item.id+')">X</button></td></tr>';
}).join("");
}
</script></body></html>
