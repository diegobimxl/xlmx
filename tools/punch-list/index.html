<!DOCTYPE html><html lang=en><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Punch List | XLMX</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0d0d0d;color:#e8e8e8;font-family:system-ui,sans-serif}
.tb{background:#1a1a1a;border-bottom:1px solid #2a2a2a;padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.tb a{color:#c8a96e;text-decoration:none;font-size:13px}.tb h1{font-size:16px;font-weight:600}
.tb-actions{margin-left:auto;display:flex;gap:8px}
.wrap{max-width:1000px;margin:0 auto;padding:24px}
.meta{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px}
.meta input{background:#1a1a1a;border:1px solid #333;color:#e8e8e8;padding:7px 12px;border-radius:6px;font-size:13px;width:100%}
.meta input:focus{outline:none;border-color:#c8a96e}
.meta label{font-size:11px;color:#666;margin-bottom:3px;display:block}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.kpi{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:10px;text-align:center}
.kpi .val{font-size:18px;font-weight:700;color:#c8a96e}.kpi .lbl{font-size:10px;color:#888;margin-top:2px}
.add-row{display:grid;grid-template-columns:60px 1fr 2fr 100px 100px 36px;gap:8px;margin-bottom:8px;align-items:center}
.add-row input,.add-row select{background:#1a1a1a;border:1px solid #333;color:#e8e8e8;padding:6px 8px;border-radius:5px;font-size:12px;width:100%}
.add-row input:focus,.add-row select:focus{outline:none;border-color:#c8a96e}
.add-btn{background:#1a1a1a;border:1px solid #333;color:#c8a96e;padding:6px 12px;border-radius:5px;font-size:12px;cursor:pointer}
.add-btn:hover{border-color:#c8a96e}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:#1a1a1a;color:#c8a96e;padding:7px 10px;text-align:left;border:1px solid #2a2a2a;position:sticky;top:0}
.tbl td{padding:6px 10px;border:1px solid #1e1e1e;vertical-align:middle}
.tbl tr:hover td{background:#161616}
.tbl td input,.tbl td select{background:transparent;border:none;color:#e8e8e8;font-size:12px;width:100%;padding:0}
.tbl td input:focus,.tbl td select:focus{outline:none;border-bottom:1px solid #c8a96e}
.status-open{color:#ff9800}.status-complete{color:#4caf50}.status-na{color:#666}
.badge{padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700}
.btn-sm{background:#1a1a1a;border:1px solid #333;color:#c8a96e;padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer}
.btn-sm:hover{border-color:#c8a96e}
.del-btn{background:transparent;border:none;color:#c88;cursor:pointer;font-size:14px;padding:2px 6px}
@media print{.tb-actions,.del-btn,.add-row,.add-btn{display:none!important}body{background:#fff;color:#000}.kpi{border:1px solid #ccc}.tbl th{background:#eee;color:#000}.tbl td{border-color:#ccc}}
</style></head><body>
<div class=tb>
<a href="/tools/">&larr; Tools</a><h1>Punch List</h1>
<div class=tb-actions>
<button class=btn-sm onclick=addItem()>+ Item</button>
<button class=btn-sm onclick=exportCSV()>Export CSV</button>
<button class=btn-sm onclick=window.print()>Print</button>
</div></div>
<div class=wrap>
<div class=meta>
<div><label>Project</label><input type=text id=proj placeholder="Project name"></div>
<div><label>Inspection Date</label><input type=date id=date></div>
<div><label>Inspector</label><input type=text id=insp placeholder="Name"></div>
</div>
<div class=kpis id=kpis></div>
<div class=add-row>
<input type=text id=ni_num placeholder="#" style="width:60px">
<input type=text id=ni_loc placeholder="Location / Room">
<input type=text id=ni_desc placeholder="Description of deficiency">
<select id=ni_resp><option>GC</option><option>Owner</option><option>MEP</option><option>Structural</option><option>Arch</option></select>
<select id=ni_stat><option>Open</option><option>Complete</option><option>N/A</option></select>
<button class=add-btn onclick=addItem()>Add</button>
</div>
<table class=tbl><thead><tr><th style="width:60px">#</th><th>Location</th><th>Description</th><th>Responsible</th><th>Status</th><th>Date Due</th><th></th></tr></thead>
<tbody id=tbody></tbody></table>
</div>
<script>
let items=[];let nextN=1;
const RESPS=['GC','Owner','MEP','Structural','Arch','Civil','Landscape'];
const STATS=['Open','Complete','N/A'];
const STATUS_COLOR={Open:'#ff9800',Complete:'#4caf50','N/A':'#666'};
document.getElementById('date').value=new Date().toISOString().slice(0,10);
function addItem(){
  const num=document.getElementById('ni_num').value||nextN;
  const loc=document.getElementById('ni_loc').value;
  const desc=document.getElementById('ni_desc').value;
  if(!desc){alert('Enter a description.');return;}
  const resp=document.getElementById('ni_resp').value;
  const stat=document.getElementById('ni_stat').value;
  items.push({id:Date.now(),num:String(num),loc,desc,resp,stat,due:''});
  nextN=items.length+1;
  document.getElementById('ni_num').value='';
  document.getElementById('ni_loc').value='';
  document.getElementById('ni_desc').value='';
  render();
}
function delItem(id){items=items.filter(x=>x.id!==id);render();}
function upd(id,key,val){const i=items.find(x=>x.id===id);if(i)i[key]=val;renderKPIs();}
function render(){
  renderKPIs();
  const tb=document.getElementById('tbody');
  tb.innerHTML=items.map(it=>`<tr>
    <td><input value="${it.num}" onchange="upd(${it.id},'num',this.value)" style="width:50px"></td>
    <td><input value="${it.loc}" onchange="upd(${it.id},'loc',this.value)"></td>
    <td><input value="${it.desc}" onchange="upd(${it.id},'desc',this.value)"></td>
    <td><select onchange="upd(${it.id},'resp',this.value)">${RESPS.map(r=>`<option ${r===it.resp?'selected':''}>${r}</option>`).join('')}</select></td>
    <td style="color:${STATUS_COLOR[it.stat]}""><select onchange="upd(${it.id},'stat',this.value)">${STATS.map(s=>`<option ${s===it.stat?'selected':''}>${s}</option>`).join('')}</select></td>
    <td><input type=date value="${it.due}" onchange="upd(${it.id},'due',this.value)"></td>
    <td><button class=del-btn onclick="delItem(${it.id})">&#x2715;</button></td>
  </tr>`).join('');
}
function renderKPIs(){
  const total=items.length;
  const open=items.filter(i=>i.stat==='Open').length;
  const done=items.filter(i=>i.stat==='Complete').length;
  const na=items.filter(i=>i.stat==='N/A').length;
  const pct=total>0?Math.round((done/total)*100):0;
  document.getElementById('kpis').innerHTML=`
    <div class=kpi><div class=val>${total}</div><div class=lbl>Total Items</div></div>
    <div class=kpi><div class=val style="color:#ff9800">${open}</div><div class=lbl>Open</div></div>
    <div class=kpi><div class=val style="color:#4caf50">${done}</div><div class=lbl>Complete</div></div>
    <div class=kpi><div class=val style="color:#666">${na}</div><div class=lbl>N/A</div></div>
    <div class=kpi><div class=val>${pct}%</div><div class=lbl>% Complete</div></div>`;
}
function exportCSV(){
  const proj=document.getElementById('proj').value||'Project';
  const dt=document.getElementById('date').value;
  const rows=[['#','Location','Description','Responsible','Status','Due Date'],...items.map(i=>[i.num,i.loc,i.desc,i.resp,i.stat,i.due])];
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=proj.replace(/\s+/g,'_')+'_PunchList_'+dt+'.csv';a.click();
}
renderKPIs();
// seed sample data
['ni_loc','ni_desc','ni_resp','ni_stat'].forEach(id=>{});
items=[
 {id:1,num:'PL-001',loc:'Level 1 Lobby',desc:'Paint touchup at east wall — scuff marks near door frame',resp:'GC',stat:'Open',due:''},
 {id:2,num:'PL-002',loc:'Restroom 110',desc:'Toilet paper holder not installed per drawings',resp:'GC',stat:'Open',due:''},
 {id:3,num:'PL-003',loc:'Mechanical Room',desc:'Label all electrical panels per NEC 110.22',resp:'MEP',stat:'Open',due:''},
];
nextN=4;render();
</script></body></html>
