<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BIM Execution Plan Checklist | BIM XL Tools</title>
<style>*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#e0e0e0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
.topbar{background:#111;border-bottom:1px solid #2a2a2a;padding:12px 24px;display:flex;align-items:center;gap:16px}
.topbar a{color:#c8a96e;text-decoration:none;font-size:13px;opacity:.7}.topbar a:hover{opacity:1}
.topbar-title{color:#e0e0e0;font-size:15px;font-weight:600}
.container{max-width:860px;margin:0 auto;padding:40px 24px}
h1{font-size:24px;font-weight:700;color:#fff;margin-bottom:8px}
.subtitle{color:#888;font-size:14px;margin-bottom:32px}
.card{background:#141414;border:1px solid #2a2a2a;border-radius:8px;padding:24px;margin-bottom:20px}
.card h2{font-size:14px;font-weight:600;color:#c8a96e;text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px}
label{display:block;font-size:13px;color:#aaa;margin-bottom:4px}
input,select{width:100%;background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:8px 12px;color:#e0e0e0;font-size:14px;margin-bottom:12px}
input:focus,select:focus{outline:none;border-color:#c8a96e}
.btn{background:#c8a96e;color:#0d0d0d;border:none;border-radius:6px;padding:10px 20px;font-weight:700;font-size:14px;cursor:pointer;margin-top:4px}
.btn:hover{background:#d4b87e}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-danger{background:#444;color:#e0e0e0}
.btn-danger:hover{background:#555}
.result{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:16px;margin-top:16px}
.result-value{font-size:20px;font-weight:700;color:#c8a96e}
.result-label{font-size:12px;color:#888;margin-bottom:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#1a1a1a;color:#c8a96e;text-align:left;padding:8px 10px;font-size:12px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #2a2a2a}
td{padding:8px 10px;border-bottom:1px solid #1e1e1e;vertical-align:top}
tr:hover td{background:#161616}
td input,td select{margin-bottom:0;padding:4px 8px;font-size:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.b-open{background:#1a3a1a;color:#4ade80}
.b-closed{background:#3a1a1a;color:#f87171}
.b-draft{background:#2a2a1a;color:#fbbf24}
.b-issued{background:#1a2a3a;color:#60a5fa}
.tbl-wrap{overflow-x:auto}
.row-actions{display:flex;gap:6px}
.empty{color:#555;font-size:13px;padding:20px 0;text-align:center}
@media(max-width:600px){.grid2,.grid3{grid-template-columns:1fr}}</style>
</head>
<body>
<div class="topbar"><a href="/tools/">← Tools</a><span class="topbar-title">BIM Execution Plan Checklist</span></div>
<div class="container">
<h1>BIM Execution Plan Checklist</h1>
<p class="subtitle">Verify your BIM Execution Plan covers all required elements per ISO 19650 and project requirements.</p>
<div class="card">
<h2>Project Info</h2>
<div class="grid2">
  <div><label>Project Name</label><input id="pName" placeholder="Enter project name"></div>
  <div><label>BIM Manager</label><input id="bimMgr" placeholder="Name / Firm"></div>
</div>
<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:4px">
  <button class="btn btn-sm" onclick="checkAll()">Check All</button>
  <button class="btn btn-danger btn-sm" onclick="uncheckAll()">Clear All</button>
  <span id="progress" style="margin-left:auto;font-size:13px;color:#888;align-self:center"></span>
</div>
</div>
<div id="sections"></div>
<script>
var ITEMS=[
  {sec:'1. Project Information',items:['Project name, number, and description','Client / owner information','BIM Manager and authoring team identified','Project schedule and milestone dates','Applicable contracts referencing BIM']},
  {sec:'2. BIM Goals & Uses',items:['Defined BIM uses (Design Authoring, Coordination, Quantity Takeoff, etc.)','Priority BIM uses documented','BIM use workflows described','Stakeholder responsibilities per BIM use']},
  {sec:'3. BIM Process Design',items:['Collaboration process defined','File naming convention established','Model breakdown structure (discipline, zone, phase)','Reference and overlay procedures','Model handover and delivery process']},
  {sec:'4. BIM Information Requirements',items:['LOD matrix per phase (LOD 100–400)','Model element author matrix completed','Graphical and non-graphical data requirements','COBie or asset data requirements (if applicable)','Clash detection tolerance defined']},
  {sec:'5. Collaboration Procedures',items:['CDE (Common Data Environment) platform designated','Access and permission matrix','Model coordination meeting schedule','Issue tracking and resolution process','Revision and supersession procedures']},
  {sec:'6. Quality Control',items:['Model audit schedule defined','Visual checking protocol','Interference detection (hard, soft, clearance)','Standards compliance review process','Pre-submittal QC checklist']},
  {sec:'7. Technology & Software',items:['Authoring software and version (Revit, ArchiCAD, etc.)','IFC version for open exchange','File format requirements per deliverable','Hardware and software requirements communicated','Model linking and coordination software (Navisworks, etc.)']},
  {sec:'8. Deliverables',items:['BIM deliverable schedule per phase','Native file deliverables listed','IFC and neutral format deliverables listed','2D drawing derivation from model confirmed','Final as-built / O&M model requirements']}
];
function render(){
  var html='';
  ITEMS.forEach(function(s,si){
    html+='<div class="card"><h2>'+s.sec+'</h2>';
    s.items.forEach(function(item,ii){
      var id='cb_'+si+'_'+ii;
      html+='<label style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;cursor:pointer"><input type="checkbox" id="'+id+'" onchange="updateProgress()" style="width:auto;margin:2px 0 0 0;flex-shrink:0;accent-color:#c8a96e"><span style="font-size:14px;color:#ccc">'+item+'</span></label>';
    });
    html+='</div>';
  });
  document.getElementById('sections').innerHTML=html;
  updateProgress();
}
function updateProgress(){
  var all=document.querySelectorAll('[id^="cb_"]');
  var checked=document.querySelectorAll('[id^="cb_"]:checked');
  document.getElementById('progress').textContent=checked.length+' / '+all.length+' complete ('+Math.round(checked.length/all.length*100)+'%)';
}
function checkAll(){document.querySelectorAll('[id^="cb_"]').forEach(function(c){c.checked=true;});updateProgress();}
function uncheckAll(){document.querySelectorAll('[id^="cb_"]').forEach(function(c){c.checked=false;});updateProgress();}
render();
</script>
</div>
</body>
</html>
