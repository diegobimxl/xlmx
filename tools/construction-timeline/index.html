<!DOCTYPE html><html lang=en><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Construction Timeline | XLMX</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0d0d0d;color:#e8e8e8;font-family:system-ui,sans-serif}
.tb{background:#1a1a1a;border-bottom:1px solid #2a2a2a;padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.tb a{color:#c8a96e;text-decoration:none;font-size:13px}.tb h1{font-size:16px;font-weight:600}
.tb-right{margin-left:auto;display:flex;gap:8px}
.btn-sm{background:#1a1a1a;border:1px solid #333;color:#c8a96e;padding:5px 12px;border-radius:4px;font-size:12px;cursor:pointer}
.btn-sm:hover{border-color:#c8a96e}
.wrap{max-width:1100px;margin:0 auto;padding:24px}
.ctrl{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;align-items:flex-end}
.ctrl label{font-size:12px;color:#888;display:block;margin-bottom:3px}
.ctrl input,.ctrl select{background:#1a1a1a;border:1px solid #333;color:#e8e8e8;padding:7px 10px;border-radius:5px;font-size:13px}
.ctrl input:focus,.ctrl select:focus{outline:none;border-color:#c8a96e}
.phases{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.phase-row{display:grid;grid-template-columns:180px 70px 70px 1fr 36px;gap:8px;align-items:center}
.phase-row input,.phase-row select{background:#1a1a1a;border:1px solid #333;color:#e8e8e8;padding:6px 8px;border-radius:5px;font-size:12px;width:100%}
.phase-row input:focus,.phase-row select:focus{outline:none;border-color:#c8a96e}
.color-swatch{width:24px;height:24px;border-radius:4px;flex-shrink:0}
.del{background:#2a1a1a;border:1px solid #3a1a1a;color:#c88;padding:0;width:32px;height:32px;border-radius:5px;cursor:pointer}
.add-ph{background:#1a1a1a;border:1px solid #333;color:#c8a96e;padding:7px 14px;border-radius:5px;font-size:12px;cursor:pointer}
.add-ph:hover{border-color:#c8a96e}
.gantt-wrap{overflow-x:auto;border:1px solid #2a2a2a;border-radius:8px}
canvas{display:block}
.note{color:#666;font-size:12px;margin-top:16px;line-height:1.6}
@media print{.tb-right,.ctrl,.phases,.add-ph,.del{display:none!important}body{background:#fff;color:#000}}
</style></head><body>
<div class=tb><a href="/tools/">&larr; Tools</a><h1>Construction Timeline Generator</h1>
<div class=tb-right>
<button class=btn-sm onclick=window.print()>Print</button>
</div></div>
<div class=wrap>
<div class=ctrl>
<div><label>Project Name</label><input type=text id=pname value="Project Timeline" oninput=draw()></div>
<div><label>Start Date</label><input type=date id=start oninput=draw()></div>
<div><label>Duration Unit</label><select id=unit onchange=draw()><option value=w>Weeks</option><option value=m selected>Months</option></select></div>
</div>
<div class=phases id=phases></div>
<button class=add-ph onclick=addPhase()>+ Add Phase</button>
<div class=gantt-wrap style="margin-top:20px"><canvas id=cv></canvas></div>
<p class=note>Drag-free Gantt — edit start/duration values to adjust bars. Typical AEC phases shown by default. Export via Print to PDF.</p>
</div>
<script>
const COLORS=['#c8a96e','#4caf50','#2196f3','#9c27b0','#ff9800','#e91e63','#00bcd4','#8bc34a','#ff5722','#607d8b','#f44336','#3f51b5'];
let phases=[
 {id:1,name:'Programming / Schematic Design',start:0,dur:2,color:COLORS[0]},
 {id:2,name:'Design Development',start:2,dur:2,color:COLORS[1]},
 {id:3,name:'Construction Documents',start:4,dur:3,color:COLORS[2]},
 {id:4,name:'Permitting',start:6,dur:2,color:COLORS[3]},
 {id:5,name:'Bidding & Procurement',start:7,dur:2,color:COLORS[4]},
 {id:6,name:'Site Work & Foundation',start:9,dur:2,color:COLORS[5]},
 {id:7,name:'Structure & Envelope',start:11,dur:3,color:COLORS[6]},
 {id:8,name:'MEP Rough-In',start:13,dur:3,color:COLORS[7]},
 {id:9,name:'Interior Finishes',start:16,dur:3,color:COLORS[8]},
 {id:10,name:'FF&E + Commissioning',start:18,dur:2,color:COLORS[9]},
 {id:11,name:'Closeout / Certificate of Occupancy',start:19,dur:1,color:COLORS[10]},
];
let nextId=12,nextColor=11;
document.getElementById('start').value=new Date().toISOString().slice(0,7)+'-01';
function addPhase(){
  nextColor=(nextColor+1)%COLORS.length;
  const maxEnd=phases.reduce((a,p)=>Math.max(a,p.start+p.dur),0);
  phases.push({id:nextId++,name:'New Phase',start:maxEnd,dur:2,color:COLORS[nextColor]});
  renderPhases();draw();
}
function delPhase(id){phases=phases.filter(p=>p.id!==id);renderPhases();draw();}
function upd(id,k,v){const p=phases.find(x=>x.id===id);if(p){p[k]=k==='start'||k==='dur'?+v:v;}draw();}
function renderPhases(){
  document.getElementById('phases').innerHTML=
    `<div style="display:grid;grid-template-columns:180px 70px 70px 1fr 36px;gap:8px;margin-bottom:4px;font-size:10px;color:#555">
      <span>Phase Name</span><span>Start</span><span>Duration</span><span>Color</span><span></span></div>`+
    phases.map(p=>`
    <div class=phase-row>
      <input value="${p.name}" onchange="upd(${p.id},'name',this.value)">
      <input type=number value="${p.start}" min=0 onchange="upd(${p.id},'start',this.value)">
      <input type=number value="${p.dur}" min=1 onchange="upd(${p.id},'dur',this.value)">
      <input type=color value="${p.color}" onchange="upd(${p.id},'color',this.value)">
      <button class=del onclick="delPhase(${p.id})">&#x2715;</button>
    </div>`).join('');
}
function draw(){
  const unit=document.getElementById('unit').value;
  const pname=document.getElementById('pname').value;
  const startDate=new Date(document.getElementById('start').value);
  const maxEnd=phases.reduce((a,p)=>Math.max(a,p.start+p.dur),0);
  const ROW=38,HDR=60,LEFT=220,PAD=16,RIGHT=20;
  const COLS=maxEnd+1;
  const colW=Math.max(36,Math.min(60,(window.innerWidth-LEFT-PAD*2-RIGHT)/COLS));
  const W=LEFT+colW*COLS+RIGHT;
  const H=HDR+phases.length*ROW+40;
  const cv=document.getElementById('cv');
  cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0d0d0d';ctx.fillRect(0,0,W,H);
  // Title
  ctx.fillStyle='#e8e8e8';ctx.font='bold 14px system-ui';ctx.textAlign='left';
  ctx.fillText(pname,PAD,24);
  // Grid header
  for(let c=0;c<=maxEnd;c++){
    const x=LEFT+c*colW;
    ctx.fillStyle='#1a1a1a';ctx.fillRect(x,30,colW-1,HDR-32);
    ctx.fillStyle='#888';ctx.font='10px system-ui';ctx.textAlign='center';
    let lbl;
    if(unit==='w'){lbl='W'+(c+1);}
    else{const d=new Date(startDate);d.setMonth(d.getMonth()+c);lbl=d.toLocaleString('en',{month:'short',year:'2-digit'});}
    ctx.fillText(lbl,x+colW/2,HDR-4);
    // gridline
    ctx.strokeStyle='#222';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,30);ctx.lineTo(x,H-20);ctx.stroke();
  }
  // Phase rows
  phases.forEach((p,i)=>{
    const y=HDR+i*ROW;
    // stripe
    if(i%2===0){ctx.fillStyle='#0f0f0f';ctx.fillRect(0,y,W,ROW);}
    // label
    ctx.fillStyle='#ccc';ctx.font='12px system-ui';ctx.textAlign='left';
    const lbl=p.name.length>28?p.name.slice(0,26)+'…':p.name;
    ctx.fillText(lbl,PAD,y+ROW/2+4);
    // bar
    const bx=LEFT+p.start*colW+2;
    const bw=p.dur*colW-4;
    const by=y+6;const bh=ROW-12;
    ctx.fillStyle=p.color+'33';ctx.fillRect(bx,by,bw,bh);
    ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.strokeRect(bx,by,bw,bh);
    ctx.fillStyle=p.color;ctx.font='bold 11px system-ui';ctx.textAlign='center';
    if(bw>30)ctx.fillText(p.dur+(unit==='w'?' wk':' mo'),bx+bw/2,by+bh/2+4);
  });
  // Today line
  const todayOffset=Math.round((new Date()-startDate)/(unit==='w'?7*86400000:30.44*86400000));
  if(todayOffset>=0&&todayOffset<=maxEnd){
    const tx=LEFT+todayOffset*colW;
    ctx.strokeStyle='#f44336';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(tx,30);ctx.lineTo(tx,H-20);ctx.stroke();
    ctx.setLineDash([]);ctx.fillStyle='#f44336';ctx.font='10px system-ui';ctx.textAlign='center';
    ctx.fillText('Today',tx,H-6);
  }
}
renderPhases();draw();window.addEventListener('resize',draw);
</script></body></html>
