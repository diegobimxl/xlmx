<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sheet Index Builder | BIM XL Tools</title>
<style>*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#e0e0e0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
.topbar{background:#111;border-bottom:1px solid #2a2a2a;padding:12px 24px;display:flex;align-items:center;gap:16px}
.topbar a{color:#c8a96e;text-decoration:none;font-size:13px;opacity:.7}.topbar a:hover{opacity:1}
.topbar-title{color:#e0e0e0;font-size:15px;font-weight:600}
.container{max-width:860px;margin:0 auto;padding:40px 24px}
h1{font-size:24px;font-weight:700;color:#fff;margin-bottom:8px}
.subtitle{color:#888;font-size:14px;margin-bottom:32px}
.card{background:#141414;border:1px solid #2a2a2a;border-radius:8px;padding:24px;margin-bottom:20px}
.card h2{font-size:14px;font-weight:600;color:#c8a96e;text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px}
label{display:block;font-size:13px;color:#aaa;margin-bottom:4px}
input,select{width:100%;background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:8px 12px;color:#e0e0e0;font-size:14px;margin-bottom:12px}
input:focus,select:focus{outline:none;border-color:#c8a96e}
.btn{background:#c8a96e;color:#0d0d0d;border:none;border-radius:6px;padding:10px 20px;font-weight:700;font-size:14px;cursor:pointer;margin-top:4px}
.btn:hover{background:#d4b87e}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-danger{background:#444;color:#e0e0e0}
.btn-danger:hover{background:#555}
.result{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:16px;margin-top:16px}
.result-value{font-size:20px;font-weight:700;color:#c8a96e}
.result-label{font-size:12px;color:#888;margin-bottom:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#1a1a1a;color:#c8a96e;text-align:left;padding:8px 10px;font-size:12px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #2a2a2a}
td{padding:8px 10px;border-bottom:1px solid #1e1e1e;vertical-align:top}
tr:hover td{background:#161616}
td input,td select{margin-bottom:0;padding:4px 8px;font-size:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.b-open{background:#1a3a1a;color:#4ade80}
.b-closed{background:#3a1a1a;color:#f87171}
.b-draft{background:#2a2a1a;color:#fbbf24}
.b-issued{background:#1a2a3a;color:#60a5fa}
.tbl-wrap{overflow-x:auto}
.row-actions{display:flex;gap:6px}
.empty{color:#555;font-size:13px;padding:20px 0;text-align:center}
@media(max-width:600px){.grid2,.grid3{grid-template-columns:1fr}}</style>
</head>
<body>
<div class="topbar"><a href="/tools/">← Tools</a><span class="topbar-title">Sheet Index Builder</span></div>
<div class="container">
<h1>Sheet Index Builder</h1>
<p class="subtitle">Build and manage a project sheet index with discipline, status, and revision tracking.</p>
<div class="card">
<h2>Add Sheet</h2>
<div class="grid3">
  <div><label>Sheet No.</label><input id="sNum" placeholder="A1.01"></div>
  <div><label>Sheet Name</label><input id="sName" placeholder="Floor Plan - Level 1"></div>
  <div><label>Discipline</label><select id="sDis">
    <option>Architecture</option><option>Structural</option><option>MEP</option>
    <option>Civil</option><option>Landscape</option><option>Interior</option><option>General</option>
  </select></div>
  <div><label>Revision</label><input id="sRev" placeholder="00" style="width:100%"></div>
  <div><label>Date</label><input id="sDate" type="date"></div>
  <div><label>Status</label><select id="sStat">
    <option value="draft">Draft</option><option value="issued">Issued for Review</option>
    <option value="cd">Issued for CD</option><option value="permit">Issued for Permit</option>
    <option value="construction">Issued for Construction</option><option value="asbuilt">As-Built</option>
  </select></div>
</div>
<button class="btn" onclick="addRow()">Add Sheet</button>
<button class="btn btn-danger btn-sm" onclick="clearAll()" style="margin-left:8px">Clear All</button>
</div>
<div class="card">
<h2>Sheet Index <span id="sheetCount" style="color:#888;font-weight:400;font-size:12px"></span></h2>
<div class="tbl-wrap">
<table><thead><tr><th>Sheet No.</th><th>Sheet Name</th><th>Discipline</th><th>Rev</th><th>Date</th><th>Status</th><th></th></tr></thead>
<tbody id="sheetBody"><tr><td colspan="7" class="empty">No sheets added yet.</td></tr></tbody>
</table>
</div>
</div>
<script>
var sheets=[];
var statusColors={draft:'b-draft',issued:'b-issued',cd:'b-issued',permit:'b-open',construction:'b-open',asbuilt:'b-closed'};
var statusLabels={draft:'Draft',issued:'IFR',cd:'IFC',permit:'IFP',construction:'IFC',asbuilt:'As-Built'};
function addRow(){
  var num=document.getElementById('sNum').value.trim();
  var name=document.getElementById('sName').value.trim();
  if(!num||!name){alert('Sheet number and name required.');return;}
  sheets.push({num:num,name:name,dis:document.getElementById('sDis').value,rev:document.getElementById('sRev').value||'00',date:document.getElementById('sDate').value,stat:document.getElementById('sStat').value});
  sheets.sort(function(a,b){return a.num.localeCompare(b.num);});
  render();
  document.getElementById('sNum').value='';document.getElementById('sName').value='';document.getElementById('sRev').value='';
}
function removeRow(i){sheets.splice(i,1);render();}
function render(){
  var b=document.getElementById('sheetBody');
  document.getElementById('sheetCount').textContent='('+sheets.length+' sheet'+(sheets.length!==1?'s':'')+')';
  if(!sheets.length){b.innerHTML='<tr><td colspan="7" class="empty">No sheets added yet.</td></tr>';return;}
  b.innerHTML=sheets.map(function(s,i){
    return '<tr><td>'+s.num+'</td><td>'+s.name+'</td><td>'+s.dis+'</td><td>'+s.rev+'</td><td>'+(s.date||'—')+'</td><td><span class="badge '+statusColors[s.stat]+'">'+statusLabels[s.stat]+'</span></td><td><button class="btn btn-danger btn-sm" onclick="removeRow('+i+')">✕</button></td></tr>';
  }).join('');
}
function clearAll(){if(confirm('Clear all sheets?')){sheets=[];render();}}
</script>
</div>
</body>
</html>
