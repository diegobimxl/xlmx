<!DOCTYPE html><html lang=en><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><title>IRR / NPV Calculator | XLMX</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0d0d0d;color:#e8e8e8;font-family:system-ui,sans-serif}
.tb{background:#1a1a1a;border-bottom:1px solid #2a2a2a;padding:12px 24px;display:flex;align-items:center;gap:16px}
.tb a{color:#c8a96e;text-decoration:none;font-size:13px}.tb h1{font-size:16px;font-weight:600}
.wrap{max-width:760px;margin:0 auto;padding:32px 24px}
.sub{color:#888;font-size:14px;margin-bottom:20px}
label{display:block;font-size:13px;color:#aaa;margin-bottom:4px;margin-top:16px}
input{background:#1a1a1a;border:1px solid #333;color:#e8e8e8;padding:8px 12px;border-radius:6px;font-size:14px;width:100%}
input:focus{outline:none;border-color:#c8a96e}
.btn{margin-top:8px;background:#c8a96e;color:#0d0d0d;border:none;padding:8px 20px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer}
.add-btn{background:#1a1a1a;border:1px solid #333;color:#c8a96e;padding:7px 16px;border-radius:6px;font-size:13px;cursor:pointer;margin-top:16px}
.add-btn:hover{border-color:#c8a96e}
.cf-row{display:grid;grid-template-columns:80px 1fr 36px;gap:8px;margin-bottom:6px;align-items:center}
.cf-row span{font-size:12px;color:#888;text-align:right}
.cf-row input{padding:6px 10px;font-size:13px}
.del{background:#2a1a1a;border:1px solid #3a1a1a;color:#c88;padding:0;width:32px;height:32px;border-radius:5px;cursor:pointer}
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:24px}
.kpi{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:14px;text-align:center}
.kpi .val{font-size:22px;font-weight:700;color:#c8a96e}.kpi .lbl{font-size:11px;color:#888;margin-top:3px}
.tbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:16px}
.tbl th{background:#1a1a1a;color:#c8a96e;padding:8px 10px;text-align:right;border:1px solid #2a2a2a}
.tbl th:first-child{text-align:left}
.tbl td{padding:7px 10px;border:1px solid #222;text-align:right}
.tbl td:first-child{text-align:left;color:#aaa}
.note{color:#666;font-size:12px;margin-top:16px;line-height:1.6}
</style></head><body>
<div class=tb><a href="/tools/">&larr; Tools</a><h1>IRR / NPV Calculator</h1></div>
<div class=wrap>
<p class=sub>Enter annual cash flows. Year 0 is typically a negative investment.</p>
<label>Discount Rate for NPV (%)</label>
<input type=number id=rate value=10 step=0.5 min=0 max=50 style="width:200px">
<div style="margin-top:16px;font-size:12px;color:#666;margin-bottom:8px">Cash Flows</div>
<div id=cfs></div>
<button class=add-btn onclick=addCF()>+ Add Year</button>
<button class=btn onclick=calc() style="margin-left:12px;margin-top:16px">Calculate</button>
<div id=out></div>
<p class=note>IRR is solved via Newton-Raphson iteration. NPV = sum of CF_t / (1+r)^t. Equity Multiple = Total Distributions / Total Invested. Payback = first year cumulative CF turns positive.</p>
</div>
<script>
let cfs=[-1000000,0,0,150000,200000,250000,300000,1200000];
function renderCFs(){
  document.getElementById('cfs').innerHTML=cfs.map((v,i)=>`
    <div class=cf-row>
      <span>Year ${i}</span>
      <input type=number value="${v}" onchange="cfs[${i}]=+this.value;calc()">
      ${i>0?`<button class=del onclick="removeCF(${i})">&#x2715;</button>`:'<span></span>'}
    </div>`).join('');
}
function addCF(){cfs.push(0);renderCFs();calc();}
function removeCF(i){cfs.splice(i,1);renderCFs();calc();}
function npv(cfs,r){return cfs.reduce((s,c,t)=>s+c/Math.pow(1+r,t),0);}
function irr(cfs){
  let r=0.1;
  for(let i=0;i<1000;i++){
    const v=npv(cfs,r);
    const dv=cfs.reduce((s,c,t)=>s-t*c/Math.pow(1+r,t+1),0);
    if(Math.abs(dv)<1e-10)break;
    const nr=r-v/dv;
    if(Math.abs(nr-r)<1e-8)return nr;
    r=nr;
    if(r<-0.99)return null;
  }
  return r;
}
function calc(){
  const rate=+document.getElementById('rate').value/100;
  const NPV=npv(cfs,rate);
  const IRR=irr(cfs);
  const invested=cfs.filter(c=>c<0).reduce((a,c)=>a+Math.abs(c),0);
  const dist=cfs.filter(c=>c>0).reduce((a,c)=>a+c,0);
  const em=invested>0?dist/invested:0;
  let payback=null;let cum=0;
  for(let i=0;i<cfs.length;i++){cum+=cfs[i];if(cum>=0&&payback===null)payback=i;}
  let cum2=0;
  const rows=cfs.map((c,t)=>{cum2+=c;return {t,c,cum:cum2,pv:c/Math.pow(1+rate,t)};});
  document.getElementById('out').innerHTML=`
  <div class=kpis>
    <div class=kpi><div class=val>${IRR!=null?(IRR*100).toFixed(2)+'%':'N/A'}</div><div class=lbl>IRR</div></div>
    <div class=kpi><div class=val style="color:${NPV>=0?'#4caf50':'#f44336'}">$${(NPV/1000).toFixed(1)}K</div><div class=lbl>NPV @ ${(rate*100).toFixed(1)}%</div></div>
    <div class=kpi><div class=val>${em.toFixed(2)}x</div><div class=lbl>Equity Multiple</div></div>
    <div class=kpi><div class=val>${payback!=null?'Year '+payback:'N/A'}</div><div class=lbl>Payback Period</div></div>
    <div class=kpi><div class=val>$${(invested/1000).toFixed(1)}K</div><div class=lbl>Total Invested</div></div>
    <div class=kpi><div class=val>$${(dist/1000).toFixed(1)}K</div><div class=lbl>Total Distributions</div></div>
  </div>
  <table class=tbl><thead><tr><th>Year</th><th>Cash Flow</th><th>PV of CF</th><th>Cumulative CF</th></tr></thead>
  <tbody>${rows.map(r=>`<tr><td>Year ${r.t}</td><td style="color:${r.c<0?'#f44336':'#4caf50'}">$${r.c.toLocaleString()}</td><td>$${r.pv.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',')}</td><td style="color:${r.cum<0?'#f44336':'#4caf50'}">$${r.cum.toLocaleString()}</td></tr>`).join('')}</tbody></table>`;
}
renderCFs();calc();
</script></body></html>
