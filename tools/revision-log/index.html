<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Revision Log | BIM XL Tools</title>
<style>*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#e0e0e0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
.topbar{background:#111;border-bottom:1px solid #2a2a2a;padding:12px 24px;display:flex;align-items:center;gap:16px}
.topbar a{color:#c8a96e;text-decoration:none;font-size:13px;opacity:.7}.topbar a:hover{opacity:1}
.topbar-title{color:#e0e0e0;font-size:15px;font-weight:600}
.container{max-width:860px;margin:0 auto;padding:40px 24px}
h1{font-size:24px;font-weight:700;color:#fff;margin-bottom:8px}
.subtitle{color:#888;font-size:14px;margin-bottom:32px}
.card{background:#141414;border:1px solid #2a2a2a;border-radius:8px;padding:24px;margin-bottom:20px}
.card h2{font-size:14px;font-weight:600;color:#c8a96e;text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px}
label{display:block;font-size:13px;color:#aaa;margin-bottom:4px}
input,select{width:100%;background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:8px 12px;color:#e0e0e0;font-size:14px;margin-bottom:12px}
input:focus,select:focus{outline:none;border-color:#c8a96e}
.btn{background:#c8a96e;color:#0d0d0d;border:none;border-radius:6px;padding:10px 20px;font-weight:700;font-size:14px;cursor:pointer;margin-top:4px}
.btn:hover{background:#d4b87e}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-danger{background:#444;color:#e0e0e0}
.btn-danger:hover{background:#555}
.result{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:16px;margin-top:16px}
.result-value{font-size:20px;font-weight:700;color:#c8a96e}
.result-label{font-size:12px;color:#888;margin-bottom:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#1a1a1a;color:#c8a96e;text-align:left;padding:8px 10px;font-size:12px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #2a2a2a}
td{padding:8px 10px;border-bottom:1px solid #1e1e1e;vertical-align:top}
tr:hover td{background:#161616}
td input,td select{margin-bottom:0;padding:4px 8px;font-size:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.b-open{background:#1a3a1a;color:#4ade80}
.b-closed{background:#3a1a1a;color:#f87171}
.b-draft{background:#2a2a1a;color:#fbbf24}
.b-issued{background:#1a2a3a;color:#60a5fa}
.tbl-wrap{overflow-x:auto}
.row-actions{display:flex;gap:6px}
.empty{color:#555;font-size:13px;padding:20px 0;text-align:center}
@media(max-width:600px){.grid2,.grid3{grid-template-columns:1fr}}</style>
</head>
<body>
<div class="topbar"><a href="/tools/">← Tools</a><span class="topbar-title">Revision Log</span></div>
<div class="container">
<h1>Revision Log</h1>
<p class="subtitle">Track drawing and document revisions with delta descriptions, authors, and issue dates.</p>
<div class="card">
<h2>Add Revision</h2>
<div class="grid2">
  <div><label>Rev No.</label><input id="revNo" placeholder="01"></div>
  <div><label>Date</label><input id="revDate" type="date"></div>
  <div><label>Description of Change</label><input id="revDesc" placeholder="Updated column grid per structural RFI-012"></div>
  <div><label>Affected Sheets</label><input id="revSheets" placeholder="A2.01, A2.02, S1.01"></div>
  <div><label>Issued By</label><input id="revBy" placeholder="Name / Firm"></div>
  <div><label>Approved By</label><input id="revAppr" placeholder="PM / Principal"></div>
</div>
<button class="btn" onclick="addRev()">Add Revision</button>
</div>
<div class="card">
<h2>Revision History <span id="revCount" style="color:#888;font-weight:400;font-size:12px"></span></h2>
<div class="tbl-wrap">
<table><thead><tr><th>Rev</th><th>Date</th><th>Description</th><th>Sheets</th><th>By</th><th>Approved</th><th></th></tr></thead>
<tbody id="revBody"><tr><td colspan="7" class="empty">No revisions logged yet.</td></tr></tbody>
</table>
</div>
</div>
<script>
var revs=[];
function addRev(){
  var no=document.getElementById('revNo').value.trim();
  var desc=document.getElementById('revDesc').value.trim();
  if(!no||!desc){alert('Revision number and description required.');return;}
  revs.unshift({no:no,date:document.getElementById('revDate').value,desc:desc,sheets:document.getElementById('revSheets').value,by:document.getElementById('revBy').value,appr:document.getElementById('revAppr').value});
  renderRev();
  ['revNo','revDate','revDesc','revSheets','revBy','revAppr'].forEach(function(id){document.getElementById(id).value='';});
}
function removeRev(i){revs.splice(i,1);renderRev();}
function renderRev(){
  var b=document.getElementById('revBody');
  document.getElementById('revCount').textContent='('+revs.length+' revision'+(revs.length!==1?'s':'')+')';
  if(!revs.length){b.innerHTML='<tr><td colspan="7" class="empty">No revisions logged yet.</td></tr>';return;}
  b.innerHTML=revs.map(function(r,i){
    return '<tr><td><span class="badge b-issued">'+r.no+'</span></td><td style="white-space:nowrap">'+(r.date||'—')+'</td><td>'+r.desc+'</td><td style="font-size:12px;color:#888">'+r.sheets+'</td><td>'+r.by+'</td><td>'+r.appr+'</td><td><button class="btn btn-danger btn-sm" onclick="removeRev('+i+')">✕</button></td></tr>';
  }).join('');
}
</script>
</div>
</body>
</html>
