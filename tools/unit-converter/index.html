<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Unit Converter | BIM XL Tools</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#e0e0e0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;padding:0}
.topbar{background:#111;border-bottom:1px solid #2a2a2a;padding:12px 24px;display:flex;align-items:center;gap:16px}
.topbar a{color:#c8a96e;text-decoration:none;font-size:13px;opacity:.7}
.topbar a:hover{opacity:1}
.topbar-title{color:#e0e0e0;font-size:15px;font-weight:600}
.container{max-width:720px;margin:0 auto;padding:40px 24px}
h1{font-size:24px;font-weight:700;color:#fff;margin-bottom:8px}
.subtitle{color:#888;font-size:14px;margin-bottom:32px}
.card{background:#141414;border:1px solid #2a2a2a;border-radius:8px;padding:24px;margin-bottom:20px}
.card h2{font-size:14px;font-weight:600;color:#c8a96e;text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px}
label{display:block;font-size:13px;color:#aaa;margin-bottom:6px;margin-top:14px}
label:first-of-type{margin-top:0}
input,select{width:100%;background:#0d0d0d;border:1px solid #333;border-radius:6px;color:#e0e0e0;font-size:15px;padding:10px 12px;outline:none}
input:focus,select:focus{border-color:#c8a96e}
.btn{background:#c8a96e;color:#0d0d0d;border:none;border-radius:6px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:20px}
.btn:hover{background:#d4b97e}
.result{background:#0d0d0d;border:1px solid #2a2a2a;border-radius:6px;padding:16px;margin-top:16px}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1e1e1e}
.result-row:last-child{border-bottom:none}
.result-label{font-size:13px;color:#888}
.result-value{font-size:18px;font-weight:700;color:#c8a96e}
.sep{height:1px;background:#2a2a2a;margin:20px 0}
footer{text-align:center;padding:40px 24px 24px;color:#444;font-size:12px}
footer a{color:#666;text-decoration:none}
</style>
</head>
<body>
<div class="topbar">
  <a href="/tools/">← Tools</a>
  <span class="topbar-title">Unit Converter</span>
</div>
<div class="container">
<h1>Unit Converter</h1>
<p class="subtitle">Convert lengths, areas, and volumes between imperial and metric units.</p>

<div class="card">
  <h2>Length</h2>
  <label>From</label>
  <select id="lf"><option value="ft">Feet</option><option value="in">Inches</option><option value="yd">Yards</option><option value="m">Meters</option><option value="cm">Centimeters</option><option value="mm">Millimeters</option></select>
  <label>Value</label><input id="lv" type="number" placeholder="Enter value">
  <label>To</label>
  <select id="lt"><option value="m">Meters</option><option value="mm">Millimeters</option><option value="cm">Centimeters</option><option value="ft">Feet</option><option value="in">Inches</option><option value="yd">Yards</option></select>
  <button class="btn" onclick="conv('l')">Convert</button>
  <div class="result" id="rl" style="display:none"><div class="result-row"><span class="result-label">Result</span><span class="result-value" id="rlv"></span></div></div>
</div>
<div class="card">
  <h2>Area</h2>
  <label>From</label>
  <select id="af"><option value="sf">Square Feet</option><option value="sy">Square Yards</option><option value="sm">Square Meters</option><option value="acre">Acres</option><option value="ha">Hectares</option></select>
  <label>Value</label><input id="av" type="number" placeholder="Enter value">
  <label>To</label>
  <select id="at"><option value="sm">Square Meters</option><option value="sf">Square Feet</option><option value="sy">Square Yards</option><option value="acre">Acres</option><option value="ha">Hectares</option></select>
  <button class="btn" onclick="conv('a')">Convert</button>
  <div class="result" id="ra" style="display:none"><div class="result-row"><span class="result-label">Result</span><span class="result-value" id="rav"></span></div></div>
</div>
<div class="card">
  <h2>Volume</h2>
  <label>From</label>
  <select id="vf"><option value="cy">Cubic Yards</option><option value="cf">Cubic Feet</option><option value="cm">Cubic Meters</option><option value="gal">Gallons</option><option value="L">Liters</option></select>
  <label>Value</label><input id="vv" type="number" placeholder="Enter value">
  <label>To</label>
  <select id="vt"><option value="cm">Cubic Meters</option><option value="cy">Cubic Yards</option><option value="cf">Cubic Feet</option><option value="gal">Gallons</option><option value="L">Liters</option></select>
  <button class="btn" onclick="conv('v')">Convert</button>
  <div class="result" id="rv" style="display:none"><div class="result-row"><span class="result-label">Result</span><span class="result-value" id="rvv"></span></div></div>
</div>
<script>
var LM={ft:0.3048,in:0.0254,yd:0.9144,m:1,cm:0.01,mm:0.001};
var AM={sf:0.092903,sy:0.836127,sm:1,acre:4046.86,ha:10000};
var VM={cy:0.764555,cf:0.0283168,cm:1,gal:0.00378541,L:0.001};
function conv(t){
  var maps={l:LM,a:AM,v:VM};
  var M=maps[t];
  var val=+document.getElementById(t+'v').value;
  var from=document.getElementById(t+'f').value;
  var to=document.getElementById(t+'t').value;
  if(!val)return;
  var base=val*M[from];
  var res=base/M[to];
  var units={l:{ft:'ft',in:'in',yd:'yd',m:'m',cm:'cm',mm:'mm'},a:{sf:'ft²',sy:'yd²',sm:'m²',acre:'acres',ha:'ha'},v:{cy:'yd³',cf:'ft³',cm:'m³',gal:'gal',L:'L'}};
  document.getElementById('r'+t+'v').textContent=res.toLocaleString('en-US',{maximumFractionDigits:4})+' '+units[t][to];
  document.getElementById('r'+t).style.display='block';
}
</script>

</div>
<footer>BIM XL Tools &mdash; <a href="https://bimxl.com">bimxl.com</a></footer>
</body>
</html>
