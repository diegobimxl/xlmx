<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Photo Log — XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:20px}.card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:20px;margin-bottom:16px}.card-title{font-size:13px;font-weight:600;color:#ccc;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}label{font-size:11px;color:#888;display:block;margin-bottom:4px}input,select,textarea{width:100%;background:#111;border:1px solid #333;color:#fff;padding:9px 12px;border-radius:6px;font-size:13px;font-family:inherit}input:focus,select:focus,textarea:focus{outline:none;border-color:#16a34a}textarea{resize:vertical;min-height:60px}.btn{padding:9px 18px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;margin-top:12px}.btn-p{background:#16a34a;color:#fff}.btn-g{background:#222;border:1px solid #333;color:#ccc;margin-left:8px}.search-row{display:flex;gap:8px;margin-bottom:12px}.search-bar{flex:1;background:#1a1a1a;border:1px solid #333;color:#fff;padding:9px 12px;border-radius:6px;font-size:13px}.search-bar:focus{outline:none;border-color:#16a34a}.tag{display:inline-block;padding:2px 8px;background:#16a34a22;color:#16a34a;border-radius:3px;font-size:10px;font-weight:600;margin-right:4px;margin-top:2px}.tbl{width:100%;border-collapse:collapse}.tbl th{font-size:11px;color:#555;text-align:left;padding:8px;border-bottom:1px solid #222}.tbl td{font-size:12px;padding:8px;border-bottom:1px solid #1a1a1a;color:#ccc;vertical-align:top}.tbl tr:hover td{background:#1e1e1e}.del-btn{background:none;border:none;color:#666;cursor:pointer;font-size:13px}.count-bar{font-size:12px;color:#888;margin-bottom:8px}</style></head><body><h1>Construction Photo Log</h1><div class="sub">Track site photos, locations, and observations by date</div><div class="card"><div class="card-title">New Entry</div><div class="grid"><div><label>Date</label><input id="pl-date" type="date"></div><div><label>Location / Zone</label><input id="pl-loc" placeholder="e.g. Level 3 NE Corner"></div><div><label>Category</label><select id="pl-cat"><option>Progress</option><option>Issue / Defect</option><option>RFI Documentation</option><option>Safety</option><option>Existing Conditions</option><option>Mockup</option><option>Closeout</option></select></div><div><label>Photographer</label><input id="pl-who" placeholder="e.g. Diego R."></div><div><label>Photo Reference # / File</label><input id="pl-ref" placeholder="e.g. IMG_0042 or P-2024-001"></div><div><label>Tags (comma separated)</label><input id="pl-tags" placeholder="e.g. concrete, level-3, rfi-12"></div></div><div style="margin-top:12px"><label>Description / Observation</label><textarea id="pl-desc" placeholder="Describe what was photographed and any observations..."></textarea></div><button class="btn btn-p" onclick="addEntry()">Add Entry</button><button class="btn btn-g" onclick="exportCSV()">Export CSV</button></div><div class="search-row"><input class="search-bar" id="search" placeholder="Search log..." oninput="render()"><select id="cat-filter" style="background:#1a1a1a;border:1px solid #333;color:#fff;padding:9px 12px;border-radius:6px;font-size:13px" onchange="render()"><option value="">All Categories</option><option>Progress</option><option>Issue / Defect</option><option>RFI Documentation</option><option>Safety</option><option>Existing Conditions</option><option>Mockup</option><option>Closeout</option></select></div><div class="card"><div class="card-title">Photo Log <span id="count-lbl" style="color:#888;font-weight:400"></span></div><table class="tbl"><thead><tr><th>Date</th><th>Location</th><th>Category</th><th>Ref #</th><th>Description</th><th>Tags</th><th>By</th><th></th></tr></thead><tbody id="tb"></tbody></table></div><script>var PL=JSON.parse(localStorage.getItem("pl")||"[]");function save(){localStorage.setItem("pl",JSON.stringify(PL));}function addEntry(){var date=document.getElementById("pl-date").value;var loc=document.getElementById("pl-loc").value.trim();var cat=document.getElementById("pl-cat").value;var who=document.getElementById("pl-who").value.trim();var ref=document.getElementById("pl-ref").value.trim();var tags=document.getElementById("pl-tags").value.trim();var desc=document.getElementById("pl-desc").value.trim();if(!loc||!desc)return;PL.push({date:date||new Date().toISOString().slice(0,10),loc,cat,who,ref,tags,desc});save();render();["pl-loc","pl-ref","pl-tags","pl-desc","pl-who"].forEach(function(id){document.getElementById(id).value="";});}function del(i){PL.splice(i,1);save();render();}function render(){var q=document.getElementById("search").value.toLowerCase();var cf=document.getElementById("cat-filter").value;var tb=document.getElementById("tb");tb.innerHTML="";var rows=PL.filter(function(e){var match=!q||(e.loc+e.cat+e.desc+e.tags+e.ref+e.who).toLowerCase().includes(q);var catMatch=!cf||e.cat===cf;return match&&catMatch;}).slice().reverse();document.getElementById("count-lbl").textContent="("+rows.length+" of "+PL.length+")";rows.forEach(function(e){var idx=PL.indexOf(e);var tagHtml="";if(e.tags){e.tags.split(",").forEach(function(t){t=t.trim();if(t)tagHtml+="<span class=\"tag\">"+t+"</span>";});}tb.innerHTML+="<tr><td>"+e.date+"</td><td>"+e.loc+"</td><td>"+e.cat+"</td><td>"+( e.ref||"-")+"</td><td>"+e.desc+"</td><td>"+tagHtml+"</td><td>"+(e.who||"-")+"</td><td><button class=\"del-btn\" onclick=\"del("+idx+")\">x</button></td></tr>";});}function exportCSV(){var rows=[["Date","Location","Category","Ref","Description","Tags","By"]];PL.forEach(function(e){rows.push([e.date,e.loc,e.cat,e.ref,e.desc,e.tags,e.who]);});var csv=rows.map(function(r){return r.map(function(c){return "\""+String(c||"").replace(/"/g,"\"\"")+"\"";}).join(",");}).join("\n");var a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="photo-log.csv";a.click();}if(PL.length===0){var t=new Date().toISOString().slice(0,10);PL=[{date:t,loc:"Level 2 - Column Grid B3",cat:"Progress",who:"Diego R.",ref:"IMG_0101",tags:"concrete,level-2,formwork",desc:"Formwork for slab level 2 complete. Ready for rebar inspection."},{date:t,loc:"Roof - NE Parapet",cat:"Issue / Defect",who:"Diego R.",ref:"IMG_0115",tags:"roofing,defect,punch",desc:"Flashing separation at parapet corner. Requires repair before waterproofing."},{date:t,loc:"Ground Floor Lobby",cat:"Existing Conditions",who:"Diego R.",ref:"IMG_0055",tags:"lobby,existing,tile",desc:"Existing tile condition documented prior to demolition. Cracking visible near entry doors."}];save();}render();</script></body></html>
