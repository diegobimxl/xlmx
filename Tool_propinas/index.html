<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Calculadora de Propinas — XLMX</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fff;color:#111;line-height:1.6}
a{color:#111;text-decoration:none}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;border-bottom:1px solid #e5e5e5}
.logo{font-size:20px;font-weight:800;letter-spacing:1px}
.back{font-size:13px;color:#666}
.main{max-width:500px;margin:40px auto;padding:0 32px}
.main h2{font-size:18px;margin-bottom:4px}
.main>p{font-size:13px;color:#666;margin-bottom:24px}
label{font-size:12px;color:#666;display:block;margin-bottom:12px}
input,select{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;font-size:14px;margin-top:4px}
.tip-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:16px 0}
.tip-opt{padding:12px;border:2px solid #e5e5e5;border-radius:6px;text-align:center;cursor:pointer;transition:all .2s}
.tip-opt.on{border-color:#111;background:#f9f9f9}
.tip-opt .pct{font-size:18px;font-weight:700}
.tip-opt .lbl{font-size:10px;color:#666}
.btn{padding:10px 24px;background:#111;color:#fff;border:none;border-radius:4px;font-size:13px;cursor:pointer;width:100%;margin-top:8px}
.result{border:1px solid #e5e5e5;border-radius:6px;padding:24px;margin-top:20px;display:none}
.result .row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.result .row.total{border-bottom:none;font-size:18px;font-weight:700;padding-top:12px}
.result .per-person{margin-top:16px;border-top:2px solid #111;padding-top:16px;text-align:center}
.result .per-person .big{font-size:32px;font-weight:700}
.result .per-person .lbl{font-size:12px;color:#666}
.share-btn{display:inline-block;padding:8px 20px;background:#25d366;color:#fff;border:none;border-radius:4px;font-size:12px;cursor:pointer;margin-top:12px}
.footer-bar{position:fixed;bottom:0;left:0;right:0;background:#111;color:#fff;display:flex;justify-content:space-between;align-items:center;padding:10px 32px;font-size:13px}
.footer-bar a{color:#111;background:#fff;padding:6px 16px;border-radius:4px;font-size:12px;font-weight:600}
</style>
</head>
<body>
<header>
<div style="display:flex;align-items:center;gap:12px"><div class="logo">XLMX</div><span style="font-size:13px;color:#666">Calculadora de Propinas</span></div>
<a href="../" class="back">&larr; Portal</a>
</header>
<div class="main">
<h2>Calculadora de Propinas</h2>
<p>Divide la cuenta, calcula la propina y comparte por WhatsApp. Sin discusiones.</p>
<label>Total de la cuenta (MXN)<input id="total" type="number" step="0.01" placeholder="$0.00"></label>
<label>Propina</label>
<div class="tip-row">
<div class="tip-opt" onclick="setTip(10)"><div class="pct">10%</div><div class="lbl">Normal</div></div>
<div class="tip-opt on" onclick="setTip(15)"><div class="pct">15%</div><div class="lbl">Bueno</div></div>
<div class="tip-opt" onclick="setTip(20)"><div class="pct">20%</div><div class="lbl">Excelente</div></div>
<div class="tip-opt" onclick="setTip(0)"><div class="pct">Otro</div><div class="lbl">Custom</div></div>
</div>
<div id="customTip" style="display:none"><label>Porcentaje personalizado<input id="customPct" type="number" step="1" placeholder="12"></label></div>
<label>Personas en la mesa<select id="people">
<option value="1">1 persona</option><option value="2" selected>2 personas</option>
<option value="3">3 personas</option><option value="4">4 personas</option>
<option value="5">5 personas</option><option value="6">6 personas</option>
<option value="7">7 personas</option><option value="8">8+ personas</option>
</select></label>
<button class="btn" onclick="calc()">Calcular</button>
<div class="result" id="result">
<div class="row"><span>Subtotal</span><span id="rSub">$0</span></div>
<div class="row"><span>Propina (<span id="rPct">15</span>%)</span><span id="rTip">$0</span></div>
<div class="row total"><span>Total</span><span id="rTotal">$0</span></div>
<div class="per-person">
<div class="lbl">Cada quien pone:</div>
<div class="big" id="rPer">$0</div>
<div class="lbl" id="rPeople">por persona</div>
</div>
<button class="share-btn" onclick="share()">Compartir por WhatsApp</button>
</div>
</div>
<div style="height:60px"></div>
<div class="footer-bar"><span>Propinas — XLMX</span><a href="mailto:info@bimxl.com">Contacto</a></div>
<script>
let tipPct=15;
function setTip(p){document.querySelectorAll('.tip-opt').forEach(x=>x.classList.remove('on'));if(p===0){document.getElementById('customTip').style.display='block';document.querySelectorAll('.tip-opt')[3].classList.add('on');tipPct=parseInt(document.getElementById('customPct').value)||15;}else{document.getElementById('customTip').style.display='none';tipPct=p;document.querySelectorAll('.tip-opt').forEach(x=>{if(x.querySelector('.pct').textContent===p+'%')x.classList.add('on');});}}
function calc(){const total=parseFloat(document.getElementById('total').value)||0;if(!total)return alert('Ingresa el total de la cuenta.');if(tipPct===0)tipPct=parseInt(document.getElementById('customPct').value)||15;const ppl=parseInt(document.getElementById('people').value);const tip=total*tipPct/100;const grand=total+tip;const per=grand/ppl;document.getElementById('rSub').textContent='$'+total.toFixed(2);document.getElementById('rPct').textContent=tipPct;document.getElementById('rTip').textContent='$'+tip.toFixed(2);document.getElementById('rTotal').textContent='$'+grand.toFixed(2);document.getElementById('rPer').textContent='$'+per.toFixed(2);document.getElementById('rPeople').textContent=ppl+' personas';document.getElementById('result').style.display='block';}
function share(){const total=document.getElementById('rTotal').textContent;const per=document.getElementById('rPer').textContent;const ppl=document.getElementById('people').value;const msg=`Cuenta del restaurante:\nTotal con propina: ${total}\nSomos ${ppl} personas\nCada quien pone: ${per}\n\nxlmx.bimxl.com`;window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');}
</script>
</body>
</html>
