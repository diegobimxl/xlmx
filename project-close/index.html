<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Project Closeout — XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:24px}.card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:20px;margin-bottom:16px}.card-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}.result-box{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:14px;text-align:center}.result-val{font-size:22px;font-weight:700;color:#16a34a}.result-lbl{font-size:11px;color:#666;margin-top:4px}.prog-bar{height:8px;background:#222;border-radius:4px;overflow:hidden;margin-top:8px}.prog-fill{height:100%;border-radius:4px;background:#16a34a;transition:width .4s}.section-head{font-size:13px;font-weight:600;color:#fff;margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid #222}.check-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #111}.check-item:last-child{border-bottom:none}.chk{width:18px;height:18px;border-radius:4px;border:1px solid #333;background:#111;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px}.chk.done{background:#16a34a;border-color:#16a34a}.item-text{flex:1;font-size:13px;color:#bbb}.item-text.done{color:#555;text-decoration:line-through}.item-note{font-size:11px;color:#555;margin-top:2px}.na-btn{font-size:10px;color:#555;background:transparent;border:1px solid #333;border-radius:4px;padding:2px 6px;cursor:pointer;margin-left:auto;flex-shrink:0}.na-btn.active{color:#818cf8;border-color:#818cf8}</style></head><body><h1>Project Closeout Checklist</h1><div class="sub">AIA / standard closeout process — track completion to Substantial Completion</div><div class="result-grid" id="summary"></div><div id="checklist"></div><script>var sections=[{title:"Inspections and Approvals",items:[{t:"Certificate of Occupancy obtained",n:"Required from AHJ before owner occupancy"},{t:"Final building inspection passed",n:""},{t:"Fire marshal final inspection",n:""},{t:"Health department approval (if applicable)",n:""},{t:"Elevator final inspection and certificate",n:""}]},{title:"Punch List and Quality",items:[{t:"Final punch list issued to GC",n:""},{t:"Punch list 100% complete",n:"Verify all items signed off"},{t:"Final cleaning complete",n:"Owner-accepted standard"},{t:"Touch-up painting complete",n:""},{t:"All damaged materials replaced",n:""}]},{title:"Systems Commissioning",items:[{t:"Mechanical systems commissioned",n:"TAB report received"},{t:"Electrical systems tested",n:""},{t:"Fire alarm system tested and certified",n:""},{t:"Access control and security systems operational",n:""},{t:"Building automation system (BAS) operational",n:""}]},{title:"Documentation and Closeout Submittals",items:[{t:"As-built drawings received from GC",n:"Redline set or BIM LOD 500"},{t:"O+M manuals delivered to Owner",n:""},{t:"Warranty documentation package assembled",n:""},{t:"Attic stock / spare materials delivered",n:""},{t:"Keys and access cards turned over",n:""}]},{title:"Financial Closeout",items:[{t:"Final application for payment submitted",n:""},{t:"All change orders executed and closed",n:""},{t:"Lien waivers — all subs and suppliers",n:""},{t:"Certificate of Substantial Completion signed",n:""},{t:"Retainage released",n:"Verify holdback per contract"}]},{title:"Owner Handover",items:[{t:"Owner orientation and training complete",n:"All major systems demonstrated"},{t:"Final commissioning report delivered",n:""},{t:"Occupancy checklist signed by Owner",n:""},{t:"Warranty period start date confirmed",n:""},{t:"Project closeout letter issued",n:""}]}];var state=JSON.parse(localStorage.getItem("closeout")||"{}");function save(){localStorage.setItem("closeout",JSON.stringify(state));}function toggle(key){state[key]=state[key]==="done"?"":state[key]==="na"?"done":"done";save();render();}function toggleNA(key){state[key]=state[key]==="na"?"":"na";save();render();}function render(){var total=0,done=0,na=0;sections.forEach(function(s){s.items.forEach(function(it){total++;var k=s.title+it.t;if(state[k]==="done")done++;if(state[k]==="na")na++;});});var pct=Math.round(done/(total-na||1)*100);document.getElementById("summary").innerHTML="<div class=\"result-box\"><div class=\"result-val\">"+total+"</div><div class=\"result-lbl\">Total Items</div></div><div class=\"result-box\"><div class=\"result-val\">"+done+"</div><div class=\"result-lbl\">Complete</div></div><div class=\"result-box\"><div class=\"result-val\" style=\"color:#818cf8\">"+na+"</div><div class=\"result-lbl\">N/A</div></div><div class=\"result-box\"><div class=\"result-val\">"+pct+"%</div><div class=\"result-lbl\">Progress</div></div>";var cl=document.getElementById("checklist");cl.innerHTML="";var secDone=0;sections.forEach(function(s){var sh=document.createElement("div");sh.className="section-head";var sCount=s.items.filter(function(it){return state[s.title+it.t]==="done";}).length;sh.textContent=s.title+" ("+sCount+"/"+s.items.length+")";cl.appendChild(sh);var card=document.createElement("div");card.className="card";s.items.forEach(function(it){var k=s.title+it.t;var isDone=state[k]==="done";var isNA=state[k]==="na";var row=document.createElement("div");row.className="check-item";var chk=document.createElement("div");chk.className="chk"+(isDone?" done":"");chk.innerHTML=isDone?"<svg width=10 height=8 viewBox=\"0 0 10 8\"><path d=\"M1 4l3 3 5-6\" stroke=\"#fff\" stroke-width=\"1.5\" fill=\"none\"/></svg>":"";chk.onclick=function(){toggle(k);};var txt=document.createElement("div");txt.className="item-text"+(isDone?" done":"");txt.textContent=it.t;if(it.n){var note=document.createElement("div");note.className="item-note";note.textContent=it.n;txt.appendChild(note);}var naBtn=document.createElement("button");naBtn.className="na-btn"+(isNA?" active":"");naBtn.textContent="N/A";naBtn.onclick=function(){toggleNA(k);};row.appendChild(chk);row.appendChild(txt);row.appendChild(naBtn);card.appendChild(row);});cl.appendChild(card);});}render();</script></body></html>
