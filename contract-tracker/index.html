<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Contract Tracker - XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:20px}label{font-size:11px;color:#888;display:block;margin-bottom:3px}input,select{background:#1a1a1a;border:1px solid #333;color:#fff;padding:7px 10px;border-radius:5px;font-size:12px}input[type=date]{color-scheme:dark}.btn{background:#16a34a;color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600}.btn-s{background:#1a1a1a;border:1px solid #333;color:#aaa;padding:7px 12px;border-radius:5px;font-size:11px;cursor:pointer}.add-form{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:16px;margin-bottom:16px;display:grid;grid-template-columns:2fr 1.5fr 1fr 1fr 1fr 1fr auto;gap:8px;align-items:flex-end}@media(max-width:800px){.add-form{grid-template-columns:1fr 1fr}}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}.stat{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:14px;text-align:center}.sv{font-size:20px;font-weight:700;color:#16a34a}.sl{font-size:10px;color:#666;margin-top:3px}.tbl{width:100%;border-collapse:collapse}.tbl th{font-size:11px;color:#555;text-align:left;padding:8px 10px;border-bottom:1px solid #222;background:#0a0a0a}.tbl td{font-size:12px;padding:8px 10px;border-bottom:1px solid #1a1a1a;color:#ccc}.badge{font-size:10px;padding:2px 7px;border-radius:3px;font-weight:600}.s-active{background:#14532d;color:#86efac}.s-pending{background:#1e3a5f;color:#93c5fd}.s-expired{background:#7f1d1d;color:#fca5a5}.s-draft{background:#374151;color:#d1d5db}.s-completed{background:#3b1d6e;color:#c4b5fd}.del{background:none;border:none;color:#666;cursor:pointer;font-size:16px}.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}</style></head><body><h1>Contract Tracker</h1><div class="sub">Track all project contracts — value, status, expiry, renewal alerts</div><div class="stats" id="stats"></div><div class="add-form"><div><label>Contract Name</label><input id="cn" placeholder="BIM Services Agreement" style="width:100%"></div><div><label>Client</label><input id="cl" placeholder="Apex Architects" style="width:100%"></div><div><label>Value (USD)</label><input type="number" id="cv" style="width:100%"></div><div><label>Start</label><input type="date" id="cs" style="width:100%"></div><div><label>Expiry</label><input type="date" id="ce" style="width:100%"></div><div><label>Status</label><select id="cst" style="width:100%"><option value="active">Active</option><option value="pending">Pending</option><option value="draft">Draft</option><option value="completed">Completed</option><option value="expired">Expired</option></select></div><div style="display:flex;align-items:flex-end"><button class="btn" onclick="add()">+ Add</button></div></div><div class="filter-bar"><select id="fst" onchange="render()" style="background:#1a1a1a;border:1px solid #333;color:#fff;padding:7px 10px;border-radius:5px;font-size:12px"><option value="">All</option><option value="active">Active</option><option value="pending">Pending</option><option value="draft">Draft</option><option value="completed">Completed</option><option value="expired">Expired</option></select><input id="fs" placeholder="Search..." oninput="render()" style="width:180px;background:#1a1a1a;border:1px solid #333;color:#fff;padding:7px 10px;border-radius:5px;font-size:12px"><button class="btn-s" onclick="exportCSV()">Export CSV</button></div><table class="tbl"><thead><tr><th>Contract</th><th>Client</th><th>Value</th><th>Start</th><th>Expiry</th><th>Days Left</th><th>Status</th><th></th></tr></thead><tbody id="tb"></tbody></table>
<script>var C=JSON.parse(localStorage.getItem("ct")||"[]");var td=new Date().toISOString().slice(0,10);document.getElementById("cs").value=td;function save(){localStorage.setItem("ct",JSON.stringify(C));}function add(){var n=document.getElementById("cn").value.trim();if(!n)return;C.push({id:Date.now(),name:n,client:document.getElementById("cl").value,value:parseFloat(document.getElementById("cv").value)||0,start:document.getElementById("cs").value,expiry:document.getElementById("ce").value,status:document.getElementById("cst").value});save();render();document.getElementById("cn").value="";}function dl(e){if(!e)return null;return Math.round((new Date(e)-new Date())/86400000);}function render(){var fs=document.getElementById("fst").value;var fq=(document.getElementById("fs").value||"").toLowerCase();var f=C.filter(function(c){return(!fs||c.status==fs)&&(!fq||c.name.toLowerCase().includes(fq)||c.client.toLowerCase().includes(fq));});var tot=f.reduce(function(a,c){return a+c.value;},0);var act=f.filter(function(c){return c.status=="active";}).length;document.getElementById("stats").innerHTML="<div class=stat><div class=sv>"+f.length+"</div><div class=sl>Contracts</div></div><div class=stat><div class=sv>"+act+"</div><div class=sl>Active</div></div><div class=stat><div class=sv>$"+Math.round(tot/1000)+"K</div><div class=sl>Value (USD)</div></div>";var rows="";f.sort(function(a,b){return(a.expiry||"9").localeCompare(b.expiry||"9");}).forEach(function(c){var d=dl(c.expiry),dt=d===null?"N/A":d<0?"EXPIRED":d+"d",dc=d===null?"#555":d<0?"#f87171":d<30?"#facc15":"#aaa";rows+="<tr><td style=font-weight:600;color:#fff>"+c.name+"</td><td>"+c.client+"</td><td>$"+c.value.toLocaleString()+"</td><td>"+c.start+"</td><td>"+c.expiry+"</td><td style=color:"+dc+">"+dt+"</td><td><span class=\"badge s-"+c.status+"\">"+c.status+"</span></td><td><button class=del onclick=\"rm("+c.id+")\">x</button></td></tr>";});document.getElementById("tb").innerHTML=rows||"<tr><td colspan=8 style=text-align:center;color:#444;padding:24px>No contracts.</td></tr>";}function rm(id){if(confirm("Remove?"))C=C.filter(function(c){return c.id!=id;});save();render();}function exportCSV(){var csv="Name,Client,Value,Start,Expiry,Status\n";C.forEach(function(c){csv+=c.name+","+c.client+","+c.value+","+c.start+","+c.expiry+","+c.status+"\n";});var a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="contracts.csv";a.click();}if(!C.length){C=[{id:1,name:"BIM Consulting MOB",client:"Apex Architects",value:45000,start:"2025-01-15",expiry:"2025-12-31",status:"active"}];save();}render();</script></body></html>
