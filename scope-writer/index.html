<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Scope of Work Generator - XLMX</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#111;color:#fff;min-height:100vh;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#888;margin-bottom:24px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:600px){.grid2{grid-template-columns:1fr}}.card{background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:18px;margin-bottom:14px}.ct{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}label{font-size:11px;color:#777;display:block;margin-bottom:3px}input,select,textarea{width:100%;background:#111;border:1px solid #333;color:#fff;padding:8px 11px;border-radius:5px;font-size:12px;font-family:inherit}textarea{resize:vertical;min-height:70px}.btn{background:#16a34a;color:#fff;border:none;padding:9px 20px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;margin-right:8px}.btn-s{background:#1a1a1a;border:1px solid #333;color:#aaa;padding:9px 16px;border-radius:6px;font-size:12px;cursor:pointer}.cb{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}.ck{display:flex;align-items:center;gap:6px;background:#111;border:1px solid #333;border-radius:4px;padding:5px 10px;cursor:pointer;font-size:12px;color:#aaa;user-select:none}.ck input{width:auto;margin:0}.ck:hover{border-color:#16a34a;color:#fff}.out{background:#0a0a0a;border:1px solid #222;border-radius:8px;padding:20px;font-family:Courier New,monospace;font-size:12px;line-height:1.8;white-space:pre-wrap;color:#ccc;max-height:600px;overflow-y:auto;margin-top:16px}.tabs{display:flex;gap:4px;margin-bottom:20px}.tab{padding:7px 18px;background:#1a1a1a;border:1px solid #333;border-radius:6px;cursor:pointer;font-size:12px;color:#888}.tab.active{background:#16a34a;border-color:#16a34a;color:#fff}.panel{display:none}.panel.active{display:block}</style></head><body>
<h1>Scope of Work Generator</h1><div class="sub">Generate a professional SOW for any AEC consulting engagement</div><div class="tabs"><div class="tab active" onclick="sw(0)">Form</div><div class="tab" onclick="sw(1)">Output</div></div><div class="panel active" id="pf"><div class="card"><div class="ct">Project Info</div><div class="grid2"><div><label>Client Name</label><input id="client" placeholder="Apex Architects"></div><div><label>Project Name</label><input id="proj" placeholder="Medical Office Building - LOD 400"></div><div><label>Service Type</label><select id="stype"><option>BIM Consulting</option><option>Architectural Design</option><option>Design Management</option><option>Project Management</option><option>VDC / Coordination</option><option>Construction Administration</option><option>Feasibility Study</option><option>Due Diligence</option></select></div><div><label>Delivery Method</label><select id="deliv"><option>Design-Bid-Build</option><option>Design-Build</option><option>CM at Risk</option><option>Integrated Project Delivery</option><option>Lump Sum Contract</option><option>Hourly / T&M</option></select></div><div><label>Start Date</label><input type="date" id="sd" style="color-scheme:dark"></div><div><label>End Date / Duration</label><input id="dur" placeholder="6 months / Dec 2025"></div></div></div><div class="card"><div class="ct">Services Included</div><div class="cb" id="svc-list"></div></div><div class="card"><div class="ct">Deliverables</div><div class="cb" id="del-list"></div></div><div class="card"><div class="ct">Exclusions</div><textarea id="excl" placeholder="Structural engineering, MEP design, permitting fees, printing costs..."></textarea></div><div class="card"><div class="ct">Compensation</div><div class="grid2"><div><label>Fee Type</label><select id="ftype"><option>Lump Sum</option><option>Hourly Rate</option><option>% of Construction Cost</option><option>Monthly Retainer</option></select></div><div><label>Amount / Rate</label><input id="fee" placeholder="$45,000 USD"></div><div><label>Payment Schedule</label><input id="pay" placeholder="30% kickoff, 30% DD, 40% CD completion"></div><div><label>Reimbursables</label><input id="reimb" placeholder="Travel, printing at cost + 10%"></div></div></div><div class="card"><div class="ct">Additional Terms</div><textarea id="terms" placeholder="Revisions: up to 2 rounds per phase. Changes beyond scope require written amendment..."></textarea></div><button class="btn" onclick="gen()">Generate SOW</button><button class="btn-s" onclick="clr()">Clear</button></div><div class="panel" id="po"><button class="btn" onclick="cp()">Copy</button><button class="btn-s" onclick="sw(0)">Back</button><div class="out" id="out"></div></div>
<script>var svcs=["BIM Modeling (Revit)","BIM Coordination","LOD Compliance Review","Clash Detection","VDC / 4D Scheduling","Quantity Takeoffs","Shop Drawing Review","Site Observation","Design Review","Submittal Review","RFI Management","As-Built Documentation","ISO 19650 Setup","ACC / CDE Administration","MEP Coordination","Structural Coordination","Facade Engineering Coordination","Energy Model Review","Code Compliance Review","Permit Support"];var dels=["Revit Model (NWC/RVT)","Navisworks Coordination Model","BIM Execution Plan (BEP)","LOD Matrix","Clash Reports","Issue Log","Meeting Minutes","Construction Documents (PDF)","Specifications (CSI)","Schedule of Values","Shop Drawing Log","RFI Log","As-Built Model","Closeout Package"];function mk(arr,cid){var c=document.getElementById(cid);arr.forEach(function(x){var l=document.createElement("label");l.className="ck";l.innerHTML="<input type=checkbox> "+x;c.appendChild(l);});}mk(svcs,"svc-list");mk(dels,"del-list");function getChecked(cid){var out=[];document.querySelectorAll("#"+cid+" input:checked").forEach(function(el){out.push(el.parentNode.textContent.trim());});return out;}function v(id){return document.getElementById(id).value.trim();}function gen(){var sep="=".repeat(60);var out=sep+"\nSCOPE OF WORK\n"+sep+"\nClient:           "+v("client")+"\nProject:          "+v("proj")+"\nService Type:     "+v("stype")+"\nDelivery Method:  "+v("deliv")+"\nStart Date:       "+v("sd")+"\nDuration / End:   "+v("dur")+"\n\n";var s=getChecked("svc-list");if(s.length){out+="SERVICES INCLUDED\n";s.forEach(function(x,i){out+=(i+1)+". "+x+"\n";});out+="\n";}var d=getChecked("del-list");if(d.length){out+="DELIVERABLES\n";d.forEach(function(x,i){out+=(i+1)+". "+x+"\n";});out+="\n";}var ex=v("excl");if(ex)out+="EXCLUSIONS\n"+ex+"\n\n";out+="COMPENSATION\nFee Type:         "+v("ftype")+"\nAmount / Rate:    "+v("fee")+"\nPayment:          "+v("pay")+"\nReimbursables:    "+v("reimb")+"\n\n";var t=v("terms");if(t)out+="ADDITIONAL TERMS\n"+t+"\n\n";out+=sep+"\nGenerated by XLMX Scope of Work Generator\n";document.getElementById("out").textContent=out;sw(1);}function cp(){navigator.clipboard.writeText(document.getElementById("out").textContent).then(function(){alert("Copied!");});}function clr(){["client","proj","sd","dur","fee","pay","reimb","excl","terms"].forEach(function(id){document.getElementById(id).value="";});document.querySelectorAll(".ck input").forEach(function(el){el.checked=false;});}function sw(i){document.querySelectorAll(".tab").forEach(function(e,j){e.classList.toggle("active",i==j);});document.querySelectorAll(".panel").forEach(function(e,j){e.classList.toggle("active",i==j);});}</script></body></html>
