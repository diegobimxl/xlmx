<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Camera Lens Calculator — XLMX</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#111;color:#fff;font-family:Inter,system-ui,sans-serif;min-height:100vh;padding:20px}
h1{font-size:1.6rem;margin-bottom:4px}p.sub{color:#999;margin-bottom:20px;font-size:.85rem}
.card{background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:.8rem;margin-bottom:4px}
input,select{width:100%;padding:10px;background:#222;border:1px solid #444;border-radius:8px;color:#fff;font-size:.95rem;margin-bottom:12px}
button{width:100%;padding:12px;background:#16a34a;color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:600}
button:hover{background:#15803d}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.kbox{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:14px;text-align:center}
.kbox .v{font-size:1.2rem;font-weight:700;color:#16a34a}.kbox .l{color:#aaa;font-size:.7rem;margin-top:4px}
.row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #222;font-size:.85rem}
.row span:first-child{color:#aaa}
.fov-vis{height:80px;position:relative;margin-bottom:16px}
canvas{display:block;width:100%;height:80px;border-radius:6px}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.preset{padding:6px 12px;background:#222;border:1px solid #333;border-radius:6px;cursor:pointer;font-size:.78rem}
.preset:hover{border-color:#16a34a;color:#16a34a}
a.back{color:#16a34a;text-decoration:none;font-size:.85rem;display:inline-block;margin-bottom:16px}
@media(max-width:600px){.grid2,.kpi{grid-template-columns:1fr}}
</style></head><body>
<a class="back" href="/">← XLMX</a>
<h1>Camera Lens Calculator</h1>
<p class="sub">Focal length, field of view, subject width, and hyperfocal distance — for architecture photography</p>
<div class="presets">
<span style="color:#aaa;font-size:.78rem;align-self:center">Quick:</span>
<div class="preset" onclick="setLens(14)">14mm Ultra-wide</div>
<div class="preset" onclick="setLens(24)">24mm Wide</div>
<div class="preset" onclick="setLens(35)">35mm Classic</div>
<div class="preset" onclick="setLens(50)">50mm Standard</div>
<div class="preset" onclick="setLens(85)">85mm Portrait</div>
<div class="preset" onclick="setLens(16);setSensor('APS-C')">16mm APS-C</div>
</div>
<div class="card">
<div class="grid2">
<div><label>Focal Length (mm)</label><input id="fl" type="number" value="24" step="1"></div>
<div><label>Sensor Format</label>
<select id="sensor">
<option value="1.0">Full Frame (35mm)</option>
<option value="1.5">APS-C (Nikon, Sony, Fuji)</option>
<option value="1.6">APS-C (Canon)</option>
<option value="2.0">Micro Four Thirds</option>
<option value="0.64">Medium Format (44×33)</option>
</select></div>
<div><label>Distance to Subject (m)</label><input id="dist" type="number" value="10" step="0.5"></div>
<div><label>Aperture (f/)</label>
<select id="ap"><option>1.4</option><option>1.8</option><option>2.0</option><option>2.8</option><option value="4" selected>4</option><option>5.6</option><option>8</option><option>11</option><option>16</option></select></div>
</div>
<button onclick="calc()">Calculate</button>
</div>
<div id="res" style="display:none">
<div class="kpi" id="kpi"></div>
<canvas id="cv" width="600" height="80"></canvas>
<div class="card" style="margin-top:12px" id="det"></div>
</div>
<script>
function setLens(fl){document.getElementById('fl').value=fl;calc()}
function setSensor(s){/* simplified */}
const toRad=d=>d*Math.PI/180;const toDeg=r=>r*180/Math.PI;
function calc(){
  const fl=+document.getElementById('fl').value;
  const crop=+document.getElementById('sensor').value;
  const dist=+document.getElementById('dist').value;
  const ap=+document.getElementById('ap').value;
  const efl=fl*crop; // equivalent focal length on full frame
  // Full frame sensor: 36×24mm
  const sw=36,sh=24;
  const fovH=2*toDeg(Math.atan(sw/(2*efl)));
  const fovV=2*toDeg(Math.atan(sh/(2*efl)));
  const fovD=2*toDeg(Math.atan(Math.sqrt(sw*sw+sh*sh)/(2*efl)));
  // Subject width at distance
  const subW=2*dist*Math.tan(toRad(fovH/2));
  const subH=2*dist*Math.tan(toRad(fovV/2));
  // Hyperfocal distance (CoC = 0.029mm for FF)
  const coc=0.029/crop;
  const hyp=fl*fl/(ap*coc*1000);
  // DoF
  const dofNear=dist*hyp/(hyp+dist);
  const dofFar=dist*hyp/(hyp-dist)>0?dist*hyp/(hyp-dist):Infinity;
  const dof=dofFar===Infinity?'∞':(dofFar-dofNear).toFixed(1)+'m';
  document.getElementById('res').style.display='block';
  document.getElementById('kpi').innerHTML=
    `<div class="kbox"><div class="v">${fovH.toFixed(1)}°</div><div class="l">Horizontal FOV</div></div>`+
    `<div class="kbox"><div class="v">${subW.toFixed(1)} m</div><div class="l">Subject Width at ${dist}m</div></div>`+
    `<div class="kbox"><div class="v">${hyp.toFixed(1)} m</div><div class="l">Hyperfocal Distance</div></div>`;
  // Draw FOV diagram
  const cv=document.getElementById('cv');const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,600,80);ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,600,80);
  const ang=toRad(fovH/2);const cx=60,cy=40;
  ctx.strokeStyle='#16a34a';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+520*Math.cos(-ang),cy+520*Math.sin(-ang));ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+520*Math.cos(ang),cy+520*Math.sin(ang));ctx.stroke();
  ctx.strokeStyle='#333';ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(580,cy);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#16a34a';ctx.beginPath();ctx.arc(cx,cy,5,0,2*Math.PI);ctx.fill();
  ctx.fillStyle='#555';ctx.fillRect(cx+dist/20*100,cy-20,4,40);
  ctx.fillStyle='#aaa';ctx.font='11px sans-serif';ctx.fillText(`Camera`,cx+4,cy-10);
  ctx.fillText(`${dist}m`,cx+dist/20*100+6,cy-8);ctx.fillText(`${subW.toFixed(1)}m wide`,cx+dist/20*100+8,cy+8);
  ctx.fillStyle='#fff';ctx.font='12px sans-serif';ctx.fillText(`FOV: ${fovH.toFixed(0)}°h × ${fovV.toFixed(0)}°v`,cx+200,cy-8);
  document.getElementById('det').innerHTML=
    `<div class="row"><span>Equivalent focal length (on FF)</span><span>${efl} mm</span></div>`+
    `<div class="row"><span>Sensor format / crop factor</span><span>×${crop}</span></div>`+
    `<div class="row"><span>Horizontal FOV</span><span>${fovH.toFixed(1)}°</span></div>`+
    `<div class="row"><span>Vertical FOV</span><span>${fovV.toFixed(1)}°</span></div>`+
    `<div class="row"><span>Diagonal FOV</span><span>${fovD.toFixed(1)}°</span></div>`+
    `<div class="row"><span>Subject width × height at ${dist}m</span><span>${subW.toFixed(1)} × ${subH.toFixed(1)} m</span></div>`+
    `<div class="row"><span>Hyperfocal distance (f/${ap})</span><span>${hyp.toFixed(1)} m</span></div>`+
    `<div class="row"><span>Depth of field at ${dist}m</span><span>${dof}</span></div>`+
    `<div class="row"><span>Arch photography use</span><span>${fl<=20?'Ultra-wide: dramatic, distortion':fl<=35?'Wide: great for interiors, minimal distortion':fl<=70?'Normal: balanced, natural look':'Tele: compressed perspective, detail shots'}</span></div>`;
}
calc();
</script></body></html>
