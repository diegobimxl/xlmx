<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Planner - XLMX</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#fff;font-family:'Inter',system-ui,sans-serif;min-height:100vh;padding:2rem}
.back{display:inline-block;color:#16a34a;text-decoration:none;font-size:.85rem;margin-bottom:2rem}
.back:hover{text-decoration:underline}
h1{font-size:1.8rem;font-weight:600;margin-bottom:.5rem}
.sub{color:#888;margin-bottom:2rem;font-size:.95rem}
.add-form{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:1.5rem;margin-bottom:1.5rem}
.add-form h2{font-size:.9rem;font-weight:600;color:#16a34a;margin-bottom:1rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}
@media(max-width:640px){.form-grid{grid-template-columns:1fr 1fr}}
label{display:block;font-size:.75rem;color:#888;margin-bottom:.25rem}
input,select,textarea{width:100%;background:#111;border:1px solid #333;color:#fff;padding:.45rem .7rem;border-radius:5px;font-size:.82rem;font-family:inherit}
textarea{resize:vertical;min-height:55px}
input:focus,select:focus,textarea:focus{outline:none;border-color:#16a34a}
.btn{background:#16a34a;color:#fff;border:none;padding:.55rem 1.25rem;border-radius:6px;font-size:.85rem;cursor:pointer;font-family:inherit;font-weight:500;margin-top:.75rem}
.btn:hover{background:#15803d}
.toolbar{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.filter-btn{background:#1a1a1a;border:1px solid #333;color:#888;padding:.3rem .75rem;border-radius:5px;font-size:.78rem;cursor:pointer}
.filter-btn.active{background:#16a34a22;border-color:#16a34a;color:#16a34a}
.project-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.proj-card{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:1.25rem;position:relative}
.proj-card:hover{border-color:#444}
.proj-title{font-size:.95rem;font-weight:600;margin-bottom:.3rem}
.proj-type{font-size:.72rem;color:#16a34a;background:#16a34a22;display:inline-block;padding:.1rem .4rem;border-radius:3px;margin-bottom:.5rem}
.proj-desc{font-size:.78rem;color:#aaa;line-height:1.5;margin-bottom:.75rem}
.proj-meta{display:flex;gap:.75rem;font-size:.72rem;color:#666}
.proj-score{position:absolute;top:1rem;right:1rem;background:#16a34a;color:#fff;border-radius:4px;padding:.2rem .5rem;font-size:.72rem;font-weight:600}
.proj-actions{margin-top:.75rem;display:flex;gap:.4rem}
.act-btn{background:#222;border:1px solid #333;color:#888;padding:.25rem .6rem;border-radius:4px;font-size:.7rem;cursor:pointer}
.act-btn:hover{color:#fff}
.act-btn.del:hover{color:#ef4444;border-color:#ef4444}
.stats-row{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
.stat{background:#1a1a1a;border:1px solid #333;border-radius:7px;padding:.75rem 1.25rem;flex:1;min-width:100px;text-align:center}
.stat-val{font-size:1.5rem;font-weight:600;color:#16a34a}
.stat-label{font-size:.72rem;color:#888;margin-top:.15rem}
.empty{text-align:center;color:#555;font-size:.88rem;padding:3rem}
</style>
</head>
<body>
<a class="back" href="/">back XLMX</a>
<h1>Portfolio Planner</h1>
<p class="sub">Curate, organize, and score your architecture portfolio projects for maximum impact.</p>

<div class="stats-row" id="statsRow"></div>

<div class="add-form">
  <h2>Add Project</h2>
  <div class="form-grid">
    <div><label>Project Name</label><input type="text" id="pName" placeholder="e.g. Torre Project Beta"></div>
    <div><label>Type</label>
      <select id="pType"><option>Residential</option><option>Commercial</option><option>Cultural</option><option>Mixed-Use</option><option>Urban Design</option><option>Interior</option><option>Landscape</option><option>Industrial</option><option>Academic</option><option>Concept</option></select>
    </div>
    <div><label>Year</label><input type="number" id="pYear" value="2024" min="1990" max="2030"></div>
    <div><label>Role</label>
      <select id="pRole"><option>Lead Architect</option><option>Design Architect</option><option>Project Architect</option><option>BIM Manager</option><option>Project Manager</option><option>Collaborator</option></select>
    </div>
    <div><label>Status</label>
      <select id="pStatus"><option>Built</option><option>Under Construction</option><option>Design Development</option><option>Concept</option><option>Competition</option><option>Academic</option></select>
    </div>
    <div><label>Impact Score (1-10)</label><input type="number" id="pScore" value="8" min="1" max="10"></div>
  </div>
  <div style="margin-top:.75rem"><label>Description / Key Features</label><textarea id="pDesc" placeholder="Key design moves, awards, area, notable aspects..."></textarea></div>
  <button class="btn" onclick="addProject()">Add to Portfolio</button>
</div>

<div class="toolbar">
  <span style="font-size:.78rem;color:#888">Filter:</span>
  <button class="filter-btn active" onclick="filter('all',this)">All</button>
  <button class="filter-btn" onclick="filter('Built',this)">Built</button>
  <button class="filter-btn" onclick="filter('Under Construction',this)">In Progress</button>
  <button class="filter-btn" onclick="filter('Concept',this)">Concept</button>
  <button class="filter-btn" onclick="filter('Competition',this)">Competition</button>
  <button class="filter-btn active" style="margin-left:.5rem" onclick="sortBy('score')">Sort: Score</button>
  <button class="filter-btn" onclick="sortBy('year')">Sort: Year</button>
  <button class="btn" style="margin-left:auto;margin-top:0;font-size:.75rem;padding:.3rem .7rem" onclick="exportList()">Export List</button>
</div>

<div class="project-grid" id="projGrid"><div class="empty">No projects yet. Add your first project above.</div></div>

<script>
var projects = [];
var currentFilter = 'all';
var currentSort = 'score';

function addProject(){
  var p = {
    id: Date.now(),
    name: document.getElementById('pName').value||'Untitled',
    type: document.getElementById('pType').value,
    year: parseInt(document.getElementById('pYear').value)||2024,
    role: document.getElementById('pRole').value,
    status: document.getElementById('pStatus').value,
    score: parseInt(document.getElementById('pScore').value)||8,
    desc: document.getElementById('pDesc').value
  };
  projects.push(p);
  save(); render();
  document.getElementById('pName').value='';
  document.getElementById('pDesc').value='';
}

function removeProject(id){
  projects=projects.filter(function(p){return p.id!==id;});
  save(); render();
}

function filter(f, el){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  render();
}

function sortBy(s){ currentSort=s; render(); }

function render(){
  var filtered=projects.filter(function(p){return currentFilter==='all'||p.status===currentFilter;});
  if(currentSort==='score')filtered.sort(function(a,b){return b.score-a.score;});
  else filtered.sort(function(a,b){return b.year-a.year;});

  var grid=document.getElementById('projGrid');
  if(!filtered.length){grid.innerHTML='<div class="empty">No projects match this filter.</div>';updateStats();return;}
  grid.innerHTML=filtered.map(function(p){
    return '<div class="proj-card">'
      +'<div class="proj-score">'+p.score+'/10</div>'
      +'<div class="proj-title">'+esc(p.name)+'</div>'
      +'<div class="proj-type">'+p.type+'</div>'
      +'<div class="proj-desc">'+esc(p.desc)+'</div>'
      +'<div class="proj-meta"><span>'+p.year+'</span><span>'+p.role+'</span><span>'+p.status+'</span></div>'
      +'<div class="proj-actions"><button class="act-btn del" onclick="removeProject('+p.id+')">Remove</button></div>'
      +'</div>';
  }).join('');
  updateStats();
}

function updateStats(){
  var total=projects.length;
  var built=projects.filter(function(p){return p.status==='Built';}).length;
  var avgScore=total?Math.round(projects.reduce(function(s,p){return s+p.score;},0)/total):0;
  var types=[...new Set(projects.map(function(p){return p.type;}))].length;
  document.getElementById('statsRow').innerHTML=[
    ['Total Projects',total],['Built',built],['Avg Score',avgScore+'/10'],['Types',types]
  ].map(function(s){return '<div class="stat"><div class="stat-val">'+s[1]+'</div><div class="stat-label">'+s[0]+'</div></div>';}).join('');
}

function exportList(){
  var text=projects.map(function(p){return p.name+' | '+p.type+' | '+p.year+' | '+p.status+' | Score: '+p.score+'/10\n'+p.desc;}).join('\n\n---\n\n');
  navigator.clipboard.writeText(text).catch(function(){});
  alert('Portfolio list copied to clipboard.');
}

function esc(s){return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function save(){try{localStorage.setItem('xlmx_portfolio',JSON.stringify(projects));}catch(e){}}
function load(){try{var d=localStorage.getItem('xlmx_portfolio');if(d)projects=JSON.parse(d);}catch(e){}}

load(); render(); updateStats();
</script>
</body>
</html>
